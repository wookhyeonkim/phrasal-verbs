<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Phrasal Verbs</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0d0d0f;--sf:#16161a;--sf2:#1e1e24;--br:#2a2a33;--ac:#7eb8f7;--ac2:#e8c96d;--ac3:#f07fa0;--ac4:#8adfb4;--tx:#f0eff4;--mu:#888899;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;}
.hdr{padding:14px 18px 0;text-align:center;position:sticky;top:0;background:var(--bg);z-index:100;border-bottom:1px solid var(--br);}
.hdr h1{font-family:'Playfair Display',serif;font-size:22px;color:var(--ac);letter-spacing:1px;margin-bottom:1px;}
.hdr p{font-size:10.5px;color:var(--mu);margin-bottom:9px;}
.tabs{display:flex;background:var(--sf);border-radius:9px 9px 0 0;overflow:hidden;margin:0 -18px;}
.tb{flex:1;padding:10px 3px;background:none;border:none;color:var(--mu);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;position:relative;}
.tb.on{color:var(--ac);background:var(--sf2);}
.tb.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--ac);}
.badge{display:inline-block;background:var(--ac3);color:#fff;font-size:8.5px;border-radius:8px;padding:1px 5px;margin-left:2px;font-weight:700;}
.pnl{display:none;}.pnl.on{display:block;}
.ctrl{padding:10px 14px;display:flex;gap:7px;align-items:center;position:sticky;top:108px;z-index:90;background:var(--bg);border-bottom:1px solid var(--br);}
.ctrl input{flex:1;background:var(--sf);border:1px solid var(--br);border-radius:9px;padding:7px 11px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.ctrl input::placeholder{color:var(--mu);}
.ctrl input:focus{border-color:var(--ac);}
.btn{background:var(--sf2);border:1px solid var(--br);border-radius:9px;padding:7px 11px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:500;cursor:pointer;white-space:nowrap;}
.btn:active{transform:scale(.96);}
.btn.a{background:var(--ac);color:#0d0d0f;border-color:var(--ac);font-weight:700;}
.btn.g{background:var(--ac4);color:#0d0d0f;border-color:var(--ac4);font-weight:700;}
/* base filter */
.bf{padding:6px 14px;display:flex;gap:6px;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--br);}
.bf-btn{background:var(--sf2);border:1px solid var(--br);border-radius:8px;padding:5px 12px;color:var(--mu);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.bf-btn.on{border-color:var(--ac);color:var(--ac);background:rgba(126,184,247,.12);}
.pi{padding:6px 14px;display:flex;justify-content:space-between;align-items:center;font-size:10.5px;color:var(--mu);}
.pnav{display:flex;gap:5px;align-items:center;}
.pnav button{background:var(--sf);border:1px solid var(--br);border-radius:7px;padding:3px 9px;color:var(--tx);font-size:11px;cursor:pointer;}
.pnav button:disabled{opacity:.3;}
.pnd{font-size:11.5px;color:var(--ac);font-weight:700;min-width:44px;text-align:center;}
.wl{padding:8px 13px 40px;}
/* card */
.wc{background:var(--sf);border:1px solid var(--br);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.ch{display:flex;align-items:flex-start;padding:13px 13px 12px;cursor:pointer;gap:9px;}
.wi{flex:1;min-width:0;}
.wtop{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
.wen{font-family:'Playfair Display',serif;font-size:20px;color:var(--tx);}
.wbase{font-size:9.5px;background:rgba(126,184,247,.12);border:1px solid rgba(126,184,247,.22);color:var(--ac);padding:2px 7px;border-radius:5px;font-weight:600;letter-spacing:.5px;}
.wpron{font-size:11px;color:var(--ac);font-family:monospace;margin-top:1px;}
.wko{font-size:13px;color:var(--ac2);font-weight:600;margin-top:3px;}
.ca{display:flex;gap:5px;align-items:center;flex-shrink:0;margin-top:2px;}
.sbtn{background:var(--sf2);border:1px solid var(--br);border-radius:7px;padding:5px 8px;font-size:15px;cursor:pointer;}
.vbtn{background:none;border:1.5px solid var(--br);border-radius:7px;padding:5px 8px;font-size:15px;cursor:pointer;}
.vbtn.sv{border-color:var(--ac);background:rgba(126,184,247,.1);}
.ei{color:var(--mu);font-size:11px;transition:transform .2s;margin-top:4px;}
.wc.ex .ei{transform:rotate(180deg);}
.cd{display:none;padding:0 13px 14px;border-top:1px solid var(--br);}
.wc.ex .cd{display:block;}
/* nu */
.nu-box{background:rgba(126,184,247,.06);border:1px solid rgba(126,184,247,.18);border-radius:10px;padding:10px 12px;margin-top:11px;font-size:12px;color:#9dc8f5;line-height:1.7;}
.nu-box strong{color:var(--ac);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;}
/* uses */
.uses-box{margin-top:10px;}
.uses-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu);margin-bottom:5px;}
.use-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:4px;}
.use-pat{background:rgba(232,201,109,.1);border:1px solid rgba(232,201,109,.22);color:var(--ac2);font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;white-space:nowrap;font-family:monospace;flex-shrink:0;}
.use-desc{font-size:11.5px;color:var(--mu);line-height:1.5;padding-top:2px;}
/* examples */
.ex-section{margin-top:11px;}
.ex-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu);margin-bottom:5px;}
.exb{font-size:12.5px;color:var(--tx);line-height:1.65;padding:8px 10px;background:var(--sf2);border-radius:9px;border-left:3px solid var(--ac);margin-bottom:5px;}
.exb em{color:var(--ac);font-style:normal;font-weight:700;}
.exko{font-size:10.5px;color:var(--mu);margin-top:2px;}
.exnote{font-size:9.5px;color:rgba(126,184,247,.6);margin-top:1px;font-style:italic;}
/* syn */
.syn-box{margin-top:10px;}
.sg{display:flex;flex-direction:column;gap:4px;}
.sr{display:flex;gap:7px;align-items:flex-start;}
.sc{background:rgba(138,223,180,.1);border:1px solid rgba(138,223,180,.22);color:var(--ac4);font-size:11px;font-weight:600;padding:2px 8px;border-radius:7px;white-space:nowrap;flex-shrink:0;}
.sm{font-size:11px;color:var(--mu);line-height:1.5;padding-top:2px;}
/* rel */
.rc{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.rch{background:rgba(240,127,160,.07);border:1px solid rgba(240,127,160,.18);color:var(--ac3);font-size:10.5px;padding:2px 8px;border-radius:6px;}
/* diff stars */
.ds{display:inline-flex;gap:1px;align-items:center;margin-left:2px;}
.ds span{font-size:10px;}
.d1{color:#8adfb4;}.d2{color:#e8c96d;}.d3{color:#f07fa0;}
/* saved */
.se{text-align:center;padding:50px 18px;color:var(--mu);}
.se .ic{font-size:44px;margin-bottom:10px;}
.svc{padding:10px 14px 0;display:flex;justify-content:flex-end;}
.svl{padding:8px 13px 40px;}
/* quiz */
.qc{padding:16px;}
.qsetup{text-align:center;padding:14px 0;}
.qsetup h2{font-family:'Playfair Display',serif;font-size:21px;color:var(--ac);margin-bottom:7px;}
.qsetup p{font-size:12.5px;color:var(--mu);margin-bottom:18px;line-height:1.6;}
.qm{display:flex;flex-direction:column;gap:9px;}
.qcard{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:24px 16px 18px;text-align:center;margin-bottom:13px;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.qw{font-family:'Playfair Display',serif;font-size:26px;color:var(--tx);margin-bottom:4px;}
.qsub{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;}
.qopts{display:flex;flex-direction:column;gap:8px;}
.qob{background:var(--sf);border:1.5px solid var(--br);border-radius:11px;padding:12px 15px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;text-align:left;}
.qob.ok{border-color:#4cde80;background:rgba(76,222,128,.1);color:#4cde80;}
.qob.no{border-color:var(--ac3);background:rgba(240,127,160,.1);color:var(--ac3);}
.qres{background:var(--sf);border-radius:14px;padding:26px 16px;text-align:center;}
.qres .qsc{font-family:'Playfair Display',serif;font-size:50px;color:var(--ac);line-height:1;}
.pb{height:3px;background:var(--br);border-radius:3px;margin-bottom:14px;}
.pf{height:100%;background:var(--ac);border-radius:3px;transition:width .3s;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.wc{animation:fi .18s ease both;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--br);border-radius:4px;}
</style>
</head>
<body>
<div class="hdr">
  <h1>⟢ Phrasal Verbs</h1>
  <p>구동사 전용 학습 · 쓰임새·뉘앙스·예문 수록</p>
  <div class="tabs">
    <button class="tb on" onclick="sw('vocab')">📖 단어장</button>
    <button class="tb" onclick="sw('saved')">⭐ 저장 <span class="badge" id="sc0">0</span></button>
    <button class="tb" onclick="sw('quiz')">✏️ 퀴즈</button>
  </div>
</div>

<div class="pnl on" id="pnl-vocab">
  <div class="ctrl">
    <input type="search" id="srch" placeholder="구동사 검색..." oninput="onSrch()">
    <button class="btn a" onclick="doShuffle()">🔀 섞기</button>
    <button class="btn g" onclick="nxt()">다음 →</button>
  </div>
  <div class="bf" id="bf">
    <button class="bf-btn on" onclick="setBase('')">전체</button>
  </div>
  <div class="pi">
    <span id="plbl"></span>
    <div class="pnav">
      <button onclick="prv()" id="pbtn">← 이전</button>
      <span class="pnd" id="pnd"></span>
      <button onclick="nxt()" id="nbtn">다음 →</button>
    </div>
  </div>
  <div class="wl" id="wl"></div>
</div>

<div class="pnl" id="pnl-saved">
  <div class="svc"><button class="btn" onclick="clrAll()">🗑️ 전체 삭제</button></div>
  <div class="svl" id="svl"></div>
</div>

<div class="pnl" id="pnl-quiz">
  <div class="qc" id="qc"></div>
</div>

<script>

const PV=[
{w:"get up",pron:"/ɡet ʌp/",ko:"일어나다; 기상하다",base:"get",diff:1,
nu:"침대나 바닥에서 몸을 일으키는 것. 기상 외에 자리에서 일어나거나 규모가 올라가는 뜻도 있다. 'get sb up'은 누군가를 깨우는 것.",
uses:[{pat:"get up (시간에)",desc:"특정 시간에 기상하다"},{pat:"get sb up",desc:"누군가를 깨우다"},{pat:"get up to sth",desc:"(구어) 무언가를 하다·장난치다"}],
ex:[{en:"I <em>get up</em> at 6 every morning to go for a run.",ko:"나는 달리기하러 매일 아침 6시에 일어난다.",note:"기상 시간"},{en:"Could you <em>get</em> the kids <em>up</em>? It's almost 8.",ko:"아이들 좀 깨워줄 수 있어? 거의 8시야.",note:"누군가 깨우기"},{en:"He <em>got up</em> from his chair to greet her.",ko:"그는 그녀를 맞이하려고 의자에서 일어났다.",note:"자리에서 일어나다"},{en:"What did you <em>get up to</em> this weekend?",ko:"이번 주말에 뭐 했어?",note:"구어: 뭘 하다"},{en:"She could barely <em>get up</em> after pulling an all-nighter.",ko:"밤을 새운 뒤 그녀는 간신히 일어날 수 있었다.",note:"힘겹게 기상"}],
syn:[{s:"rise",m:"(격식) 일어나다"},{s:"wake up",m:"잠에서 깨다"},{s:"get out of bed",m:"침대에서 나오다"}],
rel:["get up early 일찍 일어나다","get up on the wrong side 기분이 안 좋다","get-up (n.) 복장·차림새"]},

{w:"get in",pron:"/ɡet ɪn/",ko:"들어오다; 도착하다; 합격하다",base:"get",diff:1,
nu:"장소 안으로 들어오거나 교통수단에 타거나, 대학·팀에 합격하는 것. 'get into'로도 쓴다.",
uses:[{pat:"get in (장소)",desc:"안으로 들어오다"},{pat:"get in (교통수단)",desc:"차·택시 등에 타다"},{pat:"get in (시간)",desc:"비행기·기차가 도착하다"},{pat:"get into + 대학/팀",desc:"합격하다"}],
ex:[{en:"Get in! I'll give you a ride.",ko:"타! 태워다줄게.",note:"차에 타다"},{en:"What time does your flight <em>get in</em>?",ko:"비행기 몇 시에 도착해?",note:"도착 시간"},{en:"She <em>got into</em> her dream university.",ko:"그녀는 꿈의 대학에 합격했다.",note:"합격"},{en:"I couldn't <em>get in</em> — the door was locked.",ko:"못 들어갔어, 문이 잠겨 있었어.",note:"입장 불가"},{en:"He always <em>gets in</em> late on Fridays.",ko:"그는 금요일마다 항상 늦게 들어온다.",note:"귀가·출근"}],
syn:[{s:"arrive",m:"도착하다"},{s:"enter",m:"들어오다"},{s:"be admitted",m:"합격·입학하다"}],
rel:["get in touch 연락하다","get in the way 방해가 되다","get in shape 몸을 만들다"]},

{w:"get out of",pron:"/ɡet aʊt əv/",ko:"빠져나오다; 의무를 피하다; 얻다",base:"get",diff:1,
nu:"물리적으로 나오는 것부터 의무·책임을 교묘히 피하는 것까지. 'get sth out of sth'은 무언가에서 가치를 얻는다는 뜻.",
uses:[{pat:"get out of + 장소",desc:"~에서 나오다"},{pat:"get out of + 의무",desc:"~을 피하다·빠지다"},{pat:"get out of + 습관",desc:"습관에서 벗어나다"},{pat:"get sth out of sth",desc:"~에서 무언가를 얻다"}],
ex:[{en:"I need to <em>get out of</em> this meeting early.",ko:"이 회의에서 일찍 빠져나가야 해.",note:"회의 탈출"},{en:"He always manages to <em>get out of</em> doing the dishes.",ko:"그는 항상 설거지를 빠져나간다.",note:"의무 회피"},{en:"You should <em>get out of</em> the habit of skipping breakfast.",ko:"아침 거르는 습관을 버려야 해.",note:"습관 탈피"},{en:"What do you hope to <em>get out of</em> this course?",ko:"이 강좌에서 무엇을 얻길 바라나요?",note:"얻는 것"},{en:"<em>Get out of</em> the car slowly with your hands up.",ko:"손들고 천천히 차에서 내려.",note:"차에서 내리다"}],
syn:[{s:"escape",m:"탈출하다"},{s:"avoid",m:"피하다"},{s:"dodge",m:"교묘히 빠지다"}],
rel:["get out of bed 기상하다","get out of hand 통제 불능이 되다","get out of line 선을 넘다"]},

{w:"get over",pron:"/ɡet ˈəʊvər/",ko:"극복하다; 회복하다; 믿기지 않다",base:"get",diff:1,
nu:"슬픔·질병·충격을 이겨내는 것. 'can't get over'는 놀라움이나 감동을 표현하는 뉘앙스.",
uses:[{pat:"get over + 병/슬픔",desc:"~에서 회복하다"},{pat:"get over + 사람",desc:"이별 후 잊다"},{pat:"can't get over sth",desc:"믿기지 않다·놀랍다"},{pat:"get over yourself",desc:"(구어) 자만하지 마라"}],
ex:[{en:"It took him months to <em>get over</em> the breakup.",ko:"이별을 극복하는 데 몇 달이 걸렸다.",note:"이별 극복"},{en:"I'm still <em>getting over</em> a cold.",ko:"아직 감기에서 회복 중이야.",note:"병 회복"},{en:"I can't <em>get over</em> how much she's changed.",ko:"그녀가 이렇게 많이 변한 게 믿기지 않아.",note:"놀라움"},{en:"Once you <em>get over</em> the initial fear, flying is fine.",ko:"처음 두려움만 극복하면 비행은 괜찮아.",note:"두려움 극복"},{en:"<em>Get over</em> yourself — it's not always about you.",ko:"좀 내려놔, 세상이 다 너 중심은 아니야.",note:"자만 경계"}],
syn:[{s:"recover from",m:"~에서 회복하다"},{s:"overcome",m:"극복하다"},{s:"bounce back",m:"빠르게 회복하다"}],
rel:["get over a hurdle 장애물을 넘다","hard to get over 극복하기 어려운"]},

{w:"get through",pron:"/ɡet θruː/",ko:"버텨내다; 연락이 닿다; 이해시키다",base:"get",diff:1,
nu:"어려운 상황을 견뎌내거나, 전화가 연결되거나, 상대방을 이해시키는 세 가지 핵심 의미.",
uses:[{pat:"get through + 힘든 시간",desc:"견뎌내다"},{pat:"get through (전화)",desc:"연락이 닿다"},{pat:"get through to sb",desc:"이해시키다·마음에 닿다"},{pat:"get through + 서류/일",desc:"다 처리하다"}],
ex:[{en:"You'll <em>get through</em> this — I believe in you.",ko:"넌 이겨낼 거야, 믿어.",note:"격려"},{en:"I couldn't <em>get through</em> to her on the phone.",ko:"전화로 그녀에게 연락이 안 됐어.",note:"전화"},{en:"It's hard to <em>get through to</em> teenagers sometimes.",ko:"때로는 십 대들을 이해시키기가 어렵다.",note:"소통"},{en:"We have so much work to <em>get through</em> today.",ko:"오늘 처리해야 할 일이 너무 많아.",note:"할 일"},{en:"How did she <em>get through</em> the interview without preparation?",ko:"준비도 없이 어떻게 면접을 통과했지?",note:"면접 통과"}],
syn:[{s:"survive",m:"살아남다"},{s:"endure",m:"견디다"},{s:"contact",m:"연락하다"},{s:"complete",m:"끝내다"}],
rel:["get through the day 하루를 버티다","can't get through 연락이 안 된다"]},

{w:"get away with",pron:"/ɡet əˈweɪ wɪð/",ko:"(나쁜 짓을 하고도) 빠져나가다",base:"get",diff:1,
nu:"잘못이나 규칙 위반을 하고도 처벌·결과 없이 넘어가는 것. 불공정함이나 요행의 뉘앙스.",
uses:[{pat:"get away with + 나쁜 행동",desc:"처벌 없이 빠져나가다"},{pat:"get away with + 최소한",desc:"최소한으로 해도 되다"}],
ex:[{en:"He cheated on the exam and <em>got away with</em> it.",ko:"그는 시험에서 부정행위를 하고도 빠져나갔다.",note:"부정행위"},{en:"She thinks she can <em>get away with</em> anything.",ko:"그녀는 무슨 짓을 해도 빠져나갈 수 있다고 생각해.",note:"버릇"},{en:"You won't <em>get away with</em> that kind of behavior here.",ko:"여기서는 그런 행동을 해도 그냥 넘어가지 않아.",note:"경고"},{en:"Can I <em>get away with</em> wearing jeans to the interview?",ko:"면접에 청바지 입고 가도 괜찮을까?",note:"복장 고민"},{en:"Somehow he always <em>gets away with</em> being late.",ko:"그는 어쩐지 항상 지각을 해도 넘어간다.",note:"늘 그런 사람"}],
syn:[{s:"escape punishment",m:"처벌을 피하다"},{s:"avoid consequences",m:"결과를 피하다"},{s:"go unpunished",m:"처벌받지 않다"}],
rel:["crime doesn't pay 나쁜 짓은 결국 대가가 있다","you'll never get away with it 절대 넘어가지 않아"]},

{w:"take off",pron:"/teɪk ɒf/",ko:"이륙하다; 벗다; 급성장하다; 쉬다",base:"take",diff:1,
nu:"가장 다양한 의미를 가진 구동사 중 하나. 비행기 이륙, 옷 벗기, 사업 급성장, 휴가를 의미한다.",
uses:[{pat:"take off (비행기)",desc:"이륙하다"},{pat:"take off + 옷",desc:"벗다"},{pat:"take off (사업·인기)",desc:"갑자기 성장하다"},{pat:"take time off",desc:"휴가를 내다"},{pat:"take off (장소에서)",desc:"급히 떠나다"}],
ex:[{en:"The plane <em>took off</em> 20 minutes late due to weather.",ko:"날씨 때문에 비행기가 20분 늦게 이륙했다.",note:"이륙"},{en:"<em>Take off</em> your shoes before coming in.",ko:"들어오기 전에 신발 벗어.",note:"신발"},{en:"Their podcast really <em>took off</em> after going viral.",ko:"그들의 팟캐스트는 입소문을 타면서 급성장했다.",note:"급성장"},{en:"I'm <em>taking</em> Friday <em>off</em> to visit my parents.",ko:"부모님 뵈러 금요일에 쉬어.",note:"휴가"},{en:"She <em>took off</em> without saying goodbye.",ko:"그녀는 작별 인사도 없이 가버렸다.",note:"급히 떠나다"}],
syn:[{s:"launch",m:"이륙·출시하다"},{s:"remove",m:"제거하다"},{s:"boom",m:"급성장하다"},{s:"take a break",m:"쉬다"}],
rel:["takeoff (n.) 이륙","take time off 휴가를 내다","take off weight 살을 빼다"]},

{w:"take on",pron:"/teɪk ɒn/",ko:"(일을) 맡다; 고용하다; 맞서다",base:"take",diff:1,
nu:"새 책임이나 도전을 받아들이거나, 사람을 채용하거나, 강한 상대에게 맞서는 것.",
uses:[{pat:"take on + 일/역할",desc:"역할을 맡다"},{pat:"take on + 사람",desc:"고용하다"},{pat:"take on + 상대",desc:"~에 맞서다"},{pat:"take on + 특성",desc:"특성을 띠다"}],
ex:[{en:"She agreed to <em>take on</em> the project manager role.",ko:"그녀는 프로젝트 매니저 역할을 맡기로 했다.",note:"역할 수락"},{en:"We're <em>taking on</em> three new staff members next month.",ko:"다음 달에 직원 3명을 새로 채용한다.",note:"채용"},{en:"The team <em>took on</em> the defending champions and won.",ko:"팀은 디펜딩 챔피언에 맞서 이겼다.",note:"맞서다"},{en:"Don't <em>take on</em> more than you can handle.",ko:"감당할 수 있는 것 이상을 맡지 마.",note:"과도한 책임"},{en:"The meeting <em>took on</em> a more serious tone.",ko:"회의 분위기가 더 진지해졌다.",note:"성격 변화"}],
syn:[{s:"accept",m:"받아들이다"},{s:"hire",m:"고용하다"},{s:"face",m:"맞서다"},{s:"assume",m:"떠맡다"}],
rel:["take on responsibility 책임을 지다","take on a challenge 도전을 받아들이다"]},

{w:"take up",pron:"/teɪk ʌp/",ko:"시작하다; 차지하다; 제기하다",base:"take",diff:1,
nu:"취미·직업을 새로 시작하거나, 시간·공간을 차지하거나, 문제·제안을 거론하는 것.",
uses:[{pat:"take up + 취미",desc:"취미를 시작하다"},{pat:"take up + 공간/시간",desc:"차지하다"},{pat:"take up + 제안",desc:"제안을 받아들이다"},{pat:"take sth up with sb",desc:"~에게 문제를 제기하다"}],
ex:[{en:"I decided to <em>take up</em> photography last year.",ko:"작년에 사진을 시작하기로 했다.",note:"취미 시작"},{en:"This sofa <em>takes up</em> half the living room.",ko:"이 소파가 거실의 절반을 차지해.",note:"공간"},{en:"Commuting <em>takes up</em> three hours of my day.",ko:"출퇴근이 하루 세 시간을 잡아먹어.",note:"시간"},{en:"I'll <em>take up</em> your offer — it sounds great.",ko:"제안 받아들일게, 좋아 보여.",note:"제안 수락"},{en:"If you're unhappy, <em>take</em> it <em>up</em> with the manager.",ko:"불만이 있으면 매니저에게 얘기해.",note:"문제 제기"}],
syn:[{s:"start",m:"시작하다"},{s:"occupy",m:"차지하다"},{s:"accept",m:"수락하다"},{s:"raise",m:"제기하다"}],
rel:["take up space 공간을 차지하다","take up a cause 대의를 위해 나서다"]},

{w:"put off",pron:"/pʊt ɒf/",ko:"미루다; 흥미를 꺾다",base:"put",diff:1,
nu:"일·약속을 나중으로 미루거나, 무언가가 누군가의 흥미나 의욕을 꺾는 것.",
uses:[{pat:"put off + 일/약속",desc:"연기하다·미루다"},{pat:"put sb off",desc:"흥미·의욕을 꺾다"},{pat:"be put off by",desc:"~에 거부감을 느끼다"}],
ex:[{en:"Stop <em>putting off</em> your homework.",ko:"숙제 미루는 것 그만해.",note:"미루기"},{en:"The meeting has been <em>put off</em> until next week.",ko:"회의가 다음 주로 연기됐어.",note:"일정 연기"},{en:"His arrogance really <em>put</em> me <em>off</em>.",ko:"그의 오만함이 정말 흥미를 꺾었어.",note:"흥미 상실"},{en:"Don't be <em>put off</em> by the price — it's worth it.",ko:"가격에 거부감 갖지 마, 그만한 가치가 있어.",note:"거부감"},{en:"She keeps <em>putting off</em> going to the dentist.",ko:"그녀는 치과 가는 걸 계속 미루고 있어.",note:"계속 미루기"}],
syn:[{s:"postpone",m:"연기하다"},{s:"delay",m:"미루다"},{s:"deter",m:"막다·꺾다"},{s:"procrastinate",m:"미적거리다"}],
rel:["put off until tomorrow 내일로 미루다","put-off (n.) 거부감"]},

{w:"put up with",pron:"/pʊt ʌp wɪð/",ko:"참다, 견디다",base:"put",diff:1,
nu:"불편하거나 불쾌한 상황·사람을 불만을 가지면서도 참고 견디는 것. 인내의 한계를 암시.",
uses:[{pat:"put up with + 상황/사람",desc:"~을 참다·견디다"},{pat:"won't put up with",desc:"참지 않겠다 (강한 거부)"}],
ex:[{en:"I don't know how she <em>puts up with</em> all that noise.",ko:"그 소음을 어떻게 참는지 모르겠어.",note:"소음"},{en:"I'm not going to <em>put up with</em> this treatment anymore.",ko:"이런 대우 더 이상 참지 않을 거야.",note:"강한 거부"},{en:"He <em>put up with</em> the pain for weeks before seeing a doctor.",ko:"그는 몇 주 동안 통증을 참다가 의사를 찾았다.",note:"고통"},{en:"New employees have to <em>put up with</em> a lot at first.",ko:"신입 직원들은 처음에 많은 것을 참아야 한다.",note:"직장"},{en:"You shouldn't have to <em>put up with</em> bullying.",ko:"괴롭힘을 참을 필요는 없어.",note:"조언"}],
syn:[{s:"tolerate",m:"참다"},{s:"endure",m:"견디다"},{s:"stand",m:"(부정문) 못 견디다"},{s:"bear",m:"감내하다"}],
rel:["can't put up with 참을 수 없다","I've had enough 더 이상은 못 참겠다"]},

{w:"look up",pron:"/lʊk ʌp/",ko:"찾아보다; 방문하다; 나아지다",base:"look",diff:1,
nu:"사전·인터넷에서 정보를 찾거나, 오랫동안 못 본 사람을 찾아가거나, 상황이 나아지는 것.",
uses:[{pat:"look up + 단어/정보",desc:"찾아보다"},{pat:"look sb up",desc:"오랜 지인을 찾아가다"},{pat:"things are looking up",desc:"상황이 나아지다"},{pat:"look up from",desc:"~에서 고개를 들다"}],
ex:[{en:"<em>Look up</em> the word if you're unsure.",ko:"확실하지 않으면 단어를 찾아봐.",note:"사전"},{en:"If you're ever in London, <em>look me up</em>.",ko:"런던에 오면 꼭 연락해.",note:"지인 방문"},{en:"Things are finally <em>looking up</em> for the team.",ko:"팀 사정이 드디어 나아지고 있어.",note:"상황 호전"},{en:"I <em>looked up</em> his profile before the interview.",ko:"면접 전에 그의 프로필을 찾아봤어.",note:"정보 검색"},{en:"She <em>looked up</em> from her book when I called her name.",ko:"내가 이름을 부르자 그녀는 책에서 고개를 들었다.",note:"고개 들기"}],
syn:[{s:"search for",m:"검색하다"},{s:"visit",m:"방문하다"},{s:"improve",m:"나아지다"}],
rel:["look up to ~을 존경하다","look up an address 주소를 찾다"]},

{w:"look down on",pron:"/lʊk daʊn ɒn/",ko:"무시하다, 얕보다",base:"look",diff:1,
nu:"자신이 우월하다고 생각해서 다른 사람을 낮추어 보는 것. 'look up to'(존경하다)의 정반대.",
uses:[{pat:"look down on + 사람/직업",desc:"무시하다·얕보다"}],
ex:[{en:"He <em>looks down on</em> anyone who didn't go to university.",ko:"그는 대학에 가지 않은 사람은 누구든 무시한다.",note:"학력"},{en:"Don't <em>look down on</em> people just because they earn less.",ko:"돈을 덜 번다는 이유로 사람을 얕보지 마.",note:"경제"},{en:"She felt <em>looked down on</em> by her wealthier colleagues.",ko:"그녀는 부유한 동료들에게 무시당하는 느낌이었다.",note:"피해자"},{en:"Nobody should be <em>looked down on</em> for their background.",ko:"출신 때문에 무시당하는 사람은 없어야 한다.",note:"평등"},{en:"Some people <em>look down on</em> manual work unfairly.",ko:"어떤 사람들은 부당하게 육체노동을 얕본다.",note:"직업"}],
syn:[{s:"condescend to",m:"깔보다"},{s:"belittle",m:"무시하다"},{s:"scorn",m:"경멸하다"}],
rel:["look up to 존경하다","look down one's nose at 코웃음치다"]},

{w:"come across",pron:"/kʌm əˈkrɒs/",ko:"우연히 발견하다; ~한 인상을 주다",base:"come",diff:1,
nu:"찾지 않았는데 우연히 만나거나 발견하는 것, 또는 다른 사람에게 특정 인상을 주는 것.",
uses:[{pat:"come across + 물건/사람",desc:"우연히 발견·만나다"},{pat:"come across as + 형용사",desc:"~한 인상을 주다"}],
ex:[{en:"I <em>came across</em> these old photos while cleaning.",ko:"청소하다가 옛날 사진들을 우연히 발견했어.",note:"우연한 발견"},{en:"She <em>comes across as</em> confident, but she's actually shy.",ko:"그녀는 자신감 있어 보이지만 사실 수줍음이 많아.",note:"인상"},{en:"He <em>came across as</em> rude, though he didn't mean to be.",ko:"의도는 없었지만 그는 무례한 인상을 줬다.",note:"의도치 않은 인상"},{en:"Did you ever <em>come across</em> anything suspicious?",ko:"수상한 걸 발견한 적 있어?",note:"발견"},{en:"I <em>came across</em> your article online — it was great.",ko:"온라인에서 당신 글을 우연히 봤는데 정말 좋았어요.",note:"칭찬"}],
syn:[{s:"encounter",m:"우연히 만나다"},{s:"stumble upon",m:"우연히 발견하다"},{s:"seem",m:"~처럼 보이다"}],
rel:["come across well 좋은 인상을 주다","come across badly 나쁜 인상을 주다"]},

{w:"come up with",pron:"/kʌm ʌp wɪð/",ko:"생각해내다; 마련하다",base:"come",diff:1,
nu:"아이디어·해결책·변명 등을 생각해내는 것. 창의성이나 즉흥성이 느껴지는 표현.",
uses:[{pat:"come up with + 아이디어",desc:"생각해내다"},{pat:"come up with + 해결책",desc:"해결책을 고안하다"},{pat:"come up with + 돈",desc:"돈을 마련하다"}],
ex:[{en:"She <em>came up with</em> a brilliant idea during the brainstorm.",ko:"그녀는 브레인스토밍 중에 훌륭한 아이디어를 생각해냈다.",note:"아이디어"},{en:"Can you <em>come up with</em> a better excuse?",ko:"더 나은 변명 못 만들어내겠어?",note:"변명"},{en:"They <em>came up with</em> a solution in under an hour.",ko:"그들은 한 시간도 안 돼서 해결책을 고안했다.",note:"해결책"},{en:"I couldn't <em>come up with</em> the rent this month.",ko:"이번 달 임대료를 마련하지 못했어.",note:"돈"},{en:"How did you ever <em>come up with</em> that concept?",ko:"그 개념을 어떻게 생각해낸 거야?",note:"감탄"}],
syn:[{s:"devise",m:"고안하다"},{s:"think up",m:"생각해내다"},{s:"produce",m:"내놓다"}],
rel:["come up with a plan 계획을 세우다","hard to come up with 생각해내기 어려운"]},

{w:"go through",pron:"/ɡəʊ θruː/",ko:"겪다; 검토하다; 통과되다",base:"go",diff:1,
nu:"어려운 경험을 겪거나, 문서·절차를 검토하거나, 법안·거래가 통과·완료되는 것.",
uses:[{pat:"go through + 힘든 일",desc:"겪다·경험하다"},{pat:"go through + 서류",desc:"검토하다"},{pat:"go through (거래/법안)",desc:"통과·완료되다"},{pat:"go through + 절차",desc:"절차를 거치다"}],
ex:[{en:"She's <em>going through</em> a really tough time right now.",ko:"그녀는 지금 정말 힘든 시간을 겪고 있어.",note:"힘든 경험"},{en:"Let me <em>go through</em> the report one more time.",ko:"보고서를 한 번 더 검토할게.",note:"검토"},{en:"The deal finally <em>went through</em> after months of talks.",ko:"수개월의 협상 끝에 거래가 마침내 성사됐다.",note:"거래 완료"},{en:"You'll need to <em>go through</em> a background check.",ko:"신원 조사를 거쳐야 해.",note:"절차"},{en:"I've been <em>going through</em> a lot lately.",ko:"요즘 많은 것들을 겪고 있어.",note:"힘든 상황"}],
syn:[{s:"experience",m:"경험하다"},{s:"review",m:"검토하다"},{s:"pass",m:"통과하다"},{s:"endure",m:"견디다"}],
rel:["go through the motions 형식적으로 하다","go through with 끝까지 해내다"]},

{w:"turn out",pron:"/tɜːrn aʊt/",ko:"결국 ~이 되다; 나타나다; 생산하다",base:"turn",diff:1,
nu:"예상과 다르게 결과가 나오거나, 행사에 사람들이 모이거나, 상품을 생산하는 것.",
uses:[{pat:"turn out (to be)",desc:"결국 ~로 밝혀지다"},{pat:"turn out (행사)",desc:"행사에 나오다"},{pat:"as it turns out",desc:"알고 보니·결국"},{pat:"turn out + 제품",desc:"생산하다"}],
ex:[{en:"The film <em>turned out</em> to be better than I expected.",ko:"영화는 예상보다 더 좋았다.",note:"기대 이상"},{en:"Thousands <em>turned out</em> for the protest.",ko:"수천 명이 시위에 나왔다.",note:"참석"},{en:"As it <em>turns out</em>, he was right all along.",ko:"알고 보니 그가 내내 옳았던 거야.",note:"밝혀진 사실"},{en:"The factory <em>turns out</em> 500 units a day.",ko:"공장은 하루 500개를 생산한다.",note:"생산"},{en:"Everything <em>turned out</em> fine in the end.",ko:"결국 모든 것이 잘 됐다.",note:"결과"}],
syn:[{s:"end up",m:"결국 ~이 되다"},{s:"prove",m:"~임이 밝혀지다"},{s:"produce",m:"생산하다"}],
rel:["turnout (n.) 참석자 수","turn out well/badly 잘/나쁘게 끝나다"]},

{w:"turn down",pron:"/tɜːrn daʊn/",ko:"거절하다; 줄이다",base:"turn",diff:1,
nu:"제안·요청을 거절하거나, 볼륨·온도를 낮추는 것. 거절의 의미가 훨씬 자주 쓰인다.",
uses:[{pat:"turn down + 제안/요청",desc:"거절하다"},{pat:"turn down + 볼륨",desc:"낮추다"}],

{w:"fall apart",pron:"/fɔːl əˈpɑːrt/",ko:"무너지다; 해체되다; 감정적으로 붕괴하다",base:"fall",diff:1,

{w:"get back",pron:"/ɡet bæk/",ko:"돌아오다; 돌려받다; 복수하다",base:"get",diff:1,nu:"떠났다가 원래 장소로 돌아오거나, 빌려준 것을 돌려받거나, 누군가에게 앙갚음하는 세 가지 의미. 'get back to'는 나중에 다시 연락하겠다는 뜻.",uses:[{pat:"get back (장소로)",desc:"돌아오다"},{pat:"get sth back",desc:"~을 돌려받다"},{pat:"get back at sb",desc:"앙갚음하다"},{pat:"get back to sb",desc:"나중에 다시 연락하다"}],ex:[{en:"What time do you <em>get back</em> from your trip?",ko:"여행에서 몇 시에 돌아와?",note:"귀환"},{en:"I need to <em>get</em> my deposit <em>back</em>.",ko:"보증금을 돌려받아야 해.",note:"돌려받다"},{en:"I'll <em>get back</em> to you by tomorrow.",ko:"내일까지 다시 연락드릴게요.",note:"업무 이메일"},{en:"She wanted to <em>get back at</em> him for lying.",ko:"그녀는 거짓말한 그에게 앙갚음하고 싶었다.",note:"복수"},{en:"<em>Get back</em> to work — break's over.",ko:"일하러 돌아가, 쉬는 시간 끝났어.",note:"직장"}],syn:[{s:"return",m:"돌아오다"},{s:"retrieve",m:"돌려받다"},{s:"retaliate",m:"앙갚음하다"}],rel:["get back on track 정상 궤도로 돌아가다","get back to basics 기본으로 돌아가다","get back to you 다시 연락하다"]},
{w:"get across",pron:"/ɡet əˈkrɒs/",ko:"전달하다; 이해시키다",base:"get",diff:1,nu:"아이디어·메시지·감정을 상대방이 이해하도록 효과적으로 전달하는 것. 'get the point across'가 대표 표현.",uses:[{pat:"get sth across",desc:"~을 이해시키다·전달하다"},{pat:"get it across that",desc:"~라는 것을 이해시키다"},{pat:"get across to sb",desc:"~에게 전달되다"}],ex:[{en:"I couldn't <em>get</em> my point <em>across</em> in the meeting.",ko:"회의에서 내 요점을 전달하지 못했어.",note:"회의"},{en:"How do you <em>get across</em> complex ideas simply?",ko:"복잡한 아이디어를 어떻게 간단히 전달하지?",note:"설명"},{en:"The teacher struggled to <em>get</em> the concept <em>across</em>.",ko:"선생님은 개념을 이해시키는 데 애를 먹었다.",note:"교육"},{en:"She used visuals to <em>get her message across</em>.",ko:"그녀는 시각 자료로 메시지를 전달했다.",note:"발표"},{en:"It's hard to <em>get across</em> how serious this is.",ko:"이게 얼마나 심각한지 전달하기가 어렵다.",note:"긴급성"}],syn:[{s:"convey",m:"전달하다"},{s:"communicate",m:"소통하다"},{s:"put across",m:"전달하다"}],rel:["get the message across 메시지를 전달하다","get a point across 요점을 이해시키다"]},

{w:"get along",pron:"/ɡet əˈlɒŋ/",ko:"잘 지내다; 해나가다; 나이 들다",base:"get",diff:1,nu:"사람과 사이좋게 지내거나, 혼자 해나가거나, 영국식으로 나이가 드는 것. 'get along with'의 줄임말로도 쓰인다.",uses:[{pat:"get along (with sb)",desc:"~와 잘 지내다"},{pat:"get along without",desc:"~없이 해나가다"},{pat:"getting along in age",desc:"나이가 들어가다"}],ex:[{en:"Do you <em>get along</em> with your new boss?",ko:"새 상사와 잘 지내고 있어?",note:"직장"},{en:"We don't really <em>get along</em> — we're very different.",ko:"우리는 정말 잘 안 맞아, 너무 달라.",note:"성격 차이"},{en:"I can <em>get along</em> without your help, thanks.",ko:"도움 없이도 잘 할 수 있어, 고마워.",note:"독립"},{en:"How are you <em>getting along</em> with the project?",ko:"프로젝트 어떻게 진행되고 있어?",note:"진행 상황"},{en:"My grandparents are <em>getting along</em> in years.",ko:"조부모님이 연세가 드셔가고 있어.",note:"나이"}],syn:[{s:"get on with",m:"(영국식) 잘 지내다"},{s:"be on good terms",m:"좋은 관계"},{s:"manage",m:"해나가다"}],rel:["get along fine 잘 지내다","hard to get along with 같이 있기 힘든"]},
{w:"get down to",pron:"/ɡet daʊn tuː/",ko:"본격적으로 시작하다",base:"get",diff:1,nu:"잡담이나 준비를 마치고 진짜 중요한 일을 시작하는 것. 'get down to business'가 가장 대표적인 표현.",uses:[{pat:"get down to business",desc:"본론으로 들어가다"},{pat:"get down to work",desc:"본격적으로 일하다"},{pat:"get down to + 핵심",desc:"핵심으로 들어가다"}],ex:[{en:"Let's <em>get down to</em> business.",ko:"본론으로 들어갑시다.",note:"회의 시작"},{en:"OK, let's <em>get down to</em> work — we have a deadline.",ko:"자, 본격적으로 일하자, 마감이 있어.",note:"업무"},{en:"It's time to <em>get down to</em> the real issues.",ko:"진짜 문제들을 다룰 시간이야.",note:"협상"},{en:"I need to <em>get down to</em> studying tonight.",ko:"오늘 밤 본격적으로 공부해야 해.",note:"학습"},{en:"After the small talk, we finally <em>got down to</em> it.",ko:"잡담 후에 드디어 본론에 들어갔다.",note:"대화"}],syn:[{s:"start",m:"시작하다"},{s:"focus on",m:"집중하다"},{s:"tackle",m:"다루다"}],rel:["get down to business 본론으로","get down to the nitty-gritty 세부 사항으로 들어가다"]},
{w:"take back",pron:"/teɪk bæk/",ko:"철회하다; 돌려받다; 추억에 잠기다",base:"take",diff:1,nu:"한 말을 취소하거나, 물건을 반환받거나, 기억이 과거로 되돌아가게 만드는 것.",uses:[{pat:"take back + 말",desc:"~을 철회하다"},{pat:"take sth back",desc:"돌려받다·반품하다"},{pat:"take sb back",desc:"과거로 돌아가게 하다"}],ex:[{en:"I <em>take back</em> what I said — I was wrong.",ko:"내가 한 말 철회할게, 내가 틀렸어.",note:"사과"},{en:"Can I <em>take</em> this <em>back</em>? It doesn't fit.",ko:"이거 반품할 수 있어요? 맞지 않아서요.",note:"반품"},{en:"This song <em>takes me back</em> to high school.",ko:"이 노래를 들으면 고등학교 시절로 돌아가는 것 같아.",note:"추억"},{en:"I'll never <em>take back</em> what I said.",ko:"내가 한 말을 절대 취소하지 않을 거야.",note:"강한 의지"},{en:"That smell <em>takes me back</em> to my grandmother's house.",ko:"그 냄새가 할머니 댁으로 돌아가게 해.",note:"향기와 기억"}],syn:[{s:"retract",m:"철회하다"},{s:"reclaim",m:"돌려받다"},{s:"withdraw",m:"취소하다"}],rel:["take it back 말을 취소하다","take back control 통제권을 되찾다"]},
{w:"take after",pron:"/teɪk ˈɑːftər/",ko:"~을 닮다",base:"take",diff:1,nu:"부모나 친척의 외모·성격·습관을 닮은 것. 주로 가족 관계에서 쓰인다.",uses:[{pat:"take after + 가족",desc:"~를 닮다"}],ex:[{en:"She really <em>takes after</em> her mother.",ko:"그녀는 정말 엄마를 닮았어.",note:"외모"},{en:"He <em>takes after</em> his dad in terms of humor.",ko:"유머 감각은 아빠를 닮았어.",note:"성격"},{en:"Who do you <em>take after</em> — your mom or dad?",ko:"엄마 닮았어, 아빠 닮았어?",note:"질문"},{en:"I <em>take after</em> my grandfather — we're both stubborn.",ko:"나는 할아버지를 닮았어, 둘 다 고집이 세거든.",note:"성격"},{en:"She doesn't <em>take after</em> anyone in the family.",ko:"그녀는 가족 중 누구도 닮지 않았다.",note:"닮지 않다"}],syn:[{s:"resemble",m:"닮다"},{s:"look like",m:"~처럼 생기다"},{s:"be similar to",m:"~와 비슷하다"}],rel:["take after one's parents 부모를 닮다","like father like son 부전자전"]},

{w:"put through",pron:"/pʊt θruː/",ko:"(전화를) 연결하다; 겪게 하다; 처리하다",base:"put",diff:2,nu:"전화를 연결해주거나, 누군가에게 힘든 경험을 겪게 하거나, 서류·절차를 처리하는 것.",uses:[{pat:"put sb through (전화)",desc:"전화를 연결하다"},{pat:"put sb through + 경험",desc:"겪게 하다"},{pat:"put through + 서류",desc:"처리하다·통과시키다"}],ex:[{en:"Please hold — I'll <em>put</em> you <em>through</em> to sales.",ko:"잠시만요, 영업팀으로 연결해드릴게요.",note:"전화 연결"},{en:"She <em>put</em> her kids <em>through</em> college.",ko:"그녀는 아이들을 대학까지 보냈다.",note:"학비"},{en:"I'm sorry to <em>put</em> you <em>through</em> all this.",ko:"이런 일을 겪게 해서 미안해.",note:"힘든 경험"},{en:"The bill was <em>put through</em> parliament.",ko:"법안이 의회를 통과했다.",note:"법안"},{en:"Can you <em>put</em> me <em>through</em> to the manager?",ko:"매니저에게 연결해줄 수 있어요?",note:"전화"}],syn:[{s:"connect",m:"연결하다"},{s:"subject to",m:"~을 겪게 하다"},{s:"process",m:"처리하다"}],rel:["put through an ordeal 시련을 겪게 하다","put through college 대학을 보내다"]},
{w:"look into",pron:"/lʊk ˈɪntuː/",ko:"조사하다; 살펴보다",base:"look",diff:1,nu:"문제·상황·사건을 더 깊이 조사하거나 검토하는 것. 'investigate'보다 일상적인 표현.",uses:[{pat:"look into + 문제",desc:"조사하다·살펴보다"},{pat:"look into + 가능성",desc:"~을 알아보다"}],ex:[{en:"We're <em>looking into</em> the cause of the error.",ko:"오류의 원인을 조사하고 있어요.",note:"오류 조사"},{en:"The police are <em>looking into</em> the incident.",ko:"경찰이 그 사건을 조사하고 있다.",note:"범죄"},{en:"I'll <em>look into</em> it and get back to you.",ko:"알아보고 다시 연락드릴게요.",note:"업무"},{en:"Have you <em>looked into</em> other options?",ko:"다른 선택지도 알아봤어?",note:"가능성"},{en:"The committee is <em>looking into</em> the allegations.",ko:"위원회가 그 주장을 조사하고 있다.",note:"공식 조사"}],syn:[{s:"investigate",m:"조사하다"},{s:"examine",m:"살피다"},{s:"research",m:"연구하다"},{s:"probe",m:"탐색하다"}],rel:["look into the matter 사안을 살펴보다","look into a complaint 불만을 조사하다"]},
{w:"look forward to",pron:"/lʊk ˈfɔːrwərd tuː/",ko:"기대하다",base:"look",diff:1,nu:"앞으로 일어날 일을 즐거운 마음으로 기대하는 것. 이메일 마무리에 자주 쓰이는 표현.",uses:[{pat:"look forward to + V-ing",desc:"~하기를 기대하다"},{pat:"look forward to + 명사",desc:"~을 기대하다"},{pat:"I look forward to hearing from you",desc:"이메일 마무리 표현"}],ex:[{en:"I'm really <em>looking forward to</em> the weekend.",ko:"정말 주말이 기대돼.",note:"일상"},{en:"I <em>look forward to</em> working with you.",ko:"함께 일하게 되기를 기대합니다.",note:"업무 이메일"},{en:"The kids are <em>looking forward to</em> going to the theme park.",ko:"아이들은 테마파크 가는 걸 기대하고 있어.",note:"아이들"},{en:"I'm not really <em>looking forward to</em> Monday.",ko:"솔직히 월요일이 기대되지 않아.",note:"부정적"},{en:"We <em>look forward to</em> seeing you at the event.",ko:"행사에서 만나기를 기대합니다.",note:"공식 문서"}],syn:[{s:"anticipate",m:"기대하다"},{s:"await eagerly",m:"기대하며 기다리다"},{s:"be excited about",m:"~에 설레다"}],rel:["something to look forward to 기대할 것","look forward to the future 미래를 기대하다"]},
{w:"look out for",pron:"/lʊk aʊt fɔːr/",ko:"조심하다; 주의하다; 챙기다",base:"look",diff:1,nu:"위험을 경계하거나, 기회를 살피거나, 누군가를 챙기고 돌보는 것.",uses:[{pat:"look out for + 위험",desc:"~을 조심하다"},{pat:"look out for + 사람",desc:"~을 챙기다"},{pat:"look out for + 기회",desc:"기회를 노리다"}],ex:[{en:"<em>Look out for</em> ice on the roads.",ko:"도로의 빙판을 조심해.",note:"안전"},{en:"I always <em>look out for</em> my little sister.",ko:"나는 항상 여동생을 챙겨.",note:"보호"},{en:"<em>Look out for</em> any typos before you submit.",ko:"제출 전에 오타를 잘 살펴봐.",note:"꼼꼼히"},{en:"We need to <em>look out for</em> each other.",ko:"서로를 챙겨야 해.",note:"팀워크"},{en:"<em>Look out for</em> new opportunities in the market.",ko:"시장에서 새로운 기회를 살펴봐.",note:"비즈니스"}],syn:[{s:"watch out for",m:"~을 조심하다"},{s:"be alert to",m:"~에 주의를 기울이다"},{s:"take care of",m:"챙기다"}],rel:["look out! 조심해!","look out for oneself 자기 자신을 챙기다"]},
{w:"come down to",pron:"/kʌm daʊn tuː/",ko:"결국 ~의 문제다",base:"come",diff:2,nu:"복잡한 상황이 결국 핵심 요소 하나로 귀결된다는 것. 'boil down to'와 거의 동의어.",uses:[{pat:"it comes down to + 핵심",desc:"결국 ~의 문제다"},{pat:"come down to + 선택",desc:"~으로 결정된다"}],ex:[{en:"It all <em>comes down to</em> how much effort you put in.",ko:"결국 네가 얼마나 노력하느냐의 문제야.",note:"노력"},{en:"The decision <em>comes down to</em> cost vs. quality.",ko:"결정은 결국 비용 대 품질의 문제다.",note:"의사결정"},{en:"At the end of the day, it <em>comes down to</em> trust.",ko:"결국 신뢰의 문제야.",note:"관계"},{en:"Success often <em>comes down to</em> timing.",ko:"성공은 종종 타이밍의 문제다.",note:"성공"},{en:"It <em>came down to</em> the last penalty kick.",ko:"결국 마지막 패널티킥으로 결정됐다.",note:"스포츠"}],syn:[{s:"boil down to",m:"결국 ~이다"},{s:"hinge on",m:"~에 달려있다"},{s:"reduce to",m:"~으로 줄어들다"}],rel:["come down to earth 현실로 돌아오다","come down to the wire 막판까지 이어지다"]},
{w:"come out",pron:"/kʌm aʊt/",ko:"나오다; 출시되다; 결과가 나오다; 커밍아웃하다",base:"come",diff:1,nu:"안에서 밖으로 나오거나, 책·영화·앨범이 출시되거나, 결과가 밝혀지거나, 성정체성을 공개하는 것.",uses:[{pat:"come out (장소에서)",desc:"나오다"},{pat:"come out (제품·콘텐츠)",desc:"출시되다·나오다"},{pat:"come out (결과)",desc:"결과가 나오다"},{pat:"come out (성정체성)",desc:"커밍아웃하다"}],ex:[{en:"When does the new album <em>come out</em>?",ko:"새 앨범 언제 나와?",note:"출시"},{en:"The results <em>came out</em> yesterday.",ko:"결과가 어제 나왔어.",note:"결과"},{en:"She <em>came out</em> to her family last year.",ko:"그녀는 작년에 가족에게 커밍아웃했다.",note:"커밍아웃"},{en:"How did your photos <em>come out</em>?",ko:"사진들이 어떻게 나왔어?",note:"사진"},{en:"The truth always <em>comes out</em> eventually.",ko:"진실은 결국 항상 밝혀진다.",note:"진실"}],syn:[{s:"emerge",m:"나오다"},{s:"be released",m:"출시되다"},{s:"be revealed",m:"밝혀지다"}],rel:["come out on top 이기다","come out ahead 앞서 나오다","come out of nowhere 갑자기 나타나다"]},
{w:"come along",pron:"/kʌm əˈlɒŋ/",ko:"같이 가다; 나아지다; 나타나다",base:"come",diff:1,nu:"누군가와 함께 가거나, 상황·사람이 나아지거나, 기회가 나타나는 것.",uses:[{pat:"come along (with sb)",desc:"같이 가다·동행하다"},{pat:"come along (진전)",desc:"나아지다·발전하다"},{pat:"come along (기회)",desc:"(기회가) 나타나다"}],ex:[{en:"Do you want to <em>come along</em>?",ko:"같이 갈래?",note:"동행 제안"},{en:"How's your project <em>coming along</em>?",ko:"프로젝트 어떻게 되어가고 있어?",note:"진행 상황"},{en:"Her English has really <em>come along</em> this year.",ko:"그녀의 영어가 올해 정말 많이 늘었어.",note:"발전"},{en:"An opportunity like this doesn't <em>come along</em> very often.",ko:"이런 기회는 자주 오지 않아.",note:"기회"},{en:"<em>Come along</em>! We're going to be late.",ko:"어서! 늦겠어.",note:"재촉"}],syn:[{s:"join",m:"합류하다"},{s:"progress",m:"발전하다"},{s:"improve",m:"나아지다"},{s:"appear",m:"나타나다"}],rel:["come along for the ride 그냥 따라가다","things are coming along 일이 잘 되어가다"]},
{w:"go off",pron:"/ɡəʊ ɒf/",ko:"울리다; 폭발하다; 상하다; 시작되다",base:"go",diff:1,nu:"알람이 울리거나, 폭발하거나, 음식이 상하거나, 행사가 시작되는 것. 맥락에 따라 완전히 다른 의미.",uses:[{pat:"go off (알람)",desc:"울리다"},{pat:"go off (폭발물)",desc:"폭발하다·터지다"},{pat:"go off (음식)",desc:"상하다·변질되다"},{pat:"go off well/badly",desc:"잘/나쁘게 진행되다"}],ex:[{en:"My alarm <em>went off</em> at 6 AM.",ko:"알람이 오전 6시에 울렸다.",note:"알람"},{en:"A bomb <em>went off</em> in the city center.",ko:"도심에서 폭탄이 터졌다.",note:"폭발"},{en:"This milk has <em>gone off</em> — smell it.",ko:"이 우유 상했어, 냄새 맡아봐.",note:"음식"},{en:"The event <em>went off</em> without a hitch.",ko:"행사가 아무 문제 없이 잘 진행됐다.",note:"행사"},{en:"The gun <em>went off</em> accidentally.",ko:"총이 실수로 발사됐다.",note:"사고"}],syn:[{s:"ring",m:"울리다"},{s:"explode",m:"폭발하다"},{s:"spoil",m:"상하다"},{s:"trigger",m:"작동하다"}],rel:["go off the rails 궤도를 벗어나다","go off on a tangent 옆길로 새다","go off topic 주제에서 벗어나다"]},
{w:"go over",pron:"/ɡəʊ ˈəʊvər/",ko:"검토하다; 초과하다; 반응을 받다",base:"go",diff:1,nu:"내용·계획을 다시 검토하거나, 예산·시간을 초과하거나, 말이나 행동이 특정 반응을 받는 것.",uses:[{pat:"go over + 내용",desc:"검토하다·복습하다"},{pat:"go over (예산/시간)",desc:"초과하다"},{pat:"go over well/badly",desc:"(반응이) 좋다/나쁘다"}],ex:[{en:"Let's <em>go over</em> the main points one more time.",ko:"주요 사항을 한 번 더 검토합시다.",note:"복습"},{en:"We've <em>gone over</em> budget again.",ko:"또 예산을 초과했어.",note:"예산"},{en:"His speech <em>went over</em> really well.",ko:"그의 연설은 정말 좋은 반응을 받았다.",note:"반응"},{en:"Can you <em>go over</em> my essay and check for errors?",ko:"내 에세이를 검토해서 오류를 확인해줄 수 있어?",note:"교정"},{en:"The meeting <em>went over</em> by 30 minutes.",ko:"회의가 30분 초과됐어.",note:"시간 초과"}],syn:[{s:"review",m:"검토하다"},{s:"exceed",m:"초과하다"},{s:"check",m:"확인하다"}],rel:["go over sb's head 이해하지 못하다","go over the top 도를 지나치다"]},
{w:"go without",pron:"/ɡəʊ wɪˈðaʊt/",ko:"~없이 지내다",base:"go",diff:1,nu:"필요한 것 없이 견뎌내는 것. 'it goes without saying'은 '말할 필요도 없이'라는 숙어.",uses:[{pat:"go without + 필수품",desc:"~없이 살다"},{pat:"it goes without saying",desc:"말할 필요도 없이"}],ex:[{en:"Many children <em>go without</em> proper meals.",ko:"많은 아이들이 제대로 된 식사 없이 지낸다.",note:"빈곤"},{en:"I can <em>go without</em> coffee, but not without water.",ko:"커피는 없어도 되지만 물은 안 돼.",note:"필수품"},{en:"It <em>goes without saying</em> that honesty matters.",ko:"정직이 중요하다는 건 말할 필요도 없다.",note:"당연한 것"},{en:"During the war, they <em>went without</em> many basics.",ko:"전쟁 중 그들은 많은 기본적인 것들 없이 지냈다.",note:"역사"},{en:"I've been <em>going without</em> sleep all week.",ko:"일주일 내내 잠을 못 자고 있어.",note:"수면"}],syn:[{s:"do without",m:"~없이 해나가다"},{s:"manage without",m:"~없이 살다"},{s:"forgo",m:"포기하다"}],rel:["go without saying 말할 필요도 없다","go without food 굶다"]},
{w:"make up for",pron:"/meɪk ʌp fɔːr/",ko:"보상하다; 만회하다",base:"make",diff:1,nu:"잃어버린 것, 부족한 것, 나쁜 경험을 보충하거나 보상하는 것.",uses:[{pat:"make up for + 손해",desc:"손해를 보상하다"},{pat:"make up for lost time",desc:"잃어버린 시간을 만회하다"},{pat:"make up for + 단점",desc:"단점을 보완하다"}],ex:[{en:"I'll work extra hours to <em>make up for</em> lost time.",ko:"잃어버린 시간을 만회하려고 초과 근무할게.",note:"시간"},{en:"Nothing can <em>make up for</em> what you've been through.",ko:"네가 겪은 것은 어떤 것으로도 보상할 수 없어.",note:"위로"},{en:"His passion <em>makes up for</em> his lack of experience.",ko:"그의 열정이 경험 부족을 보완해준다.",note:"장단점"},{en:"I want to <em>make up for</em> missing your birthday.",ko:"네 생일을 놓친 걸 만회하고 싶어.",note:"사과"},{en:"A good attitude can <em>make up for</em> a lot.",ko:"좋은 태도가 많은 것을 만회해준다.",note:"긍정"}],syn:[{s:"compensate for",m:"보상하다"},{s:"atone for",m:"속죄하다"},{s:"offset",m:"상쇄하다"}],rel:["make up for lost time 시간을 만회하다","make amends 보상하다"]},
{w:"make do",pron:"/meɪk duː/",ko:"있는 것으로 버티다",base:"make",diff:1,nu:"완벽하지 않거나 부족한 것으로도 어떻게든 해나가는 것. 'make do with'로 쓴다.",uses:[{pat:"make do with + 가진 것",desc:"~으로 어떻게든 하다"},{pat:"make do without",desc:"~없이 해나가다"}],ex:[{en:"We had to <em>make do</em> with limited resources.",ko:"제한된 자원으로 버텨야 했다.",note:"제약"},{en:"I'll just <em>make do</em> without a dishwasher.",ko:"식기세척기 없이 그냥 해야지.",note:"일상"},{en:"In wartime, people learned to <em>make do</em>.",ko:"전쟁 중에 사람들은 있는 것으로 버티는 법을 배웠다.",note:"역사"},{en:"Can you <em>make do</em> with what's in the fridge?",ko:"냉장고에 있는 걸로 해결할 수 있어?",note:"음식"},{en:"We don't have the ideal tools but we'll <em>make do</em>.",ko:"이상적인 도구는 없지만 어떻게든 할 거야.",note:"임시방편"}],syn:[{s:"manage with",m:"~로 해나가다"},{s:"improvise",m:"즉흥적으로 대처하다"},{s:"get by",m:"어떻게든 살다"}],rel:["make do and mend 수선해서 쓰다","just making do 겨우 버티는"]},
{w:"turn up",pron:"/tɜːrn ʌp/",ko:"나타나다; 볼륨을 높이다; 발견되다",base:"turn",diff:1,nu:"예상치 못하게 나타나거나, 볼륨·온도를 높이거나, 잃었던 물건이 다시 나타나는 것.",uses:[{pat:"turn up (장소에)",desc:"나타나다"},{pat:"turn up + 볼륨/온도",desc:"높이다"},{pat:"sth turns up",desc:"(잃었던 것이) 나타나다"}],ex:[{en:"He <em>turned up</em> an hour late.",ko:"그는 한 시간 늦게 나타났다.",note:"지각"},{en:"<em>Turn up</em> the volume — I can't hear.",ko:"볼륨 좀 높여줘, 안 들려.",note:"소리"},{en:"My keys <em>turned up</em> in the couch cushions.",ko:"열쇠가 소파 쿠션 사이에서 나왔다.",note:"발견"},{en:"Something always <em>turns up</em> when you least expect it.",ko:"예상치 못할 때 항상 뭔가가 나타난다.",note:"인생"},{en:"Only half the guests <em>turned up</em>.",ko:"하객의 절반만 나타났다.",note:"행사"}],syn:[{s:"show up",m:"나타나다"},{s:"appear",m:"나타나다"},{s:"increase",m:"높이다"},{s:"surface",m:"수면 위로 나타나다"}],rel:["turn up trumps 기대 이상으로 잘 되다","turn up out of nowhere 갑자기 나타나다"]},
{w:"turn around",pron:"/tɜːrn əˈraʊnd/",ko:"돌아서다; 상황을 반전시키다",base:"turn",diff:1,nu:"몸을 돌리거나, 부진한 상황을 호전시키거나, 방향을 바꾸는 것.",uses:[{pat:"turn around (몸을)",desc:"돌아서다"},{pat:"turn around + 사업/상황",desc:"반전시키다"},{pat:"turn around time",desc:"처리 소요 시간"}],ex:[{en:"Just <em>turn around</em> and walk away.",ko:"그냥 돌아서서 걸어가.",note:"몸"},{en:"The company managed to <em>turn things around</em>.",ko:"회사가 상황을 반전시켰다.",note:"사업"},{en:"What's the <em>turnaround</em> time on this order?",ko:"이 주문 처리에 얼마나 걸려요?",note:"업무"},{en:"She <em>turned</em> her career <em>around</em> after 40.",ko:"그녀는 40대 이후 커리어를 반전시켰다.",note:"커리어"},{en:"<em>Turn around</em> — there's something behind you.",ko:"돌아봐, 뒤에 뭔가 있어.",note:"경고"}],syn:[{s:"reverse",m:"반전시키다"},{s:"improve",m:"개선하다"},{s:"rotate",m:"돌리다"}],rel:["turnaround (n.) 반전·처리 시간","do a U-turn 유턴하다"]},
{w:"break up",pron:"/breɪk ʌp/",ko:"헤어지다; 해체하다; 분산시키다",base:"break",diff:1,nu:"연인 관계가 끝나거나, 그룹·조직이 해체되거나, 군중을 해산시키는 것.",uses:[{pat:"break up (연인)",desc:"헤어지다"},{pat:"break up + 그룹",desc:"해체하다"},{pat:"break up + 싸움",desc:"말리다"},{pat:"break up (수업/행사)",desc:"끝나다"}],ex:[{en:"They <em>broke up</em> after three years together.",ko:"그들은 3년을 사귀다가 헤어졌다.",note:"이별"},{en:"The band <em>broke up</em> due to creative differences.",ko:"그 밴드는 창의적 의견 차이로 해체했다.",note:"해체"},{en:"A teacher <em>broke up</em> the fight in the hallway.",ko:"선생님이 복도에서의 싸움을 말렸다.",note:"싸움"},{en:"The clouds are starting to <em>break up</em>.",ko:"구름이 흩어지기 시작하고 있어.",note:"날씨"},{en:"School <em>breaks up</em> for summer next week.",ko:"다음 주에 학교가 여름방학에 들어간다.",note:"방학"}],syn:[{s:"split up",m:"헤어지다·나뉘다"},{s:"separate",m:"분리하다"},{s:"dissolve",m:"해산하다"}],rel:["breakup (n.) 이별","break-up text 이별 문자","break up a fight 싸움을 말리다"]},
{w:"break through",pron:"/breɪk θruː/",ko:"돌파하다; 극복하다; 이름을 알리다",base:"break",diff:2,nu:"장벽·한계를 돌파하거나, 처음으로 성공해 이름을 알리는 것.",uses:[{pat:"break through + 장벽",desc:"돌파하다"},{pat:"break through (성공)",desc:"처음으로 이름을 알리다"},{pat:"breakthrough (명사)",desc:"획기적 발전"}],ex:[{en:"The sun finally <em>broke through</em> the clouds.",ko:"태양이 마침내 구름을 뚫고 나왔다.",note:"날씨"},{en:"She <em>broke through</em> as an actress in her 30s.",ko:"그녀는 30대에 배우로 이름을 알렸다.",note:"성공"},{en:"Scientists made a major <em>breakthrough</em> in cancer research.",ko:"과학자들이 암 연구에서 큰 돌파구를 마련했다.",note:"과학"},{en:"It's hard to <em>break through</em> in such a competitive industry.",ko:"이렇게 경쟁이 치열한 업계에서 두각을 나타내기는 어렵다.",note:"업계"},{en:"The troops <em>broke through</em> enemy lines.",ko:"부대가 적진을 돌파했다.",note:"군사"}],syn:[{s:"penetrate",m:"뚫고 나가다"},{s:"overcome",m:"극복하다"},{s:"emerge",m:"등장하다"}],rel:["breakthrough (n.) 돌파구","break through barriers 장벽을 돌파하다"]},
{w:"run away",pron:"/rʌn əˈweɪ/",ko:"도망가다; 회피하다",base:"run",diff:1,nu:"위험·책임·상황에서 달아나는 것. 비유적으로 문제를 직면하지 않고 회피하는 것도 포함.",uses:[{pat:"run away (from sb/sth)",desc:"~에서 도망가다"},{pat:"run away from home",desc:"가출하다"},{pat:"run away from responsibility",desc:"책임을 회피하다"}],ex:[{en:"Don't <em>run away</em> from your problems.",ko:"문제에서 도망치지 마.",note:"조언"},{en:"The suspect <em>ran away</em> before police arrived.",ko:"용의자는 경찰이 오기 전에 도망쳤다.",note:"범죄"},{en:"She <em>ran away</em> from home at 16.",ko:"그녀는 16살에 가출했다.",note:"가출"},{en:"Stop <em>running away</em> and face it.",ko:"도망치지 말고 직면해.",note:"직면"},{en:"His imagination <em>ran away</em> with him.",ko:"그는 상상력에 완전히 사로잡혔다.",note:"상상력"}],syn:[{s:"flee",m:"달아나다"},{s:"escape",m:"탈출하다"},{s:"avoid",m:"피하다"},{s:"bolt",m:"내빼다"}],rel:["runaway (adj.) 도망친·통제 불능","run away with 가져도망가다·크게 앞서가다"]},
{w:"run over",pron:"/rʌn ˈəʊvər/",ko:"치다; 검토하다; 초과하다",base:"run",diff:1,nu:"차가 사람·동물을 치거나, 내용을 빠르게 검토하거나, 시간이 초과되는 것.",uses:[{pat:"run over + 사람/동물",desc:"~을 차로 치다"},{pat:"run over + 내용",desc:"빠르게 검토하다"},{pat:"run over (시간)",desc:"초과하다"}],ex:[{en:"A car almost <em>ran over</em> the cat.",ko:"차가 고양이를 거의 칠 뻔했어.",note:"교통"},{en:"Let me just <em>run over</em> the key points quickly.",ko:"핵심 사항을 빠르게 검토할게요.",note:"검토"},{en:"The meeting <em>ran over</em> by 20 minutes.",ko:"회의가 20분 초과됐어.",note:"시간"},{en:"Can you <em>run over</em> the plan one more time?",ko:"계획을 한 번 더 훑어줄 수 있어?",note:"복습"},{en:"The bath is <em>running over</em>!",ko:"욕조가 넘치고 있어!",note:"물 넘침"}],syn:[{s:"hit",m:"치다"},{s:"review",m:"검토하다"},{s:"exceed",m:"초과하다"},{s:"overflow",m:"넘치다"}],rel:["run over time 시간을 초과하다","run over the details 세부사항을 검토하다"]},
{w:"hold on",pron:"/həʊld ɒn/",ko:"기다리다; 버티다; 잡다",base:"hold",diff:1,nu:"전화에서 잠깐 기다리라거나, 어려운 상황을 버티거나, 무언가를 꽉 붙잡으라는 세 가지 의미.",uses:[{pat:"hold on (기다리다)",desc:"잠깐 기다리다"},{pat:"hold on (버티다)",desc:"힘든 상황을 버티다"},{pat:"hold on to sth",desc:"~을 꽉 잡다·유지하다"}],ex:[{en:"<em>Hold on</em> — I'll be right with you.",ko:"잠깐만요, 금방 갈게요.",note:"기다림"},{en:"Just <em>hold on</em> a little longer.",ko:"조금만 더 버텨.",note:"격려"},{en:"<em>Hold on</em> to the railing — it's slippery.",ko:"난간 꽉 잡아, 미끄러워.",note:"안전"},{en:"<em>Hold on</em> — something doesn't add up.",ko:"잠깐, 뭔가 앞뒤가 안 맞아.",note:"의심"},{en:"<em>Hold on</em> to that ticket — you might need it.",ko:"그 티켓 잘 갖고 있어, 필요할 수도 있어.",note:"보관"}],syn:[{s:"wait",m:"기다리다"},{s:"persevere",m:"끈기 있게 버티다"},{s:"grip",m:"꽉 잡다"}],rel:["hold on a second 잠깐만","hold on tight 꽉 잡아","hold on to hope 희망을 잃지 않다"]},
{w:"hold up",pron:"/həʊld ʌp/",ko:"지탱하다; 지연시키다; 강도짓하다",base:"hold",diff:1,nu:"무게를 지탱하거나, 지연·방해를 일으키거나, 총기로 강도짓을 하는 세 가지 의미.",uses:[{pat:"hold up + 무게",desc:"지탱하다"},{pat:"hold up + 진행",desc:"지연시키다"},{pat:"hold up (강도)",desc:"강도짓하다"},{pat:"hold up well",desc:"잘 버티다"}],ex:[{en:"What's <em>holding up</em> the delivery?",ko:"배송이 왜 이렇게 늦어지는 거야?",note:"지연"},{en:"The bridge <em>holds up</em> tons of weight.",ko:"그 다리는 수 톤의 무게를 지탱한다.",note:"지탱"},{en:"Two men <em>held up</em> the convenience store.",ko:"두 남자가 편의점을 털었다.",note:"강도"},{en:"This argument doesn't <em>hold up</em> under scrutiny.",ko:"이 주장은 면밀히 따져보면 버티지 못해.",note:"논리"},{en:"She's <em>holding up</em> well despite everything.",ko:"그녀는 모든 것에도 불구하고 잘 버티고 있어.",note:"격려"}],syn:[{s:"support",m:"지탱하다"},{s:"delay",m:"지연시키다"},{s:"rob",m:"강도짓하다"},{s:"withstand",m:"버티다"}],rel:["holdup (n.) 강도·지연","hold up to scrutiny 면밀한 검토를 버티다"]},
{w:"fall for",pron:"/fɔːl fɔːr/",ko:"사랑에 빠지다; 속다",base:"fall",diff:1,nu:"누군가와 사랑에 빠지거나, 속임수·거짓말에 넘어가는 두 가지 의미.",uses:[{pat:"fall for + 사람",desc:"~에게 반하다"},{pat:"fall for + 속임수",desc:"~에 속다·넘어가다"}],ex:[{en:"She <em>fell for</em> him the moment they met.",ko:"그녀는 그를 처음 만난 순간 반했다.",note:"첫눈에 반함"},{en:"I can't believe you <em>fell for</em> that trick.",ko:"그 속임수에 넘어갔다니 믿기지 않아.",note:"속다"},{en:"Don't <em>fall for</em> their sales pitch.",ko:"그들의 판매 멘트에 넘어가지 마.",note:"경고"},{en:"He <em>fell for</em> her sense of humor immediately.",ko:"그는 그녀의 유머 감각에 바로 반했다.",note:"매력"},{en:"They <em>fell for</em> the scam and lost everything.",ko:"그들은 사기에 넘어가 모든 것을 잃었다.",note:"사기"}],syn:[{s:"fall in love with",m:"사랑에 빠지다"},{s:"be deceived by",m:"~에 속다"},{s:"be taken in",m:"속다"}],rel:["fall head over heels 완전히 반하다","fall for it 속아 넘어가다"]},
{w:"fall back on",pron:"/fɔːl bæk ɒn/",ko:"~에 의지하다; 대안으로 쓰다",base:"fall",diff:2,nu:"주 계획이 실패했을 때 대안이나 예비 방법에 의지하는 것. 보험·비상수단의 뉘앙스.",uses:[{pat:"fall back on + 대안",desc:"~을 대안으로 쓰다"},{pat:"have sth to fall back on",desc:"대안이 있다"}],ex:[{en:"If the plan fails, we can always <em>fall back on</em> plan B.",ko:"계획이 실패하면 항상 플랜 B에 의지할 수 있어.",note:"대안"},{en:"It's good to have savings to <em>fall back on</em>.",ko:"의지할 저축이 있으면 좋아.",note:"재정"},{en:"She <em>fell back on</em> her teaching experience when job hunting.",ko:"그녀는 구직 시 교직 경험을 대안으로 활용했다.",note:"커리어"},{en:"When words fail, humor is something I <em>fall back on</em>.",ko:"말이 막힐 때 나는 유머에 의지해.",note:"사교"},{en:"Without a degree, you have less to <em>fall back on</em>.",ko:"학위가 없으면 기댈 것이 적어.",note:"조언"}],syn:[{s:"resort to",m:"~에 의지하다"},{s:"rely on",m:"의존하다"},{s:"use as backup",m:"대안으로 쓰다"}],rel:["fall back position 후퇴 포지션","safety net 안전망"]},
{w:"carry on",pron:"/ˈkæri ɒn/",ko:"계속하다; 행동하다",base:"other",diff:1,nu:"멈추지 않고 계속 진행하거나, 특정 방식으로 행동하는 것. 영국 영어에서 'keep going'으로 자주 쓰인다.",uses:[{pat:"carry on + V-ing",desc:"계속 ~하다"},{pat:"carry on with sth",desc:"~을 계속 하다"},{pat:"carry on (혼자서)",desc:"멈추지 않고 계속하다"}],ex:[{en:"<em>Carry on</em> — I'll catch up with you later.",ko:"계속해, 나중에 따라갈게.",note:"계속하다"},{en:"She <em>carried on</em> working despite the setbacks.",ko:"그녀는 어려움에도 불구하고 계속 일했다.",note:"끈기"},{en:"<em>Carry on</em> talking — I'm just going to make tea.",ko:"계속 얘기해, 나 그냥 차 한 잔 만들고 올게.",note:"일상"},{en:"Despite the rain, the outdoor concert <em>carried on</em>.",ko:"비에도 불구하고 야외 콘서트는 계속됐다.",note:"행사"},{en:"How can you just <em>carry on</em> as if nothing happened?",ko:"아무 일도 없었던 것처럼 어떻게 계속할 수가 있어?",note:"놀라움"}],syn:[{s:"continue",m:"계속하다"},{s:"keep going",m:"계속 가다"},{s:"press on",m:"밀고 나가다"},{s:"persist",m:"끈기 있게 하다"}],rel:["carry on regardless 어찌됐든 계속하다","carry-on (n.) 기내 수하물","carry on a conversation 대화를 이어가다"]},
{w:"bring up",pron:"/brɪŋ ʌp/",ko:"언급하다; 양육하다; 토하다",base:"bring",diff:1,nu:"대화에서 화제를 꺼내거나, 아이를 키우거나, 음식을 토해내는 세 가지 의미.",uses:[{pat:"bring up + 화제",desc:"언급하다·꺼내다"},{pat:"bring up + 아이",desc:"양육하다"},{pat:"bring up (음식)",desc:"토하다"}],ex:[{en:"He <em>brought up</em> an interesting point.",ko:"그는 흥미로운 점을 언급했다.",note:"화제 꺼내기"},{en:"She was <em>brought up</em> in a small town in Ireland.",ko:"그녀는 아일랜드의 작은 마을에서 자랐다.",note:"양육"},{en:"Don't <em>bring up</em> the accident — it still upsets him.",ko:"사고 얘기는 꺼내지 마, 아직 힘들어해.",note:"배려"},{en:"Who <em>brought you up</em> after your parents died?",ko:"부모님이 돌아가신 후 누가 너를 키웠어?",note:"가정"},{en:"The baby <em>brought up</em> her milk again.",ko:"아기가 또 우유를 토했다.",note:"건강"}],syn:[{s:"mention",m:"언급하다"},{s:"raise",m:"양육하다·제기하다"},{s:"introduce",m:"화제를 꺼내다"},{s:"vomit",m:"토하다"}],rel:["upbringing (n.) 양육·성장 배경","bring up a topic 주제를 꺼내다","well brought up 잘 교육받은"]},
{w:"bring out",pron:"/brɪŋ aʊt/",ko:"출시하다; 이끌어내다; 돋보이게 하다",base:"bring",diff:2,nu:"신제품을 출시하거나, 사람의 잠재력·특성을 이끌어내거나, 색·맛 등을 더 돋보이게 하는 것.",uses:[{pat:"bring out + 제품",desc:"출시하다"},{pat:"bring out + 특성",desc:"이끌어내다·드러내다"},{pat:"bring out the best/worst in",desc:"최선/최악을 이끌어내다"}],ex:[{en:"They're <em>bringing out</em> a new version next month.",ko:"다음 달에 새 버전을 출시한다.",note:"출시"},{en:"Teaching really <em>brings out</em> the best in her.",ko:"가르치는 일이 그녀의 최선을 이끌어낸다.",note:"잠재력"},{en:"This color really <em>brings out</em> your eyes.",ko:"이 색이 네 눈을 정말 돋보이게 해.",note:"외모"},{en:"Stress <em>brings out</em> the worst in people.",ko:"스트레스는 사람의 최악을 드러낸다.",note:"스트레스"},{en:"The lemon juice <em>brings out</em> the flavor.",ko:"레몬즙이 풍미를 더 돋보이게 한다.",note:"요리"}],syn:[{s:"release",m:"출시하다"},{s:"elicit",m:"이끌어내다"},{s:"highlight",m:"강조하다"},{s:"enhance",m:"향상시키다"}],rel:["bring out the best 최선을 이끌어내다","bring out the worst 최악을 드러내다"]},
{w:"set out",pron:"/set aʊt/",ko:"출발하다; 시작하다; 설명하다",base:"set",diff:1,nu:"여행을 떠나거나, 목표를 가지고 무언가를 시작하거나, 정보를 명확히 제시하는 것.",uses:[{pat:"set out (여행)",desc:"출발하다"},{pat:"set out to + 동사",desc:"~하기로 시작하다"},{pat:"set out + 정보",desc:"명확히 제시하다"}],ex:[{en:"We <em>set out</em> early to avoid the traffic.",ko:"교통 체증을 피하려고 일찍 출발했다.",note:"출발"},{en:"She <em>set out</em> to prove everyone wrong.",ko:"그녀는 모두가 틀렸다는 것을 증명하기로 했다.",note:"목표"},{en:"The report <em>sets out</em> the key findings.",ko:"보고서는 핵심 결과물을 명확히 제시한다.",note:"제시"},{en:"He <em>set out</em> on a journey across Asia.",ko:"그는 아시아 횡단 여행을 떠났다.",note:"여행"},{en:"Let me <em>set out</em> my reasons clearly.",ko:"내 이유를 명확히 설명해볼게.",note:"설명"}],syn:[{s:"depart",m:"출발하다"},{s:"aim to",m:"~하려 하다"},{s:"present",m:"제시하다"}],rel:["set out on a journey 여행을 떠나다","set out to achieve 달성하려 하다"]},
{w:"sort out",pron:"/sɔːrt aʊt/",ko:"해결하다; 정리하다",base:"other",diff:1,nu:"문제를 해결하거나, 뒤섞인 것을 정리하는 것. 영국 영어에서 특히 자주 쓰이는 표현.",uses:[{pat:"sort out + 문제",desc:"해결하다"},{pat:"sort out + 물건",desc:"정리하다·분류하다"},{pat:"sort yourself out",desc:"정신 차리다·해결하다"}],ex:[{en:"We need to <em>sort out</em> this issue before tomorrow.",ko:"내일 전에 이 문제를 해결해야 해.",note:"문제"},{en:"I spent the weekend <em>sorting out</em> my wardrobe.",ko:"주말에 옷장을 정리하며 보냈어.",note:"정리"},{en:"Don't worry — I'll <em>sort it out</em>.",ko:"걱정 마, 내가 해결할게.",note:"안심"},{en:"Can you <em>sort out</em> the invoices?",ko:"청구서들 좀 정리해줄 수 있어?",note:"업무"},{en:"You really need to <em>sort yourself out</em>.",ko:"너 정말 정신 좀 차려야 해.",note:"조언"}],syn:[{s:"resolve",m:"해결하다"},{s:"organize",m:"정리하다"},{s:"fix",m:"고치다"},{s:"deal with",m:"처리하다"}],rel:["sort out a mess 혼란을 해결하다","get sorted 해결하다"]},
{w:"check out",pron:"/tʃek aʊt/",ko:"체크아웃하다; 살펴보다; 대단하다",base:"other",diff:1,nu:"호텔에서 체크아웃하거나, 무언가를 살펴보거나, 구어체로 '봐봐!'라고 관심을 끌 때.",uses:[{pat:"check out (호텔)",desc:"체크아웃하다"},{pat:"check out + 물건/장소",desc:"살펴보다"},{pat:"check it out!",desc:"봐봐! (구어)"}],ex:[{en:"We need to <em>check out</em> by noon.",ko:"정오까지 체크아웃해야 해.",note:"호텔"},{en:"<em>Check out</em> this amazing view!",ko:"이 멋진 경치 봐!",note:"구어"},{en:"Have you <em>checked out</em> that new restaurant?",ko:"그 새 식당 가봤어?",note:"추천"},{en:"I was <em>checking out</em> some flights online.",ko:"온라인으로 항공편을 살펴보고 있었어.",note:"검색"},{en:"His story doesn't <em>check out</em>.",ko:"그의 이야기가 앞뒤가 맞지 않아.",note:"검증"}],syn:[{s:"look at",m:"보다"},{s:"examine",m:"살피다"},{s:"investigate",m:"확인하다"}],rel:["check out of 체크아웃하다","check it out 봐봐","check out a book 도서관 책을 빌리다"]},
{w:"wrap up",pron:"/ræp ʌp/",ko:"마무리하다; 따뜻하게 입다; 포장하다",base:"other",diff:1,nu:"회의·프로젝트 등을 마무리하거나, 따뜻하게 차려입거나, 선물을 포장하는 것.",uses:[{pat:"wrap up + 회의/일",desc:"마무리하다"},{pat:"wrap up (옷)",desc:"따뜻하게 입다"},{pat:"wrap up + 선물",desc:"포장하다"}],ex:[{en:"Let's <em>wrap up</em> the meeting — we're running over.",ko:"회의를 마무리합시다, 시간이 초과됐어요.",note:"회의"},{en:"<em>Wrap up</em> warm — it's freezing outside.",ko:"따뜻하게 입어, 밖에 엄청 추워.",note:"날씨"},{en:"I need to <em>wrap up</em> a few gifts for Christmas.",ko:"크리스마스 선물 몇 개를 포장해야 해.",note:"선물"},{en:"That <em>wraps up</em> today's presentation.",ko:"이걸로 오늘 발표를 마칩니다.",note:"마무리"},{en:"We're almost done — just a few things to <em>wrap up</em>.",ko:"거의 다 됐어, 마무리할 것 몇 가지만 남았어.",note:"완료"}],syn:[{s:"conclude",m:"마무리하다"},{s:"finish",m:"끝내다"},{s:"bundle up",m:"두껍게 입다"},{s:"package",m:"포장하다"}],rel:["that wraps it up 이걸로 마무리","wrap up a deal 거래를 마무리하다"]},
{w:"wear off",pron:"/weər ɒf/",ko:"효과가 사라지다; 닳다",base:"other",diff:1,nu:"약·마취·흥분 등의 효과가 점차 사라지거나, 표면이 닳아 없어지는 것.",uses:[{pat:"wear off (효과)",desc:"효과·감각이 사라지다"},{pat:"wear off (표면)",desc:"닳아서 없어지다"}],ex:[{en:"The painkiller is starting to <em>wear off</em>.",ko:"진통제 효과가 사라지기 시작했어.",note:"약"},{en:"The novelty soon <em>wore off</em>.",ko:"신기함이 금방 사라졌다.",note:"흥미"},{en:"The paint on the door has <em>worn off</em>.",ko:"문의 페인트가 닳아 없어졌다.",note:"표면"},{en:"Once the shock <em>wears off</em>, you'll feel better.",ko:"충격이 가라앉으면 괜찮아질 거야.",note:"충격"},{en:"The effects of the anesthesia are <em>wearing off</em>.",ko:"마취 효과가 사라지고 있어.",note:"의료"}],syn:[{s:"fade",m:"희미해지다"},{s:"diminish",m:"줄어들다"},{s:"subside",m:"가라앉다"},{s:"erode",m:"닳다"}],rel:["the effect wears off 효과가 사라지다","wear and tear 마모"]},
{w:"pull off",pron:"/pʊl ɒf/",ko:"해내다; 성공하다",base:"pull",diff:1,nu:"어렵거나 예상치 못한 일을 성공적으로 해내는 것. 구어체에서 특히 놀라운 성과를 표현할 때.",uses:[{pat:"pull off + 어려운 일",desc:"해내다·성공하다"},{pat:"how did you pull that off?",desc:"어떻게 해낸 거야?"}],ex:[{en:"I can't believe she <em>pulled it off</em>!",ko:"그녀가 해냈다니 믿기지 않아!",note:"감탄"},{en:"We somehow <em>pulled off</em> a last-minute victory.",ko:"우리는 어떻게든 막판 승리를 이끌었다.",note:"스포츠"},{en:"How did you <em>pull off</em> such a perfect event?",ko:"어떻게 그렇게 완벽한 행사를 해냈어?",note:"행사"},{en:"It was a risky plan, but they <em>pulled it off</em>.",ko:"위험한 계획이었지만 그들은 해냈다.",note:"리스크"},{en:"She <em>pulled off</em> the presentation with no preparation.",ko:"그녀는 아무 준비 없이 발표를 성공적으로 해냈다.",note:"즉흥"}],syn:[{s:"achieve",m:"달성하다"},{s:"manage",m:"해내다"},{s:"succeed at",m:"성공하다"},{s:"accomplish",m:"완수하다"}],rel:["pull off a win 승리를 따내다","pull off a deal 거래를 성사시키다"]},
{w:"point out",pron:"/pɔɪnt aʊt/",ko:"지적하다; 알려주다",base:"other",diff:1,nu:"다른 사람이 놓쳤거나 모르는 것을 알려주거나, 잘못을 지적하는 것.",uses:[{pat:"point out + 실수/사실",desc:"지적하다·알려주다"},{pat:"as I pointed out",desc:"내가 지적했듯이"}],ex:[{en:"She <em>pointed out</em> several errors in the report.",ko:"그녀는 보고서의 오류 몇 가지를 지적했다.",note:"오류 지적"},{en:"I just wanted to <em>point out</em> that you're wrong.",ko:"당신이 틀렸다는 걸 지적하고 싶었어요.",note:"의견"},{en:"He <em>pointed out</em> the emergency exit.",ko:"그는 비상구를 알려줬다.",note:"알려주다"},{en:"It's worth <em>pointing out</em> that this is temporary.",ko:"이것이 임시적이라는 걸 지적할 만해.",note:"강조"},{en:"As I <em>pointed out</em> earlier, this approach has risks.",ko:"앞서 지적했듯이, 이 접근법에는 위험이 있어.",note:"언급"}],syn:[{s:"indicate",m:"가리키다"},{s:"highlight",m:"강조하다"},{s:"note",m:"언급하다"},{s:"draw attention to",m:"주목하게 하다"}],rel:["point out a mistake 실수를 지적하다","point out the obvious 당연한 것을 지적하다"]}
