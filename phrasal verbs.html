{w:"get used to",pron:"/ɡet juːst tuː/",ko:"~에 익숙해지다",base:"get",diff:1,nu:"처음에는 낯설거나 불편했던 것이 시간이 지나면서 자연스럽게 느껴지는 과정. 'be used to'(이미 익숙한 상태)와 구분 필요.",uses:[{pat:"get used to + V-ing",desc:"~하는 것에 익숙해지다"},{pat:"get used to + 명사",desc:"~에 익숙해지다"},{pat:"you'll get used to it",desc:"익숙해질 거야"}],ex:[{en:"It took me a while to <em>get used to</em> waking up early.",ko:"일찍 일어나는 데 익숙해지는 데 시간이 좀 걸렸다.",note:"기상"},{en:"You'll <em>get used to</em> the noise eventually.",ko:"결국엔 소음에 익숙해질 거야.",note:"새 환경"},{en:"She's still <em>getting used to</em> living alone.",ko:"그녀는 아직 혼자 사는 데 적응 중이야.",note:"독립"},{en:"I can't <em>get used to</em> this cold weather.",ko:"이 추운 날씨에 적응이 안 돼.",note:"날씨"},{en:"Once you <em>get used to</em> the software, it's easy.",ko:"소프트웨어에 익숙해지면 쉬워.",note:"기술"}],syn:[{s:"adapt to",m:"적응하다"},{s:"get accustomed to",m:"익숙해지다"},{s:"grow used to",m:"서서히 익숙해지다"}],rel:["be used to ~에 이미 익숙하다","take time to get used to 익숙해지는 데 시간이 걸리다"]},
{w:"get ahead",pron:"/ɡet əˈhed/",ko:"앞서가다; 성공하다",base:"get",diff:1,nu:"경쟁에서 앞서거나 커리어·학업에서 성공적으로 나아가는 것. 노력과 전략이 수반된다는 뉘앙스.",uses:[{pat:"get ahead (in life/work)",desc:"성공하다·앞서가다"},{pat:"get ahead of",desc:"~보다 앞서다"},{pat:"get ahead of oneself",desc:"너무 앞서 나가다"}],ex:[{en:"Hard work is the key to <em>getting ahead</em>.",ko:"열심히 하는 것이 성공의 열쇠다.",note:"성공"},{en:"She always finds ways to <em>get ahead</em> of the competition.",ko:"그녀는 항상 경쟁에서 앞서가는 방법을 찾는다.",note:"경쟁"},{en:"Don't <em>get ahead of</em> yourself — take it step by step.",ko:"너무 앞서 나가지 마, 한 단계씩 해.",note:"조언"},{en:"Networking helps you <em>get ahead</em> in business.",ko:"네트워킹이 사업에서 앞서가는 데 도움이 된다.",note:"비즈니스"},{en:"I stayed late to <em>get ahead</em> on tomorrow's work.",ko:"내일 일을 미리 해두려고 늦게까지 있었어.",note:"업무"}],syn:[{s:"succeed",m:"성공하다"},{s:"advance",m:"나아가다"},{s:"progress",m:"발전하다"},{s:"get on",m:"잘 해나가다"}],rel:["get ahead of the game 게임에서 앞서다","stay ahead 앞선 상태를 유지하다"]},
{w:"get off",pron:"/ɡet ɒf/",ko:"내리다; 퇴근하다; 벗어나다",base:"get",diff:1,nu:"버스·기차 등에서 내리거나, 일이 끝나 퇴근하거나, 처벌·상황에서 벗어나는 것.",uses:[{pat:"get off + 교통수단",desc:"하차하다"},{pat:"get off work",desc:"퇴근하다"},{pat:"get off (처벌)",desc:"가볍게 넘어가다"},{pat:"get off to a good/bad start",desc:"좋은/나쁜 출발을 하다"}],ex:[{en:"I <em>get off</em> work at six today.",ko:"오늘 6시에 퇴근해.",note:"퇴근"},{en:"<em>Get off</em> at the third stop.",ko:"세 번째 정류장에서 내리세요.",note:"하차"},{en:"He <em>got off</em> with just a warning.",ko:"그는 경고만으로 가볍게 넘어갔다.",note:"처벌"},{en:"We <em>got off</em> to a great start this season.",ko:"우리는 이번 시즌 좋은 출발을 했다.",note:"시작"},{en:"<em>Get off</em> your phone and pay attention.",ko:"폰 내려놓고 집중해.",note:"주의"}],syn:[{s:"alight",m:"하차하다"},{s:"finish work",m:"퇴근하다"},{s:"escape",m:"벗어나다"}],rel:["get off easy 가볍게 넘어가다","get off to a flying start 아주 좋은 출발을 하다","tell sb where to get off 단호히 거절하다"]},
{w:"get on with",pron:"/ɡet ɒn wɪð/",ko:"계속하다; ~와 잘 지내다",base:"get",diff:1,nu:"하던 일을 계속하거나, 누군가와 잘 지내는 것. 영국 영어에서 특히 자주 쓰인다.",uses:[{pat:"get on with + 일",desc:"~을 계속하다"},{pat:"get on with + 사람",desc:"~와 잘 지내다"},{pat:"just get on with it",desc:"그냥 계속해"}],ex:[{en:"Stop talking and <em>get on with</em> your work.",ko:"그만 얘기하고 일 계속해.",note:"집중"},{en:"I just need to <em>get on with</em> it.",ko:"그냥 계속해야 해.",note:"결심"},{en:"Do you <em>get on with</em> your neighbours?",ko:"이웃들과 잘 지내?",note:"관계"},{en:"While I cook, can you <em>get on with</em> setting the table?",ko:"내가 요리하는 동안 상 차리는 것 계속해줄 수 있어?",note:"분담"},{en:"I actually <em>get on with</em> my boss really well.",ko:"사실 상사랑 정말 잘 지내.",note:"직장"}],syn:[{s:"continue",m:"계속하다"},{s:"get along with",m:"잘 지내다"},{s:"proceed",m:"진행하다"}],rel:["get on with life 삶을 계속 살아가다","get on with things 일을 계속 처리하다"]},
{w:"take over",pron:"/teɪk ˈəʊvər/",ko:"인수하다; 이어받다; 장악하다",base:"take",diff:1,nu:"회사를 인수하거나, 누군가의 역할을 이어받거나, 강력하게 지배권을 장악하는 것.",uses:[{pat:"take over + 회사",desc:"인수하다"},{pat:"take over from sb",desc:"~의 역할을 이어받다"},{pat:"take over (공간/권력)",desc:"장악하다"}],ex:[{en:"The tech giant <em>took over</em> the startup for $2 billion.",ko:"대형 테크 기업이 스타트업을 20억 달러에 인수했다.",note:"기업 인수"},{en:"Can you <em>take over</em> for me while I'm on leave?",ko:"내가 휴가인 동안 내 역할 대신해줄 수 있어?",note:"역할 교대"},{en:"Weeds have completely <em>taken over</em> the garden.",ko:"잡초가 정원을 완전히 장악했다.",note:"장악"},{en:"She <em>took over</em> as CEO last January.",ko:"그녀는 작년 1월에 CEO 자리를 이어받았다.",note:"승계"},{en:"Don't let work <em>take over</em> your entire life.",ko:"일이 네 삶 전체를 지배하게 놔두지 마.",note:"일과 삶"}],syn:[{s:"acquire",m:"인수하다"},{s:"seize",m:"장악하다"},{s:"succeed",m:"승계하다"},{s:"dominate",m:"지배하다"}],rel:["takeover (n.) 인수","hostile takeover 적대적 인수","take over the world 세계를 정복하다"]},
{w:"take it out on",pron:"/teɪk ɪt aʊt ɒn/",ko:"~에게 화풀이하다",base:"take",diff:2,nu:"자신의 나쁜 감정이나 스트레스를 관계없는 다른 사람에게 푸는 것. 부당하다는 뉘앙스 내포.",uses:[{pat:"take it out on + 사람",desc:"~에게 화풀이하다"}],ex:[{en:"Don't <em>take it out on</em> me — I didn't do anything.",ko:"나한테 화풀이하지 마, 나는 아무것도 안 했어.",note:"억울함"},{en:"She was stressed at work and <em>took it out on</em> her family.",ko:"그녀는 직장에서 스트레스받고 가족에게 화풀이했다.",note:"스트레스"},{en:"I know you're upset, but don't <em>take it out on</em> him.",ko:"화난 거 알지만 그에게 화풀이하지 마.",note:"조언"},{en:"He <em>took out</em> his frustration <em>on</em> the punching bag.",ko:"그는 샌드백에 좌절감을 풀었다.",note:"운동"},{en:"It's not fair to <em>take it out on</em> others when things go wrong.",ko:"일이 잘못될 때 다른 사람에게 화풀이하는 건 공평하지 않아.",note:"공정함"}],syn:[{s:"vent on",m:"~에게 발산하다"},{s:"unleash on",m:"~에게 퍼붓다"},{s:"lash out at",m:"~에게 화를 퍼붓다"}],rel:["take out frustration 좌절감을 풀다","vent anger 화를 발산하다"]},
{w:"take for granted",pron:"/teɪk fər ˈɡrɑːntɪd/",ko:"당연하게 여기다",base:"take",diff:1,nu:"무언가나 누군가의 가치를 제대로 인식하지 못하고 당연하게 여기는 것. 감사함의 부재를 내포.",uses:[{pat:"take sth for granted",desc:"~을 당연하게 여기다"},{pat:"take sb for granted",desc:"~를 당연하게 여기다"}],ex:[{en:"Don't <em>take</em> your health <em>for granted</em>.",ko:"건강을 당연하게 여기지 마.",note:"건강"},{en:"I used to <em>take</em> clean water <em>for granted</em>.",ko:"나는 깨끗한 물을 당연하게 여겼었어.",note:"감사"},{en:"She felt <em>taken for granted</em> in the relationship.",ko:"그녀는 관계에서 당연한 존재 취급받는다고 느꼈다.",note:"관계"},{en:"We often <em>take for granted</em> the people closest to us.",ko:"우리는 종종 가장 가까운 사람들을 당연하게 여긴다.",note:"관계"},{en:"Never <em>take</em> friendship <em>for granted</em>.",ko:"우정을 절대 당연하게 여기지 마.",note:"우정"}],syn:[{s:"overlook",m:"간과하다"},{s:"undervalue",m:"과소평가하다"},{s:"not appreciate",m:"감사하지 않다"}],rel:["take nothing for granted 아무것도 당연하게 여기지 않다","count your blessings 복을 세어보다"]},
{w:"put down",pron:"/pʊt daʊn/",ko:"내려놓다; 깎아내리다; 기록하다",base:"put",diff:1,nu:"물건을 내려놓거나, 누군가를 비하·무시하거나, 글로 기록하는 것. 특히 '깎아내리다' 의미는 감정적으로 강한 표현.",uses:[{pat:"put down + 물건",desc:"내려놓다"},{pat:"put sb down",desc:"무시하다·깎아내리다"},{pat:"put down + 메모",desc:"기록하다"},{pat:"put down a deposit",desc:"계약금을 내다"}],ex:[{en:"<em>Put down</em> what you're doing and listen.",ko:"하던 걸 내려놓고 들어봐.",note:"집중"},{en:"He always <em>puts</em> her <em>down</em> in front of others.",ko:"그는 항상 다른 사람들 앞에서 그녀를 깎아내린다.",note:"비하"},{en:"<em>Put down</em> your thoughts before you forget them.",ko:"잊어버리기 전에 생각을 적어둬.",note:"메모"},{en:"I couldn't <em>put down</em> that book.",ko:"그 책을 손에서 놓을 수가 없었어.",note:"책"},{en:"We had to <em>put</em> our dog <em>down</em> last year.",ko:"우리는 작년에 개를 안락사시켜야 했다.",note:"안락사"}],syn:[{s:"set down",m:"내려놓다"},{s:"belittle",m:"무시하다"},{s:"write down",m:"적다"},{s:"record",m:"기록하다"}],rel:["put-down (n.) 모욕적 발언","put down a deposit 계약금을 내다","put down roots 정착하다"]},
{w:"put up",pron:"/pʊt ʌp/",ko:"설치하다; 재워주다; 저항하다",base:"put",diff:1,nu:"포스터·선반 등을 설치하거나, 누군가를 재워주거나, 저항하거나, 자금을 제공하는 것.",uses:[{pat:"put up + 물건",desc:"설치하다·게시하다"},{pat:"put sb up",desc:"재워주다"},{pat:"put up a fight",desc:"저항하다"},{pat:"put up with",desc:"참다 (별도 항목)"}],ex:[{en:"Can you <em>put</em> me <em>up</em> for the night?",ko:"하룻밤 재워줄 수 있어?",note:"숙박"},{en:"They <em>put up</em> posters all over town.",ko:"그들은 도시 곳곳에 포스터를 붙였다.",note:"포스터"},{en:"He didn't <em>put up</em> much of a fight.",ko:"그는 별로 저항하지 않았다.",note:"저항"},{en:"The company <em>put up</em> the money for the project.",ko:"회사가 프로젝트 자금을 댔다.",note:"자금"},{en:"We need to <em>put up</em> a new shelf in the bathroom.",ko:"욕실에 새 선반을 달아야 해.",note:"설치"}],syn:[{s:"hang",m:"걸다"},{s:"accommodate",m:"묵게 하다"},{s:"resist",m:"저항하다"},{s:"install",m:"설치하다"}],rel:["put up for sale 판매에 내놓다","put up a tent 텐트를 치다"]},
{w:"put on",pron:"/pʊt ɒn/",ko:"입다; 켜다; 살찌다; 공연하다",base:"put",diff:1,nu:"옷을 입거나, TV·음악 등을 켜거나, 체중이 늘거나, 행사를 개최하는 매우 다양한 의미의 구동사.",uses:[{pat:"put on + 옷",desc:"입다"},{pat:"put on + 전자기기",desc:"켜다·틀다"},{pat:"put on weight",desc:"살이 찌다"},{pat:"put on + 행사",desc:"개최하다"}],ex:[{en:"<em>Put on</em> your coat — it's cold outside.",ko:"코트 입어, 밖에 추워.",note:"옷"},{en:"She <em>put on</em> some music while cooking.",ko:"그녀는 요리하면서 음악을 틀었다.",note:"음악"},{en:"I've <em>put on</em> weight over the holidays.",ko:"휴가 동안 살이 쪘어.",note:"체중"},{en:"The school <em>put on</em> a great performance.",ko:"학교에서 훌륭한 공연을 개최했다.",note:"공연"},{en:"Stop <em>putting on</em> an act and be yourself.",ko:"연기하지 말고 자연스럽게 행동해.",note:"가식"}],syn:[{s:"wear",m:"착용하다"},{s:"turn on",m:"켜다"},{s:"gain weight",m:"살찌다"},{s:"host",m:"개최하다"}],rel:["put on a brave face 용감한 척하다","put on airs 거들먹거리다"]},
{w:"come back",pron:"/kʌm bæk/",ko:"돌아오다; 기억나다; 반격하다",base:"come",diff:1,nu:"떠났다가 다시 돌아오거나, 잊었던 기억·감각이 돌아오거나, 말로 반격하는 것.",uses:[{pat:"come back (장소)",desc:"돌아오다"},{pat:"come back to sb",desc:"기억이 나다"},{pat:"come back at sb",desc:"반격하다"},{pat:"comeback (명사)",desc:"복귀·재기"}],ex:[{en:"When are you <em>coming back</em>?",ko:"언제 돌아올 거야?",note:"귀환"},{en:"It'll <em>come back</em> to me in a minute.",ko:"잠깐 있으면 기억날 거야.",note:"기억"},{en:"He made an impressive <em>comeback</em> after his injury.",ko:"그는 부상 후 인상적인 복귀를 했다.",note:"복귀"},{en:"What goes around <em>comes back</em> around.",ko:"뿌린 대로 거두다.",note:"인과응보"},{en:"The fashion from the 90s is <em>coming back</em>.",ko:"90년대 패션이 돌아오고 있어.",note:"유행"}],syn:[{s:"return",m:"돌아오다"},{s:"resurface",m:"다시 나타나다"},{s:"retaliate",m:"반격하다"}],rel:["comeback kid 역경을 딛고 복귀한 사람","come back to haunt 나중에 발목을 잡다"]},
{w:"come off",pron:"/kʌm ɒf/",ko:"성공하다; 떨어지다; 그만하다",base:"come",diff:2,nu:"계획·시도가 성공하거나, 무언가가 떨어지거나, 'come off it'은 '말도 안 돼·그만해'의 구어 표현.",uses:[{pat:"come off (계획)",desc:"성공하다·잘 되다"},{pat:"come off + 표면",desc:"떨어지다·벗겨지다"},{pat:"come off it!",desc:"말도 안 돼! (구어)"}],ex:[{en:"Did the plan <em>come off</em>?",ko:"계획이 잘 됐어?",note:"성공 여부"},{en:"The paint is <em>coming off</em> the wall.",ko:"벽에서 페인트가 벗겨지고 있어.",note:"벗겨짐"},{en:"<em>Come off it</em> — you don't really believe that.",ko:"말도 안 돼, 진짜 그렇게 믿는 건 아니잖아.",note:"구어"},{en:"She <em>came off</em> badly in the interview.",ko:"그녀는 면접에서 인상이 안 좋았어.",note:"인상"},{en:"The button <em>came off</em> my jacket.",ko:"재킷 단추가 떨어졌어.",note:"의복"}],syn:[{s:"succeed",m:"성공하다"},{s:"detach",m:"떨어지다"},{s:"come across",m:"인상을 주다"}],rel:["come off well/badly 좋게/나쁘게 보이다","come off the bench 교체 출전하다"]},
{w:"come around",pron:"/kʌm əˈraʊnd/",ko:"의식이 돌아오다; 생각이 바뀌다; 찾아오다",base:"come",diff:2,nu:"기절에서 깨어나거나, 처음엔 반대했다가 결국 동의하게 되거나, 주기적으로 찾아오는 것.",uses:[{pat:"come around (의식)",desc:"의식이 돌아오다"},{pat:"come around (의견)",desc:"생각이 바뀌다·동의하다"},{pat:"come around (방문)",desc:"들르다"},{pat:"come around (시간)",desc:"(시간이) 돌아오다"}],ex:[{en:"She <em>came around</em> after a few minutes.",ko:"그녀는 몇 분 후 의식이 돌아왔다.",note:"의식 회복"},{en:"He didn't like the idea at first, but he <em>came around</em>.",ko:"처음엔 아이디어가 마음에 안 들었지만 결국 동의하게 됐다.",note:"생각 변화"},{en:"Why don't you <em>come around</em> for dinner sometime?",ko:"언제 저녁 먹으러 들러.",note:"방문"},{en:"Christmas <em>comes around</em> faster every year.",ko:"크리스마스는 해마다 더 빨리 돌아오는 것 같아.",note:"시간"},{en:"Give her time — she'll <em>come around</em>.",ko:"시간을 줘, 결국 마음을 바꿀 거야.",note:"설득"}],syn:[{s:"regain consciousness",m:"의식을 되찾다"},{s:"change one's mind",m:"생각을 바꾸다"},{s:"visit",m:"들르다"}],rel:["come around to sb's way of thinking 생각을 받아들이다","come around every year 매년 돌아오다"]},
{w:"go on",pron:"/ɡəʊ ɒn/",ko:"계속하다; 일어나다; 말하다",base:"go",diff:1,nu:"계속 진행하거나, 무슨 일이 일어나고 있는지 묻거나, 계속 말하라고 격려하는 것.",uses:[{pat:"go on + V-ing",desc:"계속 ~하다"},{pat:"what's going on?",desc:"무슨 일이야?"},{pat:"go on!",desc:"계속해봐! / 정말?"},{pat:"go on for hours",desc:"몇 시간씩 이어지다"}],ex:[{en:"What's <em>going on</em>?",ko:"무슨 일이야?",note:"상황 파악"},{en:"Please <em>go on</em> — I'm listening.",ko:"계속하세요, 듣고 있어요.",note:"경청"},{en:"This meeting has been <em>going on</em> for three hours.",ko:"이 회의가 세 시간째 이어지고 있어.",note:"장시간"},{en:"<em>Go on</em>! Ask her — what's the worst that can happen?",ko:"해봐! 물어봐, 최악이 뭔데?",note:"격려"},{en:"The party <em>went on</em> until midnight.",ko:"파티가 자정까지 계속됐다.",note:"지속"}],syn:[{s:"continue",m:"계속하다"},{s:"happen",m:"일어나다"},{s:"proceed",m:"진행하다"}],rel:["go on and on 계속 이어지다","what's been going on? 무슨 일이 있었어?"]},
{w:"go ahead",pron:"/ɡəʊ əˈhed/",ko:"진행하다; 해도 돼; 앞서가다",base:"go",diff:1,nu:"허락을 요청받았을 때 '해도 돼'라고 응답하거나, 계획을 예정대로 진행하거나, 앞서 나아가는 것.",uses:[{pat:"go ahead! (허락)",desc:"해도 돼·먼저 해"},{pat:"go ahead with + 계획",desc:"계획을 진행하다"},{pat:"go ahead (먼저)",desc:"먼저 가다"}],ex:[{en:"\"Can I borrow your pen?\" \"<em>Go ahead</em>.\"",ko:"\"펜 빌려도 돼요?\" \"물론이죠.\"",note:"허락"},{en:"We decided to <em>go ahead</em> with the launch despite the risks.",ko:"위험에도 불구하고 출시를 진행하기로 했다.",note:"결정"},{en:"You <em>go ahead</em> — I'll catch up later.",ko:"먼저 가, 나중에 따라갈게.",note:"선행"},{en:"<em>Go ahead</em> and order — I already know what I want.",ko:"먼저 주문해, 난 뭐 먹을지 알아.",note:"식당"},{en:"The project will <em>go ahead</em> as planned.",ko:"프로젝트는 계획대로 진행될 거야.",note:"확정"}],syn:[{s:"proceed",m:"진행하다"},{s:"continue",m:"계속하다"},{s:"feel free to",m:"~해도 돼"}],rel:["give the go-ahead 허가를 내리다","go-ahead (n.) 허가"]},
{w:"go back",pron:"/ɡəʊ bæk/",ko:"돌아가다; 거슬러 올라가다",base:"go",diff:1,nu:"원래 자리나 상태로 돌아가거나, 역사·관계가 오래됨을 나타내는 것.",uses:[{pat:"go back (장소)",desc:"돌아가다"},{pat:"go back to + 상태",desc:"이전 상태로 돌아가다"},{pat:"go back to + 날짜",desc:"~까지 거슬러 올라가다"},{pat:"go back on one's word",desc:"약속을 어기다"}],ex:[{en:"We need to <em>go back</em> to basics.",ko:"기본으로 돌아가야 해.",note:"기본"},{en:"This tradition <em>goes back</em> hundreds of years.",ko:"이 전통은 수백 년 전으로 거슬러 올라간다.",note:"역사"},{en:"I can't <em>go back</em> to the way things were.",ko:"예전으로 돌아갈 수 없어.",note:"변화"},{en:"Don't <em>go back on</em> your promise.",ko:"약속을 어기지 마.",note:"약속"},{en:"We <em>go back</em> a long way — we met in college.",ko:"우리는 오랜 인연이야, 대학교에서 만났거든.",note:"관계"}],syn:[{s:"return",m:"돌아가다"},{s:"revert",m:"되돌아가다"},{s:"date back",m:"~까지 거슬러 올라가다"}],rel:["go back to square one 처음부터 다시 시작하다","go back on your word 약속을 어기다"]},
{w:"go for",pron:"/ɡəʊ fɔːr/",ko:"선택하다; 시도하다; 해당되다",base:"go",diff:1,nu:"특정 선택을 하거나, 무언가를 얻으려고 시도하거나, 어떤 설명이 특정 대상에게도 해당되는 것.",uses:[{pat:"go for + 선택",desc:"~로 결정하다"},{pat:"go for it",desc:"도전하다"},{pat:"that goes for you too",desc:"너도 마찬가지야"}],ex:[{en:"I'll <em>go for</em> the steak, please.",ko:"스테이크로 할게요.",note:"선택"},{en:"If you really want it, just <em>go for it</em>.",ko:"정말 원한다면 그냥 도전해.",note:"격려"},{en:"She went all out and <em>went for</em> the gold.",ko:"그녀는 전력을 다해 금메달에 도전했다.",note:"스포츠"},{en:"That rule <em>goes for</em> everyone in this office.",ko:"그 규칙은 이 사무실의 모든 사람에게 해당돼.",note:"규칙"},{en:"The house <em>went for</em> over a million dollars.",ko:"그 집은 백만 달러가 넘게 팔렸다.",note:"가격"}],syn:[{s:"choose",m:"선택하다"},{s:"try for",m:"시도하다"},{s:"apply to",m:"해당되다"}],rel:["go for a walk 산책하다","go for a record 기록에 도전하다","go for broke 전력을 다하다"]},
{w:"turn on",pron:"/tɜːrn ɒn/",ko:"켜다; 공격하다; 흥미를 일으키다",base:"turn",diff:1,nu:"전자기기를 켜거나, 갑자기 누군가를 공격하거나, 관심·흥미를 일으키는 것.",uses:[{pat:"turn on + 전자기기",desc:"켜다"},{pat:"turn on sb",desc:"갑자기 공격하다"},{pat:"turn sb on",desc:"흥미·관심을 일으키다"}],ex:[{en:"<em>Turn on</em> the heater — it's freezing.",ko:"히터 켜, 엄청 추워.",note:"기기"},{en:"The dog suddenly <em>turned on</em> its owner.",ko:"개가 갑자기 주인을 공격했다.",note:"공격"},{en:"What really <em>turns</em> me <em>on</em> is a good sense of humor.",ko:"나를 매력적으로 느끼게 하는 건 유머 감각이야.",note:"매력"},{en:"Everything <em>turns on</em> whether they agree or not.",ko:"모든 것이 그들이 동의하느냐에 달려 있어.",note:"달려있다"},{en:"Don't <em>turn on</em> me now — I'm trying to help.",ko:"지금 나한테 등 돌리지 마, 도우려는 거잖아.",note:"배신"}],syn:[{s:"switch on",m:"켜다"},{s:"attack",m:"공격하다"},{s:"excite",m:"흥분시키다"}],rel:["turn on a dime 즉시 방향을 바꾸다","turn on the charm 매력을 발산하다"]},
{w:"turn off",pron:"/tɜːrn ɒf/",ko:"끄다; 흥미를 잃게 하다",base:"turn",diff:1,nu:"전자기기·불 등을 끄거나, 누군가의 흥미나 관심을 잃게 만드는 것.",uses:[{pat:"turn off + 기기",desc:"끄다"},{pat:"turn sb off",desc:"흥미를 꺾다·거부감을 주다"},{pat:"turn off (길)",desc:"샛길로 들어서다"}],ex:[{en:"<em>Turn off</em> the TV when you leave.",ko:"나갈 때 TV 꺼.",note:"기기"},{en:"His arrogance really <em>turns</em> people <em>off</em>.",ko:"그의 오만함이 사람들의 흥미를 정말 떨어뜨려.",note:"거부감"},{en:"We need to <em>turn off</em> at the next exit.",ko:"다음 출구에서 빠져나가야 해.",note:"운전"},{en:"Constant negativity is a real <em>turn-off</em>.",ko:"끊임없는 부정적 태도는 정말 매력을 떨어뜨려.",note:"관계"},{en:"Can you <em>turn off</em> your notifications during the meeting?",ko:"회의 중 알림 좀 꺼줄 수 있어?",note:"회의"}],syn:[{s:"switch off",m:"끄다"},{s:"repel",m:"반감을 주다"},{s:"extinguish",m:"끄다"}],rel:["turn-off (n.) 흥미 떨어지게 하는 것","turn off the lights 불을 끄다"]},
{w:"turn into",pron:"/tɜːrn ˈɪntuː/",ko:"~으로 변하다; 변환하다",base:"turn",diff:1,nu:"무언가가 완전히 다른 것으로 변하는 것. 물리적 변화와 비유적 변화 모두에 쓴다.",uses:[{pat:"turn into + 명사",desc:"~으로 변하다"},{pat:"turn sth into sth",desc:"~을 ~으로 변환하다"}],ex:[{en:"The caterpillar <em>turned into</em> a butterfly.",ko:"애벌레가 나비가 됐다.",note:"변태"},{en:"What started as fun <em>turned into</em> a nightmare.",ko:"재미로 시작한 것이 악몽으로 변했다.",note:"상황 악화"},{en:"She <em>turned</em> her hobby <em>into</em> a business.",ko:"그녀는 취미를 사업으로 만들었다.",note:"성공"},{en:"The argument <em>turned into</em> a full-blown fight.",ko:"논쟁이 본격적인 싸움으로 번졌다.",note:"악화"},{en:"Water <em>turns into</em> ice at 0°C.",ko:"물은 0도에서 얼음이 된다.",note:"과학"}],syn:[{s:"become",m:"~이 되다"},{s:"transform into",m:"변환하다"},{s:"change into",m:"바뀌다"}],rel:["turn over a new leaf 새 출발하다","turn into a pumpkin 시간이 다 되다"]},
{w:"break off",pron:"/breɪk ɒf/",ko:"떼어내다; 갑자기 멈추다; 끊다",base:"break",diff:2,nu:"물리적으로 떼어내거나, 하던 말·행동을 갑자기 멈추거나, 관계를 끊는 것.",uses:[{pat:"break off + 조각",desc:"떼어내다"},{pat:"break off (말/행동)",desc:"갑자기 멈추다"},{pat:"break off + 관계",desc:"끊다·중단하다"}],ex:[{en:"She <em>broke off</em> a piece of chocolate for him.",ko:"그녀는 그를 위해 초콜릿 한 조각을 떼어줬다.",note:"음식"},{en:"He <em>broke off</em> mid-sentence and stared at the door.",ko:"그는 문장 중간에 멈추고 문을 응시했다.",note:"멈춤"},{en:"They <em>broke off</em> their engagement.",ko:"그들은 약혼을 파기했다.",note:"관계"},{en:"The branch <em>broke off</em> in the storm.",ko:"폭풍에 나뭇가지가 부러졌다.",note:"자연"},{en:"Diplomatic talks <em>broke off</em> without agreement.",ko:"외교 협상이 합의 없이 중단됐다.",note:"외교"}],syn:[{s:"detach",m:"떼어내다"},{s:"stop abruptly",m:"갑자기 멈추다"},{s:"terminate",m:"종료하다"}],rel:["break off an engagement 약혼을 파기하다","break off negotiations 협상을 중단하다"]},
{w:"break in",pron:"/breɪk ɪn/",ko:"침입하다; 끼어들다; 길들이다",base:"break",diff:1,nu:"몰래 침입하거나, 대화에 끼어들거나, 새 신발·기계를 사용에 익숙하게 길들이는 것.",uses:[{pat:"break in (건물)",desc:"침입하다"},{pat:"break in (대화)",desc:"끼어들다"},{pat:"break in + 신발/기계",desc:"길들이다"}],ex:[{en:"Someone tried to <em>break in</em> while we were on vacation.",ko:"우리가 휴가 중에 누군가 침입을 시도했다.",note:"침입"},{en:"Sorry to <em>break in</em>, but there's a call for you.",ko:"끼어들어서 미안한데 전화 왔어요.",note:"끼어들기"},{en:"These shoes need to be <em>broken in</em> before the hike.",ko:"하이킹 전에 이 신발을 길들여야 해.",note:"신발"},{en:"It takes time to <em>break in</em> a new employee.",ko:"신입 직원을 적응시키는 데 시간이 걸린다.",note:"직장"},{en:"The robbers <em>broke in</em> through the back window.",ko:"강도들이 뒷창문을 통해 침입했다.",note:"범죄"}],syn:[{s:"burgle",m:"침입하다"},{s:"interrupt",m:"끼어들다"},{s:"train",m:"훈련시키다"}],rel:["break-in (n.) 침입","break in a horse 말을 길들이다","hard to break in 끼어들기 어려운"]},
{w:"run through",pron:"/rʌn θruː/",ko:"검토하다; 훑어보다; 다 써버리다",base:"run",diff:1,nu:"내용·계획을 빠르게 검토하거나, 돈·자원을 빠르게 소비하거나, 칼로 찌르는 것.",uses:[{pat:"run through + 내용",desc:"빠르게 검토하다"},{pat:"run through + 돈",desc:"다 써버리다"},{pat:"run through sb (칼)",desc:"찌르다"}],ex:[{en:"Let me <em>run through</em> the plan one more time.",ko:"계획을 한 번 더 훑어볼게.",note:"검토"},{en:"She <em>ran through</em> her savings in just a month.",ko:"그녀는 한 달 만에 저축을 다 써버렸다.",note:"소비"},{en:"Can you <em>run through</em> what happened?",ko:"무슨 일이 있었는지 빠르게 설명해줄 수 있어?",note:"설명"},{en:"The director <em>ran through</em> the scene twice.",ko:"감독이 그 장면을 두 번 훑었다.",note:"리허설"},{en:"A chill <em>ran through</em> me when I heard the news.",ko:"소식을 듣자 몸서리가 쳐졌다.",note:"감각"}],syn:[{s:"review",m:"검토하다"},{s:"scan",m:"훑어보다"},{s:"exhaust",m:"다 써버리다"}],rel:["run through the details 세부 사항을 검토하다","run through money like water 돈을 물 쓰듯 쓰다"]},
{w:"run up",pron:"/rʌn ʌp/",ko:"빚지다; 올라가다; 만들다",base:"run",diff:2,nu:"빚·청구서를 쌓아가거나, 빠르게 달려 올라가거나, 급하게 무언가를 만드는 것.",uses:[{pat:"run up + 빚/청구서",desc:"(빚을) 쌓다"},{pat:"run up to + 장소",desc:"달려 올라가다"},{pat:"run up + 옷/물건",desc:"급하게 만들다"}],ex:[{en:"He <em>ran up</em> huge debts gambling.",ko:"그는 도박으로 엄청난 빚을 쌓았다.",note:"빚"},{en:"She <em>ran up</em> a massive phone bill.",ko:"그녀는 엄청난 전화 요금 청구서를 만들었다.",note:"청구서"},{en:"The child <em>ran up</em> to his mother.",ko:"아이가 엄마에게 달려갔다.",note:"달리기"},{en:"Can you <em>run up</em> a quick report by 3 PM?",ko:"오후 3시까지 간단한 보고서 빠르게 만들어줄 수 있어?",note:"업무"},{en:"The costs are <em>running up</em> fast.",ko:"비용이 빠르게 쌓이고 있어.",note:"비용"}],syn:[{s:"accumulate",m:"쌓다"},{s:"incur",m:"(빚을) 지다"},{s:"dash up",m:"달려 올라가다"}],rel:["run up a tab 외상을 쌓다","run up against 어려움에 부딪히다"]},
{w:"hold off",pron:"/həʊld ɒf/",ko:"미루다; 막다; 버티다",base:"hold",diff:1,nu:"무언가를 일시적으로 미루거나, 공격·압박을 막아내거나, 비·눈이 그치지 않고 버티는 것.",uses:[{pat:"hold off + 결정",desc:"미루다"},{pat:"hold off + 공격",desc:"막다·저지하다"},{pat:"hold off (날씨)",desc:"비가 내리지 않다"}],ex:[{en:"Let's <em>hold off</em> on the decision until we have more data.",ko:"데이터를 더 얻을 때까지 결정을 미루자.",note:"결정 보류"},{en:"They managed to <em>hold off</em> the attackers.",ko:"그들은 공격자들을 막아냈다.",note:"방어"},{en:"The rain <em>held off</em> during the ceremony.",ko:"식 중에는 비가 내리지 않았다.",note:"날씨"},{en:"Can you <em>hold off</em> calling him until tomorrow?",ko:"내일까지 그에게 전화하는 걸 미룰 수 있어?",note:"통화"},{en:"We need to <em>hold off</em> the competition a little longer.",ko:"경쟁사를 조금 더 막아야 해.",note:"비즈니스"}],syn:[{s:"postpone",m:"미루다"},{s:"resist",m:"막다"},{s:"delay",m:"지연하다"}],rel:["hold off on 미루다","hold off the competition 경쟁을 막다"]},
{w:"hold out",pron:"/həʊld aʊt/",ko:"버티다; 내밀다; 희망을 갖다",base:"hold",diff:2,nu:"어려운 상황에서 끝까지 버티거나, 손이나 물건을 앞으로 내밀거나, 가능성을 제시하는 것.",uses:[{pat:"hold out (버티다)",desc:"끝까지 버티다"},{pat:"hold out + 손",desc:"내밀다"},{pat:"hold out hope",desc:"희망을 버리지 않다"},{pat:"hold out for",desc:"더 좋은 조건을 기다리다"}],ex:[{en:"She <em>held out</em> hope until the very end.",ko:"그녀는 마지막까지 희망을 버리지 않았다.",note:"희망"},{en:"<em>Hold out</em> your hand.",ko:"손 내밀어봐.",note:"동작"},{en:"The soldiers <em>held out</em> for weeks.",ko:"병사들은 몇 주 동안 버텼다.",note:"저항"},{en:"I'm <em>holding out</em> for a better offer.",ko:"더 좋은 제안을 기다리는 중이야.",note:"협상"},{en:"How long can we <em>hold out</em> before running out of supplies?",ko:"물자가 떨어지기 전까지 얼마나 버틸 수 있어?",note:"생존"}],syn:[{s:"endure",m:"견디다"},{s:"persist",m:"버티다"},{s:"extend",m:"내밀다"},{s:"hope",m:"희망하다"}],rel:["hold out hope 희망을 갖다","hold out for a better deal 더 좋은 조건을 기다리다"]},
{w:"fall through",pron:"/fɔːl θruː/",ko:"무산되다; 실패하다",base:"fall",diff:1,nu:"계획·거래·약속이 예상과 달리 이루어지지 않는 것. 최종 단계에서 실패하는 뉘앙스.",uses:[{pat:"fall through (계획/거래)",desc:"무산되다"},{pat:"fall through the cracks",desc:"간과되다·놓치다"}],ex:[{en:"Our vacation plans <em>fell through</em>.",ko:"휴가 계획이 무산됐어.",note:"계획"},{en:"The business deal <em>fell through</em> at the last minute.",ko:"막판에 사업 거래가 무산됐다.",note:"거래"},{en:"The sale <em>fell through</em> because of the survey results.",ko:"조사 결과 때문에 매매가 무산됐다.",note:"부동산"},{en:"Some kids <em>fall through the cracks</em> of the education system.",ko:"어떤 아이들은 교육 시스템에서 놓쳐진다.",note:"사회"},{en:"I was counting on that job but it <em>fell through</em>.",ko:"그 일을 믿고 있었는데 무산됐어.",note:"취업"}],syn:[{s:"fail",m:"실패하다"},{s:"collapse",m:"무너지다"},{s:"not happen",m:"일어나지 않다"}],rel:["fall through the cracks 간과되다","fall through at the last minute 막판에 무산되다"]},
{w:"fall behind",pron:"/fɔːl bɪˈhaɪnd/",ko:"뒤처지다; 연체하다",base:"fall",diff:1,nu:"경쟁에서 뒤처지거나, 할 일·납부 등이 밀리는 것.",uses:[{pat:"fall behind (경쟁)",desc:"뒤처지다"},{pat:"fall behind on + 납부",desc:"연체되다"},{pat:"fall behind schedule",desc:"일정이 늦어지다"}],ex:[{en:"Don't <em>fall behind</em> on your studies.",ko:"공부에서 뒤처지지 마.",note:"학업"},{en:"They've <em>fallen behind</em> on their rent.",ko:"그들은 임대료가 밀렸어.",note:"임대료"},{en:"The project has <em>fallen behind</em> schedule.",ko:"프로젝트가 일정보다 늦어지고 있어.",note:"업무"},{en:"Once you <em>fall behind</em>, it's hard to catch up.",ko:"한번 뒤처지면 따라잡기 어렵다.",note:"경고"},{en:"Sales have <em>fallen behind</em> last year's figures.",ko:"매출이 작년 수치보다 뒤처졌다.",note:"비즈니스"}],syn:[{s:"lag behind",m:"뒤처지다"},{s:"be in arrears",m:"연체하다"},{s:"trail",m:"뒤따르다"}],rel:["fall behind the times 시대에 뒤처지다","fall behind on payments 납부가 밀리다"]},
{w:"fall out",pron:"/fɔːl aʊt/",ko:"사이가 틀어지다; 빠지다; 집합",base:"fall",diff:1,nu:"친구·가족과 사이가 나빠지거나, 머리카락이 빠지거나, 군인들이 해산하는 것.",uses:[{pat:"fall out (with sb)",desc:"~와 사이가 틀어지다"},{pat:"fall out (머리/치아)",desc:"빠지다"},{pat:"fall out! (군사)",desc:"해산!"}],ex:[{en:"She <em>fell out</em> with her best friend over money.",ko:"그녀는 돈 문제로 절친과 사이가 틀어졌다.",note:"관계"},{en:"His hair started to <em>fall out</em> after chemotherapy.",ko:"항암치료 후 그의 머리카락이 빠지기 시작했다.",note:"건강"},{en:"They <em>fell out</em> years ago and never made up.",ko:"그들은 몇 년 전에 사이가 틀어졌고 화해하지 못했다.",note:"오래된 갈등"},{en:"The bottom <em>fell out of</em> the bag.",ko:"가방 바닥이 빠졌다.",note:"물건"},{en:"Everything <em>fell out</em> when she opened the drawer.",ko:"서랍을 열자 모든 것이 쏟아져 나왔다.",note:"물건"}],syn:[{s:"quarrel",m:"다투다"},{s:"lose",m:"잃다·빠지다"},{s:"disperse",m:"해산하다"}],rel:["fallout (n.) 여파·방사능 낙진","fall out of love 사랑이 식다"]},
{w:"give up",pron:"/ɡɪv ʌp/",ko:"포기하다; 그만두다; 항복하다",base:"give",diff:1,nu:"노력을 멈추거나, 습관을 끊거나, 완전히 항복하는 것. 가장 기본적이지만 다양한 맥락에서 쓰인다.",uses:[{pat:"give up + 시도",desc:"포기하다"},{pat:"give up + 습관",desc:"끊다·그만두다"},{pat:"give up (항복)",desc:"항복하다"},{pat:"give up on sb",desc:"~에 대한 희망을 포기하다"}],ex:[{en:"Don't <em>give up</em> — you're almost there.",ko:"포기하지 마, 거의 다 왔어.",note:"격려"},{en:"He <em>gave up</em> smoking five years ago.",ko:"그는 5년 전에 담배를 끊었다.",note:"습관"},{en:"I <em>give up</em> — what's the answer?",ko:"항복, 정답이 뭐야?",note:"퀴즈"},{en:"Never <em>give up on</em> your dreams.",ko:"꿈을 포기하지 마.",note:"꿈"},{en:"She <em>gave up</em> her seat for the elderly woman.",ko:"그녀는 노인 여성을 위해 자리를 양보했다.",note:"양보"}],syn:[{s:"quit",m:"그만두다"},{s:"abandon",m:"포기하다"},{s:"surrender",m:"항복하다"},{s:"stop",m:"멈추다"}],rel:["give up hope 희망을 포기하다","give up the ghost 포기하다·죽다","never give up 절대 포기하지 마"]},
{w:"give out",pron:"/ɡɪv aʊt/",ko:"나눠주다; 다 떨어지다; 힘이 빠지다",base:"give",diff:1,nu:"여럿에게 나눠주거나, 공급이 다 떨어지거나, 몸·기계가 힘이 빠지는 것.",uses:[{pat:"give out + 물건",desc:"나눠주다"},{pat:"give out (공급)",desc:"다 떨어지다"},{pat:"give out (몸/기계)",desc:"힘이 빠지다·망가지다"}],ex:[{en:"They <em>gave out</em> free samples at the store.",ko:"가게에서 무료 샘플을 나눠줬다.",note:"배포"},{en:"The food <em>gave out</em> before everyone was fed.",ko:"모두 먹기 전에 음식이 다 떨어졌다.",note:"부족"},{en:"My legs <em>gave out</em> after the marathon.",ko:"마라톤 후 다리에 힘이 빠졌다.",note:"체력"},{en:"The engine finally <em>gave out</em>.",ko:"엔진이 결국 망가졌다.",note:"기계"},{en:"The teacher <em>gave out</em> worksheets to the class.",ko:"선생님이 학급에 학습지를 나눠줬다.",note:"교육"}],syn:[{s:"distribute",m:"배포하다"},{s:"run out",m:"다 떨어지다"},{s:"fail",m:"망가지다"},{s:"hand out",m:"나눠주다"}],rel:["give out information 정보를 제공하다","gave out of gas 기름이 다 떨어지다"]},
{w:"give off",pron:"/ɡɪv ɒf/",ko:"발산하다; 풍기다",base:"give",diff:2,nu:"냄새·빛·열·인상 등을 발산하거나 풍기는 것.",uses:[{pat:"give off + 냄새/빛",desc:"발산하다"},{pat:"give off + 인상/분위기",desc:"풍기다"}],ex:[{en:"The flowers <em>give off</em> a wonderful scent.",ko:"꽃에서 멋진 향기가 난다.",note:"냄새"},{en:"The fire <em>gave off</em> a lot of heat.",ko:"불에서 열이 많이 났다.",note:"열"},{en:"He <em>gives off</em> a very confident vibe.",ko:"그는 매우 자신감 있는 분위기를 풍긴다.",note:"분위기"},{en:"The chemical <em>gives off</em> toxic fumes.",ko:"그 화학물질은 독성 연기를 발산한다.",note:"화학"},{en:"She <em>gives off</em> good energy.",ko:"그녀는 좋은 에너지를 발산한다.",note:"에너지"}],syn:[{s:"emit",m:"방출하다"},{s:"exude",m:"발산하다"},{s:"radiate",m:"내뿜다"}],rel:["give off heat/light 열/빛을 발산하다","give off the wrong impression 잘못된 인상을 주다"]},
{w:"show off",pron:"/ʃəʊ ɒf/",ko:"과시하다; 자랑하다",base:"other",diff:1,nu:"자신의 능력·소유물 등을 다른 사람에게 자랑스럽게 보여주는 것. 부정적인 뉘앙스가 강하다.",uses:[{pat:"show off + 능력/물건",desc:"과시하다"},{pat:"show off to sb",desc:"~에게 자랑하다"}],ex:[{en:"He's always <em>showing off</em> his car.",ko:"그는 항상 자기 차를 자랑해.",note:"과시"},{en:"She <em>showed off</em> her new phone to everyone.",ko:"그녀는 모두에게 새 폰을 자랑했다.",note:"자랑"},{en:"Stop <em>showing off</em> and just do your best.",ko:"과시 그만하고 그냥 최선을 다해.",note:"조언"},{en:"Kids love to <em>show off</em> in front of their parents.",ko:"아이들은 부모 앞에서 과시하길 좋아한다.",note:"어린이"},{en:"He was just <em>showing off</em> his language skills.",ko:"그는 그냥 언어 실력을 과시하고 있었어.",note:"언어"}],syn:[{s:"boast",m:"자랑하다"},{s:"flaunt",m:"과시하다"},{s:"brag",m:"떠벌리다"},{s:"display",m:"선보이다"}],rel:["showoff (n.) 잘난 척하는 사람","show-off behavior 과시 행동"]},
{w:"pick up",pron:"/pɪk ʌp/",ko:"집다; 데리러 가다; 향상되다; 배우다",base:"pick",diff:1,nu:"가장 다양한 의미를 가진 구동사 중 하나. 문맥에 따라 줍다·데리러 가다·향상되다·자연스럽게 배우다.",uses:[{pat:"pick up + 물건",desc:"집다·사다"},{pat:"pick sb up",desc:"데리러 가다"},{pat:"pick up (상황)",desc:"나아지다·향상되다"},{pat:"pick up + 언어/기술",desc:"자연스럽게 배우다"},{pat:"pick up on",desc:"눈치채다"}],ex:[{en:"Can you <em>pick up</em> some milk on your way home?",ko:"집에 오는 길에 우유 좀 사다줄 수 있어?",note:"구매"},{en:"I'll <em>pick</em> you <em>up</em> at 8.",ko:"8시에 데리러 갈게.",note:"픽업"},{en:"Business has really <em>picked up</em> this month.",ko:"이번 달 사업이 정말 나아졌어.",note:"향상"},{en:"She <em>picked up</em> Spanish in just six months.",ko:"그녀는 6개월 만에 스페인어를 습득했다.",note:"언어"},{en:"He <em>picked up on</em> her nervousness right away.",ko:"그는 그녀의 긴장감을 바로 눈치챘다.",note:"눈치"}],syn:[{s:"lift",m:"집다"},{s:"collect",m:"데리러 가다"},{s:"improve",m:"나아지다"},{s:"learn",m:"배우다"}],rel:["pickup (n.) 픽업트럭","pick up the tab 계산하다","pick up speed 속도를 올리다"]},
{w:"pull together",pron:"/pʊl təˈɡeðər/",ko:"힘을 합치다; 정신 차리다",base:"pull",diff:1,nu:"여러 사람이 협력하거나, 산만한 것들을 하나로 모으거나, 감정을 추스르는 것.",uses:[{pat:"pull together (협력)",desc:"힘을 합치다"},{pat:"pull sth together",desc:"하나로 모으다"},{pat:"pull yourself together",desc:"정신 차리다"}],ex:[{en:"We need to <em>pull together</em> if we want to win.",ko:"이기고 싶다면 힘을 합쳐야 해.",note:"협력"},{en:"<em>Pull yourself together</em> — it's not that bad.",ko:"정신 차려, 그렇게 나쁜 건 아니야.",note:"격려"},{en:"She managed to <em>pull together</em> a great presentation.",ko:"그녀는 훌륭한 발표를 하나로 만들어냈다.",note:"준비"},{en:"The community <em>pulled together</em> after the disaster.",ko:"재난 후 지역사회가 힘을 합쳤다.",note:"공동체"},{en:"Can you <em>pull together</em> all the data by Friday?",ko:"금요일까지 모든 데이터를 모아줄 수 있어?",note:"업무"}],syn:[{s:"unite",m:"단합하다"},{s:"cooperate",m:"협력하다"},{s:"compile",m:"모으다"}],rel:["pull together as a team 팀으로 단합하다","pull it together 정신 차리다"]},
{w:"pull back",pron:"/pʊl bæk/",ko:"물러서다; 철수하다; 자제하다",base:"pull",diff:2,nu:"물리적으로 뒤로 당기거나, 군대를 철수하거나, 감정적으로 자제하는 것.",uses:[{pat:"pull back (물리적)",desc:"뒤로 당기다·물러서다"},{pat:"pull back (군사/비즈니스)",desc:"철수하다"},{pat:"pull back (감정)",desc:"자제하다·거리를 두다"}],ex:[{en:"He <em>pulled back</em> the curtain to look outside.",ko:"그는 커튼을 뒤로 당겨 밖을 내다봤다.",note:"동작"},{en:"The army was ordered to <em>pull back</em>.",ko:"군대는 철수 명령을 받았다.",note:"군사"},{en:"She <em>pulled back</em> emotionally after the argument.",ko:"말다툼 후 그녀는 감정적으로 거리를 뒀다.",note:"감정"},{en:"The company decided to <em>pull back</em> on spending.",ko:"회사는 지출을 줄이기로 했다.",note:"비즈니스"},{en:"Just as he was about to say something, he <em>pulled back</em>.",ko:"뭔가 말하려던 순간 그는 자제했다.",note:"자제"}],syn:[{s:"retreat",m:"후퇴하다"},{s:"withdraw",m:"철수하다"},{s:"restrain",m:"자제하다"}],rel:["pull back from the brink 벼랑 끝에서 물러서다","pull back the curtain 사실을 드러내다"]},
{w:"settle down",pron:"/ˈsetl daʊn/",ko:"정착하다; 진정하다; 자리 잡다",base:"other",diff:1,nu:"안정적인 생활·직업·관계를 시작하거나, 흥분·소란을 가라앉히거나, 본격적으로 집중하는 것.",uses:[{pat:"settle down (생활)",desc:"정착하다"},{pat:"settle down (감정/소란)",desc:"진정하다"},{pat:"settle down to + 일",desc:"~에 집중하기 시작하다"}],ex:[{en:"He finally <em>settled down</em> and got married at 40.",ko:"그는 40살에 마침내 정착해서 결혼했다.",note:"정착"},{en:"<em>Settle down</em>, everyone — class is starting.",ko:"모두 진정해, 수업 시작할게.",note:"교실"},{en:"After traveling for years, she wanted to <em>settle down</em>.",ko:"몇 년 여행 후 그녀는 정착하고 싶었다.",note:"인생"},{en:"I need to <em>settle down</em> and focus on work.",ko:"집중해서 일에 매달려야 해.",note:"집중"},{en:"The market is starting to <em>settle down</em> after the crash.",ko:"폭락 후 시장이 안정되기 시작하고 있다.",note:"경제"}],syn:[{s:"calm down",m:"진정하다"},{s:"establish oneself",m:"자리를 잡다"},{s:"stabilize",m:"안정되다"}],rel:["settle down for the night 잠자리에 들다","settle down with a book 책과 함께 자리 잡다"]},
{w:"stand up for",pron:"/stænd ʌp fɔːr/",ko:"~을 옹호하다; 지지하다",base:"stand",diff:1,nu:"부당한 대우를 받는 사람이나 중요한 가치를 위해 나서는 것. 용기가 필요하다는 뉘앙스.",uses:[{pat:"stand up for + 사람",desc:"~를 옹호하다"},{pat:"stand up for + 가치",desc:"~를 지지하다"},{pat:"stand up for yourself",desc:"자신을 지키다"}],ex:[{en:"She always <em>stands up for</em> the underdog.",ko:"그녀는 항상 약자를 옹호한다.",note:"약자"},{en:"You need to <em>stand up for</em> yourself more.",ko:"자신을 더 지켜야 해.",note:"자기 주장"},{en:"He <em>stood up for</em> what he believed in.",ko:"그는 자신이 믿는 것을 위해 나섰다.",note:"신념"},{en:"Nobody <em>stood up for</em> her when she was bullied.",ko:"그녀가 괴롭힘을 당했을 때 아무도 옹호하지 않았다.",note:"괴롭힘"},{en:"We must <em>stand up for</em> human rights.",ko:"인권을 위해 나서야 한다.",note:"인권"}],syn:[{s:"defend",m:"옹호하다"},{s:"support",m:"지지하다"},{s:"advocate for",m:"~를 위해 나서다"}],rel:["stand up to 맞서다","stand up and be counted 용감히 나서다"]},
{w:"let down",pron:"/let daʊn/",ko:"실망시키다; 내리다",base:"let",diff:1,nu:"기대나 믿음을 저버려 실망을 주거나, 무언가를 아래로 내리는 것.",uses:[{pat:"let sb down",desc:"실망시키다"},{pat:"let down + 물건",desc:"내리다"},{pat:"let the side down",desc:"팀에 피해를 주다"}],ex:[{en:"I don't want to <em>let</em> you <em>down</em>.",ko:"너를 실망시키고 싶지 않아.",note:"다짐"},{en:"He <em>let</em> the team <em>down</em> by missing the final.",ko:"그는 결승전에 빠져 팀을 실망시켰다.",note:"팀"},{en:"She felt <em>let down</em> by the lack of support.",ko:"지원 부족으로 실망감을 느꼈다.",note:"실망"},{en:"<em>Let down</em> the bucket slowly.",ko:"양동이를 천천히 내려.",note:"동작"},{en:"The weather <em>let us down</em> on our picnic day.",ko:"소풍날 날씨가 우리를 실망시켰다.",note:"날씨"}],syn:[{s:"disappoint",m:"실망시키다"},{s:"fail",m:"실패하다"},{s:"lower",m:"내리다"}],rel:["letdown (n.) 실망","let someone down gently 부드럽게 실망시키다"]},
{w:"call off",pron:"/kɔːl ɒf/",ko:"취소하다; 그만두다",base:"other",diff:1,nu:"계획·행사·파업 등을 공식적으로 취소하거나, 공격 등을 중단시키는 것.",uses:[{pat:"call off + 행사/계획",desc:"취소하다"},{pat:"call off + 공격/파업",desc:"중단시키다"},{pat:"call off the dogs",desc:"(구어) 공격을 멈추다"}],ex:[{en:"The match was <em>called off</em> due to bad weather.",ko:"경기가 악천후로 취소됐다.",note:"경기"},{en:"They <em>called off</em> the engagement.",ko:"그들은 약혼을 파기했다.",note:"약혼"},{en:"The strike was <em>called off</em> after negotiations.",ko:"협상 후 파업이 중단됐다.",note:"파업"},{en:"We had to <em>call off</em> the search after dark.",ko:"어두워진 후 수색을 중단해야 했다.",note:"수색"},{en:"The deal was <em>called off</em> at the last minute.",ko:"거래가 막판에 취소됐다.",note:"비즈니스"}],syn:[{s:"cancel",m:"취소하다"},{s:"abandon",m:"포기하다"},{s:"halt",m:"중단하다"}],rel:["call off a wedding 결혼을 취소하다","call off the search 수색을 중단하다"]},
{w:"call out",pron:"/kɔːl aʊt/",ko:"소리쳐 부르다; 지적하다; 출동하다",base:"other",diff:1,nu:"큰 소리로 부르거나, 잘못·위선을 공개적으로 지적하거나, 비상 인력을 출동시키는 것.",uses:[{pat:"call out + 이름",desc:"소리쳐 부르다"},{pat:"call sb out",desc:"잘못을 공개적으로 지적하다"},{pat:"call out + 인력",desc:"출동시키다"}],ex:[{en:"She <em>called out</em> his name across the room.",ko:"그녀는 방 건너편에서 그의 이름을 불렀다.",note:"부르기"},{en:"He was <em>called out</em> for his hypocrisy.",ko:"그는 위선으로 공개적으로 지적받았다.",note:"지적"},{en:"The army was <em>called out</em> to help with the floods.",ko:"홍수 지원을 위해 군대가 출동했다.",note:"출동"},{en:"I'll <em>call out</em> the plumber first thing tomorrow.",ko:"내일 아침 첫 번째로 배관공을 부를게.",note:"전문가"},{en:"Don't be afraid to <em>call out</em> bad behavior.",ko:"나쁜 행동을 지적하는 것을 두려워하지 마.",note:"용기"}],syn:[{s:"shout",m:"소리치다"},{s:"criticize publicly",m:"공개적으로 비판하다"},{s:"deploy",m:"출동시키다"}],rel:["call out sick 결근 신고하다","call out for help 도움을 외치다"]},
{w:"calm down",pron:"/kɑːm daʊn/",ko:"진정하다; 진정시키다",base:"other",diff:1,nu:"흥분·화·불안을 가라앉히거나, 다른 사람을 진정시키는 것.",uses:[{pat:"calm down (자신)",desc:"진정하다"},{pat:"calm sb down",desc:"~를 진정시키다"}],ex:[{en:"<em>Calm down</em> — everything is going to be okay.",ko:"진정해, 다 괜찮을 거야.",note:"안심"},{en:"Take a deep breath and <em>calm down</em>.",ko:"심호흡하고 진정해.",note:"호흡"},{en:"She tried to <em>calm down</em> the angry customer.",ko:"그녀는 화난 손님을 진정시키려 했다.",note:"고객"},{en:"It took hours for the situation to <em>calm down</em>.",ko:"상황이 진정되는 데 몇 시간이 걸렸다.",note:"상황"},{en:"<em>Calm down</em>! It was just a joke.",ko:"진정해, 그냥 농담이었어.",note:"오해"}],syn:[{s:"relax",m:"긴장을 풀다"},{s:"cool down",m:"식히다"},{s:"settle down",m:"진정하다"}],rel:["calm down period 진정 기간","calm the storm 폭풍을 가라앉히다"]},
{w:"back down",pron:"/bæk daʊn/",ko:"물러서다; 입장을 철회하다",base:"other",diff:1,nu:"주장·요구·위협을 철회하거나, 대립에서 물러서는 것.",uses:[{pat:"back down (from a position)",desc:"입장을 철회하다"},{pat:"back down (대립)",desc:"물러서다"}],ex:[{en:"He refused to <em>back down</em> from his position.",ko:"그는 자신의 입장에서 물러서기를 거부했다.",note:"고집"},{en:"She <em>backed down</em> when she saw how serious he was.",ko:"그가 얼마나 진지한지 보고 그녀는 물러섰다.",note:"물러섬"},{en:"The government <em>backed down</em> after public pressure.",ko:"정부는 여론의 압박에 물러섰다.",note:"정치"},{en:"Never <em>back down</em> from what you know is right.",ko:"옳다고 아는 것에서 절대 물러서지 마.",note:"신념"},{en:"He always <em>backs down</em> in an argument.",ko:"그는 항상 논쟁에서 물러선다.",note:"성격"}],syn:[{s:"retreat",m:"후퇴하다"},{s:"yield",m:"양보하다"},{s:"concede",m:"인정하다"}],rel:["back down from a threat 위협을 철회하다","stand your ground 입장을 고수하다"]},
{w:"narrow down",pron:"/ˈnærəʊ daʊn/",ko:"범위를 좁히다; 추려내다",base:"other",diff:2,nu:"많은 선택지·가능성을 줄여 더 관리하기 쉬운 수로 만드는 것.",uses:[{pat:"narrow down + 선택지",desc:"범위를 좁히다"},{pat:"narrow it down to",desc:"~으로 좁히다"}],ex:[{en:"We need to <em>narrow down</em> the candidates to three.",ko:"후보를 세 명으로 좁혀야 해.",note:"채용"},{en:"Can you <em>narrow down</em> what time it happened?",ko:"언제 일어났는지 시간을 좁혀줄 수 있어?",note:"수사"},{en:"I've <em>narrowed</em> my choices <em>down</em> to two options.",ko:"선택지를 두 가지로 좁혔어.",note:"결정"},{en:"That <em>narrows</em> it <em>down</em> a lot.",ko:"그게 범위를 많이 좁혀줘.",note:"단서"},{en:"Let's <em>narrow down</em> the topic before we start.",ko:"시작 전에 주제를 좁히자.",note:"준비"}],syn:[{s:"reduce",m:"줄이다"},{s:"limit",m:"제한하다"},{s:"shortlist",m:"후보를 줄이다"}],rel:["narrow down the search 검색 범위를 좁히다","narrow down the field 분야를 좁히다"]},
{w:"draw up",pron:"/drɔː ʌp/",ko:"작성하다; 세우다; 멈추다",base:"other",diff:2,nu:"계획·문서·목록을 공식적으로 작성하거나, 의자·차가 가까이 오거나 멈추는 것.",uses:[{pat:"draw up + 문서/계획",desc:"작성하다"},{pat:"draw up + 의자",desc:"의자를 당기다"},{pat:"draw up (차)",desc:"멈추다"}],ex:[{en:"We need to <em>draw up</em> a contract.",ko:"계약서를 작성해야 해.",note:"문서"},{en:"The lawyer <em>drew up</em> a will for the client.",ko:"변호사가 의뢰인을 위해 유언장을 작성했다.",note:"법률"},{en:"<em>Draw up</em> a chair and join us.",ko:"의자 당겨서 함께 앉아.",note:"초대"},{en:"A black car <em>drew up</em> outside the house.",ko:"검은 차가 집 앞에 멈췄다.",note:"차"},{en:"They <em>drew up</em> plans for the new building.",ko:"새 건물 계획을 세웠다.",note:"계획"}],syn:[{s:"draft",m:"초안을 작성하다"},{s:"prepare",m:"준비하다"},{s:"formulate",m:"구성하다"}],rel:["draw up a list 목록을 작성하다","draw up a plan 계획을 세우다"]},
{w:"eat up",pron:"/iːt ʌp/",ko:"다 먹다; 소비하다; 열광하다",base:"other",diff:1,nu:"음식을 다 먹거나, 시간·돈·자원을 크게 소비하거나, 칭찬·아첨을 기꺼이 받아들이는 것.",uses:[{pat:"eat up (음식)",desc:"다 먹다"},{pat:"eat up + 자원",desc:"소비하다"},{pat:"eat sth up (칭찬)",desc:"기꺼이 받아들이다"}],ex:[{en:"<em>Eat up</em>! We're going to be late.",ko:"다 먹어! 늦겠어.",note:"식사"},{en:"This project is <em>eating up</em> all my time.",ko:"이 프로젝트가 내 시간을 다 잡아먹고 있어.",note:"시간"},{en:"The kids really <em>ate up</em> the praise.",ko:"아이들은 칭찬을 정말 좋아했다.",note:"칭찬"},{en:"Heating <em>eats up</em> a lot of energy in winter.",ko:"겨울에는 난방이 에너지를 많이 소비한다.",note:"에너지"},{en:"She <em>eats up</em> everything he says.",ko:"그녀는 그가 하는 말을 모두 그대로 받아들인다.",note:"맹신"}],syn:[{s:"consume",m:"소비하다"},{s:"finish",m:"다 먹다"},{s:"devour",m:"게걸스럽게 먹다"}],rel:["eat up time 시간을 잡아먹다","eat out of someone's hand 완전히 따르다"]},
{w:"build up",pron:"/bɪld ʌp/",ko:"쌓이다; 키우다; 격려하다",base:"other",diff:1,nu:"점차 쌓이거나 증가하거나, 체력·자신감·사업을 키우거나, 누군가를 격려하는 것.",uses:[{pat:"build up + 체력/자신감",desc:"키우다"},{pat:"build up (점차 쌓이다)",desc:"쌓이다·증가하다"},{pat:"build sb up",desc:"격려하다·과장되게 홍보하다"}],ex:[{en:"You need to <em>build up</em> your strength after the operation.",ko:"수술 후 체력을 키워야 해.",note:"회복"},{en:"Traffic is <em>building up</em> on the highway.",ko:"고속도로에 교통이 쌓이고 있어.",note:"교통"},{en:"She's been <em>building up</em> her confidence slowly.",ko:"그녀는 천천히 자신감을 키워왔다.",note:"자신감"},{en:"The film was so <em>built up</em> that it was a disappointment.",ko:"영화가 너무 과장되게 홍보돼서 실망스러웠다.",note:"기대"},{en:"Tension has been <em>building up</em> for weeks.",ko:"몇 주 동안 긴장감이 쌓이고 있다.",note:"긴장"}],syn:[{s:"accumulate",m:"쌓이다"},{s:"develop",m:"키우다"},{s:"strengthen",m:"강화하다"}],rel:["build-up (n.) 축적","build up a reputation 명성을 쌓다","build up to something 서서히 준비하다"]},
{w:"open up",pron:"/ˈəʊpən ʌp/",ko:"열리다; 속내를 털어놓다; 가능성이 생기다",base:"other",diff:1,nu:"물리적으로 열리거나, 마음을 열어 속내를 털어놓거나, 새로운 기회·가능성이 생기는 것.",uses:[{pat:"open up (물리적)",desc:"열리다"},{pat:"open up (감정)",desc:"속내를 털어놓다"},{pat:"open up + 기회",desc:"가능성이 생기다"}],ex:[{en:"He finally <em>opened up</em> about his struggles.",ko:"그는 마침내 자신의 어려움에 대해 속내를 털어놓았다.",note:"감정"},{en:"The new road <em>opened up</em> the remote area.",ko:"새 도로가 외딴 지역을 열어줬다.",note:"접근성"},{en:"<em>Open up</em>! It's the police.",ko:"열어요! 경찰이에요.",note:"경찰"},{en:"This technology <em>opens up</em> many possibilities.",ko:"이 기술은 많은 가능성을 열어준다.",note:"기술"},{en:"She doesn't <em>open up</em> easily to strangers.",ko:"그녀는 낯선 사람에게 쉽게 마음을 열지 않는다.",note:"성격"}],syn:[{s:"reveal",m:"드러내다"},{s:"unlock",m:"열다"},{s:"share feelings",m:"감정을 나누다"}],rel:["open up to someone 누군가에게 마음을 열다","open up opportunities 기회를 열다"]},
{w:"slow down",pron:"/sləʊ daʊn/",ko:"속도를 늦추다; 여유를 갖다",base:"other",diff:1,nu:"물리적 속도를 줄이거나, 바쁜 생활 속에서 여유를 갖거나, 성장·활동이 둔화되는 것.",uses:[{pat:"slow down (속도)",desc:"속도를 줄이다"},{pat:"slow down (생활)",desc:"여유를 갖다"},{pat:"slow down (경제/성장)",desc:"둔화되다"}],ex:[{en:"<em>Slow down</em> — you're driving too fast.",ko:"속도 줄여, 너무 빨리 달리고 있어.",note:"운전"},{en:"You need to <em>slow down</em> — you're burning out.",ko:"여유를 가져야 해, 번아웃되고 있어.",note:"번아웃"},{en:"Economic growth is starting to <em>slow down</em>.",ko:"경제 성장이 둔화되기 시작하고 있다.",note:"경제"},{en:"As we get older, our metabolism <em>slows down</em>.",ko:"나이가 들면서 신진대사가 느려진다.",note:"건강"},{en:"<em>Slow down</em> when you explain — I can't follow.",ko:"설명할 때 천천히 해줘, 못 따라가겠어.",note:"이해"}],syn:[{s:"decelerate",m:"감속하다"},{s:"reduce speed",m:"속도를 줄이다"},{s:"take it easy",m:"여유를 갖다"}],rel:["slow down the pace 속도를 늦추다","slow-down (n.) 감속·파업"]}

{w:"get away",pron:"/ɡet əˈweɪ/",ko:"탈출하다; 벗어나다; 휴가를 가다",base:"get",diff:1,nu:"일상·책임·상황에서 잠시 벗어나거나 탈출하는 것. 범죄자가 도주하는 것도 포함.",uses:[{pat:"get away (from sth)",desc:"~에서 벗어나다"},{pat:"get away (휴가)",desc:"어딘가 다녀오다"},{pat:"get away! (구어)",desc:"말도 안 돼!"}],ex:[{en:"I need to <em>get away</em> for a few days.",ko:"며칠 동안 어딘가 다녀와야겠어.",note:"휴가"},{en:"The thief <em>got away</em> before police arrived.",ko:"경찰이 오기 전에 도둑이 도망쳤다.",note:"도주"},{en:"We finally <em>got away</em> for a weekend break.",ko:"드디어 주말 여행을 다녀왔어.",note:"여행"},{en:"<em>Get away</em>! You won the lottery?",ko:"말도 안 돼! 복권에 당첨됐다고?",note:"놀라움"},{en:"She couldn't <em>get away</em> from the office all week.",ko:"그녀는 일주일 내내 사무실을 벗어나지 못했다.",note:"바쁨"}],syn:[{s:"escape",m:"탈출하다"},{s:"flee",m:"달아나다"},{s:"take a break",m:"휴식을 취하다"}],rel:["getaway (n.) 도피·탈출","get away from it all 모든 것에서 벗어나다","get away with 처벌 없이 빠져나가다"]},
{w:"get by",pron:"/ɡet baɪ/",ko:"겨우 살아가다; 통과하다",base:"get",diff:1,nu:"충분하지는 않지만 어떻게든 생활하거나 버티는 것. 재정적으로 빠듯한 생활을 자주 묘사.",uses:[{pat:"get by (on sth)",desc:"~으로 겨우 살아가다"},{pat:"get by (without sth)",desc:"~없이 버티다"},{pat:"get by (지나가다)",desc:"지나가다"}],ex:[{en:"We don't have much, but we <em>get by</em>.",ko:"많진 않지만 그럭저럭 살아가.",note:"생활"},{en:"How does she <em>get by</em> on such a low salary?",ko:"그 낮은 급여로 어떻게 살아가지?",note:"재정"},{en:"I can <em>get by</em> in French, but I'm not fluent.",ko:"프랑스어로 어느 정도 의사소통은 되는데 유창하진 않아.",note:"언어"},{en:"Could you move so I can <em>get by</em>?",ko:"지나갈 수 있게 비켜줄 수 있어?",note:"통과"},{en:"We'll <em>get by</em> somehow — we always do.",ko:"어떻게든 될 거야, 우리 항상 그래왔잖아.",note:"낙관"}],syn:[{s:"manage",m:"어떻게든 해내다"},{s:"survive",m:"살아남다"},{s:"cope",m:"대처하다"}],rel:["get by on a budget 빠듯한 예산으로 살다","just getting by 겨우겨우 살아가는"]},
{w:"get together",pron:"/ɡet təˈɡeðər/",ko:"모이다; 만나다; 사귀다",base:"get",diff:1,nu:"사람들이 함께 모이거나 만나는 것. 비공식적인 모임을 'get-together'라고도 한다.",uses:[{pat:"get together (모임)",desc:"함께 모이다"},{pat:"get together with sb",desc:"~와 만나다"},{pat:"get it together",desc:"정신 차리다·준비하다"}],ex:[{en:"We should <em>get together</em> sometime.",ko:"언제 한번 만나자.",note:"약속"},{en:"The whole family <em>gets together</em> at Christmas.",ko:"온 가족이 크리스마스에 모인다.",note:"가족"},{en:"Are those two <em>getting together</em>?",ko:"저 두 사람 사귀는 거야?",note:"연애"},{en:"<em>Get it together</em> — we're depending on you.",ko:"정신 차려, 우리가 너를 믿고 있어.",note:"압박"},{en:"Let's <em>get together</em> to discuss the project.",ko:"프로젝트에 대해 논의하기 위해 모이자.",note:"업무"}],syn:[{s:"meet up",m:"만나다"},{s:"gather",m:"모이다"},{s:"assemble",m:"집합하다"}],rel:["get-together (n.) 모임","get your act together 제대로 준비하다"]},
{w:"get into",pron:"/ɡet ˈɪntuː/",ko:"~에 빠지다; 합격하다; 흥미를 갖다",base:"get",diff:1,nu:"취미·분야에 빠지거나, 대학·직장에 합격하거나, 논쟁·문제에 휘말리는 것.",uses:[{pat:"get into + 취미/분야",desc:"~에 빠지다·관심을 갖다"},{pat:"get into + 대학/직장",desc:"합격하다"},{pat:"get into + 논쟁",desc:"~에 휘말리다"}],ex:[{en:"I've really <em>gotten into</em> yoga lately.",ko:"요즘 요가에 완전히 빠졌어.",note:"취미"},{en:"She <em>got into</em> Harvard on a full scholarship.",ko:"그녀는 전액 장학금을 받고 하버드에 합격했다.",note:"합격"},{en:"Don't <em>get into</em> an argument with him.",ko:"그와 논쟁에 휘말리지 마.",note:"논쟁"},{en:"What's <em>gotten into</em> you today?",ko:"오늘 왜 이래?",note:"이상한 행동"},{en:"I'd love to <em>get into</em> photography.",ko:"사진에 빠져보고 싶어.",note:"관심"}],syn:[{s:"become interested in",m:"흥미를 갖다"},{s:"be admitted to",m:"합격하다"},{s:"get involved in",m:"휘말리다"}],rel:["get into trouble 문제에 빠지다","get into the habit 습관이 들다","get into shape 몸을 만들다"]},
{w:"get on",pron:"/ɡet ɒn/",ko:"타다; 나아가다; 나이 들다",base:"get",diff:1,nu:"교통수단을 타거나, 일·상황이 잘 되어가거나, 나이가 드는 것. 영국식 'get along'.",uses:[{pat:"get on + 교통수단",desc:"타다"},{pat:"get on (잘 되다)",desc:"잘 나아가다"},{pat:"getting on (나이)",desc:"나이가 들다"},{pat:"get on with",desc:"계속하다·잘 지내다"}],ex:[{en:"<em>Get on</em> the bus before it leaves.",ko:"버스가 떠나기 전에 타.",note:"탑승"},{en:"How are you <em>getting on</em> with the new job?",ko:"새 직장은 어때?",note:"진행 상황"},{en:"He's <em>getting on</em> — he'll be 70 next year.",ko:"그 분 연세가 드셨어, 내년에 70이야.",note:"나이"},{en:"We need to <em>get on</em> — there's no time to waste.",ko:"계속해야 해, 낭비할 시간이 없어.",note:"집중"},{en:"It's <em>getting on</em> — we should head home.",ko:"시간이 많이 됐어, 집에 가야겠어.",note:"시간"}],syn:[{s:"board",m:"탑승하다"},{s:"progress",m:"나아가다"},{s:"age",m:"나이 들다"}],rel:["get on well 잘 지내다","get on in years 나이가 들다","get on the bus/train 버스/기차를 타다"]},
{w:"look after",pron:"/lʊk ˈɑːftər/",ko:"돌보다; 챙기다",base:"look",diff:1,nu:"사람·동물·물건 등을 책임지고 보살피는 것. 'take care of'와 거의 동의어이며 영국식.",uses:[{pat:"look after + 사람/동물",desc:"돌보다"},{pat:"look after + 물건",desc:"관리하다"},{pat:"look after yourself",desc:"건강 잘 챙겨"}],ex:[{en:"Can you <em>look after</em> my dog this weekend?",ko:"이번 주말에 내 개 좀 봐줄 수 있어?",note:"반려동물"},{en:"She stayed home to <em>look after</em> her sick mother.",ko:"그녀는 아픈 어머니를 돌보기 위해 집에 있었다.",note:"가족"},{en:"<em>Look after</em> yourself — don't work too hard.",ko:"건강 챙겨, 너무 무리하지 마.",note:"배려"},{en:"He's good at <em>looking after</em> his money.",ko:"그는 돈 관리를 잘 해.",note:"재정"},{en:"Who <em>looked after</em> you when you were ill?",ko:"아팠을 때 누가 돌봐줬어?",note:"과거"}],syn:[{s:"take care of",m:"돌보다"},{s:"care for",m:"정성껏 돌보다"},{s:"tend to",m:"필요를 채워주다"}],rel:["look after yourself 자신을 챙겨","look after the kids 아이들을 돌보다"]},
{w:"look back on",pron:"/lʊk bæk ɒn/",ko:"돌이켜보다; 회상하다",base:"look",diff:1,nu:"과거의 경험을 되돌아보는 것. 'looking back'은 '돌이켜보면'의 뜻으로 자주 쓰인다.",uses:[{pat:"look back on + 경험",desc:"~을 돌이켜보다"},{pat:"looking back",desc:"돌이켜보면"}],ex:[{en:"<em>Looking back</em>, I should have studied harder.",ko:"돌이켜보면 더 열심히 공부했어야 했는데.",note:"후회"},{en:"She <em>looks back on</em> those years with fondness.",ko:"그녀는 그 시절을 그리움으로 돌이켜본다.",note:"추억"},{en:"Don't <em>look back</em> — keep moving forward.",ko:"뒤돌아보지 말고 계속 앞으로 가.",note:"조언"},{en:"When I <em>look back on</em> it, I was so naive.",ko:"돌이켜보면 나는 정말 순진했어.",note:"성장"},{en:"He never <em>looks back on</em> his mistakes.",ko:"그는 절대 자신의 실수를 돌이켜보지 않아.",note:"성격"}],syn:[{s:"reflect on",m:"되돌아보다"},{s:"reminisce about",m:"추억하다"},{s:"review",m:"검토하다"}],rel:["look back in anger 분노로 되돌아보다","never look back 뒤돌아보지 않다"]},
{w:"look up to",pron:"/lʊk ʌp tuː/",ko:"존경하다; 우러러보다",base:"look",diff:1,nu:"누군가를 존경하거나 롤모델로 여기는 것. 'look down on'(무시하다)의 반대.",uses:[{pat:"look up to + 사람",desc:"존경하다·우러러보다"}],ex:[{en:"I've always <em>looked up to</em> my older brother.",ko:"나는 항상 형을 존경해왔어.",note:"가족"},{en:"Kids need adults they can <em>look up to</em>.",ko:"아이들에게는 우러러볼 어른이 필요해.",note:"교육"},{en:"She <em>looks up to</em> her mentor at work.",ko:"그녀는 직장 멘토를 존경한다.",note:"멘토"},{en:"Many athletes are <em>looked up to</em> by young people.",ko:"많은 운동선수들이 젊은이들에게 존경받는다.",note:"롤모델"},{en:"Who do you <em>look up to</em> most?",ko:"가장 존경하는 사람이 누구야?",note:"질문"}],syn:[{s:"admire",m:"존경하다"},{s:"respect",m:"존중하다"},{s:"idolize",m:"우상으로 여기다"}],rel:["role model 롤모델","look up to as a hero 영웅으로 우러러보다"]},
{w:"come up",pron:"/kʌm ʌp/",ko:"생기다; 언급되다; 다가오다",base:"come",diff:1,nu:"예상치 못한 일이 갑자기 생기거나, 화제에 오르거나, 날짜·기회가 다가오는 것.",uses:[{pat:"come up (갑자기 생기다)",desc:"갑자기 생기다"},{pat:"come up in + 대화",desc:"대화에서 언급되다"},{pat:"come up (다가오다)",desc:"(날짜가) 다가오다"}],ex:[{en:"Sorry, something <em>came up</em> and I can't make it.",ko:"미안, 갑자기 일이 생겨서 못 갈 것 같아.",note:"취소"},{en:"Your name <em>came up</em> in our meeting.",ko:"회의에서 당신 이름이 나왔어요.",note:"언급"},{en:"The anniversary is <em>coming up</em> next week.",ko:"다음 주가 기념일이야.",note:"날짜"},{en:"A great opportunity has <em>come up</em>.",ko:"좋은 기회가 생겼어.",note:"기회"},{en:"The issue <em>came up</em> again at the board meeting.",ko:"이사회에서 그 문제가 또 나왔다.",note:"반복"}],syn:[{s:"arise",m:"생기다"},{s:"be mentioned",m:"언급되다"},{s:"approach",m:"다가오다"}],rel:["come up short 부족하다","come up with 생각해내다","something came up 갑자기 일이 생겼다"]},
{w:"come in",pron:"/kʌm ɪn/",ko:"들어오다; 도착하다; 유용하다",base:"come",diff:1,nu:"안으로 들어오거나, 주문·결과 등이 도착하거나, 돈이 들어오거나, 'come in handy'로 유용하게 쓰이는 것.",uses:[{pat:"come in (장소)",desc:"들어오다"},{pat:"come in (결과/정보)",desc:"도착하다"},{pat:"come in handy",desc:"유용하게 쓰이다"},{pat:"come in first/last",desc:"1등/꼴등을 하다"}],ex:[{en:"<em>Come in</em> — the door's open!",ko:"들어와, 문 열려있어!",note:"초대"},{en:"The results have just <em>come in</em>.",ko:"방금 결과가 들어왔어.",note:"결과"},{en:"This tool will <em>come in</em> handy later.",ko:"이 도구가 나중에 유용하게 쓰일 거야.",note:"유용함"},{en:"She <em>came in</em> first in the race.",ko:"그녀는 경주에서 1등을 했다.",note:"순위"},{en:"How much money is <em>coming in</em> each month?",ko:"매달 얼마나 들어오고 있어?",note:"수입"}],syn:[{s:"enter",m:"들어오다"},{s:"arrive",m:"도착하다"},{s:"prove useful",m:"유용하다"}],rel:["come in handy 유용하게 쓰이다","come in first 1등을 하다","income 수입"]},
{w:"go with",pron:"/ɡəʊ wɪð/",ko:"어울리다; 선택하다; 따르다",base:"go",diff:1,nu:"색·스타일이 어울리거나, 여러 선택지 중 하나를 고르거나, 흐름을 따르는 것.",uses:[{pat:"go with + 색/스타일",desc:"어울리다"},{pat:"go with + 선택지",desc:"~로 결정하다"},{pat:"go with the flow",desc:"흐름에 따르다"}],ex:[{en:"That tie really <em>goes with</em> your suit.",ko:"그 넥타이가 정장이랑 정말 잘 어울려.",note:"패션"},{en:"I'll <em>go with</em> the chicken, please.",ko:"저는 치킨으로 할게요.",note:"음식"},{en:"Just <em>go with</em> the flow and see what happens.",ko:"그냥 흐름에 따라가봐.",note:"태도"},{en:"Which option are you going to <em>go with</em>?",ko:"어떤 옵션으로 결정할 거야?",note:"선택"},{en:"That color doesn't <em>go with</em> anything in your wardrobe.",ko:"그 색깔은 네 옷장에 있는 어떤 것과도 안 어울려.",note:"패션"}],syn:[{s:"match",m:"어울리다"},{s:"choose",m:"선택하다"},{s:"follow",m:"따르다"}],rel:["go with the grain 자연스러운 방향으로","go with the territory 당연히 따라오는 것"]},
{w:"go out",pron:"/ɡəʊ aʊt/",ko:"외출하다; 사귀다; 꺼지다",base:"go",diff:1,nu:"밖에 나가거나, 데이트하거나 사귀거나, 불·빛이 꺼지는 것.",uses:[{pat:"go out (외출)",desc:"밖에 나가다"},{pat:"go out with sb",desc:"~와 사귀다·데이트하다"},{pat:"go out (불/빛)",desc:"꺼지다"},{pat:"go out of fashion",desc:"유행이 지나다"}],ex:[{en:"Do you want to <em>go out</em> for dinner tonight?",ko:"오늘 저녁 나가서 먹을래?",note:"외출"},{en:"Are you two <em>going out</em>?",ko:"너희 둘 사귀는 거야?",note:"연애"},{en:"The lights <em>went out</em> during the storm.",ko:"폭풍 중에 불이 꺼졌다.",note:"정전"},{en:"That fashion trend has really <em>gone out</em>.",ko:"그 패션 트렌드는 정말 유행이 지났어.",note:"유행"},{en:"She doesn't <em>go out</em> much since the accident.",ko:"그녀는 사고 이후 외출을 잘 안 해.",note:"은둔"}],syn:[{s:"leave",m:"나가다"},{s:"date",m:"사귀다"},{s:"be extinguished",m:"꺼지다"}],rel:["go out of style 유행이 지나다","go out on a limb 위험을 감수하다","night out 밤 외출"]},
{w:"go down",pron:"/ɡəʊ daʊn/",ko:"내려가다; 떨어지다; 기억되다",base:"go",diff:1,nu:"물리적으로 내려가거나, 가격·수준이 떨어지거나, 역사에 기억되거나, 컴퓨터 시스템이 다운되는 것.",uses:[{pat:"go down (물리적)",desc:"내려가다"},{pat:"go down (가격/수준)",desc:"떨어지다"},{pat:"go down in history",desc:"역사에 기록되다"},{pat:"go down (시스템)",desc:"다운되다"}],ex:[{en:"The sun <em>goes down</em> around 7 PM.",ko:"태양이 오후 7시쯤 진다.",note:"일몰"},{en:"Prices have <em>gone down</em> significantly.",ko:"가격이 상당히 떨어졌다.",note:"가격"},{en:"This will <em>go down</em> in history.",ko:"이것은 역사에 기록될 거야.",note:"역사"},{en:"The website <em>went down</em> for maintenance.",ko:"웹사이트가 유지보수로 다운됐다.",note:"IT"},{en:"His speech didn't <em>go down</em> well with the crowd.",ko:"그의 연설은 청중에게 좋은 반응을 얻지 못했다.",note:"반응"}],syn:[{s:"descend",m:"내려가다"},{s:"decrease",m:"줄다"},{s:"crash",m:"다운되다"}],rel:["go down in history 역사에 남다","go down well 좋은 반응을 얻다","go downhill 나빠지다"]},
{w:"bring in",pron:"/brɪŋ ɪn/",ko:"수익을 가져오다; 영입하다; 도입하다",base:"bring",diff:1,nu:"돈·수익을 벌어들이거나, 전문가를 영입하거나, 새 제도·정책을 도입하는 것.",uses:[{pat:"bring in + 돈",desc:"수익을 올리다"},{pat:"bring in + 전문가",desc:"영입하다"},{pat:"bring in + 정책",desc:"도입하다"}],ex:[{en:"This product <em>brings in</em> most of our revenue.",ko:"이 제품이 우리 수익 대부분을 가져온다.",note:"수익"},{en:"We need to <em>bring in</em> a specialist.",ko:"전문가를 영입해야 해.",note:"영입"},{en:"The government <em>brought in</em> new regulations.",ko:"정부가 새 규정을 도입했다.",note:"정책"},{en:"How much does the store <em>bring in</em> a week?",ko:"가게가 일주일에 얼마나 벌어?",note:"매출"},{en:"They <em>brought in</em> a consultant to fix the problem.",ko:"문제를 해결하기 위해 컨설턴트를 영입했다.",note:"컨설팅"}],syn:[{s:"earn",m:"벌다"},{s:"recruit",m:"영입하다"},{s:"introduce",m:"도입하다"}],rel:["bring in revenue 수익을 올리다","bring in an expert 전문가를 부르다"]},
{w:"give back",pron:"/ɡɪv bæk/",ko:"돌려주다; 환원하다",base:"give",diff:1,nu:"빌린 것을 돌려주거나, 사회·커뮤니티에 무언가를 환원하는 것.",uses:[{pat:"give back + 물건",desc:"돌려주다"},{pat:"give back to + 사회",desc:"환원하다"}],ex:[{en:"Can you <em>give</em> me <em>back</em> my pen?",ko:"펜 돌려줄 수 있어?",note:"반환"},{en:"She loves to <em>give back</em> to her community.",ko:"그녀는 지역사회에 환원하는 걸 좋아해.",note:"봉사"},{en:"He <em>gave back</em> all the money he had borrowed.",ko:"그는 빌린 돈을 모두 돌려줬다.",note:"상환"},{en:"Volunteering is a great way to <em>give back</em>.",ko:"자원봉사는 환원하는 훌륭한 방법이야.",note:"봉사"},{en:"<em>Give</em> me <em>back</em> my childhood!",ko:"내 어린 시절을 돌려줘!",note:"유머"}],syn:[{s:"return",m:"돌려주다"},{s:"repay",m:"갚다"},{s:"contribute back",m:"환원하다"}],rel:["give back to the community 지역사회에 환원하다","give-and-take 주고받기"]},
{w:"set up",pron:"/set ʌp/",ko:"설치하다; 설립하다; 소개팅 시켜주다",base:"set",diff:1,nu:"컴퓨터·기계 등을 설치하거나, 회사·시스템을 설립하거나, 누군가를 소개팅 시켜주거나, 함정에 빠뜨리는 것.",uses:[{pat:"set up + 기기",desc:"설치하다"},{pat:"set up + 회사/시스템",desc:"설립하다·구축하다"},{pat:"set sb up",desc:"소개팅 시켜주다"},{pat:"set sb up (함정)",desc:"함정에 빠뜨리다"}],ex:[{en:"I need to <em>set up</em> my new laptop.",ko:"새 노트북을 설정해야 해.",note:"기기"},{en:"They <em>set up</em> the company from scratch.",ko:"그들은 회사를 처음부터 설립했다.",note:"창업"},{en:"My friend tried to <em>set me up</em> on a blind date.",ko:"친구가 나를 소개팅 시켜주려 했어.",note:"소개팅"},{en:"He was <em>set up</em> — he didn't commit the crime.",ko:"그는 함정에 빠졌어, 범죄를 저지르지 않았어.",note:"함정"},{en:"Can you help me <em>set up</em> the projector?",ko:"프로젝터 설치하는 거 도와줄 수 있어?",note:"장비"}],syn:[{s:"install",m:"설치하다"},{s:"establish",m:"설립하다"},{s:"arrange",m:"주선하다"}],rel:["setup (n.) 설정·구조","set up a meeting 회의를 잡다","set up shop 가게를 열다"]},
{w:"set off",pron:"/set ɒf/",ko:"출발하다; 작동시키다; 돋보이게 하다",base:"set",diff:1,nu:"여행을 떠나거나, 폭발물·알람을 작동시키거나, 대조를 통해 무언가를 더 돋보이게 하는 것.",uses:[{pat:"set off (여행)",desc:"출발하다"},{pat:"set off + 알람/폭발물",desc:"작동시키다"},{pat:"set off + 대조",desc:"돋보이게 하다"},{pat:"set off (반응)",desc:"촉발하다"}],ex:[{en:"We <em>set off</em> at dawn to avoid traffic.",ko:"교통 체증을 피하려고 새벽에 출발했다.",note:"출발"},{en:"The smoke <em>set off</em> the fire alarm.",ko:"연기가 화재 경보기를 작동시켰다.",note:"알람"},{en:"The blue dress really <em>sets off</em> her eyes.",ko:"그 파란 드레스가 그녀의 눈을 정말 돋보이게 해.",note:"대조"},{en:"His comment <em>set off</em> a heated debate.",ko:"그의 발언이 격렬한 토론을 촉발했다.",note:"토론"},{en:"The fireworks were <em>set off</em> at midnight.",ko:"불꽃놀이가 자정에 시작됐다.",note:"불꽃"}],syn:[{s:"depart",m:"출발하다"},{s:"trigger",m:"작동시키다"},{s:"highlight",m:"돋보이게 하다"}],rel:["set off on a journey 여행을 떠나다","set off an alarm 경보를 울리다"]},
{w:"keep up",pron:"/kiːp ʌp/",ko:"유지하다; 따라가다; 잠을 못 자게 하다",base:"keep",diff:1,nu:"좋은 상태·속도를 유지하거나, 빠른 것을 따라가거나, 누군가를 잠들지 못하게 하는 것.",uses:[{pat:"keep up + 속도/노력",desc:"유지하다"},{pat:"keep up with",desc:"~을 따라가다"},{pat:"keep sb up",desc:"잠을 못 자게 하다"},{pat:"keep up the good work",desc:"잘 계속해"}],ex:[{en:"<em>Keep up</em> the good work!",ko:"잘 계속해!",note:"격려"},{en:"Walk slower — I can't <em>keep up</em>.",ko:"천천히 걸어, 따라갈 수 없어.",note:"속도"},{en:"The baby was <em>keeping</em> us <em>up</em> all night.",ko:"아기가 밤새 우리를 잠 못 자게 했다.",note:"수면"},{en:"It's hard to <em>keep up</em> with the latest news.",ko:"최신 뉴스를 따라가기 어렵다.",note:"정보"},{en:"She managed to <em>keep up</em> her grades despite everything.",ko:"모든 것에도 불구하고 그녀는 성적을 유지했다.",note:"학업"}],syn:[{s:"maintain",m:"유지하다"},{s:"sustain",m:"지속하다"},{s:"match",m:"맞추다"}],rel:["keep up appearances 외양을 유지하다","keep up to date 최신을 유지하다"]},
{w:"keep on",pron:"/kiːp ɒn/",ko:"계속하다; 잔소리하다",base:"keep",diff:1,nu:"멈추지 않고 어떤 행동을 계속 이어가거나, 같은 말을 반복해서 잔소리하는 것.",uses:[{pat:"keep on + V-ing",desc:"계속 ~하다"},{pat:"keep on about sth",desc:"~에 대해 잔소리하다"}],ex:[{en:"<em>Keep on</em> trying — you'll get it.",ko:"계속 시도해, 될 거야.",note:"격려"},{en:"She <em>kept on</em> talking even after everyone left.",ko:"모두가 떠난 후에도 그녀는 계속 말했다.",note:"집요"},{en:"Stop <em>keeping on</em> about it — I heard you the first time.",ko:"그만 잔소리해, 처음에 들었어.",note:"잔소리"},{en:"Just <em>keep on</em> doing what you're doing.",ko:"지금 하는 걸 계속해.",note:"지속"},{en:"He <em>kept on</em> working despite being exhausted.",ko:"그는 지쳐있었음에도 계속 일했다.",note:"끈기"}],syn:[{s:"continue",m:"계속하다"},{s:"persist",m:"끈기 있게 하다"},{s:"nag",m:"잔소리하다"}],rel:["keep on keeping on 계속 나아가다","keep at it 계속 해나가다"]},
{w:"keep away",pron:"/kiːp əˈweɪ/",ko:"멀리하다; 접근하지 못하게 하다",base:"keep",diff:1,nu:"위험한 것으로부터 거리를 두거나, 누군가를 접근하지 못하게 하는 것.",uses:[{pat:"keep away from + 위험",desc:"~을 멀리하다"},{pat:"keep sb away from",desc:"~를 접근 못하게 하다"}],ex:[{en:"<em>Keep away</em> from the edge — it's dangerous.",ko:"가장자리에서 떨어져, 위험해.",note:"안전"},{en:"Try to <em>keep away</em> from junk food.",ko:"정크푸드를 멀리하려고 노력해.",note:"건강"},{en:"The fence <em>keeps</em> animals <em>away</em> from the garden.",ko:"울타리가 동물들을 정원에 접근하지 못하게 한다.",note:"울타리"},{en:"She's been <em>keeping away</em> from social media lately.",ko:"그녀는 요즘 소셜 미디어를 멀리하고 있다.",note:"SNS"},{en:"<em>Keep</em> children <em>away</em> from this medicine.",ko:"어린이 손이 닿지 않는 곳에 보관하세요.",note:"안전 경고"}],syn:[{s:"stay away from",m:"~에서 멀리하다"},{s:"avoid",m:"피하다"},{s:"prevent from approaching",m:"접근을 막다"}],rel:["keep away from danger 위험을 멀리하다","keep at arm's length 거리를 두다"]},
{w:"hold down",pron:"/həʊld daʊn/",ko:"누르다; 유지하다; 억누르다",base:"hold",diff:2,nu:"물리적으로 누르거나, 직장을 유지하거나, 가격·소리를 낮게 유지하는 것.",uses:[{pat:"hold down + 직장",desc:"직장을 유지하다"},{pat:"hold down + 물건",desc:"눌러 고정하다"},{pat:"hold down + 가격/소리",desc:"낮게 유지하다"}],ex:[{en:"He can't <em>hold down</em> a job for more than a month.",ko:"그는 한 달 이상 직장을 유지하지 못해.",note:"직장"},{en:"<em>Hold down</em> the button for three seconds.",ko:"버튼을 3초 동안 누르고 있어.",note:"기기 조작"},{en:"Can you <em>hold down</em> the noise, please?",ko:"좀 조용히 해줄 수 있어요?",note:"소음"},{en:"The tent needs pegs to <em>hold</em> it <em>down</em>.",ko:"텐트에는 고정핀이 필요해.",note:"야외"},{en:"They're trying to <em>hold down</em> costs.",ko:"그들은 비용을 낮게 유지하려 하고 있어.",note:"비용"}],syn:[{s:"maintain",m:"유지하다"},{s:"press",m:"누르다"},{s:"suppress",m:"억누르다"}],rel:["hold down a job 직장을 유지하다","hold down the fort 자리를 지키다"]},
{w:"stand out",pron:"/stænd aʊt/",ko:"두드러지다; 눈에 띄다",base:"stand",diff:1,nu:"다른 것들 사이에서 특히 돋보이거나 눈에 띄는 것. 긍정적·부정적 양쪽 맥락 모두 쓸 수 있다.",uses:[{pat:"stand out (from the crowd)",desc:"군중 속에서 두드러지다"},{pat:"stand out (특징)",desc:"눈에 띄다"}],ex:[{en:"She <em>stands out</em> in a crowd.",ko:"그녀는 군중 속에서 눈에 띄어.",note:"외모"},{en:"What <em>stands out</em> most in your CV?",ko:"이력서에서 가장 눈에 띄는 게 뭐야?",note:"취업"},{en:"His performance really <em>stood out</em> from the rest.",ko:"그의 연기는 다른 사람들과 정말 달랐다.",note:"실력"},{en:"The red building <em>stands out</em> against the sky.",ko:"빨간 건물이 하늘을 배경으로 눈에 띈다.",note:"시각"},{en:"To succeed, you need to <em>stand out</em> from the competition.",ko:"성공하려면 경쟁에서 눈에 띄어야 해.",note:"경쟁"}],syn:[{s:"be conspicuous",m:"눈에 띄다"},{s:"excel",m:"뛰어나다"},{s:"distinguish oneself",m:"두각을 나타내다"}],rel:["stand out from the crowd 군중에서 두드러지다","outstanding (adj.) 뛰어난"]},
{w:"stand up",pron:"/stænd ʌp/",ko:"일어서다; 바람맞히다; 견디다",base:"stand",diff:1,nu:"자리에서 일어서거나, 약속을 지키지 않아 상대를 기다리게 하거나, 검증·비판에 견디는 것.",uses:[{pat:"stand up (일어서다)",desc:"일어서다"},{pat:"stand sb up",desc:"바람맞히다"},{pat:"stand up to + 검증",desc:"견디다"},{pat:"stand up for",desc:"옹호하다 (별도 항목)"}],ex:[{en:"Please <em>stand up</em> when the judge enters.",ko:"판사가 들어올 때 일어서세요.",note:"예의"},{en:"He <em>stood</em> me <em>up</em> — I waited for two hours.",ko:"그가 바람맞혔어, 두 시간 기다렸어.",note:"약속"},{en:"This argument doesn't <em>stand up</em> to scrutiny.",ko:"이 논거는 면밀한 검토를 견디지 못해.",note:"논리"},{en:"The bridge was built to <em>stand up</em> to earthquakes.",ko:"그 다리는 지진에 견디도록 지어졌다.",note:"내구성"},{en:"<em>Stand up</em> for what you believe in.",ko:"자신이 믿는 것을 위해 나서.",note:"신념"}],syn:[{s:"rise",m:"일어서다"},{s:"desert",m:"바람맞히다"},{s:"withstand",m:"견디다"}],rel:["stand-up comedy 스탠드업 코미디","stand up to pressure 압박을 견디다"]},
{w:"stand by",pron:"/stænd baɪ/",ko:"대기하다; 지지하다; 방관하다",base:"stand",diff:2,nu:"준비 상태로 대기하거나, 누군가를 끝까지 지지하거나, 아무 행동 없이 지켜보는 것.",uses:[{pat:"stand by (대기)",desc:"준비하고 대기하다"},{pat:"stand by + 사람",desc:"~의 편을 들다·지지하다"},{pat:"stand by (방관)",desc:"가만히 지켜보다"}],ex:[{en:"All crew, <em>stand by</em> for takeoff.",ko:"전 승무원, 이륙 준비 대기.",note:"항공"},{en:"I'll <em>stand by</em> you no matter what.",ko:"무슨 일이 있어도 네 편이야.",note:"지지"},{en:"How could you just <em>stand by</em> and do nothing?",ko:"그냥 지켜보면서 아무것도 안 하다니?",note:"방관"},{en:"<em>Stand by</em> for further instructions.",ko:"추가 지시를 기다리세요.",note:"대기"},{en:"He <em>stood by</em> his decision despite the criticism.",ko:"그는 비판에도 불구하고 자신의 결정을 고수했다.",note:"결정"}],syn:[{s:"wait",m:"기다리다"},{s:"support",m:"지지하다"},{s:"watch idly",m:"방관하다"}],rel:["standby (n.) 대기","stand by one's words 말을 지키다","bystander 방관자"]},
{w:"make out",pron:"/meɪk aʊt/",ko:"알아보다; 이해하다; 잘 해나가다",base:"make",diff:1,nu:"어렴풋이 보이거나 들리는 것을 겨우 알아차리거나, 상황을 이해하거나, 어떻게 됐는지 묻는 것.",uses:[{pat:"make out + 글씨/소리",desc:"겨우 알아보다"},{pat:"make out (상황)",desc:"이해하다"},{pat:"how did you make out?",desc:"어떻게 됐어?"},{pat:"make sb out to be",desc:"~인 것처럼 보이게 하다"}],ex:[{en:"I could barely <em>make out</em> his handwriting.",ko:"그의 손글씨를 겨우 알아볼 수 있었다.",note:"글씨"},{en:"I can't <em>make out</em> what she's saying.",ko:"그녀가 하는 말을 알아들을 수 없어.",note:"소리"},{en:"How did you <em>make out</em> in the interview?",ko:"면접은 어떻게 됐어?",note:"결과"},{en:"She's not as bad as people <em>make</em> her <em>out</em> to be.",ko:"사람들이 말하는 것만큼 나쁜 사람은 아니야.",note:"평가"},{en:"I can't <em>make out</em> what's going on.",ko:"무슨 일인지 이해가 안 돼.",note:"상황"}],syn:[{s:"discern",m:"식별하다"},{s:"decipher",m:"해독하다"},{s:"understand",m:"이해하다"}],rel:["make out a check 수표를 쓰다","make it out 탈출하다"]},
{w:"make it",pron:"/meɪk ɪt/",ko:"성공하다; 제때 도착하다; 참석하다",base:"make",diff:1,nu:"목표를 달성하거나 성공하거나, 제때 도착하거나, 행사에 참석하는 것.",uses:[{pat:"make it (성공)",desc:"성공하다"},{pat:"make it (시간)",desc:"제때 도착하다"},{pat:"can't make it",desc:"못 갈 것 같다"}],ex:[{en:"She worked hard and finally <em>made it</em>.",ko:"그녀는 열심히 해서 마침내 성공했다.",note:"성공"},{en:"We <em>made it</em> just before the doors closed.",ko:"문이 닫히기 직전에 도착했어.",note:"시간"},{en:"I don't think I can <em>make it</em> to the party.",ko:"파티에 못 갈 것 같아.",note:"불참"},{en:"He didn't think he'd <em>make it</em> through the surgery.",ko:"그는 수술을 버틸 수 있을지 몰랐다.",note:"생존"},{en:"If we leave now, we'll just <em>make it</em>.",ko:"지금 출발하면 겨우 될 거야.",note:"시간"}],syn:[{s:"succeed",m:"성공하다"},{s:"arrive in time",m:"제때 도착하다"},{s:"manage",m:"해내다"}],rel:["make it big 크게 성공하다","make it work 잘 되게 하다","make it to the top 정상에 오르다"]},
{w:"make sense of",pron:"/meɪk sens əv/",ko:"~을 이해하다; 파악하다",base:"make",diff:2,nu:"복잡하거나 혼란스러운 것을 이해하거나 의미를 파악하는 것. 'make sense'(말이 되다)와 구분.",uses:[{pat:"make sense of + 복잡한 것",desc:"이해하다·파악하다"}],ex:[{en:"I can't <em>make sense of</em> this instruction manual.",ko:"이 설명서를 도무지 이해할 수가 없어.",note:"설명서"},{en:"Trying to <em>make sense of</em> grief takes time.",ko:"슬픔을 이해하는 데는 시간이 걸린다.",note:"감정"},{en:"She's trying to <em>make sense of</em> everything that happened.",ko:"그녀는 일어난 모든 것을 이해하려 하고 있다.",note:"상황"},{en:"Can you help me <em>make sense of</em> this data?",ko:"이 데이터를 이해하는 것 좀 도와줄 수 있어?",note:"데이터"},{en:"It's hard to <em>make sense of</em> a tragedy.",ko:"비극을 이해하기는 어렵다.",note:"위로"}],syn:[{s:"understand",m:"이해하다"},{s:"interpret",m:"해석하다"},{s:"decipher",m:"해독하다"}],rel:["make sense 말이 되다","make no sense 말도 안 되다"]},
{w:"draw on",pron:"/drɔː ɒn/",ko:"활용하다; 끌어내다",base:"other",diff:2,nu:"경험·지식·자원 등을 활용하거나 끌어내는 것. 내면의 무언가를 사용한다는 뉘앙스.",uses:[{pat:"draw on + 경험/지식",desc:"활용하다·의지하다"},{pat:"draw on + 자원",desc:"끌어내다"}],ex:[{en:"She <em>drew on</em> her years of experience for the project.",ko:"그녀는 프로젝트에 수년간의 경험을 활용했다.",note:"경험"},{en:"The writer <em>draws on</em> real events for inspiration.",ko:"그 작가는 영감을 위해 실제 사건을 활용한다.",note:"창작"},{en:"Leaders must <em>draw on</em> their inner strength.",ko:"리더들은 내면의 힘을 끌어내야 한다.",note:"리더십"},{en:"We'll need to <em>draw on</em> all available resources.",ko:"모든 가용 자원을 활용해야 할 거야.",note:"자원"},{en:"He <em>drew on</em> his childhood memories for the novel.",ko:"그는 어린 시절 기억을 소설에 활용했다.",note:"소설"}],syn:[{s:"utilize",m:"활용하다"},{s:"tap into",m:"끌어내다"},{s:"rely on",m:"의존하다"}],rel:["draw on experience 경험을 활용하다","draw on reserves 비축분을 사용하다"]},
{w:"fill in",pron:"/fɪl ɪn/",ko:"채우다; 대신하다; 알려주다",base:"other",diff:1,nu:"빈칸을 채우거나, 누군가를 대신하거나, 중요한 정보를 알려주는 것.",uses:[{pat:"fill in + 양식",desc:"양식을 작성하다"},{pat:"fill in for sb",desc:"대신하다"},{pat:"fill sb in",desc:"~에게 상황을 알려주다"}],ex:[{en:"Please <em>fill in</em> this form.",ko:"이 양식을 작성해주세요.",note:"서류"},{en:"Can you <em>fill in</em> for me today?",ko:"오늘 나 대신해줄 수 있어?",note:"대신"},{en:"<em>Fill me in</em> on what I missed.",ko:"내가 놓친 것 좀 알려줘.",note:"상황 파악"},{en:"<em>Fill in</em> the blanks with the correct word.",ko:"올바른 단어로 빈칸을 채워.",note:"교육"},{en:"She <em>filled</em> him <em>in</em> on the latest developments.",ko:"그녀는 그에게 최근 상황을 알려줬다.",note:"업무"}],syn:[{s:"complete",m:"작성하다"},{s:"substitute",m:"대신하다"},{s:"inform",m:"알리다"}],rel:["fill in the blanks 빈칸을 채우다","fill in for 대신하다"]},
{w:"think through",pron:"/θɪŋk θruː/",ko:"신중히 생각하다; 충분히 고민하다",base:"other",diff:2,nu:"결정·계획 등을 서두르지 않고 모든 측면을 충분히 고려하는 것.",uses:[{pat:"think through + 결정",desc:"신중히 생각하다"},{pat:"think it through",desc:"충분히 고민하다"}],ex:[{en:"I need time to <em>think</em> this <em>through</em>.",ko:"이것을 충분히 생각할 시간이 필요해.",note:"고민"},{en:"Have you <em>thought through</em> all the consequences?",ko:"모든 결과를 충분히 생각해봤어?",note:"결과"},{en:"Don't rush — <em>think it through</em> carefully.",ko:"서두르지 마, 신중히 생각해.",note:"조언"},{en:"The plan hasn't been fully <em>thought through</em>.",ko:"계획이 충분히 검토되지 않았어.",note:"계획"},{en:"Let me <em>think through</em> the options.",ko:"선택지들을 충분히 생각해볼게.",note:"선택"}],syn:[{s:"consider carefully",m:"신중히 고려하다"},{s:"deliberate",m:"숙고하다"},{s:"reflect on",m:"숙고하다"}],rel:["think over 다시 생각해보다","think twice 다시 생각하다"]},
{w:"think over",pron:"/θɪŋk ˈəʊvər/",ko:"다시 생각해보다; 고려하다",base:"other",diff:1,nu:"결정을 내리기 전에 다시 한번 생각해보거나 충분히 고려하는 것.",uses:[{pat:"think over + 제안",desc:"~을 다시 생각해보다"},{pat:"think it over",desc:"다시 고려하다"}],ex:[{en:"Let me <em>think it over</em> and get back to you.",ko:"다시 생각해보고 연락드릴게요.",note:"업무"},{en:"I'll need a few days to <em>think over</em> your offer.",ko:"제안을 고려하는 데 며칠 필요해요.",note:"제안"},{en:"Have you <em>thought over</em> what I said?",ko:"내가 한 말 다시 생각해봤어?",note:"조언"},{en:"<em>Think it over</em> — there's no rush.",ko:"다시 생각해봐, 급하지 않아.",note:"여유"},{en:"She <em>thought over</em> the decision all night.",ko:"그녀는 밤새 결정을 다시 생각해봤다.",note:"고민"}],syn:[{s:"reconsider",m:"재고하다"},{s:"mull over",m:"곰곰이 생각하다"},{s:"deliberate",m:"숙고하다"}],rel:["think twice 다시 생각하다","sleep on it 하룻밤 자고 생각하다"]},
{w:"knock out",pron:"/nɒk aʊt/",ko:"기절시키다; 제거하다; 감동시키다",base:"other",diff:1,nu:"권투에서 KO시키거나, 경쟁에서 탈락시키거나, 매우 인상적으로 감동시키는 것.",uses:[{pat:"knock out + 상대",desc:"기절시키다·KO하다"},{pat:"knock out + 경쟁자",desc:"제거하다·탈락시키다"},{pat:"knock sb out (감동)",desc:"크게 감동시키다"}],ex:[{en:"He was <em>knocked out</em> in the third round.",ko:"그는 3라운드에서 KO됐다.",note:"권투"},{en:"Our team was <em>knocked out</em> in the semifinals.",ko:"우리 팀은 준결승에서 탈락했다.",note:"스포츠"},{en:"Her performance absolutely <em>knocked me out</em>.",ko:"그녀의 공연은 정말 나를 크게 감동시켰다.",note:"감동"},{en:"The medicine <em>knocked</em> me <em>out</em>.",ko:"약이 나를 정신 못 차리게 했어.",note:"약"},{en:"They <em>knocked out</em> the competition easily.",ko:"그들은 경쟁자들을 쉽게 물리쳤다.",note:"경쟁"}],syn:[{s:"eliminate",m:"제거하다"},{s:"defeat",m:"패배시키다"},{s:"impress",m:"감동시키다"}],rel:["knockout (n.) KO·매력적인 것","knock-out blow 결정타"]},
{w:"knock down",pron:"/nɒk daʊn/",ko:"쓰러뜨리다; 철거하다; 가격을 낮추다",base:"other",diff:1,nu:"물리적으로 쓰러뜨리거나, 건물을 철거하거나, 가격을 깎는 것.",uses:[{pat:"knock down + 사람",desc:"쓰러뜨리다"},{pat:"knock down + 건물",desc:"철거하다"},{pat:"knock down + 가격",desc:"가격을 낮추다"}],ex:[{en:"The car <em>knocked down</em> a pedestrian.",ko:"차가 보행자를 쓰러뜨렸다.",note:"사고"},{en:"They <em>knocked down</em> the old factory.",ko:"그들은 낡은 공장을 철거했다.",note:"철거"},{en:"Can you <em>knock</em> the price <em>down</em> a bit?",ko:"가격을 좀 낮춰줄 수 있어요?",note:"협상"},{en:"The wind <em>knocked down</em> several trees.",ko:"바람이 나무 몇 그루를 쓰러뜨렸다.",note:"폭풍"},{en:"She was <em>knocked down</em> by the news.",ko:"그녀는 그 소식에 충격을 받았다.",note:"충격"}],syn:[{s:"demolish",m:"철거하다"},{s:"topple",m:"쓰러뜨리다"},{s:"reduce",m:"낮추다"}],rel:["knockdown price 크게 낮춘 가격","knock down barriers 장벽을 허물다"]},
{w:"cut back",pron:"/kʌt bæk/",ko:"삭감하다; 줄이다",base:"other",diff:1,nu:"지출·생산·직원 수 등을 줄이거나, 식물을 가지치기하는 것.",uses:[{pat:"cut back on + 지출",desc:"~을 줄이다"},{pat:"cut back + 예산",desc:"삭감하다"}],ex:[{en:"We need to <em>cut back on</em> expenses.",ko:"지출을 줄여야 해.",note:"재정"},{en:"The company <em>cut back</em> its workforce by 20%.",ko:"회사가 인력을 20% 삭감했다.",note:"구조조정"},{en:"I'm trying to <em>cut back on</em> caffeine.",ko:"카페인 섭취를 줄이려고 해.",note:"건강"},{en:"Government spending has been <em>cut back</em>.",ko:"정부 지출이 삭감됐다.",note:"정책"},{en:"She <em>cut back</em> the roses before winter.",ko:"그녀는 겨울 전에 장미를 가지치기했다.",note:"정원"}],syn:[{s:"reduce",m:"줄이다"},{s:"decrease",m:"감소시키다"},{s:"scale back",m:"규모를 줄이다"}],rel:["cut back on spending 지출을 줄이다","cutback (n.) 삭감"]},
{w:"cut out",pron:"/kʌt aʊt/",ko:"오려내다; 그만두다; 중단하다",base:"other",diff:1,nu:"가위로 오려내거나, 나쁜 습관을 그만두거나, 엔진이 갑자기 멈추거나, 중간에서 배제하는 것.",uses:[{pat:"cut out + 물건",desc:"오려내다"},{pat:"cut out + 습관",desc:"그만두다"},{pat:"cut sb out",desc:"배제하다"},{pat:"cut out (엔진)",desc:"갑자기 멈추다"}],ex:[{en:"<em>Cut out</em> the pictures and paste them here.",ko:"사진을 오려내서 여기에 붙여.",note:"공작"},{en:"You should <em>cut out</em> sugar from your diet.",ko:"식단에서 설탕을 없애야 해.",note:"건강"},{en:"The engine suddenly <em>cut out</em>.",ko:"엔진이 갑자기 멈췄다.",note:"기계"},{en:"She was <em>cut out</em> of the will.",ko:"그녀는 유언장에서 제외됐다.",note:"상속"},{en:"<em>Cut out</em> the noise — I'm trying to work.",ko:"소음 좀 그쳐줘, 일하려고 하는데.",note:"조용히"}],syn:[{s:"stop",m:"그만두다"},{s:"exclude",m:"배제하다"},{s:"stall",m:"멈추다"}],rel:["cut it out 그만해","cut out the middleman 중간상을 없애다","not cut out for ~에 맞지 않다"]},
{w:"die down",pron:"/daɪ daʊn/",ko:"가라앉다; 잦아들다",base:"other",diff:1,nu:"소란·바람·감정 등이 점차 가라앉거나 잦아드는 것.",uses:[{pat:"die down (소음/감정)",desc:"가라앉다·잦아들다"}],ex:[{en:"The wind eventually <em>died down</em>.",ko:"바람이 결국 잦아들었다.",note:"날씨"},{en:"The controversy will <em>die down</em> in a few days.",ko:"논란은 며칠 안에 가라앉을 거야.",note:"논란"},{en:"Wait for the excitement to <em>die down</em>.",ko:"흥분이 가라앉을 때까지 기다려.",note:"감정"},{en:"The noise <em>died down</em> after midnight.",ko:"자정 이후에 소음이 가라앉았다.",note:"소음"},{en:"Once the panic <em>dies down</em>, we can think clearly.",ko:"공황이 가라앉으면 명확히 생각할 수 있어.",note:"심리"}],syn:[{s:"subside",m:"가라앉다"},{s:"calm down",m:"진정되다"},{s:"fade",m:"희미해지다"}],rel:["die out 멸종하다·사라지다","die away 점점 사라지다"]},
{w:"die out",pron:"/daɪ aʊt/",ko:"멸종하다; 사라지다",base:"other",diff:2,nu:"동물이 멸종하거나, 전통·관습·트렌드가 완전히 사라지는 것.",uses:[{pat:"die out (생물)",desc:"멸종하다"},{pat:"die out (관습/전통)",desc:"완전히 사라지다"}],ex:[{en:"Many species are in danger of <em>dying out</em>.",ko:"많은 종들이 멸종 위기에 처해 있다.",note:"환경"},{en:"This tradition is <em>dying out</em> among younger generations.",ko:"이 전통이 젊은 세대에서 사라지고 있다.",note:"전통"},{en:"Dinosaurs <em>died out</em> millions of years ago.",ko:"공룡은 수백만 년 전에 멸종했다.",note:"역사"},{en:"Old customs slowly <em>die out</em> as society changes.",ko:"사회가 변하면서 오래된 관습들이 서서히 사라진다.",note:"사회"},{en:"Some languages are <em>dying out</em> rapidly.",ko:"일부 언어들이 빠르게 사라지고 있다.",note:"언어"}],syn:[{s:"become extinct",m:"멸종하다"},{s:"vanish",m:"사라지다"},{s:"disappear",m:"없어지다"}],rel:["extinction 멸종","dying breed 사라져가는 유형"]},
{w:"wear out",pron:"/weər aʊt/",ko:"닳다; 지치게 하다",base:"other",diff:1,nu:"물건이 오래 써서 닳거나, 사람을 완전히 지치게 만드는 것.",uses:[{pat:"wear out + 물건",desc:"닳다·해지다"},{pat:"wear sb out",desc:"완전히 지치게 하다"},{pat:"worn out",desc:"지쳐있는·낡은"}],ex:[{en:"These shoes are completely <em>worn out</em>.",ko:"이 신발은 완전히 닳았어.",note:"신발"},{en:"The kids <em>wore</em> me <em>out</em> today.",ko:"오늘 아이들이 나를 완전히 지치게 했어.",note:"피로"},{en:"I'm <em>worn out</em> — I need a holiday.",ko:"완전히 지쳤어, 휴가가 필요해.",note:"번아웃"},{en:"Don't <em>wear out</em> your welcome.",ko:"너무 오래 머물러 눈치 보이게 만들지 마.",note:"예의"},{en:"Constant worry <em>wears</em> you <em>out</em>.",ko:"끊임없는 걱정이 사람을 지치게 한다.",note:"정신 건강"}],syn:[{s:"exhaust",m:"지치게 하다"},{s:"fatigue",m:"피로하게 하다"},{s:"deteriorate",m:"낡다"}],rel:["worn out 지쳐있는·낡은","wear and tear 마모","outwear 더 오래 버티다"]},
{w:"turn to",pron:"/tɜːrn tuː/",ko:"~에게 의지하다; 변하다; 돌아서다",base:"turn",diff:1,nu:"도움·위안을 위해 누군가에게 의지하거나, 특정 상태로 변하거나, 다른 화제로 돌아서는 것.",uses:[{pat:"turn to + 사람",desc:"~에게 의지하다"},{pat:"turn to + 상태",desc:"~으로 변하다"},{pat:"turn to + 화제",desc:"~으로 넘어가다"}],ex:[{en:"Who do you <em>turn to</em> when you need help?",ko:"도움이 필요할 때 누구에게 의지해?",note:"의지"},{en:"Water <em>turns to</em> ice below zero.",ko:"물은 0도 이하에서 얼음으로 변한다.",note:"변화"},{en:"Let's <em>turn to</em> the next item on the agenda.",ko:"다음 안건으로 넘어갑시다.",note:"회의"},{en:"She <em>turned to</em> alcohol to cope with the stress.",ko:"그녀는 스트레스를 달래기 위해 술에 의지했다.",note:"의존"},{en:"His grief <em>turned to</em> anger.",ko:"그의 슬픔이 분노로 변했다.",note:"감정"}],syn:[{s:"rely on",m:"의지하다"},{s:"transform into",m:"변하다"},{s:"resort to",m:"의지하다"}],rel:["turn to someone for help 도움을 요청하다","turn to drink 술에 의지하다"]},
{w:"break away",pron:"/breɪk əˈweɪ/",ko:"탈출하다; 분리하다; 새로운 길을 가다",base:"break",diff:2,nu:"집단·전통·통제에서 벗어나거나, 조직에서 분리 독립하는 것.",uses:[{pat:"break away from + 집단",desc:"~에서 탈출하다·벗어나다"},{pat:"break away (분리)",desc:"분리 독립하다"}],ex:[{en:"She finally <em>broke away</em> from the controlling relationship.",ko:"그녀는 마침내 통제적인 관계에서 벗어났다.",note:"관계"},{en:"The group <em>broke away</em> to form a new party.",ko:"그 그룹은 분리되어 새 정당을 만들었다.",note:"정치"},{en:"He <em>broke away</em> from the pack and took the lead.",ko:"그는 선두 그룹에서 이탈하여 앞서나갔다.",note:"스포츠"},{en:"It's hard to <em>break away</em> from old habits.",ko:"오래된 습관에서 벗어나기는 어렵다.",note:"습관"},{en:"She <em>broke away</em> from her family's expectations.",ko:"그녀는 가족의 기대에서 벗어났다.",note:"자유"}],syn:[{s:"escape",m:"탈출하다"},{s:"secede",m:"분리 독립하다"},{s:"separate",m:"분리하다"}],rel:["breakaway (n.) 이탈·분리","break free 자유로워지다"]},
{w:"break even",pron:"/breɪk ˈiːvən/",ko:"본전을 찾다; 손익분기점에 도달하다",base:"break",diff:2,nu:"사업이나 투자에서 이익도 손실도 없이 원금만 회수하는 것.",uses:[{pat:"break even (사업)",desc:"손익이 0이 되다"},{pat:"break-even point",desc:"손익분기점"}],ex:[{en:"The company <em>broke even</em> in its first year.",ko:"회사는 첫 해에 본전을 찾았다.",note:"창업"},{en:"We need 100 sales just to <em>break even</em>.",ko:"본전을 찾으려면 100개를 팔아야 해.",note:"계산"},{en:"Did you at least <em>break even</em> at the casino?",ko:"카지노에서 최소한 본전은 찾았어?",note:"도박"},{en:"The event barely <em>broke even</em>.",ko:"그 행사는 겨우 본전을 찾았다.",note:"행사"},{en:"I'm happy to <em>break even</em> on this deal.",ko:"이 거래에서 본전만 찾아도 만족해.",note:"협상"}],syn:[{s:"cover costs",m:"비용을 충당하다"},{s:"recoup",m:"회수하다"},{s:"balance out",m:"균형을 맞추다"}],rel:["break-even point 손익분기점","in the black 흑자","in the red 적자"]}
