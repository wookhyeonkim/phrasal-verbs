{w:"give way",pron:"/ɡɪv weɪ/",ko:"양보하다; 무너지다; 길을 비켜주다",base:"give",diff:2,nu:"차가 양보하거나, 구조물이 무너지거나, 감정·저항이 결국 꺾이는 것.",uses:[{pat:"give way (to traffic)",desc:"양보하다"},{pat:"give way (구조물)",desc:"무너지다"},{pat:"give way to + 감정",desc:"~에 굴복하다"}],ex:[{en:"The bridge <em>gave way</em> under the weight.",ko:"다리가 무게를 못 이기고 무너졌다.",note:"붕괴"},{en:"You must <em>give way</em> to oncoming traffic.",ko:"반대편 차량에 양보해야 해.",note:"교통"},{en:"She finally <em>gave way</em> to tears.",ko:"그녀는 결국 눈물을 흘렸다.",note:"감정"},{en:"Winter is <em>giving way</em> to spring.",ko:"겨울이 봄에 자리를 내주고 있다.",note:"계절"},{en:"Don't <em>give way</em> to despair.",ko:"절망에 굴복하지 마.",note:"조언"}],syn:[{s:"yield",m:"양보하다"},{s:"collapse",m:"무너지다"},{s:"succumb",m:"굴복하다"}],rel:["give way to 길을 비켜주다","give way to pressure 압박에 굴복하다"]},
{w:"give rise to",pron:"/ɡɪv raɪz tuː/",ko:"~을 야기하다; 일으키다",base:"give",diff:2,nu:"어떤 결과나 상황을 만들어내거나 초래하는 것. 주로 공식적·서면 표현에서 쓰인다.",uses:[{pat:"give rise to + 결과",desc:"~을 야기하다·초래하다"}],ex:[{en:"The incident <em>gave rise to</em> public outrage.",ko:"그 사건이 대중의 분노를 야기했다.",note:"사건"},{en:"New technology has <em>given rise to</em> new industries.",ko:"새 기술이 새로운 산업을 일으켰다.",note:"기술"},{en:"His comments <em>gave rise to</em> speculation.",ko:"그의 발언이 추측을 낳았다.",note:"발언"},{en:"Poverty often <em>gives rise to</em> crime.",ko:"빈곤은 종종 범죄를 야기한다.",note:"사회"},{en:"The discovery <em>gave rise to</em> many questions.",ko:"그 발견이 많은 의문을 낳았다.",note:"과학"}],syn:[{s:"cause",m:"야기하다"},{s:"lead to",m:"이어지다"},{s:"produce",m:"만들어내다"}],rel:["give birth to 낳다","give way to 길을 내주다"]},
{w:"fall in with",pron:"/fɔːl ɪn wɪð/",ko:"~와 어울리다; 동의하다",base:"fall",diff:2,nu:"나쁜 친구나 집단과 어울리거나, 누군가의 계획·의견에 동의하는 것.",uses:[{pat:"fall in with + 나쁜 무리",desc:"~와 어울리다"},{pat:"fall in with + 계획",desc:"동의하다"}],ex:[{en:"He <em>fell in with</em> the wrong crowd at school.",ko:"그는 학교에서 나쁜 친구들과 어울리게 됐다.",note:"나쁜 영향"},{en:"She <em>fell in with</em> our plan immediately.",ko:"그녀는 즉시 우리 계획에 동의했다.",note:"동의"},{en:"Don't <em>fall in with</em> people who drag you down.",ko:"너를 끌어내리는 사람들과 어울리지 마.",note:"조언"},{en:"The committee <em>fell in with</em> the proposal.",ko:"위원회가 제안에 동의했다.",note:"공식"},{en:"He <em>fell in with</em> a group of artists.",ko:"그는 예술가 집단과 어울리게 됐다.",note:"집단"}],syn:[{s:"associate with",m:"~와 어울리다"},{s:"agree with",m:"동의하다"},{s:"go along with",m:"따르다"}],rel:["fall into bad habits 나쁜 습관에 빠지다","run with the wrong crowd 나쁜 무리와 어울리다"]},
{w:"fall into",pron:"/fɔːl ˈɪntuː/",ko:"~에 빠지다; ~에 해당하다; 자연스럽게 시작하다",base:"fall",diff:1,nu:"함정·습관에 빠지거나, 특정 범주에 해당하거나, 대화·일상이 자연스럽게 시작되는 것.",uses:[{pat:"fall into + 함정/습관",desc:"~에 빠지다"},{pat:"fall into + 범주",desc:"해당하다"},{pat:"fall into conversation",desc:"자연스럽게 대화를 나누다"}],ex:[{en:"Be careful not to <em>fall into</em> a routine.",ko:"일상에 너무 빠져들지 않도록 조심해.",note:"습관"},{en:"These items <em>fall into</em> three categories.",ko:"이 항목들은 세 가지 범주에 해당한다.",note:"분류"},{en:"We <em>fell into</em> conversation straight away.",ko:"우리는 바로 자연스럽게 대화를 나눴다.",note:"만남"},{en:"Don't <em>fall into</em> the trap of overthinking.",ko:"과도한 생각의 함정에 빠지지 마.",note:"심리"},{en:"She <em>fell into</em> depression after losing her job.",ko:"그녀는 직장을 잃고 우울증에 빠졌다.",note:"심리"}],syn:[{s:"sink into",m:"~에 빠지다"},{s:"belong to",m:"해당하다"},{s:"slip into",m:"서서히 빠지다"}],rel:["fall into place 제자리를 찾다","fall into the wrong hands 나쁜 사람 손에 들어가다"]},
{w:"run across",pron:"/rʌn əˈkrɒs/",ko:"우연히 만나다; 발견하다",base:"run",diff:1,nu:"예상치 못하게 사람을 만나거나 물건을 발견하는 것. 'come across', 'run into'와 비슷.",uses:[{pat:"run across + 사람",desc:"우연히 만나다"},{pat:"run across + 물건",desc:"우연히 발견하다"}],ex:[{en:"I <em>ran across</em> my old diary while cleaning.",ko:"청소하다가 옛날 일기를 우연히 발견했어.",note:"발견"},{en:"I <em>ran across</em> Jane at the conference.",ko:"컨퍼런스에서 제인을 우연히 만났어.",note:"만남"},{en:"Did you ever <em>run across</em> that book you were looking for?",ko:"찾던 책 우연히 발견한 적 있어?",note:"물건"},{en:"You might <em>run across</em> some interesting people there.",ko:"거기서 흥미로운 사람들을 우연히 만날 수도 있어.",note:"가능성"},{en:"I <em>ran across</em> this article and thought of you.",ko:"이 기사를 보다가 네가 생각났어.",note:"공유"}],syn:[{s:"bump into",m:"우연히 만나다"},{s:"come across",m:"우연히 발견하다"},{s:"encounter",m:"만나다"}],rel:["run into 우연히 만나다","come across 우연히 발견하다"]},
{w:"run out",pron:"/rʌn aʊt/",ko:"다 떨어지다; 만료되다",base:"run",diff:1,nu:"공급·재고·시간이 바닥나거나, 계약·기간이 만료되는 것. 'run out of'의 줄임 형태.",uses:[{pat:"run out (공급)",desc:"다 떨어지다"},{pat:"run out (기간)",desc:"만료되다"},{pat:"run out of time",desc:"시간이 다 되다"}],ex:[{en:"We've <em>run out</em> — can you get more?",ko:"다 떨어졌어, 더 가져올 수 있어?",note:"재고"},{en:"My contract <em>runs out</em> next month.",ko:"내 계약이 다음 달에 만료돼.",note:"계약"},{en:"We're <em>running out</em> of time.",ko:"시간이 다 되어가고 있어.",note:"시간"},{en:"The printer <em>ran out</em> of ink.",ko:"프린터 잉크가 다 떨어졌다.",note:"기기"},{en:"Patience <em>runs out</em> eventually.",ko:"인내심도 결국엔 바닥이 난다.",note:"비유"}],syn:[{s:"be exhausted",m:"소진되다"},{s:"expire",m:"만료되다"},{s:"dry up",m:"말라버리다"}],rel:["run out of 다 떨어지다","run out of steam 에너지가 다하다"]},
{w:"run off",pron:"/rʌn ɒf/",ko:"도망치다; 인쇄하다; 물이 흘러내리다",base:"run",diff:2,nu:"급히 도망치거나, 복사물을 인쇄하거나, 빗물이 흘러내리는 것.",uses:[{pat:"run off (도망)",desc:"급히 떠나다"},{pat:"run off + 복사본",desc:"인쇄하다"},{pat:"run off with",desc:"~와 도망치다·가져가다"}],ex:[{en:"She <em>ran off</em> without saying goodbye.",ko:"그녀는 작별 인사도 없이 급히 떠났다.",note:"도주"},{en:"Can you <em>run off</em> 20 copies of this?",ko:"이거 20부 인쇄해줄 수 있어?",note:"인쇄"},{en:"He <em>ran off</em> with his secretary.",ko:"그는 비서와 함께 도망쳤다.",note:"불륜"},{en:"The thief <em>ran off</em> with my bag.",ko:"도둑이 내 가방을 들고 달아났다.",note:"도난"},{en:"Rainwater <em>runs off</em> the roof.",ko:"빗물이 지붕에서 흘러내린다.",note:"배수"}],syn:[{s:"flee",m:"도망치다"},{s:"print",m:"인쇄하다"},{s:"elope",m:"도망치다"}],rel:["run off at the mouth 말을 쏟아내다","run-off election 결선 투표"]},
{w:"hold together",pron:"/həʊld təˈɡeðər/",ko:"결속시키다; 하나로 유지하다",base:"hold",diff:2,nu:"조직·관계·물건이 분열되지 않고 하나로 유지되는 것.",uses:[{pat:"hold together (조직/관계)",desc:"하나로 유지하다"},{pat:"hold sth together",desc:"결속시키다"}],ex:[{en:"It was her leadership that <em>held</em> the team <em>together</em>.",ko:"팀을 하나로 묶은 건 그녀의 리더십이었다.",note:"리더십"},{en:"The glue isn't <em>holding</em> it <em>together</em> anymore.",ko:"접착제가 더 이상 붙어있지 않아.",note:"물건"},{en:"The country is barely <em>holding together</em>.",ko:"나라가 간신히 하나로 유지되고 있다.",note:"정치"},{en:"What <em>holds</em> a family <em>together</em>?",ko:"가족을 하나로 묶는 게 뭐야?",note:"가족"},{en:"The deal barely <em>held together</em> to the end.",ko:"거래가 끝까지 간신히 유지됐다.",note:"협상"}],syn:[{s:"unite",m:"단합하다"},{s:"keep intact",m:"온전히 유지하다"},{s:"bind",m:"묶다"}],rel:["hold it together 정신을 붙잡다","the glue that holds us together 우리를 묶는 것"]},
{w:"bring down",pron:"/brɪŋ daʊn/",ko:"무너뜨리다; 낮추다; 우울하게 하다",base:"bring",diff:1,nu:"정부·시스템을 무너뜨리거나, 가격·수준을 낮추거나, 누군가를 우울하게 만드는 것.",uses:[{pat:"bring down + 정부/시스템",desc:"무너뜨리다"},{pat:"bring down + 가격",desc:"낮추다"},{pat:"bring sb down",desc:"우울하게 하다"}],ex:[{en:"The scandal <em>brought down</em> the government.",ko:"스캔들이 정부를 무너뜨렸다.",note:"정치"},{en:"We need to <em>bring down</em> the cost of living.",ko:"생활비를 낮춰야 해.",note:"경제"},{en:"Don't let negative people <em>bring you down</em>.",ko:"부정적인 사람들이 너를 우울하게 만들게 놔두지 마.",note:"심리"},{en:"The medication should <em>bring down</em> your fever.",ko:"약이 열을 낮춰줄 거야.",note:"건강"},{en:"The hunter <em>brought down</em> the bird.",ko:"사냥꾼이 새를 쏘아 떨어뜨렸다.",note:"사냥"}],syn:[{s:"topple",m:"무너뜨리다"},{s:"reduce",m:"낮추다"},{s:"depress",m:"우울하게 하다"}],rel:["bring down the house 열광적인 반응을 얻다","bring down prices 가격을 낮추다"]},
{w:"bring forward",pron:"/brɪŋ ˈfɔːrwərd/",ko:"앞당기다; 제안하다",base:"bring",diff:2,nu:"일정을 앞당기거나, 회의에서 의견·증거를 제시하는 것.",uses:[{pat:"bring forward + 일정",desc:"앞당기다"},{pat:"bring forward + 의견/증거",desc:"제시하다·제안하다"}],ex:[{en:"Can we <em>bring forward</em> the meeting to Monday?",ko:"회의를 월요일로 앞당길 수 있을까요?",note:"일정"},{en:"She <em>brought forward</em> new evidence.",ko:"그녀는 새로운 증거를 제시했다.",note:"법정"},{en:"Several proposals were <em>brought forward</em>.",ko:"몇 가지 제안이 제시됐다.",note:"회의"},{en:"The deadline has been <em>brought forward</em> by a week.",ko:"마감일이 일주일 앞당겨졌다.",note:"업무"},{en:"I'd like to <em>bring forward</em> an idea.",ko:"아이디어를 하나 제안하고 싶습니다.",note:"제안"}],syn:[{s:"advance",m:"앞당기다"},{s:"propose",m:"제안하다"},{s:"present",m:"제시하다"}],rel:["put forward 제안하다","bring forward evidence 증거를 제시하다"]},
{w:"come off it",pron:"/kʌm ɒf ɪt/",ko:"말도 안 돼; 그만해",base:"come",diff:2,nu:"상대방의 말이나 행동이 터무니없거나 과장됐을 때 쓰는 강한 구어 표현.",uses:[{pat:"come off it!",desc:"말도 안 돼!·그만해!"}],ex:[{en:"<em>Come off it</em> — you don't really believe that.",ko:"말도 안 돼, 진짜 그렇게 믿는 건 아니잖아.",note:"반박"},{en:"<em>Come off it</em>! That's way too expensive.",ko:"그만해! 너무 비싸잖아.",note:"가격"},{en:"\"I ran 10km this morning.\" \"<em>Come off it</em>!\"",ko:"\"오늘 아침에 10km 뛰었어.\" \"말도 안 돼!\"",note:"놀라움"},{en:"<em>Come off it</em> — you're not that busy.",ko:"그만해, 그렇게 바쁘지 않잖아.",note:"변명"},{en:"<em>Come off it</em>! You knew about this all along.",ko:"그만해! 처음부터 알고 있었잖아.",note:"꾸짖기"}],syn:[{s:"give me a break",m:"말도 안 돼"},{s:"no way",m:"절대 아니야"},{s:"get real",m:"현실을 봐"}],rel:["come off it! 말도 안 돼","give me a break 그만해"]},
{w:"come to",pron:"/kʌm tuː/",ko:"의식이 돌아오다; 결국 ~에 이르다; ~에 달하다",base:"come",diff:1,nu:"기절에서 깨어나거나, 어떤 상황에 이르거나, 금액·수량이 ~에 달하는 것.",uses:[{pat:"come to (의식)",desc:"의식이 돌아오다"},{pat:"come to + 결론/결정",desc:"~에 이르다"},{pat:"come to + 금액",desc:"합계가 ~이다"},{pat:"come to nothing",desc:"아무 성과 없다"}],ex:[{en:"She <em>came to</em> in the hospital.",ko:"그녀는 병원에서 의식이 돌아왔다.",note:"의식 회복"},{en:"We finally <em>came to</em> an agreement.",ko:"우리는 마침내 합의에 이르렀다.",note:"협상"},{en:"The total <em>comes to</em> $150.",ko:"합계가 150달러야.",note:"계산"},{en:"All his efforts <em>came to</em> nothing.",ko:"그의 모든 노력이 아무 성과 없이 끝났다.",note:"실패"},{en:"It <em>came to</em> me in the middle of the night.",ko:"한밤중에 불현듯 생각이 났어.",note:"영감"}],syn:[{s:"regain consciousness",m:"의식을 되찾다"},{s:"amount to",m:"~에 달하다"},{s:"reach",m:"이르다"}],rel:["come to a conclusion 결론에 이르다","come to think of it 생각해보니"]},
{w:"go under",pron:"/ɡəʊ ˈʌndər/",ko:"파산하다; 가라앉다; 수술받다",base:"go",diff:2,nu:"사업이 파산하거나, 물 아래로 가라앉거나, 마취를 받는 것.",uses:[{pat:"go under (사업)",desc:"파산하다"},{pat:"go under (물)",desc:"가라앉다"},{pat:"go under (마취)",desc:"마취에 들어가다"}],ex:[{en:"The company <em>went under</em> during the recession.",ko:"경기 침체 중에 회사가 파산했다.",note:"파산"},{en:"The ship slowly <em>went under</em>.",ko:"배가 서서히 가라앉았다.",note:"침몰"},{en:"The patient <em>went under</em> in minutes.",ko:"환자는 몇 분 만에 마취에 들어갔다.",note:"수술"},{en:"Many small businesses <em>went under</em> last year.",ko:"작년에 많은 소규모 사업이 파산했다.",note:"경제"},{en:"He <em>went under</em> a false name.",ko:"그는 가명을 사용했다.",note:"신분"}],syn:[{s:"go bankrupt",m:"파산하다"},{s:"sink",m:"가라앉다"},{s:"collapse",m:"붕괴하다"}],rel:["go under the knife 수술받다","go belly up 파산하다"]},
{w:"go up",pron:"/ɡəʊ ʌp/",ko:"오르다; 올라가다; 불타다",base:"go",diff:1,nu:"가격·수치가 오르거나, 위로 올라가거나, 불에 타오르는 것.",uses:[{pat:"go up (가격/수준)",desc:"오르다"},{pat:"go up (물리적)",desc:"올라가다"},{pat:"go up in flames",desc:"불타다"}],ex:[{en:"Prices keep <em>going up</em>.",ko:"가격이 계속 오르고 있어.",note:"물가"},{en:"She <em>went up</em> to him and introduced herself.",ko:"그녀는 그에게 다가가 자기소개를 했다.",note:"접근"},{en:"The building <em>went up</em> in flames.",ko:"건물이 불타올랐다.",note:"화재"},{en:"A new apartment block is <em>going up</em> next door.",ko:"옆에 새 아파트가 올라가고 있어.",note:"건설"},{en:"The curtain <em>goes up</em> at 7 PM.",ko:"공연 막이 오후 7시에 오른다.",note:"공연"}],syn:[{s:"rise",m:"오르다"},{s:"ascend",m:"올라가다"},{s:"increase",m:"증가하다"}],rel:["go up in smoke 연기로 사라지다","go up the ladder 승진하다"]},
{w:"take apart",pron:"/teɪk əˈpɑːrt/",ko:"분해하다; 혹평하다",base:"take",diff:2,nu:"기계·물건을 부품으로 분해하거나, 논문·발표 등을 날카롭게 비판하는 것.",uses:[{pat:"take apart + 기계",desc:"분해하다"},{pat:"take apart + 논거/발표",desc:"철저히 비판하다"}],ex:[{en:"He <em>took apart</em> the engine to find the problem.",ko:"그는 문제를 찾기 위해 엔진을 분해했다.",note:"수리"},{en:"The critic completely <em>took apart</em> his novel.",ko:"비평가가 그의 소설을 완전히 혹평했다.",note:"비평"},{en:"I love <em>taking things apart</em> to see how they work.",ko:"작동 원리를 알기 위해 분해하는 걸 좋아해.",note:"탐구"},{en:"She <em>took his argument apart</em> point by point.",ko:"그녀는 그의 주장을 점하나씩 반박했다.",note:"토론"},{en:"The toy was easy to <em>take apart</em> but hard to put back.",ko:"장난감을 분해하기는 쉬웠지만 다시 조립하기는 어려웠다.",note:"조립"}],syn:[{s:"disassemble",m:"분해하다"},{s:"dismantle",m:"해체하다"},{s:"criticize",m:"비판하다"}],rel:["take to pieces 산산조각 내다","pick apart 꼬치꼬치 따지다"]},
{w:"take out",pron:"/teɪk aʊt/",ko:"꺼내다; 데리고 나가다; 빌리다",base:"take",diff:1,nu:"안에서 꺼내거나, 누군가를 식사·데이트에 데려가거나, 도서관 책을 빌리거나, 보험을 가입하는 것.",uses:[{pat:"take out + 물건",desc:"꺼내다"},{pat:"take sb out",desc:"데리고 나가다·사주다"},{pat:"take out + 대출/보험",desc:"가입하다·받다"}],ex:[{en:"Let me <em>take</em> you <em>out</em> for dinner.",ko:"저녁 사줄게.",note:"식사"},{en:"Can you <em>take out</em> the trash?",ko:"쓰레기 좀 버려줄 수 있어?",note:"집안일"},{en:"She <em>took out</em> a loan to start her business.",ko:"그녀는 사업을 시작하기 위해 대출을 받았다.",note:"대출"},{en:"I need to <em>take out</em> travel insurance.",ko:"여행 보험에 가입해야 해.",note:"보험"},{en:"He <em>took out</em> his phone and started typing.",ko:"그는 핸드폰을 꺼내 타이핑을 시작했다.",note:"행동"}],syn:[{s:"remove",m:"꺼내다"},{s:"invite out",m:"데리고 나가다"},{s:"extract",m:"추출하다"}],rel:["takeout (n.) 테이크아웃","take out the trash 쓰레기를 버리다","take out a loan 대출받다"]},
{w:"take down",pron:"/teɪk daʊn/",ko:"내리다; 적다; 무너뜨리다",base:"take",diff:1,nu:"게시물·장식을 내리거나, 메모를 받아 적거나, 상대방을 제압하는 것.",uses:[{pat:"take down + 게시물",desc:"내리다"},{pat:"take down + 메모",desc:"받아 적다"},{pat:"take down + 상대",desc:"제압하다·무너뜨리다"}],ex:[{en:"Could you <em>take down</em> my number?",ko:"제 번호 좀 적어줄 수 있어요?",note:"메모"},{en:"They had to <em>take down</em> the old building.",ko:"낡은 건물을 철거해야 했다.",note:"철거"},{en:"The post was <em>taken down</em> for violating guidelines.",ko:"게시물이 지침 위반으로 내려졌다.",note:"SNS"},{en:"The police <em>took down</em> the suspect.",ko:"경찰이 용의자를 제압했다.",note:"체포"},{en:"<em>Take down</em> these instructions carefully.",ko:"이 지시사항을 주의 깊게 받아 적어.",note:"교육"}],syn:[{s:"remove",m:"내리다"},{s:"note down",m:"적다"},{s:"defeat",m:"무너뜨리다"}],rel:["take down notes 메모하다","take down a website 사이트를 내리다"]},
{w:"put aside",pron:"/pʊt əˈsaɪd/",ko:"제쳐두다; 저축하다; 무시하다",base:"put",diff:1,nu:"잠시 제쳐두거나, 돈을 저축하거나, 차이점·감정을 무시하고 나아가는 것.",uses:[{pat:"put aside + 일/감정",desc:"제쳐두다·잠시 미루다"},{pat:"put aside + 돈",desc:"저축하다"},{pat:"put aside + 차이점",desc:"무시하고 나아가다"}],ex:[{en:"Let's <em>put aside</em> our differences for now.",ko:"지금은 우리의 차이를 제쳐두자.",note:"화해"},{en:"She <em>puts aside</em> a little money each month.",ko:"그녀는 매달 돈을 조금씩 저축한다.",note:"저축"},{en:"<em>Put aside</em> your work and rest for a while.",ko:"일은 제쳐두고 잠시 쉬어.",note:"휴식"},{en:"He <em>put aside</em> his pride and apologized.",ko:"그는 자존심을 내려놓고 사과했다.",note:"화해"},{en:"<em>Put that aside</em> — we'll deal with it later.",ko:"그건 제쳐두자, 나중에 처리하면 돼.",note:"우선순위"}],syn:[{s:"set aside",m:"제쳐두다"},{s:"save",m:"저축하다"},{s:"overlook",m:"무시하다"}],rel:["set aside 제쳐두다","put money aside 돈을 저축하다"]},
{w:"put back",pron:"/pʊt bæk/",ko:"제자리에 돌려놓다; 연기하다",base:"put",diff:1,nu:"물건을 원래 자리에 갖다 놓거나, 일정을 뒤로 미루는 것.",uses:[{pat:"put back + 물건",desc:"제자리에 돌려놓다"},{pat:"put back + 일정",desc:"연기하다"}],ex:[{en:"Please <em>put</em> everything <em>back</em> where you found it.",ko:"찾은 자리에 다 돌려놔.",note:"정리"},{en:"The meeting was <em>put back</em> to Friday.",ko:"회의가 금요일로 미뤄졌다.",note:"일정"},{en:"<em>Put</em> the milk <em>back</em> in the fridge.",ko:"우유 냉장고에 다시 넣어.",note:"음식"},{en:"The launch has been <em>put back</em> by six months.",ko:"출시가 6개월 연기됐다.",note:"제품"},{en:"<em>Put</em> the book <em>back</em> on the shelf.",ko:"책을 선반에 다시 꽂아.",note:"정돈"}],syn:[{s:"return",m:"돌려놓다"},{s:"postpone",m:"연기하다"},{s:"replace",m:"원상복구하다"}],rel:["put back on track 궤도에 되돌리다","put back the clock 시계를 되돌리다"]},
{w:"look over",pron:"/lʊk ˈəʊvər/",ko:"훑어보다; 검토하다",base:"look",diff:1,nu:"문서·작업물을 빠르게 훑어보거나 검토하는 것.",uses:[{pat:"look over + 문서",desc:"훑어보다·검토하다"}],ex:[{en:"Can you <em>look over</em> my essay before I submit it?",ko:"제출 전에 내 에세이 좀 봐줄 수 있어?",note:"교정"},{en:"Let me <em>look over</em> the contract first.",ko:"먼저 계약서를 검토해볼게.",note:"계약"},{en:"She <em>looked over</em> her notes before the exam.",ko:"시험 전에 메모를 훑어봤다.",note:"시험"},{en:"I <em>looked over</em> the plan and found a few issues.",ko:"계획을 검토하다가 몇 가지 문제를 발견했다.",note:"검토"},{en:"<em>Look over</em> the menu and let me know when you're ready.",ko:"메뉴 훑어보고 준비되면 알려줘.",note:"식당"}],syn:[{s:"review",m:"검토하다"},{s:"scan",m:"훑어보다"},{s:"check",m:"확인하다"}],rel:["look over one's shoulder 뒤를 돌아보다·감시하다","overlook 간과하다"]},
{w:"look on",pron:"/lʊk ɒn/",ko:"지켜보다; 방관하다; 여기다",base:"look",diff:2,nu:"행동 없이 지켜보기만 하거나, 누군가를 특정 방식으로 여기는 것.",uses:[{pat:"look on (방관)",desc:"지켜보다·방관하다"},{pat:"look on sb as",desc:"~로 여기다"}],ex:[{en:"We <em>looked on</em> helplessly as the fire spread.",ko:"우리는 불이 번지는 것을 무력하게 지켜봤다.",note:"방관"},{en:"She <em>looks on</em> him as a father figure.",ko:"그녀는 그를 아버지 같은 존재로 여긴다.",note:"관계"},{en:"Don't just <em>look on</em> — help!",ko:"구경만 하지 말고 도와줘!",note:"개입"},{en:"He <em>looked on</em> with pride as his daughter graduated.",ko:"딸이 졸업하는 것을 자랑스럽게 지켜봤다.",note:"감정"},{en:"I <em>look on</em> it as an opportunity.",ko:"나는 그것을 기회로 여긴다.",note:"관점"}],syn:[{s:"watch",m:"지켜보다"},{s:"observe",m:"관찰하다"},{s:"regard as",m:"~로 여기다"}],rel:["onlooker 구경꾼","look on the bright side 긍정적으로 보다"]},
{w:"break out of",pron:"/breɪk aʊt əv/",ko:"탈출하다; 벗어나다",base:"break",diff:1,nu:"감옥·습관·일상에서 벗어나거나 탈출하는 것.",uses:[{pat:"break out of + 감옥",desc:"탈출하다"},{pat:"break out of + 습관/패턴",desc:"벗어나다"}],ex:[{en:"He <em>broke out of</em> prison after three years.",ko:"그는 3년 만에 탈옥했다.",note:"탈옥"},{en:"She's trying to <em>break out of</em> her comfort zone.",ko:"그녀는 편안한 영역에서 벗어나려 하고 있다.",note:"성장"},{en:"It's hard to <em>break out of</em> old patterns.",ko:"오래된 패턴에서 벗어나기는 어렵다.",note:"습관"},{en:"The animal <em>broke out of</em> its cage.",ko:"동물이 우리에서 탈출했다.",note:"탈출"},{en:"He <em>broke out of</em> his shell at university.",ko:"그는 대학에서 자신의 껍데기를 벗어났다.",note:"성장"}],syn:[{s:"escape from",m:"탈출하다"},{s:"free oneself from",m:"~에서 자유로워지다"},{s:"get out of",m:"벗어나다"}],rel:["break free 자유로워지다","step out of one's comfort zone 편안한 영역을 벗어나다"]},
{w:"turn over",pron:"/tɜːrn ˈəʊvər/",ko:"뒤집다; 넘기다; 매출",base:"turn",diff:2,nu:"물건을 뒤집거나, 권한·물건을 넘기거나, 비즈니스에서 매출을 올리는 것.",uses:[{pat:"turn over + 물건",desc:"뒤집다"},{pat:"turn over + 권한",desc:"넘기다"},{pat:"turn over (매출)",desc:"매출을 올리다"}],ex:[{en:"She <em>turned over</em> in her sleep.",ko:"그녀는 잠결에 몸을 뒤집었다.",note:"수면"},{en:"They <em>turned over</em> control to the new team.",ko:"그들은 새 팀에 통제권을 넘겼다.",note:"인수인계"},{en:"The company <em>turns over</em> £5 million a year.",ko:"그 회사는 연간 500만 파운드의 매출을 올린다.",note:"매출"},{en:"<em>Turn over</em> the page.",ko:"페이지를 넘겨.",note:"독서"},{en:"He <em>turned over</em> a new leaf after rehab.",ko:"그는 재활 후 새 출발을 했다.",note:"변화"}],syn:[{s:"flip",m:"뒤집다"},{s:"hand over",m:"넘기다"},{s:"generate revenue",m:"매출을 내다"}],rel:["turnover (n.) 매출·이직률","turn over a new leaf 새 출발하다"]},
{w:"make up",pron:"/meɪk ʌp/",ko:"화해하다; 구성하다; 꾸며내다",base:"make",diff:1,nu:"싸웠다가 화해하거나, 전체를 구성하거나, 거짓말을 꾸며내거나, 잠 등 부족한 것을 보충하는 것.",uses:[{pat:"make up (with sb)",desc:"화해하다"},{pat:"make up + 비율",desc:"구성하다"},{pat:"make up + 이야기",desc:"꾸며내다"},{pat:"make up for",desc:"보충하다·보상하다"}],ex:[{en:"They argued but <em>made up</em> the next day.",ko:"다퉜지만 다음 날 화해했다.",note:"화해"},{en:"Women <em>make up</em> 60% of the workforce.",ko:"여성이 전체 인력의 60%를 구성한다.",note:"구성"},{en:"Stop <em>making up</em> excuses.",ko:"변명 꾸며내는 거 그만해.",note:"거짓"},{en:"I need to <em>make up</em> for lost sleep.",ko:"부족한 잠을 보충해야 해.",note:"보충"},{en:"He <em>makes up</em> stories to impress people.",ko:"그는 사람들에게 인상을 주기 위해 이야기를 꾸며낸다.",note:"과장"}],syn:[{s:"reconcile",m:"화해하다"},{s:"constitute",m:"구성하다"},{s:"fabricate",m:"꾸며내다"}],rel:["make-up (n.) 화장품","make up one's mind 결심하다","make it up to someone 보상하다"]},
{w:"figure in",pron:"/ˈfɪɡər ɪn/",ko:"~을 고려하다; 포함시키다",base:"other",diff:2,nu:"계획·계산에 어떤 요소를 포함시키거나 고려하는 것.",uses:[{pat:"figure in + 요소",desc:"~을 고려하다·포함시키다"}],ex:[{en:"Did you <em>figure in</em> the cost of shipping?",ko:"배송비는 고려했어?",note:"계산"},{en:"We need to <em>figure in</em> all the variables.",ko:"모든 변수를 고려해야 해.",note:"계획"},{en:"Don't forget to <em>figure in</em> taxes.",ko:"세금 포함하는 거 잊지 마.",note:"재정"},{en:"That risk wasn't <em>figured in</em> to the estimate.",ko:"그 리스크는 견적에 포함되지 않았다.",note:"견적"},{en:"Time for breaks should be <em>figured in</em>.",ko:"휴식 시간도 고려해야 한다.",note:"일정"}],syn:[{s:"factor in",m:"고려하다"},{s:"include",m:"포함하다"},{s:"account for",m:"~을 감안하다"}],rel:["factor in 고려하다","take into account 감안하다"]},
{w:"work up",pron:"/wɜːrk ʌp/",ko:"일으키다; 북돋우다; 만들어내다",base:"other",diff:2,nu:"용기·식욕·열정을 북돋우거나, 흥분·감정을 일으키거나, 서서히 발전시키는 것.",uses:[{pat:"work up + 용기/식욕",desc:"~을 북돋우다"},{pat:"work sb up",desc:"흥분시키다"},{pat:"work up to + 목표",desc:"서서히 발전하다"}],ex:[{en:"I couldn't <em>work up</em> the courage to ask her out.",ko:"그녀에게 데이트 신청할 용기를 낼 수 없었다.",note:"용기"},{en:"All that exercise has <em>worked up</em> my appetite.",ko:"운동했더니 식욕이 생겼어.",note:"식욕"},{en:"Don't <em>get worked up</em> over nothing.",ko:"아무것도 아닌 것에 흥분하지 마.",note:"감정"},{en:"She's <em>working up to</em> running a marathon.",ko:"그녀는 서서히 마라톤을 향해 나아가고 있다.",note:"목표"},{en:"He <em>worked up</em> a sweat at the gym.",ko:"그는 헬스장에서 땀을 흘렸다.",note:"운동"}],syn:[{s:"muster",m:"불러일으키다"},{s:"agitate",m:"흥분시키다"},{s:"build up",m:"쌓아올리다"}],rel:["work up a sweat 땀을 흘리다","get worked up 흥분하다","work up courage 용기를 내다"]},
{w:"sort through",pron:"/sɔːrt θruː/",ko:"꼼꼼히 살펴보다; 분류하다",base:"other",diff:1,nu:"많은 물건·정보·감정을 하나씩 살피며 정리하거나 분류하는 것.",uses:[{pat:"sort through + 물건",desc:"분류하다·정리하다"},{pat:"sort through + 감정",desc:"감정을 정리하다"}],ex:[{en:"I need to <em>sort through</em> all these old files.",ko:"이 오래된 파일들을 모두 분류해야 해.",note:"정리"},{en:"She spent hours <em>sorting through</em> her mother's belongings.",ko:"그녀는 어머니의 소지품을 정리하는 데 몇 시간을 보냈다.",note:"유품"},{en:"I'm still <em>sorting through</em> my feelings.",ko:"아직 내 감정을 정리 중이야.",note:"감정"},{en:"<em>Sort through</em> the applications and pick the top five.",ko:"지원서를 검토해서 상위 5개를 골라.",note:"채용"},{en:"We need to <em>sort through</em> the evidence carefully.",ko:"증거를 꼼꼼히 살펴봐야 해.",note:"조사"}],syn:[{s:"sift through",m:"걸러내다"},{s:"go through",m:"훑어보다"},{s:"examine",m:"살피다"}],rel:["sort out 해결하다","go through 검토하다"]},
{w:"pass on",pron:"/pɑːs ɒn/",ko:"전달하다; 건너뛰다; 사망하다",base:"pass",diff:1,nu:"정보·전통·질병을 전달하거나, 제안을 거절하거나, 완곡하게 사망을 표현하는 것.",uses:[{pat:"pass on + 정보/전통",desc:"전달하다"},{pat:"pass on (제안)",desc:"거절하다"},{pat:"pass on (완곡)",desc:"사망하다"}],ex:[{en:"Please <em>pass on</em> my regards to your family.",ko:"가족에게 안부 전해줘.",note:"안부"},{en:"She <em>passed on</em> her love of music to her children.",ko:"그녀는 음악에 대한 사랑을 아이들에게 전수했다.",note:"전수"},{en:"I'll <em>pass on</em> the dessert, thanks.",ko:"디저트는 괜찮아요, 고마워요.",note:"거절"},{en:"His grandfather <em>passed on</em> last year.",ko:"그의 할아버지가 작년에 돌아가셨다.",note:"사망"},{en:"The virus can be <em>passed on</em> through contact.",ko:"바이러스는 접촉을 통해 전파될 수 있다.",note:"전파"}],syn:[{s:"transmit",m:"전달하다"},{s:"decline",m:"거절하다"},{s:"pass away",m:"사망하다"}],rel:["pass down 물려주다","hand down 전수하다"]},
{w:"pass out",pron:"/pɑːs aʊt/",ko:"기절하다; 나눠주다; 졸업하다",base:"pass",diff:1,nu:"의식을 잃고 쓰러지거나, 물건을 나눠주거나, 군사훈련을 마치고 졸업하는 것.",uses:[{pat:"pass out (기절)",desc:"기절하다"},{pat:"pass out + 물건",desc:"나눠주다"},{pat:"pass out (졸업)",desc:"(훈련을) 마치다"}],ex:[{en:"She <em>passed out</em> from the heat.",ko:"더위로 기절했다.",note:"기절"},{en:"<em>Pass out</em> the worksheets, please.",ko:"학습지 좀 나눠주세요.",note:"배포"},{en:"He <em>passed out</em> drunk on the sofa.",ko:"그는 술에 취해 소파에서 쓰러졌다.",note:"음주"},{en:"The soldiers <em>passed out</em> last week.",ko:"병사들이 지난주에 훈련을 마쳤다.",note:"훈련"},{en:"I nearly <em>passed out</em> when I heard the price.",ko:"가격을 듣고 거의 기절할 뻔했어.",note:"충격"}],syn:[{s:"faint",m:"기절하다"},{s:"distribute",m:"나눠주다"},{s:"lose consciousness",m:"의식을 잃다"}],rel:["pass out cold 완전히 기절하다","hand out 나눠주다"]},
{w:"count on",pron:"/kaʊnt ɒn/",ko:"~를 믿다; 의지하다",base:"other",diff:1,nu:"누군가 또는 무언가가 반드시 그럴 것이라고 확신하거나 의지하는 것.",uses:[{pat:"count on + 사람",desc:"~를 믿다·의지하다"},{pat:"count on + 일이 일어날 것",desc:"~가 될 것이라고 믿다"}],ex:[{en:"You can always <em>count on</em> her.",ko:"그녀는 항상 믿을 수 있어.",note:"신뢰"},{en:"I'm <em>counting on</em> you to be there.",ko:"네가 거기 있을 거라고 믿어.",note:"기대"},{en:"Don't <em>count on</em> the weather being nice.",ko:"날씨가 좋을 거라고 기대하지 마.",note:"불확실"},{en:"We <em>counted on</em> him and he let us down.",ko:"우리는 그를 믿었는데 실망시켰다.",note:"배신"},{en:"You can <em>count on</em> me.",ko:"나만 믿어.",note:"다짐"}],syn:[{s:"rely on",m:"의지하다"},{s:"depend on",m:"의존하다"},{s:"trust",m:"믿다"}],rel:["count me in 나도 낄게","count me out 나는 빼줘"]},
{w:"count out",pron:"/kaʊnt aʊt/",ko:"제외하다; 세다",base:"other",diff:1,nu:"누군가나 무언가를 계획·활동에서 제외하거나, 돈·물건을 하나씩 세는 것.",uses:[{pat:"count sb out",desc:"~를 제외하다"},{pat:"count out + 돈",desc:"세어서 건네다"}],ex:[{en:"<em>Count me out</em> — I'm busy that day.",ko:"나는 빼줘, 그날 바빠.",note:"제외"},{en:"He carefully <em>counted out</em> the change.",ko:"그는 거스름돈을 하나씩 세어 건넸다.",note:"계산"},{en:"Don't <em>count her out</em> — she's stronger than you think.",ko:"그녀를 배제하지 마, 생각보다 강해.",note:"과소평가"},{en:"The referee <em>counted him out</em>.",ko:"심판이 KO 카운트를 셌다.",note:"권투"},{en:"<em>Count me out</em> of the office party.",ko:"직원 파티에서 나는 빼줘.",note:"회사"}],syn:[{s:"exclude",m:"제외하다"},{s:"eliminate",m:"탈락시키다"},{s:"tally",m:"세다"}],rel:["count me in 포함시켜줘","count out loud 소리 내어 세다"]},

{w:"drop out",pron:"/drɒp aʊt/",ko:"그만두다; 탈퇴하다; 중퇴하다",base:"other",diff:1,nu:"학교를 중퇴하거나, 경쟁·활동에서 탈퇴하거나, 사회에서 이탈하는 것.",uses:[{pat:"drop out (of school)",desc:"중퇴하다"},{pat:"drop out (of + 활동)",desc:"탈퇴하다·기권하다"}],ex:[{en:"He <em>dropped out</em> of college in his second year.",ko:"그는 대학교 2학년 때 중퇴했다.",note:"중퇴"},{en:"She <em>dropped out</em> of the race due to injury.",ko:"그녀는 부상으로 경기에서 기권했다.",note:"기권"},{en:"Several candidates <em>dropped out</em> of the election.",ko:"몇 명의 후보자가 선거에서 사퇴했다.",note:"선거"},{en:"He <em>dropped out</em> of society and went to live off the grid.",ko:"그는 사회에서 이탈해 자급자족 생활을 시작했다.",note:"이탈"},{en:"Don't <em>drop out</em> — you're so close to finishing.",ko:"그만두지 마, 끝까지 다 왔잖아.",note:"격려"}],syn:[{s:"quit",m:"그만두다"},{s:"withdraw",m:"탈퇴하다"},{s:"leave",m:"떠나다"}],rel:["dropout (n.) 중퇴자","drop out of the race 경쟁에서 탈퇴하다"]}

{w:"pick up on",pron:"/pɪk ʌp ɒn/",ko:"알아채다; 감지하다",base:"pick",diff:2,nu:"미묘한 신호·분위기·단서를 감지하거나 눈치채는 것. 예민한 감각이나 통찰력을 내포.",uses:[{pat:"pick up on + 신호",desc:"신호를 감지하다"},{pat:"pick up on + 분위기",desc:"분위기를 파악하다"}],ex:[{en:"She <em>picked up on</em> his nervousness immediately.",ko:"그녀는 그의 긴장감을 바로 눈치챘다.",note:"감지"},{en:"Dogs can <em>pick up on</em> human emotions.",ko:"개는 인간의 감정을 감지할 수 있다.",note:"동물"},{en:"I <em>picked up on</em> some tension in the room.",ko:"방 안에서 긴장감을 느꼈다.",note:"분위기"},{en:"Children often <em>pick up on</em> things adults miss.",ko:"아이들은 어른들이 놓치는 것을 종종 알아챈다.",note:"통찰"},{en:"Did you <em>pick up on</em> what he was hinting at?",ko:"그가 암시하는 것을 눈치챘어?",note:"힌트"}],syn:[{s:"detect",m:"감지하다"},{s:"notice",m:"알아채다"},{s:"sense",m:"느끼다"}],rel:["pick up signals 신호를 감지하다","read the room 분위기를 파악하다"]},
{w:"pick out",pron:"/pɪk aʊt/",ko:"고르다; 식별하다; 돋보이다",base:"pick",diff:1,nu:"여러 선택지 중에서 고르거나, 군중 속에서 특정 인물·사물을 식별하거나, 특정 부분이 돋보이는 것.",uses:[{pat:"pick out + 선택",desc:"고르다·선택하다"},{pat:"pick sb out",desc:"식별하다·알아보다"},{pat:"pick out + 색깔",desc:"돋보이다"}],ex:[{en:"Can you help me <em>pick out</em> a dress?",ko:"드레스 고르는 거 도와줄 수 있어?",note:"쇼핑"},{en:"I could <em>pick her out</em> anywhere.",ko:"어디서든 그녀를 알아볼 수 있어.",note:"식별"},{en:"The gold lettering was <em>picked out</em> against the black background.",ko:"검은 배경에 금색 글씨가 돋보였다.",note:"시각"},{en:"The teacher <em>picked out</em> his best students.",ko:"선생님이 최고 학생들을 골라냈다.",note:"선발"},{en:"She <em>picked out</em> several errors in the text.",ko:"그녀는 본문에서 오류 몇 가지를 찾아냈다.",note:"검토"}],syn:[{s:"choose",m:"고르다"},{s:"identify",m:"식별하다"},{s:"select",m:"선택하다"}],rel:["cherry-pick 선별하다","single out 특별히 고르다"]},
{w:"pick apart",pron:"/pɪk əˈpɑːrt/",ko:"꼼꼼히 분석하다; 혹평하다",base:"pick",diff:2,nu:"논거·아이디어·작품을 세부적으로 파헤치거나 결점을 하나하나 지적하는 것.",uses:[{pat:"pick apart + 논거/작품",desc:"꼼꼼히 분석하다·혹평하다"}],ex:[{en:"The lawyer <em>picked apart</em> every detail of the testimony.",ko:"변호사는 증언의 모든 세부 사항을 파헤쳤다.",note:"법정"},{en:"Critics <em>picked apart</em> his latest film.",ko:"비평가들이 그의 최신 영화를 혹평했다.",note:"비평"},{en:"She <em>picked apart</em> my argument with ease.",ko:"그녀는 내 주장을 쉽게 논파했다.",note:"토론"},{en:"Stop <em>picking apart</em> everything I say.",ko:"내가 하는 말 하나하나 꼬치꼬치 따지는 거 그만해.",note:"짜증"},{en:"The professor <em>picked apart</em> each student's essay.",ko:"교수가 각 학생의 에세이를 꼼꼼히 분석했다.",note:"교육"}],syn:[{s:"dissect",m:"해부하다"},{s:"criticize",m:"비판하다"},{s:"analyze",m:"분석하다"}],rel:["pick holes in 결점을 찾다","tear apart 완전히 분해하다"]},
{w:"pull up",pron:"/pʊl ʌp/",ko:"멈추다; 끌어올리다; 꾸짖다",base:"pull",diff:1,nu:"차가 멈추거나, 무언가를 끌어올리거나, 누군가의 잘못을 지적하는 것.",uses:[{pat:"pull up (차)",desc:"멈추다"},{pat:"pull up + 물건",desc:"끌어올리다"},{pat:"pull sb up",desc:"꾸짖다·지적하다"}],ex:[{en:"A taxi <em>pulled up</em> outside the hotel.",ko:"택시가 호텔 앞에 멈췄다.",note:"차"},{en:"He <em>pulled up</em> his socks and tried again.",ko:"그는 양말을 끌어올리고 다시 시도했다.",note:"다시 시작"},{en:"She was <em>pulled up</em> by her boss for being late.",ko:"그녀는 지각으로 상사에게 지적받았다.",note:"꾸짖기"},{en:"<em>Pull up</em> a chair and join us.",ko:"의자 당겨서 합류해.",note:"초대"},{en:"The weeds need to be <em>pulled up</em>.",ko:"잡초를 뽑아야 해.",note:"정원"}],syn:[{s:"stop",m:"멈추다"},{s:"hoist",m:"끌어올리다"},{s:"reprimand",m:"꾸짖다"}],rel:["pull up short 갑자기 멈추다","pull up one's socks 분발하다"]},
{w:"pull down",pron:"/pʊl daʊn/",ko:"내리다; 철거하다; 끌어내리다",base:"pull",diff:1,nu:"블라인드·옷을 내리거나, 건물을 철거하거나, 성과·기분을 끌어내리는 것.",uses:[{pat:"pull down + 건물",desc:"철거하다"},{pat:"pull down + 물건",desc:"아래로 내리다"},{pat:"pull sb down",desc:"끌어내리다"}],ex:[{en:"They're <em>pulling down</em> the old cinema.",ko:"낡은 영화관을 철거하고 있어.",note:"철거"},{en:"<em>Pull down</em> the blinds — it's too bright.",ko:"블라인드 내려, 너무 밝아.",note:"블라인드"},{en:"One bad grade can <em>pull down</em> your average.",ko:"성적 하나가 평균을 끌어내릴 수 있어.",note:"성적"},{en:"Negative people will <em>pull you down</em>.",ko:"부정적인 사람들이 너를 끌어내릴 거야.",note:"영향"},{en:"The old statue was <em>pulled down</em> by protesters.",ko:"시위대가 낡은 동상을 끌어내렸다.",note:"시위"}],syn:[{s:"demolish",m:"철거하다"},{s:"lower",m:"내리다"},{s:"drag down",m:"끌어내리다"}],rel:["pull down a salary 급여를 받다","pull down barriers 장벽을 없애다"]},
{w:"pull in",pron:"/pʊl ɪn/",ko:"들어오다; 벌다; 끌어당기다",base:"pull",diff:1,nu:"차·기차가 도착하거나, 돈을 벌거나, 군중·관심을 끌어당기는 것.",uses:[{pat:"pull in (차/기차)",desc:"들어오다·정차하다"},{pat:"pull in + 돈",desc:"벌다"},{pat:"pull in + 군중",desc:"끌어모으다"}],ex:[{en:"The train <em>pulled in</em> right on time.",ko:"기차가 정시에 들어왔다.",note:"기차"},{en:"She <em>pulls in</em> a six-figure salary.",ko:"그녀는 6자리 연봉을 번다.",note:"급여"},{en:"The concert <em>pulled in</em> thousands of fans.",ko:"콘서트에 수천 명의 팬이 몰렸다.",note:"관중"},{en:"He was <em>pulled in</em> for questioning.",ko:"그는 심문을 위해 불려갔다.",note:"경찰"},{en:"The advert is really <em>pulling in</em> customers.",ko:"광고가 고객을 정말 많이 끌어모으고 있어.",note:"마케팅"}],syn:[{s:"arrive",m:"도착하다"},{s:"earn",m:"벌다"},{s:"attract",m:"끌어당기다"}],rel:["pull in a profit 이익을 내다","pull into a station 역에 들어오다"]},
{w:"set back",pron:"/set bæk/",ko:"지연시키다; 후퇴시키다; 비용이 들다",base:"set",diff:2,nu:"진행을 지연시키거나, 발전을 방해하거나, 어떤 비용이 드는 것.",uses:[{pat:"set back + 진행",desc:"지연시키다"},{pat:"set sb back + 돈",desc:"~의 비용이 들다"},{pat:"setback (명사)",desc:"차질·후퇴"}],ex:[{en:"The storm <em>set back</em> construction by two weeks.",ko:"폭풍이 공사를 2주 지연시켰다.",note:"지연"},{en:"How much did that <em>set</em> you <em>back</em>?",ko:"그거 얼마 들었어?",note:"비용"},{en:"This is just a <em>setback</em> — don't give up.",ko:"이건 그냥 차질이야, 포기하지 마.",note:"격려"},{en:"The injury <em>set back</em> his recovery significantly.",ko:"부상이 그의 회복을 크게 지연시켰다.",note:"건강"},{en:"Don't let failure <em>set you back</em>.",ko:"실패가 너를 후퇴시키게 하지 마.",note:"조언"}],syn:[{s:"delay",m:"지연시키다"},{s:"hinder",m:"방해하다"},{s:"cost",m:"비용이 들다"}],rel:["setback (n.) 차질","set back the clock 시계를 되돌리다"]},
{w:"set in",pron:"/set ɪn/",ko:"시작되다; 자리 잡다",base:"set",diff:2,nu:"불쾌한 날씨·질병·분위기 등이 본격적으로 시작되거나 자리를 잡는 것.",uses:[{pat:"set in (날씨/계절)",desc:"본격적으로 시작되다"},{pat:"set in (감정/질병)",desc:"자리 잡다"}],ex:[{en:"Winter has really <em>set in</em> now.",ko:"이제 정말 겨울이 자리를 잡았어.",note:"계절"},{en:"Panic began to <em>set in</em>.",ko:"공황이 시작되기 시작했다.",note:"감정"},{en:"If the infection <em>sets in</em>, it could be serious.",ko:"감염이 자리를 잡으면 심각해질 수 있어.",note:"건강"},{en:"Boredom had <em>set in</em> after the first hour.",ko:"첫 시간 후에 지루함이 자리를 잡았다.",note:"감정"},{en:"The rot had already <em>set in</em> by the time they noticed.",ko:"그들이 알아챘을 때는 이미 부패가 자리를 잡고 있었다.",note:"부패"}],syn:[{s:"begin",m:"시작되다"},{s:"take hold",m:"자리잡다"},{s:"establish itself",m:"정착하다"}],rel:["set in stone 확정되다","boredom sets in 지루함이 밀려오다"]},
{w:"set aside",pron:"/set əˈsaɪd/",ko:"따로 떼어두다; 무시하다; 취소하다",base:"set",diff:2,nu:"시간·돈·물건을 따로 떼어두거나, 감정·차이를 무시하고 나아가거나, 판결을 취소하는 것.",uses:[{pat:"set aside + 시간/돈",desc:"따로 떼어두다"},{pat:"set aside + 차이/감정",desc:"무시하다"},{pat:"set aside + 판결",desc:"취소하다"}],ex:[{en:"<em>Set aside</em> an hour each day for exercise.",ko:"매일 운동을 위한 시간을 따로 떼어둬.",note:"시간"},{en:"Let's <em>set aside</em> our differences.",ko:"우리의 차이점은 무시하자.",note:"화해"},{en:"He <em>sets aside</em> 10% of his income every month.",ko:"그는 매달 소득의 10%를 저축한다.",note:"저축"},{en:"The verdict was <em>set aside</em> by the appeal court.",ko:"항소법원이 판결을 취소했다.",note:"법률"},{en:"<em>Setting aside</em> his behavior, the work itself is good.",ko:"그의 행동은 무시하고, 작업 자체는 훌륭하다.",note:"평가"}],syn:[{s:"reserve",m:"따로 두다"},{s:"ignore",m:"무시하다"},{s:"overturn",m:"취소하다"}],rel:["set aside time 시간을 내다","put aside 제쳐두다"]},
{w:"catch on",pron:"/kætʃ ɒn/",ko:"유행하다; 이해하다",base:"other",diff:1,nu:"아이디어·트렌드가 대중에게 퍼지거나, 개념을 이해하는 것.",uses:[{pat:"catch on (유행)",desc:"유행하다·퍼지다"},{pat:"catch on (이해)",desc:"이해하다·눈치채다"}],ex:[{en:"The new style slowly <em>caught on</em>.",ko:"새로운 스타일이 서서히 유행했다.",note:"유행"},{en:"He was slow to <em>catch on</em>, but he got it eventually.",ko:"그는 이해가 느렸지만 결국엔 알았다.",note:"이해"},{en:"The trend <em>caught on</em> quickly online.",ko:"그 트렌드가 온라인에서 빠르게 퍼졌다.",note:"SNS"},{en:"She <em>caught on</em> to what he was doing.",ko:"그녀는 그가 하는 짓을 눈치챘다.",note:"눈치"},{en:"Once the idea <em>catches on</em>, it spreads fast.",ko:"아이디어가 한번 퍼지기 시작하면 빠르게 확산된다.",note:"확산"}],syn:[{s:"become popular",m:"유행하다"},{s:"understand",m:"이해하다"},{s:"take off",m:"퍼지다"}],rel:["catch on quickly 빠르게 이해하다","catch up 따라잡다"]},
{w:"catch out",pron:"/kætʃ aʊt/",ko:"들키다; 거짓을 잡다",base:"other",diff:2,nu:"누군가의 거짓말·실수·부정행위를 발각하거나, 예상치 못한 상황에 대비하지 못해 걸리는 것.",uses:[{pat:"catch sb out",desc:"~의 거짓·실수를 들키게 하다"},{pat:"be caught out",desc:"들키다·대비 못하다"}],ex:[{en:"He was <em>caught out</em> lying to his boss.",ko:"그는 상사에게 거짓말하다 들켰다.",note:"거짓말"},{en:"The sudden question <em>caught</em> her <em>out</em>.",ko:"갑작스러운 질문에 그녀가 당황했다.",note:"당황"},{en:"Don't try to <em>catch me out</em> — I've done my research.",ko:"나 시험하려 들지 마, 충분히 조사했어.",note:"준비"},{en:"The rain <em>caught</em> us <em>out</em> without umbrellas.",ko:"우산 없이 나왔다가 비를 맞았다.",note:"준비 부족"},{en:"The journalist <em>caught out</em> the politician in a lie.",ko:"기자가 정치인의 거짓말을 잡아냈다.",note:"폭로"}],syn:[{s:"expose",m:"폭로하다"},{s:"unmask",m:"정체를 드러내다"},{s:"trap",m:"함정에 빠뜨리다"}],rel:["be caught red-handed 현행범으로 잡히다","catch sb in the act 행위 중에 잡다"]},
{w:"bring back",pron:"/brɪŋ bæk/",ko:"되살리다; 돌아오게 하다; 추억을 되살리다",base:"bring",diff:1,nu:"물건을 돌려오거나, 제도·관행을 부활시키거나, 과거의 기억을 되살리는 것.",uses:[{pat:"bring back + 물건",desc:"가져오다·돌아오다"},{pat:"bring back + 제도",desc:"부활시키다"},{pat:"bring back + 추억",desc:"추억을 되살리다"}],ex:[{en:"Can you <em>bring back</em> some souvenirs?",ko:"기념품 좀 가져올 수 있어?",note:"여행"},{en:"That song <em>brings back</em> so many memories.",ko:"그 노래가 정말 많은 추억을 되살려.",note:"추억"},{en:"The government wants to <em>bring back</em> the old law.",ko:"정부가 옛 법을 부활시키려 한다.",note:"정책"},{en:"Seeing him <em>brought back</em> feelings I'd forgotten.",ko:"그를 보자 잊고 있던 감정들이 되살아났다.",note:"감정"},{en:"<em>Bring back</em> the report when you're done.",ko:"다 끝나면 보고서 가져와.",note:"업무"}],syn:[{s:"restore",m:"되살리다"},{s:"return",m:"돌아오다"},{s:"revive",m:"부활시키다"}],rel:["bring back memories 추억을 되살리다","bring back to life 생기를 되찾다"]},
{w:"bring together",pron:"/brɪŋ təˈɡeðər/",ko:"한데 모으다; 화해시키다",base:"bring",diff:1,nu:"사람들을 한자리에 모으거나, 갈등 중인 사람들을 화해시키거나, 다양한 요소를 결합하는 것.",uses:[{pat:"bring together + 사람들",desc:"한데 모으다"},{pat:"bring together + 요소",desc:"결합하다"}],ex:[{en:"The event <em>brought together</em> people from all over the world.",ko:"행사가 전 세계 사람들을 한데 모았다.",note:"행사"},{en:"Music has the power to <em>bring people together</em>.",ko:"음악에는 사람들을 한데 모으는 힘이 있다.",note:"음악"},{en:"The mediator tried to <em>bring</em> the two sides <em>together</em>.",ko:"조정자가 양측을 화해시키려 했다.",note:"중재"},{en:"The project <em>brings together</em> art and technology.",ko:"그 프로젝트는 예술과 기술을 결합한다.",note:"융합"},{en:"Tragedy often <em>brings</em> communities <em>together</em>.",ko:"비극은 종종 공동체를 하나로 만든다.",note:"공동체"}],syn:[{s:"unite",m:"단합시키다"},{s:"gather",m:"모으다"},{s:"combine",m:"결합하다"}],rel:["bring together as one 하나로 뭉치다","come together 모이다"]},
{w:"carry off",pron:"/ˈkæri ɒf/",ko:"해내다; 가져가다",base:"other",diff:2,nu:"어렵거나 까다로운 일을 성공적으로 해내거나, 무언가를 가져가는 것.",uses:[{pat:"carry off + 어려운 일",desc:"성공적으로 해내다"},{pat:"carry off + 상/물건",desc:"가져가다"}],ex:[{en:"She <em>carried off</em> the speech perfectly.",ko:"그녀는 연설을 완벽하게 해냈다.",note:"연설"},{en:"He <em>carried off</em> the award for best actor.",ko:"그가 남우주연상을 받아 갔다.",note:"수상"},{en:"Can you really <em>carry off</em> wearing that?",ko:"그거 진짜 소화할 수 있어?",note:"패션"},{en:"The thief <em>carried off</em> the painting.",ko:"도둑이 그림을 들고 달아났다.",note:"도난"},{en:"She <em>carried off</em> the role brilliantly.",ko:"그녀는 그 역할을 훌륭하게 해냈다.",note:"연기"}],syn:[{s:"pull off",m:"해내다"},{s:"win",m:"수상하다"},{s:"execute",m:"실행하다"}],rel:["pull off 해내다","carry out 수행하다"]},
{w:"carry forward",pron:"/ˈkæri ˈfɔːrwərd/",ko:"이월하다; 계속 발전시키다",base:"other",diff:2,nu:"잔액이나 점수를 다음으로 이월하거나, 전통·아이디어를 계속 이어나가는 것.",uses:[{pat:"carry forward + 잔액",desc:"이월하다"},{pat:"carry forward + 전통",desc:"이어나가다"}],ex:[{en:"Any unused budget will be <em>carried forward</em> to next year.",ko:"미사용 예산은 내년으로 이월됩니다.",note:"회계"},{en:"She <em>carries forward</em> her grandmother's traditions.",ko:"그녀는 할머니의 전통을 이어나간다.",note:"전통"},{en:"The points can be <em>carried forward</em> to the next round.",ko:"점수는 다음 라운드로 이월될 수 있다.",note:"게임"},{en:"We need to <em>carry forward</em> the momentum.",ko:"모멘텀을 계속 유지해야 해.",note:"비즈니스"},{en:"His legacy will be <em>carried forward</em> by future generations.",ko:"그의 유산은 미래 세대에 의해 이어질 것이다.",note:"유산"}],syn:[{s:"transfer",m:"이전하다"},{s:"continue",m:"계속하다"},{s:"perpetuate",m:"이어나가다"}],rel:["carry over 이월하다","pass down 물려주다"]},
{w:"work through",pron:"/wɜːrk θruː/",ko:"해결하다; 처리하다; 극복하다",base:"other",diff:2,nu:"문제·감정·상황을 하나씩 처리하거나 극복하는 것. 시간이 걸리는 과정을 내포.",uses:[{pat:"work through + 문제",desc:"해결하다·극복하다"},{pat:"work through + 감정",desc:"감정을 처리하다"},{pat:"work through + 할 일",desc:"하나씩 처리하다"}],ex:[{en:"It takes time to <em>work through</em> grief.",ko:"슬픔을 극복하는 데는 시간이 걸린다.",note:"감정"},{en:"Let's <em>work through</em> the problem together.",ko:"함께 문제를 해결해 나가자.",note:"협력"},{en:"She's still <em>working through</em> her feelings.",ko:"그녀는 아직 감정을 처리 중이야.",note:"심리"},{en:"We have a lot of emails to <em>work through</em>.",ko:"처리해야 할 이메일이 많아.",note:"업무"},{en:"Therapy helped him <em>work through</em> his trauma.",ko:"상담치료가 트라우마 극복에 도움이 됐다.",note:"치료"}],syn:[{s:"resolve",m:"해결하다"},{s:"process",m:"처리하다"},{s:"overcome",m:"극복하다"}],rel:["work out 해결하다","get through 헤쳐나가다"]},
{w:"work on",pron:"/wɜːrk ɒn/",ko:"작업하다; 개선하다; 설득하다",base:"other",diff:1,nu:"어떤 과제·프로젝트를 진행하거나, 약점·기술을 개선하거나, 누군가를 서서히 설득하는 것.",uses:[{pat:"work on + 프로젝트",desc:"작업하다·진행하다"},{pat:"work on + 기술/약점",desc:"개선하다"},{pat:"work on sb",desc:"설득하다"}],ex:[{en:"I'm <em>working on</em> a new book.",ko:"새 책 작업 중이야.",note:"창작"},{en:"You need to <em>work on</em> your communication skills.",ko:"소통 능력을 개선해야 해.",note:"개선"},{en:"I'll <em>work on</em> him — he'll come around.",ko:"내가 설득해볼게, 결국 동의할 거야.",note:"설득"},{en:"We're <em>working on</em> a solution.",ko:"해결책을 찾고 있어.",note:"업무"},{en:"She's been <em>working on</em> her posture.",ko:"그녀는 자세를 고치려고 노력 중이야.",note:"건강"}],syn:[{s:"develop",m:"개발하다"},{s:"improve",m:"개선하다"},{s:"persuade",m:"설득하다"}],rel:["work on oneself 자신을 개선하다","work on a deal 거래를 진행하다"]},
{w:"check in",pron:"/tʃek ɪn/",ko:"체크인하다; 안부를 확인하다",base:"other",diff:1,nu:"호텔·항공기에 체크인하거나, 누군가의 상태를 확인하거나, 진행 상황을 점검하는 것.",uses:[{pat:"check in (호텔/공항)",desc:"체크인하다"},{pat:"check in on sb",desc:"안부를 확인하다"},{pat:"check in (진행)",desc:"진행 상황을 점검하다"}],ex:[{en:"We need to <em>check in</em> by 3 PM.",ko:"오후 3시까지 체크인해야 해.",note:"호텔"},{en:"I'll <em>check in on</em> you tomorrow.",ko:"내일 안부 확인할게.",note:"배려"},{en:"Let's <em>check in</em> next week on the project.",ko:"다음 주에 프로젝트 진행 상황 점검하자.",note:"업무"},{en:"She always <em>checks in</em> when she arrives.",ko:"그녀는 도착하면 항상 연락한다.",note:"연락"},{en:"<em>Check in</em> online to save time at the airport.",ko:"시간을 절약하려면 온라인 체크인 해.",note:"공항"}],syn:[{s:"register",m:"등록하다"},{s:"verify",m:"확인하다"},{s:"update",m:"상황을 알리다"}],rel:["check out 체크아웃하다","check in online 온라인 체크인"]},
{w:"switch off",pron:"/swɪtʃ ɒf/",ko:"끄다; 집중을 끊다",base:"other",diff:1,nu:"전기기기를 끄거나, 정신적으로 집중을 끊고 쉬는 것.",uses:[{pat:"switch off + 기기",desc:"끄다"},{pat:"switch off (정신적)",desc:"집중을 끊다·머리를 식히다"}],ex:[{en:"<em>Switch off</em> the lights before you leave.",ko:"나가기 전에 불 꺼.",note:"기기"},{en:"I can't <em>switch off</em> after work.",ko:"퇴근 후에도 머리를 못 끄겠어.",note:"번아웃"},{en:"Sometimes you just need to <em>switch off</em> and relax.",ko:"때로는 그냥 집중을 끊고 쉬어야 해.",note:"휴식"},{en:"<em>Switch off</em> your phone during the meeting.",ko:"회의 중 폰 꺼.",note:"예절"},{en:"He can <em>switch off</em> completely on holiday.",ko:"그는 휴가 중에 완전히 머리를 끌 수 있어.",note:"휴가"}],syn:[{s:"turn off",m:"끄다"},{s:"unwind",m:"긴장을 풀다"},{s:"disconnect",m:"접속을 끊다"}],rel:["switch on 켜다","switch off your brain 생각을 멈추다"]},

{w:"tune in",pron:"/tjuːn ɪn/",ko:"채널을 맞추다; 집중하다",base:"other",diff:1,nu:"라디오·TV 채널을 맞추거나, 누군가의 말·분위기에 집중하는 것.",uses:[{pat:"tune in (방송)",desc:"채널을 맞추다"},{pat:"tune in to + 감정",desc:"~에 집중하다"}],ex:[{en:"<em>Tune in</em> tomorrow for the final episode.",ko:"최종 에피소드는 내일 채널을 맞춰.",note:"방송"},{en:"You need to <em>tune in</em> to what your body is telling you.",ko:"몸이 하는 말에 귀를 기울여야 해.",note:"건강"},{en:"Millions of people <em>tuned in</em> to watch the game.",ko:"수백만 명이 경기를 시청하기 위해 채널을 맞췄다.",note:"스포츠"},{en:"She's really good at <em>tuning in</em> to others' feelings.",ko:"그녀는 다른 사람의 감정에 집중하는 데 정말 능해.",note:"공감"},{en:"<em>Tune in</em> next week for more.",ko:"더 많은 내용을 위해 다음 주에 채널 맞춰.",note:"방송"}],syn:[{s:"watch",m:"시청하다"},{s:"listen to",m:"듣다"},{s:"pay attention to",m:"집중하다"}],rel:["tune out 무시하다","tuned in 감각이 예민한"]},
{w:"tune out",pron:"/tjuːn aʊt/",ko:"무시하다; 집중을 끊다",base:"other",diff:2,nu:"원하지 않는 정보·소음을 의도적으로 무시하거나, 대화에서 집중을 끊는 것.",uses:[{pat:"tune out + 소음/말",desc:"무시하다·차단하다"},{pat:"tune out (집중 끊음)",desc:"집중을 끊다"}],ex:[{en:"I just <em>tune out</em> the background noise.",ko:"나는 그냥 배경 소음을 무시해.",note:"소음"},{en:"Students tend to <em>tune out</em> after 20 minutes.",ko:"학생들은 20분 후에 집중이 흐트러지는 경향이 있다.",note:"교육"},{en:"She <em>tuned out</em> his complaints.",ko:"그녀는 그의 불평을 무시했다.",note:"무시"},{en:"I completely <em>tuned out</em> during the lecture.",ko:"강의 중에 완전히 딴생각을 했어.",note:"집중"},{en:"He has the ability to <em>tune out</em> distractions.",ko:"그는 방해 요소를 무시하는 능력이 있다.",note:"집중력"}],syn:[{s:"ignore",m:"무시하다"},{s:"block out",m:"차단하다"},{s:"switch off",m:"집중을 끊다"}],rel:["tune in 집중하다","zone out 멍하게 있다"]},
{w:"step up",pron:"/step ʌp/",ko:"나서다; 강화하다; 향상되다",base:"other",diff:1,nu:"책임을 지거나 도전에 맞서거나, 노력·수준을 높이거나, 향상되는 것.",uses:[{pat:"step up (나서다)",desc:"책임을 지다·나서다"},{pat:"step up + 노력",desc:"강화하다"},{pat:"step up (향상)",desc:"향상되다"}],ex:[{en:"Someone needs to <em>step up</em> and take charge.",ko:"누군가 나서서 책임을 져야 해.",note:"리더십"},{en:"We need to <em>step up</em> our efforts.",ko:"노력을 강화해야 해.",note:"업무"},{en:"He really <em>stepped up</em> when we needed him.",ko:"필요할 때 그가 정말 나섰다.",note:"신뢰"},{en:"The company <em>stepped up</em> production.",ko:"회사가 생산을 늘렸다.",note:"생산"},{en:"She <em>stepped up</em> to the challenge.",ko:"그녀는 도전에 맞섰다.",note:"도전"}],syn:[{s:"rise to the occasion",m:"나서다"},{s:"increase",m:"늘리다"},{s:"improve",m:"향상되다"}],rel:["step up to the plate 책임을 지다","step up a gear 속도를 높이다"]},
{w:"step back",pron:"/step bæk/",ko:"물러서다; 객관적으로 보다",base:"other",diff:1,nu:"물리적으로 물러서거나, 상황을 더 객관적으로 보기 위해 거리를 두는 것.",uses:[{pat:"step back (물리적)",desc:"물러서다"},{pat:"step back (객관적)",desc:"거리를 두고 보다"}],ex:[{en:"<em>Step back</em> and look at the big picture.",ko:"물러서서 큰 그림을 봐.",note:"관점"},{en:"Sometimes you need to <em>step back</em> from a situation.",ko:"때로는 상황에서 거리를 둬야 해.",note:"조언"},{en:"<em>Step back</em> — give the artist some room.",ko:"물러서, 예술가에게 공간을 줘.",note:"물리적"},{en:"I had to <em>step back</em> and reassess.",ko:"물러서서 다시 평가해야 했어.",note:"재평가"},{en:"He <em>stepped back</em> from his role as CEO.",ko:"그는 CEO 역할에서 물러났다.",note:"은퇴"}],syn:[{s:"retreat",m:"물러서다"},{s:"distance oneself",m:"거리를 두다"},{s:"reassess",m:"재평가하다"}],rel:["take a step back 한 발 물러서다","step down 사임하다"]},
{w:"step down",pron:"/step daʊn/",ko:"사임하다; 물러나다; 낮추다",base:"other",diff:1,nu:"직위·권한에서 자발적으로 물러나거나, 수준·속도를 낮추는 것.",uses:[{pat:"step down (직위)",desc:"사임하다·물러나다"},{pat:"step down + 수준",desc:"낮추다"}],ex:[{en:"The CEO announced he would <em>step down</em>.",ko:"CEO가 사임할 것이라고 발표했다.",note:"사임"},{en:"She <em>stepped down</em> from the board.",ko:"그녀는 이사회에서 물러났다.",note:"이사회"},{en:"He <em>stepped down</em> as captain.",ko:"그는 주장직에서 물러났다.",note:"스포츠"},{en:"We need to <em>step down</em> the voltage.",ko:"전압을 낮춰야 해.",note:"기술"},{en:"It's time for the older generation to <em>step down</em>.",ko:"구세대가 물러날 때가 됐다.",note:"세대교체"}],syn:[{s:"resign",m:"사임하다"},{s:"retire",m:"은퇴하다"},{s:"reduce",m:"낮추다"}],rel:["step aside 비켜서다","stand down 물러나다"]},
{w:"sign up",pron:"/saɪn ʌp/",ko:"등록하다; 신청하다",base:"other",diff:1,nu:"서비스·강좌·조직 등에 가입하거나 신청하는 것.",uses:[{pat:"sign up for + 강좌/서비스",desc:"등록하다·신청하다"},{pat:"sign up (군대)",desc:"입대하다"}],ex:[{en:"I <em>signed up</em> for a yoga class.",ko:"요가 수업에 등록했어.",note:"등록"},{en:"<em>Sign up</em> for our newsletter.",ko:"우리 뉴스레터를 구독하세요.",note:"구독"},{en:"He <em>signed up</em> to volunteer at the shelter.",ko:"그는 보호소 자원봉사를 신청했다.",note:"봉사"},{en:"How many people have <em>signed up</em> so far?",ko:"지금까지 몇 명이 등록했어?",note:"확인"},{en:"She <em>signed up</em> for more than she could handle.",ko:"그녀는 감당할 수 없는 것까지 신청했다.",note:"과부하"}],syn:[{s:"register",m:"등록하다"},{s:"enroll",m:"수강신청하다"},{s:"subscribe",m:"구독하다"}],rel:["sign up for 등록하다","sign on 계약하다"]},
{w:"sign off",pron:"/saɪn ɒf/",ko:"승인하다; 마치다; 이만 줄이다",base:"other",diff:2,nu:"문서·작업을 공식 승인하거나, 방송·이메일을 마무리하거나, 병가를 승인하는 것.",uses:[{pat:"sign off on + 문서",desc:"승인하다"},{pat:"sign off (방송/이메일)",desc:"마무리하다"},{pat:"sign off (병가)",desc:"병가를 승인하다"}],ex:[{en:"The manager needs to <em>sign off</em> on this expense.",ko:"매니저가 이 비용을 승인해야 해.",note:"승인"},{en:"I'll <em>sign off</em> here — speak soon.",ko:"이만 줄일게, 곧 얘기해.",note:"이메일"},{en:"The doctor <em>signed</em> her <em>off</em> for two weeks.",ko:"의사가 2주 병가를 승인해줬다.",note:"병가"},{en:"The project can't proceed until the boss <em>signs off</em>.",ko:"상사가 승인하기 전까지 프로젝트를 진행할 수 없어.",note:"승인"},{en:"She <em>signed off</em> with a warm goodbye.",ko:"그녀는 따뜻한 작별 인사로 마무리했다.",note:"마무리"}],syn:[{s:"approve",m:"승인하다"},{s:"authorize",m:"허가하다"},{s:"conclude",m:"마무리하다"}],rel:["sign off on 승인하다","sign-off (n.) 승인·마무리"]},
{w:"back up",pron:"/bæk ʌp/",ko:"백업하다; 지지하다; 후진하다",base:"other",diff:1,nu:"데이터를 백업하거나, 주장을 뒷받침하거나, 차를 후진시키거나, 교통이 막히는 것.",uses:[{pat:"back up + 데이터",desc:"백업하다"},{pat:"back up + 주장",desc:"뒷받침하다"},{pat:"back up (차)",desc:"후진하다"},{pat:"traffic backs up",desc:"교통이 막히다"}],ex:[{en:"Make sure to <em>back up</em> your files.",ko:"파일 꼭 백업해.",note:"데이터"},{en:"Can you <em>back up</em> what you just said?",ko:"방금 한 말을 뒷받침할 수 있어?",note:"주장"},{en:"Could you <em>back up</em> a little?",ko:"조금 후진해줄 수 있어?",note:"차"},{en:"Traffic is <em>backing up</em> on the highway.",ko:"고속도로에 교통이 막히고 있어.",note:"교통"},{en:"I'll <em>back you up</em> on this.",ko:"이 문제에서 네 편을 들어줄게.",note:"지지"}],syn:[{s:"support",m:"지지하다"},{s:"reverse",m:"후진하다"},{s:"save",m:"저장하다"}],rel:["backup (n.) 백업","back up a claim 주장을 뒷받침하다"]},
{w:"face up to",pron:"/feɪs ʌp tuː/",ko:"~에 직면하다; 책임지다",base:"other",diff:2,nu:"불쾌하거나 어려운 현실·책임을 회피하지 않고 직면하는 것.",uses:[{pat:"face up to + 현실",desc:"~에 직면하다"},{pat:"face up to + 책임",desc:"책임을 지다"}],ex:[{en:"It's time to <em>face up to</em> your responsibilities.",ko:"책임을 직면할 때야.",note:"책임"},{en:"He finally <em>faced up to</em> the truth.",ko:"그는 마침내 사실을 직면했다.",note:"진실"},{en:"She couldn't <em>face up to</em> her mistakes.",ko:"그녀는 자신의 실수를 직면하지 못했다.",note:"실수"},{en:"You have to <em>face up to</em> the fact that it's over.",ko:"끝났다는 사실을 직면해야 해.",note:"현실"},{en:"<em>Face up to</em> your fears — it gets easier.",ko:"두려움에 직면해, 점점 쉬워져.",note:"성장"}],syn:[{s:"confront",m:"직면하다"},{s:"accept",m:"받아들이다"},{s:"acknowledge",m:"인정하다"}],rel:["face the music 결과를 받아들이다","come to terms with 받아들이다"]},
{w:"opt out",pron:"/ɒpt aʊt/",ko:"거부하다; 빠지다",base:"other",diff:2,nu:"의무·시스템·활동에서 빠져나오거나 참여를 거부하는 것. 'opt in'의 반대.",uses:[{pat:"opt out of + 시스템",desc:"~에서 빠지다"},{pat:"opt out (활동)",desc:"참여를 거부하다"}],ex:[{en:"You can <em>opt out</em> of receiving emails.",ko:"이메일 수신을 거부할 수 있어.",note:"이메일"},{en:"She decided to <em>opt out</em> of the pension scheme.",ko:"그녀는 연금 제도에서 빠지기로 했다.",note:"연금"},{en:"Employees can <em>opt out</em> of overtime.",ko:"직원들은 초과 근무를 거부할 수 있다.",note:"업무"},{en:"He <em>opted out</em> of the rat race.",ko:"그는 치열한 경쟁에서 빠졌다.",note:"삶"},{en:"You can always <em>opt out</em> if you change your mind.",ko:"마음이 바뀌면 언제든 빠져나올 수 있어.",note:"선택"}],syn:[{s:"withdraw",m:"빠져나오다"},{s:"decline",m:"거절하다"},{s:"exit",m:"나가다"}],rel:["opt in 참여하다","opt for 선택하다"]},
{w:"opt in",pron:"/ɒpt ɪn/",ko:"참여를 선택하다; 동의하다",base:"other",diff:2,nu:"자발적으로 시스템·서비스·활동에 참여를 선택하는 것. 'opt out'의 반대.",uses:[{pat:"opt in to + 서비스",desc:"~에 참여하다·동의하다"}],ex:[{en:"You have to actively <em>opt in</em> to receive updates.",ko:"업데이트를 받으려면 직접 동의해야 해.",note:"서비스"},{en:"Only 30% of employees <em>opted in</em> to the scheme.",ko:"직원의 30%만 그 제도에 참여했다.",note:"제도"},{en:"<em>Opt in</em> to our loyalty program for discounts.",ko:"할인을 위해 우리 멤버십 프로그램에 가입하세요.",note:"마케팅"},{en:"She <em>opted in</em> to the clinical trial.",ko:"그녀는 임상시험 참여에 동의했다.",note:"의료"},{en:"Users must choose to <em>opt in</em>.",ko:"사용자가 직접 참여를 선택해야 한다.",note:"정책"}],syn:[{s:"join",m:"참여하다"},{s:"agree",m:"동의하다"},{s:"sign up",m:"신청하다"}],rel:["opt out 빠지다","opt for 선택하다"]},
{w:"log in",pron:"/lɒɡ ɪn/",ko:"로그인하다",base:"other",diff:1,nu:"컴퓨터 시스템·앱·웹사이트에 계정 정보를 입력하고 접속하는 것.",uses:[{pat:"log in to + 시스템",desc:"로그인하다"},{pat:"log in with",desc:"~로 로그인하다"}],ex:[{en:"<em>Log in</em> with your email and password.",ko:"이메일과 비밀번호로 로그인하세요.",note:"인증"},{en:"I can't <em>log in</em> to my account.",ko:"계정에 로그인할 수 없어.",note:"문제"},{en:"She <em>logged in</em> remotely from home.",ko:"그녀는 집에서 원격으로 로그인했다.",note:"원격"},{en:"<em>Log in</em> to check your messages.",ko:"메시지를 확인하려면 로그인하세요.",note:"안내"},{en:"You need to <em>log in</em> every 24 hours.",ko:"24시간마다 로그인해야 해.",note:"보안"}],syn:[{s:"sign in",m:"로그인하다"},{s:"access",m:"접속하다"},{s:"authenticate",m:"인증하다"}],rel:["log out 로그아웃하다","log in credentials 로그인 정보"]},
{w:"log out",pron:"/lɒɡ aʊt/",ko:"로그아웃하다",base:"other",diff:1,nu:"컴퓨터 시스템·앱에서 접속을 종료하는 것.",uses:[{pat:"log out (of + 시스템)",desc:"로그아웃하다"}],ex:[{en:"Always <em>log out</em> on shared computers.",ko:"공용 컴퓨터에서는 항상 로그아웃해.",note:"보안"},{en:"She <em>logged out</em> and went home.",ko:"그녀는 로그아웃하고 집에 갔다.",note:"퇴근"},{en:"Don't forget to <em>log out</em> of your account.",ko:"계정에서 로그아웃하는 것 잊지 마.",note:"보안"},{en:"He was automatically <em>logged out</em> after inactivity.",ko:"그는 비활동으로 자동 로그아웃됐다.",note:"자동"},{en:"<em>Log out</em> and log back in to fix the issue.",ko:"로그아웃 후 다시 로그인하면 문제가 해결될 거야.",note:"해결"}],syn:[{s:"sign out",m:"로그아웃하다"},{s:"disconnect",m:"연결을 끊다"},{s:"exit",m:"나가다"}],rel:["log in 로그인하다","sign out 로그아웃하다"]},
{w:"burn out",pron:"/bɜːrn aʊt/",ko:"번아웃되다; 다 타버리다",base:"other",diff:1,nu:"과로로 심신이 지쳐 탈진하거나, 불·전구가 다 타버리는 것.",uses:[{pat:"burn out (사람)",desc:"번아웃되다"},{pat:"burn out (불/전구)",desc:"다 타버리다"}],ex:[{en:"She <em>burned out</em> after working 80-hour weeks.",ko:"주 80시간 일하다가 번아웃됐어.",note:"번아웃"},{en:"The candle <em>burned out</em> in the night.",ko:"촛불이 밤새 다 타버렸다.",note:"불"},{en:"Take breaks or you'll <em>burn out</em>.",ko:"휴식을 취해, 안 그러면 번아웃돼.",note:"조언"},{en:"The lightbulb has <em>burned out</em>.",ko:"전구가 다 나갔어.",note:"전구"},{en:"Many doctors <em>burn out</em> within five years.",ko:"많은 의사들이 5년 안에 번아웃된다.",note:"직업"}],syn:[{s:"exhaust oneself",m:"탈진하다"},{s:"wear out",m:"지치다"},{s:"fizzle out",m:"서서히 꺼지다"}],rel:["burnout (n.) 번아웃","burn the candle at both ends 무리하다"]},
{w:"fade away",pron:"/feɪd əˈweɪ/",ko:"서서히 사라지다; 희미해지다",base:"other",diff:1,nu:"소리·빛·기억·사람이 서서히 사라지거나 희미해지는 것.",uses:[{pat:"fade away (소리/빛)",desc:"서서히 사라지다"},{pat:"fade away (사람/기억)",desc:"서서히 잊히다"}],ex:[{en:"The music slowly <em>faded away</em>.",ko:"음악이 서서히 사라졌다.",note:"소리"},{en:"The memories began to <em>fade away</em>.",ko:"기억들이 희미해지기 시작했다.",note:"기억"},{en:"He just <em>faded away</em> after the scandal.",ko:"스캔들 이후 그는 서서히 사라졌다.",note:"명성"},{en:"The pain slowly <em>faded away</em>.",ko:"고통이 서서히 사라졌다.",note:"건강"},{en:"Old traditions <em>fade away</em> over time.",ko:"오래된 전통들은 시간이 지나면서 사라진다.",note:"문화"}],syn:[{s:"disappear",m:"사라지다"},{s:"diminish",m:"줄어들다"},{s:"vanish",m:"없어지다"}],rel:["fade out 서서히 사라지다","die away 서서히 꺼지다"]}
