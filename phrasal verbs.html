{w:"hang on",pron:"/hæŋ ɒn/",ko:"기다리다; 버티다; 잡다",base:"other",diff:1,nu:"잠깐 기다리거나, 어려운 상황을 끝까지 버티거나, 무언가를 꽉 잡는 것.",uses:[{pat:"hang on (기다리다)",desc:"잠깐 기다리다"},{pat:"hang on (버티다)",desc:"힘든 상황을 버티다"},{pat:"hang on to sth",desc:"꽉 잡다·유지하다"}],ex:[{en:"<em>Hang on</em> — I'll be right back.",ko:"잠깐만, 금방 돌아올게.",note:"기다림"},{en:"Just <em>hang on</em> a little longer.",ko:"조금만 더 버텨.",note:"격려"},{en:"<em>Hang on to</em> your ticket.",ko:"티켓 잘 갖고 있어.",note:"보관"},{en:"<em>Hang on</em> — something's not right here.",ko:"잠깐, 뭔가 이상한데.",note:"의심"},{en:"She <em>hung on</em> every word he said.",ko:"그녀는 그의 말 한마디 한마디에 집중했다.",note:"집중"}],syn:[{s:"wait",m:"기다리다"},{s:"hold on",m:"기다리다"},{s:"persevere",m:"버티다"}],rel:["hang on a minute 잠깐만","hang on to hope 희망을 잃지 않다","hang on every word 말 한마디에 집중하다"]},
{w:"hang up",pron:"/hæŋ ʌp/",ko:"전화를 끊다; 걸다",base:"other",diff:1,nu:"전화를 끊거나, 옷·그림 등을 벽에 걸거나, 문제가 생겨 막히는 것.",uses:[{pat:"hang up (전화)",desc:"전화를 끊다"},{pat:"hang up + 물건",desc:"걸다"},{pat:"hung up on",desc:"~에 집착하다"}],ex:[{en:"She <em>hung up</em> without saying goodbye.",ko:"그녀는 작별 인사도 없이 전화를 끊었다.",note:"전화"},{en:"<em>Hang up</em> your coat when you come in.",ko:"들어오면 코트 걸어.",note:"정리"},{en:"Don't <em>hang up</em> on me!",ko:"나한테 전화 끊지 마!",note:"화"},{en:"He's still <em>hung up on</em> his ex.",ko:"그는 아직도 전 여자친구에게 집착하고 있어.",note:"집착"},{en:"Let me <em>hang up</em> these pictures.",ko:"이 그림들 좀 걸어줄게.",note:"인테리어"}],syn:[{s:"disconnect",m:"연결을 끊다"},{s:"put up",m:"걸다"},{s:"obsess over",m:"집착하다"}],rel:["hang up the phone 전화를 끊다","hung up on 집착하는","hang up one's boots 은퇴하다"]},
{w:"hang out",pron:"/hæŋ aʊt/",ko:"어울리다; 시간을 보내다",base:"other",diff:1,nu:"친구들과 편안하게 어울리거나 시간을 보내는 것. 격식 없는 모임.",uses:[{pat:"hang out with + 사람",desc:"~와 어울리다"},{pat:"hang out (장소)",desc:"~에서 시간을 보내다"}],ex:[{en:"We used to <em>hang out</em> at the park after school.",ko:"우리는 방과 후 공원에서 어울리곤 했어.",note:"학창시절"},{en:"Do you want to <em>hang out</em> this weekend?",ko:"이번 주말에 같이 놀래?",note:"약속"},{en:"He just likes to <em>hang out</em> at home.",ko:"그는 그냥 집에서 시간 보내는 걸 좋아해.",note:"집순이"},{en:"We <em>hung out</em> all day without a plan.",ko:"우리는 계획 없이 하루 종일 어울렸어.",note:"자유로운 시간"},{en:"Who do you usually <em>hang out</em> with?",ko:"보통 누구랑 어울려?",note:"친구"}],syn:[{s:"spend time",m:"시간을 보내다"},{s:"socialize",m:"어울리다"},{s:"chill",m:"편하게 있다"}],rel:["hangout (n.) 아지트","hang around 어슬렁거리다","hang with 어울리다"]},
{w:"hang around",pron:"/hæŋ əˈraʊnd/",ko:"어슬렁거리다; 기다리다; 어울리다",base:"other",diff:1,nu:"목적 없이 어슬렁거리거나, 누군가를 기다리거나, 특정 사람들과 자주 어울리는 것.",uses:[{pat:"hang around (어슬렁)",desc:"목적 없이 있다"},{pat:"hang around with + 사람",desc:"~와 자주 어울리다"},{pat:"hang around (기다리다)",desc:"기다리다"}],ex:[{en:"Stop <em>hanging around</em> and do something useful.",ko:"어슬렁거리지 말고 뭔가 유용한 일 해.",note:"빈둥"},{en:"He <em>hangs around</em> with the wrong crowd.",ko:"그는 나쁜 무리와 어울린다.",note:"친구"},{en:"I <em>hung around</em> for an hour but he never showed.",ko:"한 시간 기다렸는데 그는 안 나타났어.",note:"기다림"},{en:"Don't <em>hang around</em> — we're late!",ko:"꾸물거리지 마, 늦었어!",note:"재촉"},{en:"She tends to <em>hang around</em> after class.",ko:"그녀는 수업 후에 남아 있는 경향이 있다.",note:"학교"}],syn:[{s:"loiter",m:"어슬렁거리다"},{s:"wait",m:"기다리다"},{s:"associate with",m:"어울리다"}],rel:["hang out 어울리다","hang about 어슬렁거리다 (영국식)"]},
{w:"hang in there",pron:"/hæŋ ɪn ðeər/",ko:"버텨라; 힘내",base:"other",diff:1,nu:"어려운 상황에서 포기하지 말고 끝까지 버티라는 격려 표현.",uses:[{pat:"hang in there!",desc:"버텨!·힘내!"}],ex:[{en:"<em>Hang in there</em> — it'll get better.",ko:"버텨, 나아질 거야.",note:"격려"},{en:"I know it's tough, but just <em>hang in there</em>.",ko:"힘든 거 알지만 그냥 버텨.",note:"위로"},{en:"<em>Hang in there</em> — only one more week to go.",ko:"힘내, 딱 일주일만 더야.",note:"마지막 고비"},{en:"She told herself to <em>hang in there</em>.",ko:"그녀는 스스로 버티라고 다독였다.",note:"자기 격려"},{en:"Everyone is rooting for you — just <em>hang in there</em>.",ko:"모두 응원하고 있어, 그냥 버텨.",note:"응원"}],syn:[{s:"hold on",m:"버티다"},{s:"persevere",m:"끈기 있게 하다"},{s:"keep going",m:"계속하다"}],rel:["hold on 버티다","keep going 계속하다","don't give up 포기하지 마"]},
{w:"keep out",pron:"/kiːp aʊt/",ko:"들어오지 못하게 하다; 관여하지 않다",base:"keep",diff:1,nu:"어떤 장소나 상황에 들어오지 못하게 하거나, 자신이 관여하지 않는 것.",uses:[{pat:"keep sb/sth out",desc:"들어오지 못하게 하다"},{pat:"keep out of + 일",desc:"~에 관여하지 않다"}],ex:[{en:"<em>Keep out!</em> This is private property.",ko:"출입 금지! 이건 사유지야.",note:"경고"},{en:"The coat <em>keeps</em> the cold <em>out</em>.",ko:"코트가 추위를 막아준다.",note:"방한"},{en:"<em>Keep</em> the dog <em>out</em> of the garden.",ko:"개가 정원에 들어오지 못하게 해.",note:"반려동물"},{en:"<em>Keep out of</em> my business.",ko:"내 일에 관여하지 마.",note:"경고"},{en:"Sunscreen helps <em>keep out</em> harmful UV rays.",ko:"선크림은 해로운 자외선을 차단하는 데 도움이 돼.",note:"건강"}],syn:[{s:"exclude",m:"배제하다"},{s:"block",m:"막다"},{s:"bar",m:"출입을 막다"}],rel:["keep out of trouble 문제에 끼어들지 않다","keep out sign 출입금지 표지"]},
{w:"keep to",pron:"/kiːp tuː/",ko:"~을 지키다; ~만 다니다",base:"keep",diff:2,nu:"약속·계획·규칙을 지키거나, 특정 장소·주제만 이용하는 것.",uses:[{pat:"keep to + 약속/계획",desc:"~을 지키다"},{pat:"keep to + 경로/주제",desc:"~만 따르다"}],ex:[{en:"<em>Keep to</em> the path — it's dangerous off-trail.",ko:"길에서 벗어나지 마, 위험해.",note:"등산"},{en:"Please <em>keep to</em> the point.",ko:"요점만 말해주세요.",note:"집중"},{en:"She <em>keeps to</em> herself mostly.",ko:"그녀는 대부분 혼자 지내.",note:"내향"},{en:"<em>Keep to</em> the schedule and we'll be fine.",ko:"일정을 지키면 괜찮을 거야.",note:"계획"},{en:"He <em>kept to</em> his word.",ko:"그는 약속을 지켰다.",note:"신뢰"}],syn:[{s:"stick to",m:"지키다"},{s:"adhere to",m:"따르다"},{s:"follow",m:"따르다"}],rel:["keep to oneself 혼자 지내다","stick to the plan 계획을 지키다"]},
{w:"let in",pron:"/let ɪn/",ko:"들여보내다; 받아들이다",base:"let",diff:1,nu:"문을 열어 들여보내거나, 빛·공기를 들이거나, 비밀을 공유하는 것.",uses:[{pat:"let sb in",desc:"들여보내다"},{pat:"let in + 빛/공기",desc:"들이다"},{pat:"let sb in on",desc:"비밀을 공유하다"}],ex:[{en:"Can you <em>let me in</em>? I forgot my key.",ko:"들여보내줄 수 있어? 열쇠 두고 왔어.",note:"문"},{en:"Open the window to <em>let in</em> some air.",ko:"공기를 들이기 위해 창문 열어.",note:"환기"},{en:"She <em>let me in on</em> a secret.",ko:"그녀가 비밀을 털어놨어.",note:"비밀"},{en:"Don't <em>let in</em> strangers.",ko:"낯선 사람은 들이지 마.",note:"안전"},{en:"The curtains <em>let in</em> a lot of light.",ko:"커튼이 빛을 많이 들인다.",note:"빛"}],syn:[{s:"admit",m:"들여보내다"},{s:"allow in",m:"들어오게 하다"},{s:"share",m:"공유하다"}],rel:["let out 나가게 하다","let sb into a secret 비밀을 알려주다"]},
{w:"let out",pron:"/let aʊt/",ko:"나가게 하다; 소리를 내다; 풀어주다",base:"let",diff:1,nu:"사람·동물을 나가게 하거나, 소리를 내거나, 옷을 넓게 수선하는 것.",uses:[{pat:"let sb/sth out",desc:"나가게 하다"},{pat:"let out + 소리",desc:"소리를 내다"},{pat:"let out (수업/수감)",desc:"끝나다·석방하다"}],ex:[{en:"Can you <em>let the dog out</em>?",ko:"개 좀 내보내줄 수 있어?",note:"반려동물"},{en:"She <em>let out</em> a scream.",ko:"그녀가 비명을 질렀다.",note:"소리"},{en:"School <em>lets out</em> at 3 PM.",ko:"학교가 오후 3시에 끝난다.",note:"하교"},{en:"He was <em>let out</em> of prison early.",ko:"그는 감옥에서 조기 석방됐다.",note:"석방"},{en:"I need to <em>let out</em> this jacket — it's too tight.",ko:"이 재킷 넓혀야 해, 너무 꽉 껴.",note:"수선"}],syn:[{s:"release",m:"풀어주다"},{s:"emit",m:"발산하다"},{s:"free",m:"자유롭게 하다"}],rel:["let in 들여보내다","let loose 풀어주다"]},
{w:"let off",pron:"/let ɒf/",ko:"봐주다; 폭발시키다; 내려주다",base:"let",diff:1,nu:"처벌 없이 봐주거나, 불꽃·총을 쏘거나, 차에서 내려주는 것.",uses:[{pat:"let sb off",desc:"봐주다·처벌하지 않다"},{pat:"let off + 폭발물",desc:"폭발시키다"},{pat:"let sb off (차)",desc:"내려주다"}],ex:[{en:"The teacher <em>let him off</em> with a warning.",ko:"선생님이 경고만으로 봐줬다.",note:"봐주기"},{en:"They <em>let off</em> fireworks at midnight.",ko:"자정에 불꽃놀이를 터뜨렸다.",note:"불꽃"},{en:"<em>Let me off</em> at the next stop.",ko:"다음 정거장에서 내려줘.",note:"하차"},{en:"I'll <em>let you off</em> this time.",ko:"이번만 봐줄게.",note:"경고"},{en:"The gun accidentally <em>went off</em>.",ko:"총이 실수로 발사됐다.",note:"사고"}],syn:[{s:"excuse",m:"봐주다"},{s:"fire",m:"발사하다"},{s:"drop off",m:"내려주다"}],rel:["let off steam 화를 발산하다","get off lightly 가볍게 넘어가다"]},
{w:"let up",pron:"/let ʌp/",ko:"약해지다; 그치다; 봐주다",base:"let",diff:2,nu:"비·눈·바람이 약해지거나, 압박·노력이 줄어들거나, 누군가를 더 이상 괴롭히지 않는 것.",uses:[{pat:"let up (날씨/강도)",desc:"약해지다·그치다"},{pat:"let up on sb",desc:"그만 괴롭히다"}],ex:[{en:"The rain finally <em>let up</em>.",ko:"비가 마침내 그쳤다.",note:"날씨"},{en:"Don't <em>let up</em> — keep the pressure on.",ko:"늦추지 마, 계속 압박해.",note:"경쟁"},{en:"Can you <em>let up on</em> him a bit?",ko:"그를 좀 봐줄 수 없어?",note:"압박"},{en:"The wind finally <em>let up</em> after the storm.",ko:"폭풍이 지나고 바람이 마침내 약해졌다.",note:"바람"},{en:"She never <em>lets up</em> — she's incredibly driven.",ko:"그녀는 절대 늦추지 않아, 정말 열정적이야.",note:"근성"}],syn:[{s:"ease up",m:"약해지다"},{s:"subside",m:"가라앉다"},{s:"relent",m:"누그러지다"}],rel:["ease up 줄어들다","back off 물러서다"]},
{w:"show through",pron:"/ʃəʊ θruː/",ko:"비쳐 보이다; 드러나다",base:"other",diff:2,nu:"속이 비쳐 보이거나, 감추려 했던 감정·성격이 결국 드러나는 것.",uses:[{pat:"show through (물건)",desc:"비쳐 보이다"},{pat:"show through (감정/성격)",desc:"드러나다"}],ex:[{en:"Your bra strap is <em>showing through</em> your shirt.",ko:"셔츠에 브라 끈이 비쳐 보여.",note:"옷"},{en:"Her real feelings <em>showed through</em>.",ko:"그녀의 진짜 감정이 드러났다.",note:"감정"},{en:"His passion <em>shows through</em> in his work.",ko:"그의 열정이 작업에서 드러난다.",note:"성격"},{en:"The pencil marks <em>show through</em> the paint.",ko:"페인트 아래로 연필 자국이 비쳐 보인다.",note:"미술"},{en:"No matter how hard she tried, the sadness <em>showed through</em>.",ko:"아무리 노력해도 슬픔이 드러났다.",note:"감정"}],syn:[{s:"be visible",m:"보이다"},{s:"reveal",m:"드러내다"},{s:"come through",m:"드러나다"}],rel:["see through 꿰뚫어 보다","shine through 빛나다"]},
{w:"move on",pron:"/muːv ɒn/",ko:"앞으로 나아가다; 화제를 바꾸다",base:"other",diff:1,nu:"어떤 상황·관계·화제에서 벗어나 앞으로 나아가는 것.",uses:[{pat:"move on (삶)",desc:"앞으로 나아가다"},{pat:"move on (화제)",desc:"다음 주제로 넘어가다"},{pat:"move on from",desc:"~에서 벗어나다"}],ex:[{en:"It's time to <em>move on</em>.",ko:"앞으로 나아갈 시간이야.",note:"새 출발"},{en:"Let's <em>move on</em> to the next topic.",ko:"다음 주제로 넘어가죠.",note:"회의"},{en:"She found it hard to <em>move on</em> after the divorce.",ko:"그녀는 이혼 후 앞으로 나아가기가 힘들었다.",note:"이별"},{en:"<em>Move on</em>! Nothing to see here.",ko:"지나가세요, 볼 게 없어요.",note:"구경꾼"},{en:"He <em>moved on</em> from his old job to something better.",ko:"그는 더 좋은 것을 위해 예전 직장에서 나왔다.",note:"이직"}],syn:[{s:"progress",m:"나아가다"},{s:"get over",m:"극복하다"},{s:"continue",m:"계속하다"}],rel:["move forward 앞으로 나아가다","let go 놓아주다"]},
{w:"move in",pron:"/muːv ɪn/",ko:"이사 들어오다; 접근하다",base:"other",diff:1,nu:"새 집에 이사 오거나, 경쟁자·경찰 등이 접근하는 것.",uses:[{pat:"move in (이사)",desc:"이사 들어오다"},{pat:"move in with sb",desc:"~와 함께 살다"},{pat:"move in (접근)",desc:"접근하다"}],ex:[{en:"We <em>moved in</em> last Saturday.",ko:"지난 토요일에 이사 들어왔어.",note:"이사"},{en:"Are you going to <em>move in</em> with your partner?",ko:"파트너랑 함께 살 거야?",note:"동거"},{en:"Police <em>moved in</em> to disperse the crowd.",ko:"경찰이 군중을 해산시키기 위해 접근했다.",note:"경찰"},{en:"A new family has <em>moved in</em> next door.",ko:"옆집에 새 가족이 이사 왔어.",note:"이웃"},{en:"He <em>moved in</em> on the opportunity fast.",ko:"그는 기회를 빠르게 잡았다.",note:"기회"}],syn:[{s:"take up residence",m:"입주하다"},{s:"approach",m:"접근하다"},{s:"settle in",m:"정착하다"}],rel:["move out 이사 나가다","move in together 함께 살다"]},
{w:"move out",pron:"/muːv aʊt/",ko:"이사 나가다; 떠나다",base:"other",diff:1,nu:"살던 곳에서 이사 나가거나, 자리·상황을 떠나는 것.",uses:[{pat:"move out (이사)",desc:"이사 나가다"},{pat:"move out of",desc:"~에서 나가다"}],ex:[{en:"She <em>moved out</em> when she turned 18.",ko:"그녀는 18살이 되자 이사 나갔다.",note:"독립"},{en:"We need to <em>move out</em> by the end of the month.",ko:"이달 말까지 이사 나가야 해.",note:"이사"},{en:"He <em>moved out</em> of his comfort zone.",ko:"그는 편안한 영역에서 나왔다.",note:"성장"},{en:"The old tenants <em>moved out</em> last week.",ko:"예전 세입자들이 지난주에 이사 나갔어.",note:"임대"},{en:"It's time to <em>move out</em> of your parents' house.",ko:"부모님 집에서 독립할 때야.",note:"독립"}],syn:[{s:"leave",m:"떠나다"},{s:"vacate",m:"비우다"},{s:"depart",m:"출발하다"}],rel:["move in 이사 들어오다","pack up and leave 짐 싸서 떠나다"]},
{w:"move up",pron:"/muːv ʌp/",ko:"올라가다; 승진하다; 자리를 비켜주다",base:"other",diff:1,nu:"직위나 순위가 올라가거나, 자리를 앞쪽으로 옮겨 공간을 만드는 것.",uses:[{pat:"move up (직위/순위)",desc:"올라가다·승진하다"},{pat:"move up (자리)",desc:"앞으로 이동하다"}],ex:[{en:"She <em>moved up</em> quickly in the company.",ko:"그녀는 회사에서 빠르게 승진했다.",note:"승진"},{en:"Can you <em>move up</em> a bit so I can sit down?",ko:"내가 앉을 수 있게 조금 올라가줄 수 있어?",note:"자리"},{en:"The team <em>moved up</em> to second place.",ko:"팀이 2위로 올라갔다.",note:"순위"},{en:"He <em>moved up</em> the ladder fast.",ko:"그는 빠르게 출세했다.",note:"성공"},{en:"<em>Move up</em> — there's room at the front.",ko:"앞으로 가봐, 앞에 자리 있어.",note:"공간"}],syn:[{s:"advance",m:"앞으로 나아가다"},{s:"be promoted",m:"승진하다"},{s:"rise",m:"오르다"}],rel:["move up in the world 출세하다","move up a gear 속도를 높이다"]},
{w:"wake up",pron:"/weɪk ʌp/",ko:"잠에서 깨다; 정신 차리다",base:"other",diff:1,nu:"잠에서 깨거나, 현실을 깨닫고 정신을 차리거나, 누군가를 깨우는 것.",uses:[{pat:"wake up (기상)",desc:"잠에서 깨다"},{pat:"wake up! (경고)",desc:"정신 차려!"},{pat:"wake sb up",desc:"깨우다"}],ex:[{en:"I <em>woke up</em> at 7 this morning.",ko:"오늘 아침 7시에 일어났어.",note:"기상"},{en:"<em>Wake up</em>! You're missing the point.",ko:"정신 차려! 핵심을 놓치고 있잖아.",note:"경고"},{en:"The noise <em>woke me up</em>.",ko:"소음에 잠이 깼다.",note:"방해"},{en:"She <em>woke up</em> to the reality of her situation.",ko:"그녀는 자신의 상황의 현실을 깨달았다.",note:"깨달음"},{en:"Could you <em>wake me up</em> at 6?",ko:"6시에 깨워줄 수 있어?",note:"부탁"}],syn:[{s:"get up",m:"일어나다"},{s:"arise",m:"기상하다"},{s:"rouse",m:"깨우다"}],rel:["wake-up call 경종","wake up and smell the coffee 현실을 직시해"]},
{w:"stay up",pron:"/steɪ ʌp/",ko:"안 자다; 늦게까지 깨어있다",base:"other",diff:1,nu:"자지 않고 늦게까지 깨어 있거나, 물건이 제자리를 유지하는 것.",uses:[{pat:"stay up late",desc:"늦게까지 깨어있다"},{pat:"stay up (물건)",desc:"제자리를 유지하다"}],ex:[{en:"I <em>stayed up</em> all night studying.",ko:"밤새 공부하느라 잠을 못 잤어.",note:"공부"},{en:"Don't <em>stay up</em> too late.",ko:"너무 늦게까지 자지 마.",note:"조언"},{en:"The kids wanted to <em>stay up</em> and watch the game.",ko:"아이들이 경기를 보려고 안 자려 했다.",note:"아이들"},{en:"My hair won't <em>stay up</em>.",ko:"머리가 유지가 안 돼.",note:"헤어"},{en:"She <em>stayed up</em> worrying about him.",ko:"그녀는 그 걱정으로 잠을 못 잤다.",note:"걱정"}],syn:[{s:"keep awake",m:"깨어있다"},{s:"sit up",m:"앉아서 있다"},{s:"remain up",m:"깨어있다"}],rel:["pull an all-nighter 밤새다","stay up all night 밤새 깨어있다"]},
{w:"stay in",pron:"/steɪ ɪn/",ko:"집에 있다; 안에 머물다",base:"other",diff:1,nu:"외출하지 않고 집·건물 안에 머무는 것.",uses:[{pat:"stay in (집)",desc:"집에 있다"},{pat:"stay in + 제자리",desc:"제자리를 유지하다"}],ex:[{en:"Let's <em>stay in</em> tonight — I'm tired.",ko:"오늘은 집에 있자, 피곤해.",note:"집콕"},{en:"The dentist told me to <em>stay in</em> bed.",ko:"치과 의사가 침대에 있으라고 했어.",note:"휴식"},{en:"She decided to <em>stay in</em> and read.",ko:"그녀는 집에서 책을 읽기로 했다.",note:"여가"},{en:"The screw won't <em>stay in</em>.",ko:"나사가 제자리를 유지하지 않아.",note:"수리"},{en:"I prefer to <em>stay in</em> on weeknights.",ko:"평일 저녁은 집에 있는 걸 더 좋아해.",note:"취향"}],syn:[{s:"remain indoors",m:"실내에 머물다"},{s:"stay home",m:"집에 있다"}],rel:["stay out 밖에 있다","stay in touch 연락을 유지하다"]},
{w:"stay out",pron:"/steɪ aʊt/",ko:"밖에 있다; 관여하지 않다",base:"other",diff:1,nu:"집에 돌아오지 않고 밖에 있거나, 어떤 문제·상황에 관여하지 않는 것.",uses:[{pat:"stay out (밖)",desc:"밖에 있다·귀가하지 않다"},{pat:"stay out of + 일",desc:"~에 관여하지 않다"}],ex:[{en:"She <em>stayed out</em> until 3 AM.",ko:"그녀는 새벽 3시까지 밖에 있었다.",note:"밤 외출"},{en:"<em>Stay out of</em> this — it's not your problem.",ko:"이 일에 끼어들지 마, 네 문제가 아니야.",note:"경고"},{en:"The dog <em>stayed out</em> in the rain.",ko:"개가 빗속에서 밖에 있었다.",note:"동물"},{en:"Try to <em>stay out of</em> trouble.",ko:"문제에 끼어들지 않으려 해.",note:"조언"},{en:"I'm going to <em>stay out</em> of their argument.",ko:"그들의 논쟁에는 끼어들지 않을 거야.",note:"방관"}],syn:[{s:"remain outside",m:"밖에 있다"},{s:"keep out of",m:"~에 관여하지 않다"},{s:"avoid",m:"피하다"}],rel:["stay in 집에 있다","stay out of trouble 문제를 피하다"]},
{w:"wind up",pron:"/waɪnd ʌp/",ko:"결국 ~이 되다; 마무리하다; 태엽을 감다",base:"other",diff:2,nu:"의도치 않게 어떤 상황이 되거나, 일을 마무리하거나, 태엽·시계를 감거나, 누군가를 약 올리는 것.",uses:[{pat:"wind up + V-ing/in",desc:"결국 ~이 되다"},{pat:"wind up + 회의",desc:"마무리하다"},{pat:"wind sb up",desc:"약 올리다"}],ex:[{en:"He <em>wound up</em> in hospital after the accident.",ko:"그는 사고 후 결국 병원에 입원했다.",note:"결과"},{en:"Let's <em>wind up</em> the meeting.",ko:"회의를 마무리합시다.",note:"회의"},{en:"Are you <em>winding me up</em>?",ko:"나 약 올리는 거야?",note:"구어"},{en:"She <em>wound up</em> doing all the work herself.",ko:"그녀는 결국 모든 일을 혼자 하게 됐다.",note:"결과"},{en:"I <em>wound up</em> staying the whole weekend.",ko:"결국 주말 내내 머물게 됐어.",note:"예상 밖"}],syn:[{s:"end up",m:"결국 ~이 되다"},{s:"conclude",m:"마무리하다"},{s:"tease",m:"약 올리다"}],rel:["wind down 긴장을 풀다","wind-up (n.) 마무리"]},
{w:"wind down",pron:"/waɪnd daʊn/",ko:"긴장을 풀다; 서서히 끝나다",base:"other",diff:1,nu:"하루가 끝날 때 긴장을 풀고 쉬거나, 행사·사업이 서서히 축소되어 끝나는 것.",uses:[{pat:"wind down (긴장)",desc:"긴장을 풀다"},{pat:"wind down (행사/사업)",desc:"서서히 끝나다"}],ex:[{en:"I like to <em>wind down</em> with a book before bed.",ko:"자기 전에 책을 읽으며 긴장을 풀기 좋아해.",note:"취침 전"},{en:"The party started to <em>wind down</em> around 11.",ko:"파티가 11시쯤 서서히 끝나기 시작했다.",note:"파티"},{en:"The company is <em>winding down</em> its operations.",ko:"회사가 운영을 서서히 축소하고 있다.",note:"사업"},{en:"Take a bath to help you <em>wind down</em>.",ko:"긴장을 풀기 위해 목욕해.",note:"휴식"},{en:"The economy is <em>winding down</em> after years of growth.",ko:"수년간의 성장 후 경제가 서서히 둔화되고 있다.",note:"경제"}],syn:[{s:"relax",m:"긴장을 풀다"},{s:"unwind",m:"풀다"},{s:"slow down",m:"속도를 줄이다"}],rel:["wind up 마무리하다","unwind 긴장을 풀다"]},
{w:"phase in",pron:"/feɪz ɪn/",ko:"단계적으로 도입하다",base:"other",diff:2,nu:"새 시스템·정책·변화를 갑자기 시행하지 않고 단계적으로 도입하는 것.",uses:[{pat:"phase in + 정책/시스템",desc:"단계적으로 도입하다"}],ex:[{en:"The new system will be <em>phased in</em> over two years.",ko:"새 시스템은 2년에 걸쳐 단계적으로 도입될 것이다.",note:"정책"},{en:"The changes are being <em>phased in</em> gradually.",ko:"변화들이 서서히 도입되고 있다.",note:"변화"},{en:"New regulations will be <em>phased in</em> next year.",ko:"새 규정이 내년에 단계적으로 시행된다.",note:"규정"},{en:"The software update will be <em>phased in</em> for all users.",ko:"소프트웨어 업데이트가 모든 사용자에게 단계적으로 적용된다.",note:"기술"},{en:"It's better to <em>phase in</em> changes slowly.",ko:"변화를 서서히 도입하는 것이 낫다.",note:"조언"}],syn:[{s:"introduce gradually",m:"서서히 도입하다"},{s:"roll out",m:"단계적으로 출시하다"},{s:"implement slowly",m:"천천히 시행하다"}],rel:["phase out 단계적으로 없애다","roll out 출시하다"]},
{w:"phase out",pron:"/feɪz aʊt/",ko:"단계적으로 없애다",base:"other",diff:2,nu:"제품·정책·관행을 갑자기 중단하지 않고 서서히 없애는 것.",uses:[{pat:"phase out + 제품/정책",desc:"단계적으로 없애다"}],ex:[{en:"The company is <em>phasing out</em> plastic packaging.",ko:"회사가 플라스틱 포장을 단계적으로 없애고 있다.",note:"환경"},{en:"Older models will be <em>phased out</em> next year.",ko:"구형 모델은 내년에 단계적으로 없어진다.",note:"제품"},{en:"The government plans to <em>phase out</em> coal power.",ko:"정부는 석탄 발전을 단계적으로 폐지할 계획이다.",note:"에너지"},{en:"They're <em>phasing out</em> the old software.",ko:"그들은 구 소프트웨어를 단계적으로 없애고 있다.",note:"기술"},{en:"The tax break is being <em>phased out</em>.",ko:"세금 감면이 단계적으로 없어지고 있다.",note:"세금"}],syn:[{s:"eliminate gradually",m:"서서히 없애다"},{s:"discontinue",m:"중단하다"},{s:"remove slowly",m:"천천히 제거하다"}],rel:["phase in 단계적으로 도입하다","wind down 서서히 끝내다"]},
{w:"chip in",pron:"/tʃɪp ɪn/",ko:"돈을 모으다; 거들다",base:"other",diff:1,nu:"여러 사람이 공동 목적을 위해 돈을 내거나, 대화·작업에 끼어들어 돕는 것.",uses:[{pat:"chip in + 돈",desc:"돈을 모으다"},{pat:"chip in (대화/작업)",desc:"거들다·끼어들어 돕다"}],ex:[{en:"Everyone <em>chipped in</em> for the birthday gift.",ko:"모두 생일 선물을 위해 돈을 모았다.",note:"선물"},{en:"If we all <em>chip in</em>, we can cover the cost.",ko:"모두 조금씩 내면 비용을 충당할 수 있어.",note:"비용"},{en:"She <em>chipped in</em> with a helpful suggestion.",ko:"그녀가 유용한 제안을 거들었다.",note:"기여"},{en:"Can you <em>chip in</em> $10?",ko:"10달러 낼 수 있어?",note:"부담"},{en:"He <em>chipped in</em> to help with the decorating.",ko:"그는 인테리어 작업을 돕기 위해 거들었다.",note:"도움"}],syn:[{s:"contribute",m:"기여하다"},{s:"pitch in",m:"거들다"},{s:"add",m:"보태다"}],rel:["pitch in 거들다","put in 내다"]},
{w:"pitch in",pron:"/pɪtʃ ɪn/",ko:"거들다; 협력하다",base:"other",diff:1,nu:"여러 사람이 공동 작업에 힘을 합쳐 도움을 주는 것.",uses:[{pat:"pitch in (협력)",desc:"함께 돕다·거들다"}],ex:[{en:"Everyone <em>pitched in</em> to clean up after the party.",ko:"파티 후 모두가 청소를 거들었다.",note:"청소"},{en:"If we all <em>pitch in</em>, it'll be done quickly.",ko:"다 같이 거들면 금방 끝날 거야.",note:"협력"},{en:"He <em>pitched in</em> without being asked.",ko:"그는 요청받지 않았는데도 거들었다.",note:"자발"},{en:"The whole community <em>pitched in</em> after the flood.",ko:"홍수 이후 지역사회 전체가 힘을 합쳤다.",note:"공동체"},{en:"<em>Pitch in</em> and we'll finish sooner.",ko:"함께 거들면 더 빨리 끝날 거야.",note:"격려"}],syn:[{s:"chip in",m:"거들다"},{s:"help out",m:"도움을 주다"},{s:"contribute",m:"기여하다"}],rel:["chip in 돈을 모으다·거들다","help out 돕다"]},
{w:"help out",pron:"/help aʊt/",ko:"돕다; 거들다",base:"other",diff:1,nu:"어려움에 처한 사람이나 일을 도와주는 것. 특히 임시적이거나 추가적인 도움.",uses:[{pat:"help sb out",desc:"~를 돕다"},{pat:"help out with + 일",desc:"~을 도와주다"}],ex:[{en:"Can you <em>help me out</em>?",ko:"나 좀 도와줄 수 있어?",note:"도움 요청"},{en:"She <em>helped out</em> at the school fair.",ko:"그녀는 학교 바자회에서 도왔다.",note:"봉사"},{en:"My parents <em>helped out</em> financially.",ko:"부모님이 재정적으로 도움을 주셨다.",note:"지원"},{en:"I'll <em>help out</em> wherever I can.",ko:"할 수 있는 곳이라면 어디든 도울게.",note:"자원"},{en:"He <em>helps out</em> at the local shelter on weekends.",ko:"그는 주말에 지역 쉼터에서 돕는다.",note:"봉사"}],syn:[{s:"assist",m:"돕다"},{s:"pitch in",m:"거들다"},{s:"lend a hand",m:"도움을 주다"}],rel:["lend a hand 도움을 주다","chip in 거들다"]},
{w:"ask around",pron:"/ɑːsk əˈraʊnd/",ko:"여기저기 물어보다",base:"other",diff:1,nu:"여러 사람에게 정보·의견·추천을 구하는 것.",uses:[{pat:"ask around (정보)",desc:"여기저기 물어보다"}],ex:[{en:"I'll <em>ask around</em> and see if anyone knows.",ko:"여기저기 물어봐서 아는 사람이 있는지 볼게.",note:"정보"},{en:"<em>Ask around</em> — someone might have a recommendation.",ko:"여기저기 물어봐, 추천해줄 사람이 있을 수도 있어.",note:"추천"},{en:"She <em>asked around</em> but nobody had seen him.",ko:"그녀가 여기저기 물었지만 아무도 그를 못 봤다.",note:"수색"},{en:"I've been <em>asking around</em> about jobs.",ko:"일자리에 대해 여기저기 물어보고 있어.",note:"구직"},{en:"Let me <em>ask around</em> the office.",ko:"사무실에서 여기저기 물어볼게.",note:"업무"}],syn:[{s:"inquire",m:"문의하다"},{s:"canvass",m:"여론을 묻다"},{s:"check around",m:"여기저기 확인하다"}],rel:["ask for 요청하다","look around 둘러보다"]},
{w:"think ahead",pron:"/θɪŋk əˈhed/",ko:"미리 생각하다; 앞을 내다보다",base:"other",diff:1,nu:"현재만이 아니라 미래를 예측하고 미리 준비하는 것.",uses:[{pat:"think ahead (미리)",desc:"미리 생각하다"},{pat:"think ahead to + 미래",desc:"~을 미리 생각하다"}],ex:[{en:"You need to <em>think ahead</em> if you want to succeed.",ko:"성공하려면 미리 생각해야 해.",note:"조언"},{en:"She always <em>thinks ahead</em> and plans carefully.",ko:"그녀는 항상 미리 생각하고 신중하게 계획한다.",note:"계획"},{en:"Try to <em>think ahead</em> to potential problems.",ko:"잠재적 문제들을 미리 생각해봐.",note:"예방"},{en:"He didn't <em>think ahead</em> and now he's in trouble.",ko:"그는 미리 생각하지 않아서 지금 문제에 처했다.",note:"후회"},{en:"<em>Thinking ahead</em> is a key leadership skill.",ko:"미리 생각하는 것은 핵심 리더십 기술이다.",note:"리더십"}],syn:[{s:"plan ahead",m:"미리 계획하다"},{s:"anticipate",m:"예측하다"},{s:"look ahead",m:"앞을 내다보다"}],rel:["plan ahead 미리 계획하다","think in advance 미리 생각하다"]},
{w:"talk over",pron:"/tɔːk ˈəʊvər/",ko:"의논하다; 상의하다",base:"other",diff:1,nu:"결정을 내리기 전에 충분히 의논하거나 상의하는 것.",uses:[{pat:"talk over + 문제",desc:"~을 의논하다"},{pat:"talk sth over with sb",desc:"~와 상의하다"}],ex:[{en:"Let's <em>talk it over</em> before we decide.",ko:"결정하기 전에 의논해보자.",note:"결정"},{en:"She <em>talked it over</em> with her husband.",ko:"그녀는 남편과 상의했다.",note:"부부"},{en:"They <em>talked over</em> their options for hours.",ko:"그들은 몇 시간 동안 선택지들을 의논했다.",note:"논의"},{en:"I need to <em>talk this over</em> with my team.",ko:"이걸 팀과 상의해야 해.",note:"업무"},{en:"We <em>talked over</em> the problems and found a solution.",ko:"문제들을 의논해서 해결책을 찾았다.",note:"협력"}],syn:[{s:"discuss",m:"논의하다"},{s:"consult",m:"상의하다"},{s:"deliberate",m:"숙고하다"}],rel:["talk through 자세히 논의하다","think over 다시 생각하다"]},
{w:"talk through",pron:"/tɔːk θruː/",ko:"자세히 설명하다; 단계별로 안내하다",base:"other",diff:1,nu:"복잡한 내용을 상대방이 이해할 수 있도록 차근차근 설명하는 것.",uses:[{pat:"talk sb through + 과정",desc:"단계별로 안내하다"},{pat:"talk through + 문제",desc:"자세히 논의하다"}],ex:[{en:"Let me <em>talk you through</em> the process.",ko:"과정을 차근차근 설명해줄게.",note:"설명"},{en:"Can you <em>talk me through</em> what happened?",ko:"무슨 일이 있었는지 차근차근 설명해줄 수 있어?",note:"이해"},{en:"She <em>talked through</em> her feelings with a therapist.",ko:"그녀는 치료사와 감정을 자세히 이야기했다.",note:"상담"},{en:"I'll <em>talk you through</em> the steps.",ko:"단계들을 안내해줄게.",note:"안내"},{en:"We need to <em>talk through</em> this issue properly.",ko:"이 문제를 제대로 자세히 논의해야 해.",note:"논의"}],syn:[{s:"explain",m:"설명하다"},{s:"guide",m:"안내하다"},{s:"walk through",m:"단계별로 안내하다"}],rel:["walk through 단계별로 안내하다","talk over 상의하다"]},
{w:"come apart",pron:"/kʌm əˈpɑːrt/",ko:"분리되다; 무너지다",base:"come",diff:2,nu:"물건이 분리되거나, 계획·관계가 무너지거나, 감정적으로 무너지는 것.",uses:[{pat:"come apart (물건)",desc:"분리되다"},{pat:"come apart (계획/감정)",desc:"무너지다"}],ex:[{en:"The toy <em>came apart</em> in his hands.",ko:"장난감이 그의 손에서 분리됐다.",note:"물건"},{en:"Their marriage was <em>coming apart</em>.",ko:"그들의 결혼이 무너지고 있었다.",note:"관계"},{en:"She <em>came apart</em> when she heard the news.",ko:"그녀는 소식을 듣자 무너졌다.",note:"감정"},{en:"The deal <em>came apart</em> at the last minute.",ko:"거래가 막판에 무산됐다.",note:"거래"},{en:"The seams <em>came apart</em> after washing.",ko:"빨래 후 솔기가 떨어졌다.",note:"옷"}],syn:[{s:"fall apart",m:"무너지다"},{s:"disintegrate",m:"분해되다"},{s:"collapse",m:"붕괴하다"}],rel:["fall apart 무너지다","come undone 풀리다"]},
{w:"come into",pron:"/kʌm ˈɪntuː/",ko:"~를 물려받다; ~하게 되다",base:"come",diff:2,nu:"유산을 물려받거나, 어떤 상황·상태에 들어가게 되는 것.",uses:[{pat:"come into + 유산",desc:"물려받다"},{pat:"come into + 상태",desc:"~하게 되다"}],ex:[{en:"She <em>came into</em> a large inheritance.",ko:"그녀는 큰 유산을 물려받았다.",note:"유산"},{en:"This word has <em>come into</em> common use.",ko:"이 단어는 일반적으로 쓰이게 됐다.",note:"언어"},{en:"His true talent <em>came into</em> its own.",ko:"그의 진정한 재능이 꽃을 피웠다.",note:"재능"},{en:"The new law <em>comes into</em> effect next month.",ko:"새 법이 다음 달부터 효력을 발휘한다.",note:"법률"},{en:"He <em>came into</em> his own as a leader.",ko:"그는 리더로서 진가를 발휘했다.",note:"성장"}],syn:[{s:"inherit",m:"물려받다"},{s:"acquire",m:"획득하다"},{s:"enter",m:"들어가다"}],rel:["come into effect 효력이 생기다","come into one's own 진가를 발휘하다"]},
{w:"grow up",pron:"/ɡrəʊ ʌp/",ko:"자라다; 어른이 되다",base:"other",diff:1,nu:"어린이가 성인으로 자라거나, 성숙하게 행동하라는 말로도 쓰인다.",uses:[{pat:"grow up (성장)",desc:"자라다·어른이 되다"},{pat:"grow up! (명령)",desc:"철 좀 들어!"}],ex:[{en:"She <em>grew up</em> in a small village.",ko:"그녀는 작은 마을에서 자랐다.",note:"어린 시절"},{en:"What did you want to be when you <em>grew up</em>?",ko:"어렸을 때 뭐가 되고 싶었어?",note:"꿈"},{en:"<em>Grow up</em>! Stop acting like a child.",ko:"철 좀 들어! 애처럼 굴지 마.",note:"꾸짖기"},{en:"It takes time to <em>grow up</em>.",ko:"어른이 되는 데는 시간이 걸린다.",note:"성장"},{en:"He <em>grew up</em> fast after his parents divorced.",ko:"그는 부모님이 이혼한 후 빨리 철들었다.",note:"성숙"}],syn:[{s:"mature",m:"성숙하다"},{s:"develop",m:"성장하다"},{s:"come of age",m:"성인이 되다"}],rel:["grown-up (n.) 어른","grow apart 사이가 멀어지다","grow on you 점점 좋아지다"]},
{w:"grow on",pron:"/ɡrəʊ ɒn/",ko:"점점 좋아지다",base:"other",diff:2,nu:"처음에는 별로였는데 시간이 지나면서 점점 마음에 들게 되는 것.",uses:[{pat:"grow on sb",desc:"~에게 점점 좋아지다"}],ex:[{en:"That song is really <em>growing on me</em>.",ko:"그 노래가 점점 좋아지고 있어.",note:"음악"},{en:"He's odd at first, but he <em>grows on you</em>.",ko:"처음엔 이상하지만 점점 좋아져.",note:"사람"},{en:"The city <em>grew on me</em> after a few months.",ko:"몇 달 후에는 그 도시가 점점 좋아졌다.",note:"도시"},{en:"I didn't like it at first, but it's <em>growing on me</em>.",ko:"처음엔 별로였는데 점점 마음에 들어.",note:"취향"},{en:"Good coffee <em>grows on you</em>.",ko:"좋은 커피는 점점 빠져들게 돼.",note:"음식"}],syn:[{s:"become appealing",m:"매력적으로 변하다"},{s:"win over",m:"마음을 사다"},{s:"get used to",m:"익숙해지다"}],rel:["grow into 점점 맞게 되다","it grows on you 점점 좋아진다"]},
{w:"grow out of",pron:"/ɡrəʊ aʊt əv/",ko:"벗어나다; 커서 맞지 않다",base:"other",diff:2,nu:"나이가 들면서 습관·단계·옷 등에서 벗어나는 것.",uses:[{pat:"grow out of + 옷",desc:"커서 맞지 않다"},{pat:"grow out of + 습관",desc:"나이 들면서 벗어나다"}],ex:[{en:"He's <em>grown out of</em> all his clothes.",ko:"그는 옷들이 다 작아졌어.",note:"성장"},{en:"She <em>grew out of</em> her shyness in college.",ko:"그녀는 대학에서 수줍음을 벗어났다.",note:"성숙"},{en:"Most kids <em>grow out of</em> thumb-sucking.",ko:"대부분의 아이들은 손가락 빠는 습관에서 벗어난다.",note:"습관"},{en:"I think you'll <em>grow out of</em> this phase.",ko:"이 시기를 벗어날 거야.",note:"단계"},{en:"The business <em>grew out of</em> a simple idea.",ko:"그 사업은 단순한 아이디어에서 발전했다.",note:"발전"}],syn:[{s:"outgrow",m:"성장하여 벗어나다"},{s:"move beyond",m:"넘어가다"},{s:"mature past",m:"성숙하여 지나가다"}],rel:["outgrow 커서 벗어나다","grow into 점점 맞게 되다"]},
{w:"find out",pron:"/faɪnd aʊt/",ko:"알아내다; 발견하다",base:"other",diff:1,nu:"모르는 정보를 조사하거나 노력해서 알아내거나, 비밀이 드러나는 것.",uses:[{pat:"find out + 정보",desc:"알아내다"},{pat:"find out about",desc:"~에 대해 알아내다"},{pat:"find sb out",desc:"~의 거짓을 들키다"}],ex:[{en:"I need to <em>find out</em> what time the train leaves.",ko:"기차가 몇 시에 출발하는지 알아봐야 해.",note:"정보"},{en:"She <em>found out</em> about the surprise party.",ko:"그녀는 깜짝 파티에 대해 알게 됐다.",note:"비밀"},{en:"How did you <em>find out</em>?",ko:"어떻게 알았어?",note:"발각"},{en:"I'll <em>find out</em> and let you know.",ko:"알아보고 알려줄게.",note:"확인"},{en:"He was <em>found out</em> cheating on the exam.",ko:"그는 시험에서 부정행위를 하다 들켰다.",note:"들키다"}],syn:[{s:"discover",m:"발견하다"},{s:"learn",m:"알게 되다"},{s:"uncover",m:"밝혀내다"}],rel:["find out the truth 진실을 알다","find sb out 거짓을 폭로하다"]}
,
{w:"ask out",pron:"/ɑːsk aʊt/",ko:"데이트 신청하다",base:"other",diff:1,nu:"누군가에게 함께 외출하거나 데이트를 제안하는 것. 연애 감정을 내포.",uses:[{pat:"ask sb out",desc:"데이트 신청하다"},{pat:"ask sb out to dinner",desc:"저녁 식사에 초대하다"}],ex:[{en:"He finally <em>asked her out</em>.",ko:"그가 마침내 그녀에게 데이트 신청을 했다.",note:"용기"},{en:"Why don't you just <em>ask him out</em>?",ko:"그냥 데이트 신청하지 그래?",note:"조언"},{en:"She was too shy to <em>ask anyone out</em>.",ko:"그녀는 너무 수줍어서 아무에게도 데이트 신청을 못 했다.",note:"수줍음"},{en:"He <em>asked me out</em> for coffee.",ko:"그가 커피 한잔 하자고 했어.",note:"가벼운 만남"},{en:"I've been wanting to <em>ask her out</em> for weeks.",ko:"몇 주 동안 그녀에게 데이트 신청하고 싶었어.",note:"망설임"}],syn:[{s:"invite out",m:"초대하다"},{s:"woo",m:"구애하다"},{s:"approach romantically",m:"연애적으로 접근하다"}],rel:["ask for a date 데이트를 요청하다","shoot one's shot 용감히 시도하다"]},
{w:"ask for",pron:"/ɑːsk fɔːr/",ko:"요청하다; 자초하다",base:"other",diff:1,nu:"무언가를 요청하거나, 나쁜 결과를 자초하는 것. 'asking for trouble'은 문제를 자초한다는 뜻.",uses:[{pat:"ask for + 도움/물건",desc:"요청하다"},{pat:"ask for trouble",desc:"문제를 자초하다"},{pat:"ask for it",desc:"자업자득이다"}],ex:[{en:"Don't be afraid to <em>ask for</em> help.",ko:"도움 요청하는 걸 두려워하지 마.",note:"도움"},{en:"She <em>asked for</em> a raise.",ko:"그녀는 급여 인상을 요청했다.",note:"직장"},{en:"You're <em>asking for</em> trouble if you do that.",ko:"그러면 문제를 자초하는 거야.",note:"경고"},{en:"He was basically <em>asking for</em> it.",ko:"그는 사실상 자업자득이었어.",note:"자초"},{en:"<em>Ask for</em> the bill, please.",ko:"계산서 부탁드려요.",note:"식당"}],syn:[{s:"request",m:"요청하다"},{s:"demand",m:"요구하다"},{s:"invite",m:"자초하다"}],rel:["ask for help 도움을 요청하다","ask for trouble 문제를 자초하다"]},
{w:"deal out",pron:"/diːl aʊt/",ko:"나눠주다; 처우하다",base:"other",diff:2,nu:"카드·벌칙 등을 나눠주거나, 누군가를 특정 방식으로 처우하는 것.",uses:[{pat:"deal out + 카드/벌칙",desc:"나눠주다"},{pat:"deal out + 처우",desc:"처우하다"}],ex:[{en:"She <em>dealt out</em> the cards to each player.",ko:"그녀는 각 플레이어에게 카드를 나눠줬다.",note:"카드 게임"},{en:"Justice was <em>dealt out</em> fairly.",ko:"정의가 공정하게 집행됐다.",note:"정의"},{en:"He <em>dealt out</em> punishments without hesitation.",ko:"그는 거침없이 처벌을 내렸다.",note:"처벌"},{en:"The boss <em>dealt out</em> tasks to the team.",ko:"상사가 팀에 업무를 나눠줬다.",note:"업무"},{en:"Kindness should be <em>dealt out</em> generously.",ko:"친절은 넉넉하게 베풀어야 한다.",note:"격언"}],syn:[{s:"distribute",m:"배분하다"},{s:"hand out",m:"나눠주다"},{s:"dispense",m:"지급하다"}],rel:["deal with 처리하다","hand out 나눠주다"]},
{w:"fit in",pron:"/fɪt ɪn/",ko:"어울리다; 시간을 내다; 맞다",base:"other",diff:1,nu:"집단·환경에 잘 어울리거나, 바쁜 일정에 시간을 끼워 넣거나, 공간에 들어맞는 것.",uses:[{pat:"fit in (집단)",desc:"어울리다"},{pat:"fit in + 약속",desc:"일정을 끼워 넣다"},{pat:"fit in (공간)",desc:"들어맞다"}],ex:[{en:"She never really <em>fit in</em> at her old school.",ko:"그녀는 예전 학교에서 잘 어울리지 못했다.",note:"소속감"},{en:"Can you <em>fit in</em> a meeting at 3?",ko:"3시에 회의 끼워 넣을 수 있어?",note:"일정"},{en:"Everything <em>fits in</em> the suitcase perfectly.",ko:"모든 것이 여행 가방에 완벽하게 들어맞아.",note:"공간"},{en:"He tried to <em>fit in</em> with the group.",ko:"그는 그룹에 어울리려 했다.",note:"적응"},{en:"I'll try to <em>fit you in</em> this afternoon.",ko:"오늘 오후에 시간을 내려고 해볼게요.",note:"진료 예약"}],syn:[{s:"belong",m:"소속되다"},{s:"squeeze in",m:"끼워 넣다"},{s:"integrate",m:"통합되다"}],rel:["fit in with 어울리다","stand out 두드러지다"]},
{w:"fill out",pron:"/fɪl aʊt/",ko:"양식을 작성하다; 살이 붙다",base:"other",diff:1,nu:"서류·양식의 모든 항목을 빠짐없이 작성하거나, 몸에 살이 붙어 풍성해지는 것.",uses:[{pat:"fill out + 양식",desc:"양식을 작성하다"},{pat:"fill out (몸)",desc:"살이 붙다"}],ex:[{en:"Please <em>fill out</em> this application form.",ko:"이 지원서를 작성해주세요.",note:"서류"},{en:"You need to <em>fill out</em> all the fields.",ko:"모든 항목을 작성해야 해.",note:"완성"},{en:"He's really <em>filled out</em> since high school.",ko:"그는 고등학교 이후 많이 살이 붙었어.",note:"몸매"},{en:"It takes 10 minutes to <em>fill out</em> the form.",ko:"양식 작성하는 데 10분 걸려.",note:"시간"},{en:"The baby's cheeks have <em>filled out</em>.",ko:"아기 볼이 통통해졌어.",note:"성장"}],syn:[{s:"complete",m:"완성하다"},{s:"fill in",m:"작성하다"},{s:"put on weight",m:"살찌다"}],rel:["fill in 작성하다","fill up 가득 채우다"]},
{w:"stand for",pron:"/stænd fɔːr/",ko:"의미하다; 대표하다; 용인하다",base:"stand",diff:1,nu:"약어·상징이 무언가를 의미하거나, 가치를 대표하거나, 참을 수 없다는 부정적 표현.",uses:[{pat:"stand for + 약어",desc:"~을 의미하다"},{pat:"stand for + 가치",desc:"~을 대표하다"},{pat:"won't stand for",desc:"참지 않겠다"}],ex:[{en:"What does NASA <em>stand for</em>?",ko:"NASA가 무엇의 약자야?",note:"약어"},{en:"She <em>stands for</em> equality and justice.",ko:"그녀는 평등과 정의를 대표한다.",note:"가치"},{en:"I won't <em>stand for</em> this kind of behavior.",ko:"이런 행동은 참지 않겠어.",note:"경고"},{en:"What does your company <em>stand for</em>?",ko:"당신 회사는 무엇을 추구해?",note:"비전"},{en:"UK <em>stands for</em> United Kingdom.",ko:"UK는 United Kingdom의 약자야.",note:"약어"}],syn:[{s:"represent",m:"대표하다"},{s:"mean",m:"의미하다"},{s:"tolerate",m:"참다"}],rel:["stand for something 의미가 있다","won't stand for it 참을 수 없다"]},
{w:"stand in for",pron:"/stænd ɪn fɔːr/",ko:"~를 대신하다",base:"stand",diff:2,nu:"다른 사람의 자리를 임시로 채우거나 대신하는 것.",uses:[{pat:"stand in for + 사람",desc:"~를 대신하다"}],ex:[{en:"Can you <em>stand in for</em> me at the meeting?",ko:"회의에서 나 대신해줄 수 있어?",note:"대리"},{en:"She <em>stood in for</em> the director while he was ill.",ko:"그가 아픈 동안 그녀가 감독 대리를 했다.",note:"직장"},{en:"Who's <em>standing in for</em> the teacher today?",ko:"오늘 선생님 대신 누가 오지?",note:"학교"},{en:"I <em>stood in for</em> my colleague at the conference.",ko:"콘퍼런스에서 동료를 대신했다.",note:"업무"},{en:"He <em>stood in for</em> the president at the ceremony.",ko:"그는 대통령을 대신해 행사에 참석했다.",note:"공식"}],syn:[{s:"substitute for",m:"대신하다"},{s:"cover for",m:"대신하다"},{s:"fill in for",m:"대리하다"}],rel:["fill in for 대신하다","cover for 대신하다"]},
{w:"make off",pron:"/meɪk ɒf/",ko:"도망치다",base:"make",diff:2,nu:"급히 도망치거나 달아나는 것. 특히 범죄 후 도주하는 경우.",uses:[{pat:"make off (도망)",desc:"급히 도망치다"},{pat:"make off with + 물건",desc:"~을 가지고 달아나다"}],ex:[{en:"The thief <em>made off</em> on a bicycle.",ko:"도둑이 자전거를 타고 달아났다.",note:"도주"},{en:"He <em>made off</em> with the cash.",ko:"그는 현금을 들고 달아났다.",note:"도난"},{en:"They <em>made off</em> before anyone could stop them.",ko:"아무도 막기 전에 달아났다.",note:"도주"},{en:"The burglar <em>made off</em> through the back door.",ko:"강도가 뒷문으로 달아났다.",note:"범죄"},{en:"She <em>made off</em> with my heart.",ko:"그녀가 내 마음을 훔쳐 달아났어.",note:"비유·유머"}],syn:[{s:"run away",m:"도망치다"},{s:"flee",m:"달아나다"},{s:"abscond",m:"도주하다"}],rel:["make a run for it 도망치다","get away 탈출하다"]},
{w:"make for",pron:"/meɪk fɔːr/",ko:"~로 향하다; ~에 도움이 되다",base:"make",diff:2,nu:"어떤 방향으로 나아가거나, 어떤 결과·상황을 만들어내는 것.",uses:[{pat:"make for + 장소",desc:"~로 향하다"},{pat:"make for + 결과",desc:"~을 만들어내다"}],ex:[{en:"After the show we <em>made for</em> the exit.",ko:"공연 후 우리는 출구로 향했다.",note:"방향"},{en:"Good sleep <em>makes for</em> better decisions.",ko:"잘 자면 더 나은 결정을 한다.",note:"결과"},{en:"This tension doesn't <em>make for</em> a good environment.",ko:"이런 긴장감은 좋은 환경에 도움이 안 돼.",note:"부정"},{en:"Diverse teams <em>make for</em> better ideas.",ko:"다양한 팀이 더 좋은 아이디어를 만들어낸다.",note:"긍정"},{en:"They <em>made for</em> the hills when the storm came.",ko:"폭풍이 오자 그들은 언덕으로 향했다.",note:"피신"}],syn:[{s:"head for",m:"~로 향하다"},{s:"contribute to",m:"기여하다"},{s:"lead to",m:"이어지다"}],rel:["head for 향하다","lead to 이어지다"]},
{w:"go around",pron:"/ɡəʊ əˈraʊnd/",ko:"돌아다니다; 퍼지다; 충분하다",base:"go",diff:1,nu:"여러 곳을 돌아다니거나, 소문·병이 퍼지거나, 모두에게 나눠줄 만큼 충분한 것.",uses:[{pat:"go around (돌아다니다)",desc:"돌아다니다"},{pat:"go around (소문/병)",desc:"퍼지다"},{pat:"go around (충분하다)",desc:"모두에게 돌아가다"}],ex:[{en:"There's a rumour <em>going around</em>.",ko:"소문이 돌고 있어.",note:"소문"},{en:"There's enough food to <em>go around</em>.",ko:"모두에게 돌아갈 만큼 음식이 충분해.",note:"충분함"},{en:"A cold is <em>going around</em> the office.",ko:"사무실에 감기가 돌고 있어.",note:"질병"},{en:"She likes to <em>go around</em> exploring new places.",ko:"그녀는 새로운 곳을 탐험하며 돌아다니기를 좋아해.",note:"탐험"},{en:"What goes around <em>comes around</em>.",ko:"뿌린 대로 거둔다.",note:"속담"}],syn:[{s:"circulate",m:"돌다"},{s:"spread",m:"퍼지다"},{s:"be enough",m:"충분하다"}],rel:["what goes around comes around 인과응보","go about 돌아다니다"]},
{w:"go along with",pron:"/ɡəʊ əˈlɒŋ wɪð/",ko:"동의하다; 따르다",base:"go",diff:1,nu:"다른 사람의 의견·계획에 반대하지 않고 따르거나 동의하는 것.",uses:[{pat:"go along with + 계획/의견",desc:"따르다·동의하다"}],ex:[{en:"I'll <em>go along with</em> whatever you decide.",ko:"네가 결정하는 것에 따를게.",note:"동의"},{en:"She just <em>went along with</em> the group.",ko:"그녀는 그냥 그룹을 따랐다.",note:"순응"},{en:"He refused to <em>go along with</em> the plan.",ko:"그는 계획에 따르기를 거부했다.",note:"거부"},{en:"I can't <em>go along with</em> that decision.",ko:"그 결정에는 동의할 수 없어.",note:"반대"},{en:"Sometimes you have to <em>go along with</em> things you don't like.",ko:"때로는 마음에 들지 않는 것도 따라야 할 때가 있다.",note:"현실"}],syn:[{s:"agree with",m:"동의하다"},{s:"comply with",m:"따르다"},{s:"accept",m:"받아들이다"}],rel:["go with the flow 흐름에 따르다","fall in with 동의하다"]},
{w:"go by",pron:"/ɡəʊ baɪ/",ko:"지나가다; 시간이 흐르다; 따르다",base:"go",diff:1,nu:"사람·차가 지나가거나, 시간이 흐르거나, 규칙·이름을 따르는 것.",uses:[{pat:"go by (시간)",desc:"시간이 흐르다"},{pat:"go by + 규칙",desc:"~에 따르다"},{pat:"go by + 이름",desc:"~으로 불리다"}],ex:[{en:"Time <em>goes by</em> so fast.",ko:"시간이 정말 빨리 흐르네.",note:"시간"},{en:"A car <em>went by</em> at high speed.",ko:"차가 빠르게 지나갔다.",note:"통과"},{en:"He <em>goes by</em> the nickname 'Rocky'.",ko:"그는 '록키'라는 별명으로 불린다.",note:"이름"},{en:"We should <em>go by</em> the rules.",ko:"규칙에 따라야 해.",note:"규칙"},{en:"As the days <em>went by</em>, she felt better.",ko:"날이 지나면서 그녀는 나아졌다.",note:"회복"}],syn:[{s:"pass",m:"지나가다"},{s:"elapse",m:"흐르다"},{s:"follow",m:"따르다"}],rel:["go by the book 규정대로 하다","as time goes by 시간이 지남에 따라"]},
{w:"go in for",pron:"/ɡəʊ ɪn fɔːr/",ko:"좋아하다; 참가하다",base:"go",diff:2,nu:"특정 활동을 즐기거나 취미로 삼거나, 대회에 참가하는 것.",uses:[{pat:"go in for + 취미/활동",desc:"즐기다·취미로 하다"},{pat:"go in for + 대회",desc:"참가하다"}],ex:[{en:"I don't really <em>go in for</em> horror films.",ko:"나는 공포 영화를 별로 좋아하지 않아.",note:"취향"},{en:"She <em>goes in for</em> long-distance running.",ko:"그녀는 장거리 달리기를 즐긴다.",note:"취미"},{en:"He decided to <em>go in for</em> the competition.",ko:"그는 대회에 참가하기로 했다.",note:"대회"},{en:"Do you <em>go in for</em> outdoor sports?",ko:"야외 스포츠를 즐겨?",note:"질문"},{en:"I don't <em>go in for</em> that sort of thing.",ko:"나는 그런 걸 별로 안 좋아해.",note:"취향"}],syn:[{s:"enjoy",m:"즐기다"},{s:"be into",m:"빠져있다"},{s:"enter",m:"참가하다"}],rel:["be into 좋아하다","take up 시작하다"]},
{w:"take sides",pron:"/teɪk saɪdz/",ko:"편을 들다",base:"take",diff:1,nu:"논쟁·갈등에서 한쪽 편을 드는 것.",uses:[{pat:"take sides (in + 논쟁)",desc:"편을 들다"}],ex:[{en:"I don't want to <em>take sides</em>.",ko:"어느 편도 들고 싶지 않아.",note:"중립"},{en:"She <em>took sides</em> with her brother.",ko:"그녀는 남동생 편을 들었다.",note:"가족"},{en:"It's not fair to <em>take sides</em> without knowing all the facts.",ko:"모든 사실을 알지 못한 채 편을 드는 건 공정하지 않아.",note:"조언"},{en:"The media shouldn't <em>take sides</em> in politics.",ko:"언론은 정치에서 편을 들면 안 돼.",note:"언론"},{en:"Everyone is <em>taking sides</em> in this argument.",ko:"모두가 이 논쟁에서 편을 들고 있어.",note:"갈등"}],syn:[{s:"take a stance",m:"입장을 취하다"},{s:"support",m:"지지하다"},{s:"be biased",m:"편향되다"}],rel:["take sb's side ~의 편을 들다","be neutral 중립을 지키다"]},
{w:"take a toll",pron:"/teɪk ə təʊl/",ko:"타격을 주다; 해를 끼치다",base:"take",diff:2,nu:"장기적인 스트레스나 어려움이 신체·정신·관계에 해를 끼치거나 약화시키는 것.",uses:[{pat:"take a toll on + 건강/관계",desc:"타격을 주다·약화시키다"}],ex:[{en:"The stress is <em>taking a toll on</em> her health.",ko:"스트레스가 그녀의 건강에 타격을 주고 있어.",note:"건강"},{en:"Years of overwork <em>took a toll on</em> his marriage.",ko:"수년간의 과로가 그의 결혼에 타격을 줬다.",note:"관계"},{en:"The long commute is <em>taking its toll</em>.",ko:"긴 통근이 타격을 주고 있어.",note:"일상"},{en:"War <em>takes a heavy toll</em> on civilians.",ko:"전쟁은 민간인에게 큰 피해를 준다.",note:"전쟁"},{en:"It's <em>taking a toll on</em> everyone.",ko:"모두에게 타격을 주고 있어.",note:"공동"}],syn:[{s:"harm",m:"해를 끼치다"},{s:"damage",m:"손상시키다"},{s:"weaken",m:"약화시키다"}],rel:["take its toll 타격을 주다","wear down 약화시키다"]},
{w:"take place",pron:"/teɪk pleɪs/",ko:"일어나다; 개최되다",base:"take",diff:1,nu:"사건·행사가 발생하거나 개최되는 것. 'happen'보다 격식적.",uses:[{pat:"take place (사건)",desc:"일어나다"},{pat:"take place (행사)",desc:"개최되다"}],ex:[{en:"The meeting will <em>take place</em> on Monday.",ko:"회의는 월요일에 개최될 거야.",note:"행사"},{en:"The accident <em>took place</em> at midnight.",ko:"사고는 자정에 일어났다.",note:"사건"},{en:"Where will the ceremony <em>take place</em>?",ko:"행사는 어디서 열려?",note:"장소"},{en:"Changes are <em>taking place</em> rapidly.",ko:"변화가 빠르게 일어나고 있다.",note:"변화"},{en:"The tournament <em>takes place</em> every four years.",ko:"그 대회는 4년마다 개최된다.",note:"주기"}],syn:[{s:"happen",m:"일어나다"},{s:"occur",m:"발생하다"},{s:"be held",m:"개최되다"}],rel:["take place of ~의 자리를 대신하다","in place of ~대신에"]},
{w:"break free",pron:"/breɪk friː/",ko:"자유로워지다; 탈출하다",base:"break",diff:1,nu:"속박·통제·습관에서 벗어나 자유로워지는 것.",uses:[{pat:"break free from + 속박",desc:"~에서 자유로워지다"}],ex:[{en:"She finally <em>broke free</em> from the controlling relationship.",ko:"그녀는 마침내 통제적인 관계에서 벗어났다.",note:"관계"},{en:"He struggled to <em>break free</em> from addiction.",ko:"그는 중독에서 벗어나려고 몸부림쳤다.",note:"중독"},{en:"The bird <em>broke free</em> from its cage.",ko:"새가 우리에서 탈출했다.",note:"탈출"},{en:"<em>Break free</em> from what's holding you back.",ko:"너를 막고 있는 것에서 자유로워져.",note:"격려"},{en:"She wanted to <em>break free</em> and start fresh.",ko:"그녀는 탈출해서 새로 시작하고 싶었다.",note:"새 출발"}],syn:[{s:"escape",m:"탈출하다"},{s:"liberate oneself",m:"자유로워지다"},{s:"break away",m:"벗어나다"}],rel:["break away 탈출하다","set free 자유롭게 하다"]},
{w:"break new ground",pron:"/breɪk njuː ɡraʊnd/",ko:"새 지평을 열다; 선구적이다",base:"break",diff:3,nu:"전례 없는 새로운 영역을 개척하거나 혁신적인 일을 하는 것.",uses:[{pat:"break new ground (분야)",desc:"새 지평을 열다"}],ex:[{en:"The research is <em>breaking new ground</em>.",ko:"그 연구는 새 지평을 열고 있다.",note:"연구"},{en:"Her novel <em>broke new ground</em> in fiction.",ko:"그녀의 소설은 소설 분야에서 새 지평을 열었다.",note:"문학"},{en:"The technology <em>breaks new ground</em> in AI.",ko:"그 기술은 AI 분야에서 새 지평을 열고 있다.",note:"기술"},{en:"He's always trying to <em>break new ground</em>.",ko:"그는 항상 새 지평을 열려 한다.",note:"혁신"},{en:"The film <em>broke new ground</em> in storytelling.",ko:"그 영화는 스토리텔링에서 새 지평을 열었다.",note:"영화"}],syn:[{s:"pioneer",m:"개척하다"},{s:"innovate",m:"혁신하다"},{s:"blaze a trail",m:"선구적 역할을 하다"}],rel:["blaze a trail 선구적 역할을 하다","be groundbreaking 획기적이다"]},
{w:"run along",pron:"/rʌn əˈlɒŋ/",ko:"가다; 어서 가",base:"run",diff:1,nu:"어린이에게 가라고 하거나, 어른에게 다소 무시하는 뉘앙스로 가라고 하는 것.",uses:[{pat:"run along! (명령)",desc:"어서 가!"}],ex:[{en:"<em>Run along</em> now — the adults are talking.",ko:"어서 가, 어른들이 얘기 중이야.",note:"어린이"},{en:"<em>Run along</em> and play outside.",ko:"나가서 놀아.",note:"아이"},{en:"\"Can I help?\" \"Just <em>run along</em>, I'm busy.\"",ko:"\"도울까요?\" \"그냥 가, 바빠.\"",note:"거절"},{en:"The teacher said \"<em>run along</em>\" when class was over.",ko:"수업이 끝나자 선생님이 \"가렴\"이라고 했다.",note:"수업"},{en:"<em>Run along</em> — I'll call you later.",ko:"어서 가, 나중에 전화할게.",note:"이별"}],syn:[{s:"go away",m:"가다"},{s:"off you go",m:"가렴"},{s:"scram",m:"꺼져"}],rel:["off you go 어서 가","go on 어서 해"]},
{w:"run on",pron:"/rʌn ɒn/",ko:"계속되다; ~으로 작동하다",base:"run",diff:2,nu:"예상보다 길게 계속되거나, 어떤 연료·에너지로 작동하거나, 말을 길게 늘어놓는 것.",uses:[{pat:"run on (시간)",desc:"예상보다 길게 계속되다"},{pat:"run on + 연료",desc:"~으로 작동하다"},{pat:"run on (말)",desc:"말을 늘어놓다"}],ex:[{en:"The meeting <em>ran on</em> for three hours.",ko:"회의가 세 시간 동안 이어졌다.",note:"시간"},{en:"This car <em>runs on</em> electricity.",ko:"이 차는 전기로 작동한다.",note:"연료"},{en:"He tends to <em>run on</em> when nervous.",ko:"그는 긴장하면 말을 늘어놓는 경향이 있다.",note:"말"},{en:"The speech <em>ran on</em> past the allotted time.",ko:"연설이 배정된 시간을 넘겨 계속됐다.",note:"연설"},{en:"This engine <em>runs on</em> diesel.",ko:"이 엔진은 디젤로 작동한다.",note:"기계"}],syn:[{s:"continue",m:"계속되다"},{s:"be powered by",m:"~로 작동하다"},{s:"ramble",m:"말을 늘어놓다"}],rel:["run over 초과하다","go on 계속되다"]},
{w:"put in for",pron:"/pʊt ɪn fɔːr/",ko:"신청하다; 지원하다",base:"put",diff:2,nu:"직장·휴가·보상 등을 공식적으로 신청하거나 지원하는 것.",uses:[{pat:"put in for + 직책/휴가",desc:"신청하다·지원하다"}],ex:[{en:"She <em>put in for</em> a promotion.",ko:"그녀는 승진을 신청했다.",note:"승진"},{en:"I'm going to <em>put in for</em> some holiday time.",ko:"휴가를 신청할 거야.",note:"휴가"},{en:"He <em>put in for</em> the transfer to the new branch.",ko:"그는 새 지점으로의 전근을 신청했다.",note:"전근"},{en:"Did you <em>put in for</em> overtime pay?",ko:"초과근무 수당 신청했어?",note:"수당"},{en:"I'll <em>put in for</em> the open position.",ko:"공석에 지원할게.",note:"지원"}],syn:[{s:"apply for",m:"지원하다"},{s:"request",m:"요청하다"},{s:"submit a request",m:"신청하다"}],rel:["apply for 지원하다","put forward 제안하다"]},
{w:"put out to",pron:"/pʊt aʊt tuː/",ko:"입찰·공모에 내놓다",base:"put",diff:3,nu:"작업·계약을 외부 업체의 입찰에 내놓거나, 바다에 나가는 것.",uses:[{pat:"put out to tender",desc:"입찰에 내놓다"},{pat:"put out to sea",desc:"바다로 나가다"}],ex:[{en:"The contract was <em>put out to</em> tender.",ko:"계약이 입찰에 부쳐졌다.",note:"입찰"},{en:"The project will be <em>put out to</em> bid.",ko:"프로젝트가 입찰에 내놓아질 것이다.",note:"공모"},{en:"The fishing boat <em>put out to</em> sea at dawn.",ko:"어선이 새벽에 바다로 나갔다.",note:"항해"},{en:"They decided to <em>put</em> the work <em>out to</em> external contractors.",ko:"그들은 외부 업체에 일을 발주하기로 했다.",note:"외주"},{en:"The tender was <em>put out to</em> several companies.",ko:"입찰이 여러 회사에 공고됐다.",note:"비즈니스"}],syn:[{s:"tender",m:"입찰에 내놓다"},{s:"bid out",m:"입찰하다"}],rel:["put out to tender 입찰에 부치다","outsource 외주하다"]},
{w:"call back",pron:"/kɔːl bæk/",ko:"다시 전화하다; 리콜하다",base:"other",diff:1,nu:"나중에 다시 전화하거나, 제품·직원을 다시 불러들이는 것.",uses:[{pat:"call sb back",desc:"다시 전화하다"},{pat:"call back + 제품",desc:"리콜하다"}],ex:[{en:"I'll <em>call you back</em> in five minutes.",ko:"5분 후에 다시 전화할게.",note:"전화"},{en:"She forgot to <em>call back</em>.",ko:"그녀는 다시 전화하는 것을 잊었다.",note:"잊음"},{en:"The company <em>called back</em> thousands of cars.",ko:"회사가 수천 대의 차를 리콜했다.",note:"리콜"},{en:"Can you <em>call me back</em> when you're free?",ko:"시간 날 때 다시 전화해줄 수 있어?",note:"요청"},{en:"He was <em>called back</em> for a second interview.",ko:"그는 2차 면접에 다시 불려갔다.",note:"면접"}],syn:[{s:"phone back",m:"다시 전화하다"},{s:"recall",m:"리콜하다"},{s:"return a call",m:"전화 답장하다"}],rel:["missed call 부재중 전화","get back to 다시 연락하다"]},
{w:"call up",pron:"/kɔːl ʌp/",ko:"전화하다; 소집하다; 불러일으키다",base:"other",diff:1,nu:"전화를 걸거나, 군대에 소집하거나, 기억·감정을 불러일으키는 것.",uses:[{pat:"call up + 사람",desc:"전화하다"},{pat:"call up (군대)",desc:"소집하다"},{pat:"call up + 기억",desc:"불러일으키다"}],ex:[{en:"I'll <em>call you up</em> when I arrive.",ko:"도착하면 전화할게.",note:"전화"},{en:"He was <em>called up</em> for military service.",ko:"그는 군 복무 소집을 받았다.",note:"군대"},{en:"The smell <em>called up</em> old memories.",ko:"그 냄새가 옛 기억을 불러일으켰다.",note:"기억"},{en:"She <em>called up</em> her best friend for advice.",ko:"그녀는 조언을 구하기 위해 절친에게 전화했다.",note:"친구"},{en:"The reserves were <em>called up</em> during the crisis.",ko:"위기 중에 예비군이 소집됐다.",note:"위기"}],syn:[{s:"phone",m:"전화하다"},{s:"summon",m:"소집하다"},{s:"evoke",m:"불러일으키다"}],rel:["call back 다시 전화하다","call out 외치다"]},
{w:"come clean",pron:"/kʌm kliːn/",ko:"솔직히 털어놓다",base:"come",diff:2,nu:"숨기고 있던 것을 솔직하게 고백하거나 사실을 털어놓는 것.",uses:[{pat:"come clean about + 비밀",desc:"솔직히 털어놓다"}],ex:[{en:"It's time to <em>come clean</em> about what happened.",ko:"무슨 일이 있었는지 솔직히 털어놓을 시간이야.",note:"고백"},{en:"He finally <em>came clean</em> about the affair.",ko:"그는 마침내 불륜에 대해 고백했다.",note:"비밀"},{en:"I think you should <em>come clean</em> with your parents.",ko:"부모님께 솔직하게 털어놓아야 할 것 같아.",note:"조언"},{en:"She <em>came clean</em> to her boss about the mistake.",ko:"그녀는 상사에게 실수에 대해 솔직히 말했다.",note:"직장"},{en:"It's better to <em>come clean</em> now than later.",ko:"나중보다 지금 솔직히 말하는 게 낫다.",note:"조언"}],syn:[{s:"confess",m:"고백하다"},{s:"admit",m:"인정하다"},{s:"open up",m:"털어놓다"}],rel:["come out with it 솔직히 말하다","fess up 자백하다"]},
{w:"come first",pron:"/kʌm fɜːrst/",ko:"우선시되다; 1등 하다",base:"come",diff:1,nu:"어떤 것이 가장 중요하게 여겨지거나, 경쟁에서 1등을 하는 것.",uses:[{pat:"come first (우선)",desc:"우선시되다"},{pat:"come first (순위)",desc:"1등 하다"}],ex:[{en:"Family always <em>comes first</em>.",ko:"가족이 항상 우선이야.",note:"가치"},{en:"She <em>came first</em> in the race.",ko:"그녀가 레이스에서 1등을 했다.",note:"경쟁"},{en:"Work shouldn't always <em>come first</em>.",ko:"일이 항상 우선시되면 안 돼.",note:"균형"},{en:"Safety <em>comes first</em> in this workplace.",ko:"이 직장에서는 안전이 최우선이야.",note:"원칙"},{en:"He always puts others before himself — they always <em>come first</em>.",ko:"그는 항상 자신보다 타인을 먼저 생각해.",note:"이타심"}],syn:[{s:"be a priority",m:"우선시되다"},{s:"win",m:"이기다"},{s:"take precedence",m:"우선권을 갖다"}],rel:["put first 우선시하다","safety first 안전 제일"]},
{w:"knock about",pron:"/nɒk əˈbaʊt/",ko:"돌아다니다; 혹사시키다",base:"other",diff:2,nu:"여러 곳을 돌아다니거나, 물건을 거칠게 다루거나, 생각을 이리저리 논의하는 것.",uses:[{pat:"knock about (돌아다니다)",desc:"이곳저곳 돌아다니다"},{pat:"knock about + 아이디어",desc:"이리저리 논의하다"}],ex:[{en:"He's been <em>knocking about</em> Asia for years.",ko:"그는 몇 년 동안 아시아 각지를 돌아다녔다.",note:"여행"},{en:"We were <em>knocking about</em> some ideas.",ko:"우리는 몇 가지 아이디어를 이리저리 논의했다.",note:"논의"},{en:"This bag has been <em>knocked about</em> a lot.",ko:"이 가방은 많이 혹사됐어.",note:"물건"},{en:"I like to <em>knock about</em> the city on weekends.",ko:"주말에 도시를 돌아다니기를 좋아해.",note:"산책"},{en:"We're just <em>knocking about</em> ideas — nothing concrete yet.",ko:"그냥 아이디어를 이리저리 생각해보는 중이야, 아직 구체적인 건 없어.",note:"브레인스토밍"}],syn:[{s:"wander",m:"돌아다니다"},{s:"kick around",m:"이리저리 논의하다"},{s:"rough up",m:"거칠게 다루다"}],rel:["kick around ideas 아이디어를 논의하다","wander around 돌아다니다"]},
{w:"bring round",pron:"/brɪŋ raʊnd/",ko:"설득하다; 의식을 되살리다; 데려오다",base:"bring",diff:2,nu:"반대하던 사람을 설득하거나, 기절한 사람을 의식이 돌아오게 하거나, 물건을 가져오는 것.",uses:[{pat:"bring sb round (설득)",desc:"설득하다"},{pat:"bring sb round (의식)",desc:"의식을 되살리다"},{pat:"bring round + 물건",desc:"가져오다"}],ex:[{en:"I think I can <em>bring him round</em> to my way of thinking.",ko:"그를 내 생각으로 설득할 수 있을 것 같아.",note:"설득"},{en:"The smelling salts <em>brought her round</em>.",ko:"냄새 맡는 소금이 그녀의 의식을 되살렸다.",note:"의식"},{en:"<em>Bring round</em> a bottle of wine if you're coming.",ko:"오면 와인 한 병 가져와.",note:"방문"},{en:"She was unconscious but the doctor <em>brought her round</em>.",ko:"그녀는 의식을 잃었지만 의사가 되살렸다.",note:"응급"},{en:"Eventually he was <em>brought round</em> to accepting the deal.",ko:"결국 그는 거래를 받아들이도록 설득됐다.",note:"협상"}],syn:[{s:"persuade",m:"설득하다"},{s:"revive",m:"되살리다"},{s:"bring over",m:"가져오다"}],rel:["come round 설득되다","bring over 가져오다"]},
{w:"work out at",pron:"/wɜːrk aʊt æt/",ko:"합계가 ~이다",base:"other",diff:2,nu:"계산의 결과나 합계가 특정 금액·수치가 되는 것.",uses:[{pat:"work out at + 금액",desc:"합계가 ~이다"}],ex:[{en:"That <em>works out at</em> about $10 per person.",ko:"그건 1인당 약 10달러 꼴이야.",note:"계산"},{en:"The total <em>works out at</em> £500.",ko:"합계가 500파운드야.",note:"금액"},{en:"The rent <em>works out at</em> £800 a month.",ko:"임대료는 한 달에 800파운드야.",note:"임대"},{en:"If we divide it equally, it <em>works out at</em> $25 each.",ko:"균등하게 나누면 각 25달러야.",note:"나눔"},{en:"Over a year, it <em>works out at</em> a significant saving.",ko:"1년으로 따지면 상당한 절약이야.",note:"저축"}],syn:[{s:"amount to",m:"~에 달하다"},{s:"come to",m:"합계가 ~이다"},{s:"total",m:"합계가 되다"}],rel:["work out 해결하다","come to ~에 달하다"]},

{w:"figure on",pron:"/ˈfɪɡər ɒn/",ko:"~을 예상하다; ~를 계획하다",base:"other",diff:2,nu:"어떤 일이 일어날 것이라고 예상하거나, 계획에 포함시키는 것. 미국식 구어체.",uses:[{pat:"figure on + 일어날 일",desc:"~을 예상하다"},{pat:"figure on + 계획",desc:"~을 계획에 넣다"}],ex:[{en:"I didn't <em>figure on</em> it taking so long.",ko:"이렇게 오래 걸릴 거라고 예상 못 했어.",note:"예상 밖"},{en:"We should <em>figure on</em> at least 10 people attending.",ko:"적어도 10명이 참석할 것으로 예상해야 해.",note:"계획"},{en:"I wasn't <em>figuring on</em> spending this much.",ko:"이렇게 많이 쓸 거라고 생각 못 했어.",note:"지출"},{en:"<em>Figure on</em> an hour for the journey.",ko:"여정에 한 시간 정도 예상해.",note:"시간"},{en:"We <em>figured on</em> finishing by Friday.",ko:"우리는 금요일까지 끝낼 것으로 계획했다.",note:"일정"}],syn:[{s:"plan on",m:"계획하다"},{s:"expect",m:"예상하다"},{s:"count on",m:"기대하다"}],rel:["count on 기대하다","plan on 계획하다"]},

{w:"look ahead",pron:"/lʊk əˈhed/",ko:"앞을 내다보다; 미래를 준비하다",base:"look",diff:1,nu:"현재에만 집중하지 않고 미래를 예측하고 준비하는 것.",uses:[{pat:"look ahead (미래)",desc:"앞을 내다보다"},{pat:"look ahead to + 미래",desc:"~을 기대하다"}],ex:[{en:"It's important to <em>look ahead</em> and plan.",ko:"앞을 내다보고 계획하는 것이 중요해.",note:"계획"},{en:"<em>Looking ahead</em>, we expect growth.",ko:"앞을 내다보면 성장이 기대돼.",note:"전망"},{en:"Don't dwell on the past — <em>look ahead</em>.",ko:"과거에 연연하지 말고 앞을 봐.",note:"조언"},{en:"We need to <em>look ahead</em> to next quarter.",ko:"다음 분기를 내다봐야 해.",note:"비즈니스"},{en:"She always <em>looks ahead</em> to the next challenge.",ko:"그녀는 항상 다음 도전을 내다본다.",note:"성격"}],syn:[{s:"plan ahead",m:"미리 계획하다"},{s:"anticipate",m:"예측하다"},{s:"think ahead",m:"미리 생각하다"}],rel:["look forward to 기대하다","think ahead 미리 생각하다"]},
{w:"deal in",pron:"/diːl ɪn/",ko:"거래하다; 포함시키다",base:"other",diff:2,nu:"특정 상품을 거래하거나, 누군가를 거래·계획에 포함시키는 것.",uses:[{pat:"deal in + 상품",desc:"~을 거래하다"},{pat:"deal sb in",desc:"포함시키다"}],ex:[{en:"He <em>deals in</em> antique furniture.",ko:"그는 골동품 가구를 거래한다.",note:"사업"},{en:"The company <em>deals in</em> luxury goods.",ko:"그 회사는 명품을 거래한다.",note:"비즈니스"},{en:"<em>Deal me in</em> — I want to play.",ko:"나도 껴줘, 하고 싶어.",note:"게임"},{en:"Are you <em>dealing in</em> stolen goods?",ko:"훔친 물건을 거래하고 있는 거야?",note:"범죄"},{en:"<em>Deal</em> her <em>in</em> — she's part of the team.",ko:"그녀도 껴줘, 팀의 일원이잖아.",note:"포함"}],syn:[{s:"trade in",m:"거래하다"},{s:"include",m:"포함시키다"},{s:"traffic in",m:"거래하다"}],rel:["deal with 처리하다","deal out 나눠주다"]},
{w:"give over",pron:"/ɡɪv ˈəʊvər/",ko:"그만하다; 넘기다",base:"give",diff:2,nu:"하던 행동을 그만하거나, 시간·공간을 특정 목적에 바치거나, 통제권을 넘기는 것.",uses:[{pat:"give over! (영국 구어)",desc:"그만해!"},{pat:"give over to + 목적",desc:"~에 바치다"},{pat:"give over + 통제권",desc:"넘기다"}],ex:[{en:"<em>Give over</em>! You're being ridiculous.",ko:"그만해! 우스운 소리 하고 있어.",note:"구어"},{en:"The afternoon was <em>given over to</em> discussions.",ko:"오후는 토론에 할애됐다.",note:"시간"},{en:"She <em>gave over</em> control to her deputy.",ko:"그녀는 부관에게 통제권을 넘겼다.",note:"권한"},{en:"<em>Give over</em> moaning and do something.",ko:"투덜거리지 말고 뭔가 해.",note:"잔소리"},{en:"The room was <em>given over</em> to storage.",ko:"그 방은 창고로 쓰이게 됐다.",note:"공간"}],syn:[{s:"stop",m:"그만하다"},{s:"devote",m:"바치다"},{s:"hand over",m:"넘기다"}],rel:["give up 포기하다","hand over 넘기다"]},
{w:"give forth",pron:"/ɡɪv fɔːrθ/",ko:"발산하다; 내다",base:"give",diff:3,nu:"빛·소리·냄새 등을 내거나 발산하는 것. 다소 격식적·문학적 표현.",uses:[{pat:"give forth + 빛/소리",desc:"발산하다·내다"}],ex:[{en:"The flowers <em>gave forth</em> a sweet scent.",ko:"꽃들이 달콤한 향기를 발산했다.",note:"향기"},{en:"The fire <em>gave forth</em> warmth.",ko:"불이 온기를 내뿜었다.",note:"열"},{en:"He <em>gave forth</em> a deep sigh.",ko:"그는 깊은 한숨을 내쉬었다.",note:"탄식"},{en:"The speaker <em>gave forth</em> wisdom.",ko:"연사는 지혜를 쏟아냈다.",note:"격식"},{en:"The trumpet <em>gave forth</em> a clear note.",ko:"트럼펫이 맑은 음을 냈다.",note:"음악"}],syn:[{s:"emit",m:"방출하다"},{s:"give off",m:"발산하다"},{s:"produce",m:"내다"}],rel:["give off 발산하다","emit 방출하다"]},
{w:"put through to",pron:"/pʊt θruː tuː/",ko:"전화를 연결하다",base:"put",diff:1,nu:"전화를 특정 사람·부서에 연결해주는 것.",uses:[{pat:"put sb through to + 사람",desc:"전화를 연결하다"}],ex:[{en:"Let me <em>put you through to</em> customer service.",ko:"고객 서비스로 연결해드릴게요.",note:"전화"},{en:"Can you <em>put me through to</em> the manager?",ko:"매니저에게 연결해줄 수 있어요?",note:"요청"},{en:"I'll <em>put you through</em> right away.",ko:"바로 연결해드릴게요.",note:"안내"},{en:"She was <em>put through to</em> the wrong department.",ko:"그녀는 잘못된 부서로 연결됐다.",note:"실수"},{en:"Hold on while I <em>put you through</em>.",ko:"연결하는 동안 잠깐 기다려주세요.",note:"대기"}],syn:[{s:"connect",m:"연결하다"},{s:"transfer",m:"전환하다"},{s:"forward",m:"전달하다"}],rel:["put through 처리하다","connect to 연결하다"]},
{w:"come in handy",pron:"/kʌm ɪn ˈhændi/",ko:"유용하게 쓰이다",base:"come",diff:1,nu:"예상치 못한 상황에서 무언가가 유용하게 쓰이는 것.",uses:[{pat:"come in handy",desc:"유용하게 쓰이다"}],ex:[{en:"This knife will <em>come in handy</em> for camping.",ko:"이 칼이 캠핑에서 유용하게 쓰일 거야.",note:"유용함"},{en:"That extra cash <em>came in handy</em>.",ko:"그 여분의 돈이 유용하게 쓰였어.",note:"돈"},{en:"Your language skills will <em>come in handy</em>.",ko:"네 언어 능력이 유용하게 쓰일 거야.",note:"능력"},{en:"I kept it because I knew it would <em>come in handy</em>.",ko:"나중에 쓸 것 같아서 갖고 있었어.",note:"예비"},{en:"A good umbrella always <em>comes in handy</em>.",ko:"좋은 우산은 항상 유용하게 쓰여.",note:"일상"}],syn:[{s:"be useful",m:"유용하다"},{s:"prove helpful",m:"도움이 되다"},{s:"serve a purpose",m:"쓸모가 있다"}],rel:["come in 들어오다","handy (adj.) 유용한"]},
{w:"come to light",pron:"/kʌm tuː laɪt/",ko:"드러나다; 밝혀지다",base:"come",diff:2,nu:"숨겨져 있던 사실이나 정보가 알려지거나 밝혀지는 것.",uses:[{pat:"come to light",desc:"드러나다·밝혀지다"}],ex:[{en:"New evidence has <em>come to light</em>.",ko:"새로운 증거가 드러났다.",note:"증거"},{en:"The truth finally <em>came to light</em>.",ko:"진실이 마침내 밝혀졌다.",note:"진실"},{en:"Several problems <em>came to light</em> during the audit.",ko:"감사 중에 몇 가지 문제가 드러났다.",note:"감사"},{en:"How did this information <em>come to light</em>?",ko:"이 정보가 어떻게 밝혀졌어?",note:"질문"},{en:"More details are <em>coming to light</em> every day.",ko:"매일 더 많은 세부 사항이 밝혀지고 있다.",note:"진행"}],syn:[{s:"emerge",m:"나타나다"},{s:"be revealed",m:"밝혀지다"},{s:"surface",m:"드러나다"}],rel:["bring to light 드러내다","come out 알려지다"]},
{w:"come to terms with",pron:"/kʌm tuː tɜːrmz wɪð/",ko:"받아들이다; 인정하다",base:"come",diff:2,nu:"힘든 현실이나 상황을 감정적으로 받아들이고 적응하는 것.",uses:[{pat:"come to terms with + 현실",desc:"~을 받아들이다"}],ex:[{en:"She's still <em>coming to terms with</em> the loss.",ko:"그녀는 아직 그 상실을 받아들이는 중이야.",note:"슬픔"},{en:"He had to <em>come to terms with</em> his illness.",ko:"그는 자신의 병을 받아들여야 했다.",note:"건강"},{en:"It takes time to <em>come to terms with</em> failure.",ko:"실패를 받아들이는 데는 시간이 걸린다.",note:"실패"},{en:"Have you <em>come to terms with</em> what happened?",ko:"일어난 일을 받아들였어?",note:"과거"},{en:"Learning to <em>come to terms with</em> change is a skill.",ko:"변화를 받아들이는 법을 배우는 것은 하나의 기술이다.",note:"성장"}],syn:[{s:"accept",m:"받아들이다"},{s:"reconcile oneself to",m:"~에 체념하다"},{s:"make peace with",m:"화해하다"}],rel:["accept 받아들이다","face up to 직면하다"]},
{w:"fall short",pron:"/fɔːl ʃɔːrt/",ko:"부족하다; 기대에 못 미치다",base:"fall",diff:2,nu:"기대·목표·기준에 미치지 못하는 것.",uses:[{pat:"fall short of + 기대/목표",desc:"~에 못 미치다"},{pat:"fall short",desc:"부족하다"}],ex:[{en:"The results <em>fell short of</em> expectations.",ko:"결과가 기대에 못 미쳤다.",note:"실망"},{en:"We <em>fell short</em> by just two points.",ko:"딱 2점 부족했어.",note:"아쉬움"},{en:"The film <em>falls short</em> in the second half.",ko:"영화가 후반부에서 기대에 못 미친다.",note:"평가"},{en:"Don't <em>fall short</em> of your potential.",ko:"네 잠재력에 못 미치지 마.",note:"격려"},{en:"Their offer <em>fell short</em> of what we needed.",ko:"그들의 제안은 우리가 필요한 것에 미치지 못했다.",note:"협상"}],syn:[{s:"fail to meet",m:"충족하지 못하다"},{s:"be lacking",m:"부족하다"},{s:"come up short",m:"부족하다"}],rel:["come up short 부족하다","fall behind 뒤처지다"]},
{w:"fall flat",pron:"/fɔːl flæt/",ko:"효과가 없다; 실패하다",base:"fall",diff:2,nu:"농담이나 계획이 기대했던 반응을 얻지 못하거나 완전히 실패하는 것.",uses:[{pat:"fall flat (농담/계획)",desc:"효과가 없다·실패하다"}],ex:[{en:"His joke <em>fell flat</em> — nobody laughed.",ko:"그의 농담이 효과가 없었어, 아무도 웃지 않았어.",note:"농담"},{en:"The campaign completely <em>fell flat</em>.",ko:"캠페인이 완전히 실패했다.",note:"마케팅"},{en:"My attempt at humor <em>fell flat</em>.",ko:"내 유머 시도가 효과가 없었어.",note:"개인"},{en:"The speech <em>fell flat</em> with the audience.",ko:"연설이 청중에게 전혀 반응을 얻지 못했다.",note:"연설"},{en:"The new product launch <em>fell flat</em>.",ko:"신제품 출시가 실패했다.",note:"비즈니스"}],syn:[{s:"fail",m:"실패하다"},{s:"bomb",m:"참패하다"},{s:"flop",m:"실패하다"}],rel:["fall through 무산되다","go over badly 나쁜 반응을 얻다"]},
{w:"fall prey to",pron:"/fɔːl preɪ tuː/",ko:"~의 희생양이 되다; ~에 빠지다",base:"fall",diff:3,nu:"위험·유혹·조작에 희생당하거나 빠지는 것.",uses:[{pat:"fall prey to + 위험/유혹",desc:"~의 희생양이 되다"}],ex:[{en:"Don't <em>fall prey to</em> scams.",ko:"사기의 희생양이 되지 마.",note:"사기"},{en:"He <em>fell prey to</em> peer pressure.",ko:"그는 또래 압박에 굴복했다.",note:"압박"},{en:"Many people <em>fall prey to</em> misinformation.",ko:"많은 사람들이 잘못된 정보의 희생양이 된다.",note:"정보"},{en:"She <em>fell prey to</em> his charm.",ko:"그녀는 그의 매력에 빠졌다.",note:"매력"},{en:"Animals <em>fall prey to</em> predators.",ko:"동물들은 포식자의 먹이가 된다.",note:"자연"}],syn:[{s:"become a victim of",m:"희생양이 되다"},{s:"succumb to",m:"굴복하다"},{s:"be caught by",m:"잡히다"}],rel:["fall for 속다","be taken advantage of 이용당하다"]},
{w:"stand out against",pron:"/stænd aʊt əˈɡenst/",ko:"~에 대비해 돋보이다; 반대하다",base:"stand",diff:2,nu:"배경과의 대비로 눈에 띄거나, 어떤 것에 적극적으로 반대하는 것.",uses:[{pat:"stand out against + 배경",desc:"대비되어 돋보이다"},{pat:"stand out against + 제도",desc:"반대하다"}],ex:[{en:"The red sign <em>stands out against</em> the white wall.",ko:"빨간 표지판이 흰 벽과 대비되어 눈에 띈다.",note:"시각"},{en:"She <em>stood out against</em> the unfair policy.",ko:"그녀는 불공정한 정책에 반대했다.",note:"반대"},{en:"The dark tree <em>stands out against</em> the pale sky.",ko:"어두운 나무가 흐린 하늘과 대비되어 돋보인다.",note:"풍경"},{en:"He always <em>stands out against</em> corruption.",ko:"그는 항상 부패에 맞선다.",note:"원칙"},{en:"The yellow logo <em>stands out against</em> the dark background.",ko:"노란 로고가 어두운 배경에 돋보인다.",note:"디자인"}],syn:[{s:"contrast with",m:"대비되다"},{s:"oppose",m:"반대하다"},{s:"be prominent against",m:"~에 대비해 두드러지다"}],rel:["stand out 두드러지다","stand against 반대하다"]},
{w:"turn away",pron:"/tɜːrn əˈweɪ/",ko:"외면하다; 돌려보내다",base:"turn",diff:1,nu:"외면하거나 고개를 돌리거나, 누군가를 거절하고 돌려보내는 것.",uses:[{pat:"turn away (시선)",desc:"외면하다·고개를 돌리다"},{pat:"turn sb away",desc:"거절하다·돌려보내다"}],ex:[{en:"She <em>turned away</em> in disgust.",ko:"그녀는 역겨움에 고개를 돌렸다.",note:"반응"},{en:"Hundreds of people were <em>turned away</em> at the door.",ko:"수백 명이 문 앞에서 거절당했다.",note:"입장 거절"},{en:"Don't <em>turn away</em> from the truth.",ko:"진실에서 외면하지 마.",note:"현실"},{en:"The restaurant had to <em>turn away</em> customers.",ko:"식당이 손님들을 돌려보내야 했다.",note:"만석"},{en:"He <em>turned away</em> and pretended not to see.",ko:"그는 고개를 돌리고 보지 못한 척했다.",note:"외면"}],syn:[{s:"look away",m:"외면하다"},{s:"reject",m:"거절하다"},{s:"send away",m:"돌려보내다"}],rel:["turn back 돌아가다","send away 돌려보내다"]},
{w:"turn back",pron:"/tɜːrn bæk/",ko:"돌아가다; 되돌리다",base:"turn",diff:1,nu:"왔던 길을 돌아가거나, 시간을 되돌리거나, 누군가를 돌려보내는 것.",uses:[{pat:"turn back (여행)",desc:"돌아가다"},{pat:"turn back the clock",desc:"시간을 되돌리다"},{pat:"turn sb back",desc:"돌려보내다"}],ex:[{en:"The weather forced us to <em>turn back</em>.",ko:"날씨 때문에 되돌아가야 했다.",note:"여행"},{en:"There's no <em>turning back</em> now.",ko:"이제 돌이킬 수 없어.",note:"결정"},{en:"I wish I could <em>turn back</em> the clock.",ko:"시간을 되돌릴 수 있다면 좋겠어.",note:"후회"},{en:"They were <em>turned back</em> at the border.",ko:"그들은 국경에서 되돌려보내졌다.",note:"입국 거절"},{en:"Once you've started, don't <em>turn back</em>.",ko:"시작했으면 뒤돌아보지 마.",note:"격려"}],syn:[{s:"return",m:"돌아가다"},{s:"go back",m:"되돌아가다"},{s:"reverse",m:"되돌리다"}],rel:["no turning back 되돌릴 수 없는","turn around 돌아서다"]},
{w:"hold over",pron:"/həʊld ˈəʊvər/",ko:"연장하다; 보류하다; 협박하다",base:"hold",diff:2,nu:"영화·공연의 상영을 연장하거나, 결정을 다음으로 미루거나, 약점으로 협박하는 것.",uses:[{pat:"hold over (공연)",desc:"연장하다"},{pat:"hold over + 결정",desc:"보류하다"},{pat:"hold sth over sb",desc:"협박하다"}],ex:[{en:"The film was <em>held over</em> for another week.",ko:"영화가 일주일 더 연장 상영됐다.",note:"연장"},{en:"The decision was <em>held over</em> until next month.",ko:"결정이 다음 달로 보류됐다.",note:"보류"},{en:"He was <em>holding</em> that secret <em>over</em> her.",ko:"그는 그 비밀로 그녀를 협박하고 있었다.",note:"협박"},{en:"The meeting was <em>held over</em> from last week.",ko:"회의가 지난주에서 이번 주로 미뤄졌다.",note:"연기"},{en:"That mistake shouldn't be <em>held over</em> you forever.",ko:"그 실수가 영원히 당신에게 약점으로 남으면 안 돼.",note:"공정"}],syn:[{s:"extend",m:"연장하다"},{s:"postpone",m:"연기하다"},{s:"blackmail",m:"협박하다"}],rel:["hold back 보류하다","carry over 이월하다"]},
{w:"hold in",pron:"/həʊld ɪn/",ko:"억누르다; 참다",base:"hold",diff:2,nu:"감정·배를 안으로 억누르거나 참는 것.",uses:[{pat:"hold in + 감정",desc:"억누르다·참다"},{pat:"hold in your stomach",desc:"배를 집어넣다"}],ex:[{en:"She <em>held in</em> her laughter.",ko:"그녀는 웃음을 참았다.",note:"참음"},{en:"Don't <em>hold in</em> your feelings — talk about them.",ko:"감정을 억누르지 말고 얘기해.",note:"조언"},{en:"He <em>held in</em> his anger all day.",ko:"그는 하루 종일 화를 참았다.",note:"화"},{en:"<em>Hold in</em> your stomach for the photo.",ko:"사진 찍으니까 배 집어넣어.",note:"사진"},{en:"It's not healthy to <em>hold in</em> your emotions.",ko:"감정을 억누르는 것은 건강에 좋지 않아.",note:"건강"}],syn:[{s:"suppress",m:"억누르다"},{s:"contain",m:"억제하다"},{s:"restrain",m:"참다"}],rel:["hold back 억누르다","bottle up 속에 담아두다"]},
{w:"pick up after",pron:"/pɪk ʌp ˈɑːftər/",ko:"~의 뒷정리를 하다",base:"pick",diff:2,nu:"다른 사람이 어질러 놓은 것을 대신 치우거나 정리하는 것.",uses:[{pat:"pick up after + 사람",desc:"~의 뒷정리를 하다"}],ex:[{en:"I'm tired of <em>picking up after</em> you.",ko:"네 뒷정리 하는 것 지쳤어.",note:"불만"},{en:"Parents often <em>pick up after</em> their kids.",ko:"부모들은 종종 아이들의 뒷정리를 한다.",note:"육아"},{en:"Stop expecting others to <em>pick up after</em> you.",ko:"다른 사람들이 네 뒷정리 해줄 거라고 기대하지 마.",note:"책임"},{en:"The cleaner had to <em>pick up after</em> the party guests.",ko:"청소부가 파티 손님들의 뒷정리를 해야 했다.",note:"파티"},{en:"Nobody should have to <em>pick up after</em> grown adults.",ko:"다 큰 어른의 뒷정리를 대신 해줄 사람은 없어.",note:"성인"}],syn:[{s:"clean up after",m:"뒷정리하다"},{s:"tidy up",m:"정리하다"}],rel:["clean up after 뒷정리하다","pick up 줍다"]},
{w:"break the ice",pron:"/breɪk ðə aɪs/",ko:"어색한 분위기를 깨다",base:"break",diff:1,nu:"처음 만난 사람들 사이의 어색함이나 긴장감을 없애는 것.",uses:[{pat:"break the ice",desc:"어색한 분위기를 깨다"}],ex:[{en:"He told a joke to <em>break the ice</em>.",ko:"그는 어색한 분위기를 깨기 위해 농담을 했다.",note:"첫 만남"},{en:"Ice-breaker games help <em>break the ice</em>.",ko:"아이스브레이커 게임이 어색한 분위기를 깨는 데 도움이 돼.",note:"활동"},{en:"She was the first to <em>break the ice</em> and introduce herself.",ko:"그녀가 먼저 나서서 자기소개를 했다.",note:"용기"},{en:"A simple compliment can <em>break the ice</em>.",ko:"간단한 칭찬이 분위기를 깨는 데 도움이 돼.",note:"팁"},{en:"It was hard to <em>break the ice</em> at first.",ko:"처음에는 어색한 분위기를 깨기가 어려웠다.",note:"어려움"}],syn:[{s:"ease the tension",m:"긴장을 풀다"},{s:"initiate conversation",m:"대화를 시작하다"},{s:"warm up the atmosphere",m:"분위기를 풀다"}],rel:["icebreaker 아이스브레이커","warm up 워밍업하다"]},
{w:"break the news",pron:"/breɪk ðə njuːz/",ko:"(나쁜) 소식을 전하다",base:"break",diff:2,nu:"특히 좋지 않거나 충격적인 소식을 처음으로 알려주는 것.",uses:[{pat:"break the news to sb",desc:"~에게 소식을 전하다"},{pat:"break it to sb gently",desc:"부드럽게 알려주다"}],ex:[{en:"Who's going to <em>break the news</em> to him?",ko:"누가 그에게 소식을 전할 거야?",note:"나쁜 소식"},{en:"She <em>broke the news</em> gently.",ko:"그녀는 부드럽게 소식을 전했다.",note:"배려"},{en:"I hate being the one to <em>break the news</em>.",ko:"나쁜 소식을 전하는 사람이 되기 싫어.",note:"불편함"},{en:"How do you <em>break the news</em> to someone that they've been fired?",ko:"해고됐다는 소식을 어떻게 전하지?",note:"어려운 상황"},{en:"He had to <em>break the news</em> about the accident.",ko:"그는 사고 소식을 전해야 했다.",note:"사고"}],syn:[{s:"inform",m:"알리다"},{s:"deliver the news",m:"소식을 전하다"},{s:"tell",m:"말하다"}],rel:["bear bad news 나쁜 소식을 전하다","be the messenger 전달자가 되다"]},
{w:"keep tabs on",pron:"/kiːp tæbz ɒn/",ko:"~을 추적하다; 감시하다",base:"keep",diff:2,nu:"누군가의 행동이나 상황을 주의 깊게 지켜보거나 추적하는 것.",uses:[{pat:"keep tabs on + 사람/상황",desc:"~을 추적하다·감시하다"}],ex:[{en:"The boss is <em>keeping tabs on</em> everyone.",ko:"상사가 모두를 감시하고 있어.",note:"감시"},{en:"I like to <em>keep tabs on</em> my spending.",ko:"나는 지출을 추적하는 걸 좋아해.",note:"재정"},{en:"Parents should <em>keep tabs on</em> their kids' online activity.",ko:"부모들은 아이들의 온라인 활동을 주시해야 한다.",note:"육아"},{en:"He's been <em>keeping tabs on</em> his ex.",ko:"그는 전 여자친구를 감시하고 있어.",note:"스토킹"},{en:"It's hard to <em>keep tabs on</em> everything.",ko:"모든 것을 파악하기는 어렵다.",note:"일상"}],syn:[{s:"monitor",m:"감시하다"},{s:"track",m:"추적하다"},{s:"keep an eye on",m:"주시하다"}],rel:["keep an eye on 주시하다","keep track of 추적하다"]},
{w:"keep track of",pron:"/kiːp træk əv/",ko:"~을 파악하다; 추적하다",base:"keep",diff:1,nu:"변하는 정보·상황을 계속 파악하거나 기록하는 것.",uses:[{pat:"keep track of + 정보",desc:"~을 파악하다·기록하다"}],ex:[{en:"I use an app to <em>keep track of</em> my expenses.",ko:"앱을 써서 지출을 파악해.",note:"재정"},{en:"It's hard to <em>keep track of</em> all the changes.",ko:"모든 변화를 파악하기 어렵다.",note:"정보"},{en:"She <em>kept track of</em> every meeting in her diary.",ko:"그녀는 일기장에 모든 회의를 기록했다.",note:"기록"},{en:"<em>Keep track of</em> your progress.",ko:"진행 상황을 파악해.",note:"목표"},{en:"I've lost <em>track of</em> how many times we've met.",ko:"몇 번 만났는지 잊어버렸어.",note:"분실"}],syn:[{s:"monitor",m:"모니터하다"},{s:"record",m:"기록하다"},{s:"follow",m:"추적하다"}],rel:["keep tabs on 감시하다","lose track of 파악을 잃다"]},
{w:"get even",pron:"/ɡet ˈiːvən/",ko:"복수하다; 앙갚음하다",base:"get",diff:1,nu:"누군가가 자신에게 한 나쁜 일에 똑같이 갚아주는 것.",uses:[{pat:"get even with + 사람",desc:"~에게 복수하다"}],ex:[{en:"I'll <em>get even</em> with him for that.",ko:"저것 때문에 그에게 복수할 거야.",note:"복수"},{en:"She vowed to <em>get even</em>.",ko:"그녀는 복수하겠다고 맹세했다.",note:"결심"},{en:"Don't try to <em>get even</em> — it's not worth it.",ko:"복수하려 하지 마, 그럴 가치 없어.",note:"조언"},{en:"He waited years to <em>get even</em> with his rival.",ko:"그는 몇 년을 기다려 라이벌에게 복수했다.",note:"기다림"},{en:"Two wrongs don't make a right — don't try to <em>get even</em>.",ko:"나쁜 것 두 개가 좋은 것을 만들지 않아, 복수하려 하지 마.",note:"격언"}],syn:[{s:"retaliate",m:"앙갚음하다"},{s:"take revenge",m:"복수하다"},{s:"pay back",m:"갚아주다"}],rel:["get back at 앙갚음하다","take revenge 복수하다"]},
{w:"get hold of",pron:"/ɡet həʊld əv/",ko:"연락하다; 구하다; 잡다",base:"get",diff:1,nu:"누군가에게 연락을 취하거나, 물건을 구하거나, 무언가를 잡는 것.",uses:[{pat:"get hold of + 사람",desc:"연락하다"},{pat:"get hold of + 물건",desc:"구하다·입수하다"},{pat:"get hold of + 물건 (잡다)",desc:"잡다"}],ex:[{en:"I've been trying to <em>get hold of</em> you all day.",ko:"하루 종일 연락하려 했어.",note:"연락"},{en:"Where can I <em>get hold of</em> this book?",ko:"이 책을 어디서 구할 수 있어?",note:"구하기"},{en:"<em>Get hold of</em> the rope and pull.",ko:"밧줄을 잡고 당겨.",note:"잡기"},{en:"How did they <em>get hold of</em> that information?",ko:"그들이 그 정보를 어떻게 입수했지?",note:"정보"},{en:"I can't <em>get hold of</em> anyone on a Sunday.",ko:"일요일엔 아무에게도 연락이 안 돼.",note:"연락"}],syn:[{s:"contact",m:"연락하다"},{s:"obtain",m:"구하다"},{s:"grab",m:"잡다"}],rel:["get in touch 연락하다","obtain 입수하다"]},
{w:"get wind of",pron:"/ɡet wɪnd əv/",ko:"~의 낌새를 채다; 소문을 듣다",base:"get",diff:2,nu:"아직 공식적으로 알려지지 않은 정보나 계획에 대해 간접적으로 알게 되는 것.",uses:[{pat:"get wind of + 계획/정보",desc:"낌새를 채다·소문을 듣다"}],ex:[{en:"How did they <em>get wind of</em> our plans?",ko:"그들이 어떻게 우리 계획의 낌새를 챘지?",note:"비밀"},{en:"The press <em>got wind of</em> the scandal.",ko:"언론이 스캔들 소문을 들었다.",note:"언론"},{en:"She <em>got wind of</em> the surprise party.",ko:"그녀가 깜짝 파티의 낌새를 채버렸어.",note:"비밀"},{en:"If the boss <em>gets wind of</em> this, we're in trouble.",ko:"상사가 이것을 알게 되면 우리 큰일이야.",note:"경고"},{en:"I <em>got wind of</em> a potential merger.",ko:"합병 가능성에 대한 소문을 들었어.",note:"비즈니스"}],syn:[{s:"hear about",m:"소문을 듣다"},{s:"get a hint of",m:"낌새를 채다"},{s:"find out",m:"알아내다"}],rel:["catch wind of 낌새를 채다","hear on the grapevine 소문을 듣다"]},
{w:"drag on",pron:"/dræɡ ɒn/",ko:"질질 끌다; 지루하게 이어지다",base:"other",diff:1,nu:"회의·연설·상황이 너무 오랫동안 지루하게 이어지는 것.",uses:[{pat:"drag on (시간)",desc:"지루하게 이어지다"}],ex:[{en:"The meeting <em>dragged on</em> for hours.",ko:"회의가 몇 시간 동안 질질 끌었다.",note:"회의"},{en:"The war <em>dragged on</em> for years.",ko:"전쟁이 수년간 질질 끌었다.",note:"전쟁"},{en:"Stop letting this conversation <em>drag on</em>.",ko:"이 대화가 질질 끌리게 놔두지 마.",note:"대화"},{en:"The film <em>dragged on</em> in the second half.",ko:"영화가 후반부에서 지루하게 이어졌다.",note:"영화"},{en:"Time really <em>drags on</em> when you're bored.",ko:"지루할 때 시간이 정말 느리게 간다.",note:"지루함"}],syn:[{s:"linger",m:"계속되다"},{s:"stretch out",m:"늘어지다"},{s:"go on and on",m:"계속 이어지다"}],rel:["drag out 끌다","go on 계속되다"]},
{w:"drag out",pron:"/dræɡ aʊt/",ko:"끌어내다; 질질 끌다",base:"other",diff:1,nu:"무언가를 억지로 끌어내거나, 상황·과정을 불필요하게 오래 끄는 것.",uses:[{pat:"drag out + 물건",desc:"끌어내다"},{pat:"drag out + 과정",desc:"질질 끌다"},{pat:"drag sth out of sb",desc:"억지로 끌어내다"}],ex:[{en:"Don't <em>drag out</em> the negotiations.",ko:"협상을 질질 끌지 마.",note:"협상"},{en:"She <em>dragged</em> the truth <em>out of</em> him.",ko:"그녀는 그에게서 진실을 억지로 끌어냈다.",note:"진실"},{en:"<em>Drag out</em> the old photos and we'll have a look.",ko:"옛날 사진들 꺼내, 한번 볼게.",note:"물건"},{en:"Why are you <em>dragging this out</em>?",ko:"왜 이걸 질질 끄는 거야?",note:"답답함"},{en:"The trial was <em>dragged out</em> for months.",ko:"재판이 몇 달 동안 질질 끌렸다.",note:"법정"}],syn:[{s:"prolong",m:"연장하다"},{s:"extract",m:"끄집어내다"},{s:"stretch",m:"늘이다"}],rel:["drag on 질질 끌다","draw out 끌어내다"]},
{w:"back out of",pron:"/bæk aʊt əv/",ko:"~에서 빠지다; 약속을 어기다",base:"other",diff:1,nu:"이미 동의하거나 약속한 것에서 빠져나오는 것. 실망을 줄 수 있는 뉘앙스.",uses:[{pat:"back out of + 약속/거래",desc:"~에서 빠지다·약속을 어기다"}],ex:[{en:"He <em>backed out of</em> the deal at the last minute.",ko:"그는 막판에 거래에서 빠졌다.",note:"거래"},{en:"She <em>backed out of</em> the wedding.",ko:"그녀는 결혼식에서 빠졌다.",note:"결혼"},{en:"Don't <em>back out of</em> your commitments.",ko:"약속에서 빠지지 마.",note:"조언"},{en:"He tends to <em>back out of</em> things when it gets tough.",ko:"그는 힘들어지면 빠지려는 경향이 있다.",note:"성격"},{en:"The investor <em>backed out of</em> the project.",ko:"투자자가 프로젝트에서 빠졌다.",note:"투자"}],syn:[{s:"withdraw from",m:"철수하다"},{s:"pull out of",m:"빠지다"},{s:"renege on",m:"약속을 어기다"}],rel:["pull out of 빠지다","back down 물러서다"]},
{w:"back away from",pron:"/bæk əˈweɪ frəm/",ko:"~에서 물러서다; 회피하다",base:"other",diff:2,nu:"위험하거나 불편한 것에서 뒤로 물러서거나, 입장을 철회하는 것.",uses:[{pat:"back away from + 위험",desc:"물러서다"},{pat:"back away from + 입장",desc:"철회하다"}],ex:[{en:"<em>Back away from</em> the edge!",ko:"가장자리에서 물러서!",note:"안전"},{en:"He <em>backed away from</em> his earlier statement.",ko:"그는 앞서 한 발언에서 물러섰다.",note:"철회"},{en:"She <em>backed away from</em> the confrontation.",ko:"그녀는 대립에서 물러섰다.",note:"갈등"},{en:"The government <em>backed away from</em> its plan.",ko:"정부가 계획에서 물러섰다.",note:"정책"},{en:"Don't <em>back away from</em> challenges.",ko:"도전에서 물러서지 마.",note:"격려"}],syn:[{s:"retreat from",m:"후퇴하다"},{s:"step back from",m:"물러서다"},{s:"withdraw from",m:"철수하다"}],rel:["back down 물러서다","back out of 빠지다"]},
{w:"speak out",pron:"/spiːk aʊt/",ko:"공개적으로 발언하다; 목소리를 높이다",base:"other",diff:1,nu:"부당함이나 중요한 사안에 대해 용감하게 공개적으로 발언하는 것.",uses:[{pat:"speak out (against sth)",desc:"~에 대해 목소리를 높이다"}],ex:[{en:"She <em>spoke out</em> against injustice.",ko:"그녀는 불의에 맞서 목소리를 높였다.",note:"용기"},{en:"More people need to <em>speak out</em>.",ko:"더 많은 사람들이 목소리를 높여야 해.",note:"사회"},{en:"He was afraid to <em>speak out</em>.",ko:"그는 목소리를 높이기 두려웠다.",note:"두려움"},{en:"<em>Speak out</em> if you witness bullying.",ko:"괴롭힘을 목격하면 목소리를 높여.",note:"조언"},{en:"The employees <em>spoke out</em> about unsafe conditions.",ko:"직원들이 불안전한 환경에 대해 목소리를 높였다.",note:"직장"}],syn:[{s:"voice",m:"목소리를 내다"},{s:"stand up",m:"나서다"},{s:"protest",m:"항의하다"}],rel:["speak up 목소리를 높이다","stand up for 옹호하다"]},
{w:"speak up",pron:"/spiːk ʌp/",ko:"크게 말하다; 의견을 말하다",base:"other",diff:1,nu:"더 크게 말하거나, 두려움 없이 의견을 표현하거나, 누군가를 위해 나서는 것.",uses:[{pat:"speak up (크기)",desc:"더 크게 말하다"},{pat:"speak up (의견)",desc:"의견을 말하다"},{pat:"speak up for sb",desc:"~를 위해 나서다"}],ex:[{en:"<em>Speak up</em> — I can't hear you.",ko:"크게 말해, 안 들려.",note:"소리"},{en:"Don't be afraid to <em>speak up</em> in meetings.",ko:"회의에서 의견 말하는 걸 두려워하지 마.",note:"회의"},{en:"She <em>spoke up</em> for the less experienced team members.",ko:"그녀는 경험이 적은 팀원들을 위해 나섰다.",note:"나섬"},{en:"If you disagree, <em>speak up</em>.",ko:"동의하지 않으면 말해.",note:"소통"},{en:"He finally <em>spoke up</em> about what he'd seen.",ko:"그는 마침내 자신이 본 것에 대해 말했다.",note:"용기"}],syn:[{s:"raise one's voice",m:"목소리를 높이다"},{s:"say something",m:"말하다"},{s:"defend",m:"방어하다"}],rel:["speak out 공개 발언하다","pipe up 불쑥 말하다"]},

{w:"throw away",pron:"/θrəʊ əˈweɪ/",ko:"버리다; 낭비하다",base:"other",diff:1,nu:"물건을 버리거나, 기회·재능을 낭비하는 것.",uses:[{pat:"throw away + 물건",desc:"버리다"},{pat:"throw away + 기회",desc:"낭비하다"}],ex:[{en:"Don't <em>throw away</em> your old notes.",ko:"옛날 노트 버리지 마.",note:"보관"},{en:"He <em>threw away</em> a promising career.",ko:"그는 유망한 커리어를 낭비했다.",note:"낭비"},{en:"<em>Throw away</em> anything you don't need.",ko:"필요 없는 건 버려.",note:"정리"},{en:"Don't <em>throw away</em> this opportunity.",ko:"이 기회를 낭비하지 마.",note:"기회"},{en:"She <em>threw away</em> the receipt by mistake.",ko:"그녀는 실수로 영수증을 버렸다.",note:"실수"}],syn:[{s:"discard",m:"버리다"},{s:"waste",m:"낭비하다"},{s:"dispose of",m:"처분하다"}],rel:["throw out 버리다","waste 낭비하다"]},
{w:"throw out",pron:"/θrəʊ aʊt/",ko:"버리다; 내쫓다; 제안하다",base:"other",diff:1,nu:"물건을 버리거나, 사람을 쫓아내거나, 아이디어를 제안하는 것.",uses:[{pat:"throw out + 물건",desc:"버리다"},{pat:"throw sb out",desc:"내쫓다"},{pat:"throw out + 아이디어",desc:"제안하다"}],ex:[{en:"I <em>threw out</em> all my old magazines.",ko:"오래된 잡지들을 다 버렸어.",note:"정리"},{en:"He was <em>thrown out</em> of the bar.",ko:"그는 바에서 쫓겨났다.",note:"퇴장"},{en:"Let me <em>throw out</em> a few ideas.",ko:"몇 가지 아이디어를 제안해볼게.",note:"브레인스토밍"},{en:"The case was <em>thrown out</em> of court.",ko:"사건이 법원에서 기각됐다.",note:"법정"},{en:"She <em>threw out</em> her back lifting boxes.",ko:"그녀는 상자를 들다가 허리를 삐었다.",note:"부상"}],syn:[{s:"discard",m:"버리다"},{s:"expel",m:"쫓아내다"},{s:"suggest",m:"제안하다"}],rel:["throw away 버리다","kick out 내쫓다"]},
{w:"throw up",pron:"/θrəʊ ʌp/",ko:"토하다; 급히 짓다; 드러내다",base:"other",diff:1,nu:"구토하거나, 건물을 급히 세우거나, 기회·문제를 드러내는 것.",uses:[{pat:"throw up (구토)",desc:"토하다"},{pat:"throw up + 건물",desc:"급히 짓다"},{pat:"throw up + 문제",desc:"드러내다"}],ex:[{en:"The smell made her want to <em>throw up</em>.",ko:"냄새 때문에 토할 것 같았다.",note:"구토"},{en:"They <em>threw up</em> a building in record time.",ko:"그들은 기록적인 시간에 건물을 급히 지었다.",note:"건설"},{en:"The investigation <em>threw up</em> some interesting findings.",ko:"조사가 흥미로운 결과를 드러냈다.",note:"발견"},{en:"He <em>threw up</em> his hands in despair.",ko:"그는 절망하여 두 손을 들었다.",note:"제스처"},{en:"The journey made the child <em>throw up</em>.",ko:"여정이 아이를 멀미하게 했다.",note:"멀미"}],syn:[{s:"vomit",m:"구토하다"},{s:"erect quickly",m:"급히 세우다"},{s:"reveal",m:"드러내다"}],rel:["feel sick 구역질나다","bring up 토하다"]}
