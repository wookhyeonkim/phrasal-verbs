{w:"lay off",pron:"/leɪ ɒf/",ko:"해고하다; 그만하다",base:"other",diff:1,nu:"경영상 이유로 직원을 해고하거나, 누군가를 그만 괴롭히거나 비판하는 것.",uses:[{pat:"lay off + 직원",desc:"해고하다"},{pat:"lay off sb/sth",desc:"그만하다·내버려두다"}],ex:[{en:"The company had to <em>lay off</em> 200 workers.",ko:"회사는 200명의 직원을 해고해야 했다.",note:"해고"},{en:"<em>Lay off</em> him — he's trying his best.",ko:"그냥 내버려 둬, 최선을 다하고 있잖아.",note:"간섭"},{en:"She was <em>laid off</em> during the recession.",ko:"그녀는 경기 침체 중에 해고됐다.",note:"경제"},{en:"<em>Lay off</em> the junk food.",ko:"정크푸드 좀 그만 먹어.",note:"건강"},{en:"I got <em>laid off</em> last month.",ko:"지난달에 해고됐어.",note:"개인"}],syn:[{s:"dismiss",m:"해고하다"},{s:"make redundant",m:"감원하다"},{s:"stop",m:"그만하다"}],rel:["layoff (n.) 해고","make redundant 감원하다","leave alone 내버려두다"]},
{w:"lay down",pron:"/leɪ daʊn/",ko:"내려놓다; 규정을 정하다; 희생하다",base:"other",diff:2,nu:"무기·짐을 내려놓거나, 규칙·조건을 정하거나, 목숨을 희생하는 것.",uses:[{pat:"lay down + 무기",desc:"무기를 내려놓다"},{pat:"lay down + 규칙",desc:"규정하다"},{pat:"lay down one's life",desc:"목숨을 바치다"}],ex:[{en:"The rebels <em>laid down</em> their arms.",ko:"반군이 무기를 내려놓았다.",note:"항복"},{en:"The contract <em>lays down</em> the terms.",ko:"계약이 조건을 규정한다.",note:"규정"},{en:"He <em>laid down</em> his life for his country.",ko:"그는 나라를 위해 목숨을 바쳤다.",note:"희생"},{en:"She <em>laid down</em> strict rules for the house.",ko:"그녀는 집에 엄격한 규칙을 정했다.",note:"규칙"},{en:"<em>Lay down</em> your burden and rest.",ko:"짐을 내려놓고 쉬어.",note:"비유"}],syn:[{s:"put down",m:"내려놓다"},{s:"establish",m:"정하다"},{s:"sacrifice",m:"희생하다"}],rel:["lay out 배치하다","lay aside 제쳐두다"]},
{w:"lay out",pron:"/leɪ aʊt/",ko:"배치하다; 설명하다; 돈을 쓰다",base:"other",diff:2,nu:"물건을 늘어놓거나, 계획을 상세히 설명하거나, 돈을 지출하거나, 사람을 넘어뜨리는 것.",uses:[{pat:"lay out + 물건",desc:"늘어놓다·배치하다"},{pat:"lay out + 계획",desc:"상세히 설명하다"},{pat:"lay out + 돈",desc:"지출하다"}],ex:[{en:"She <em>laid out</em> all the documents on the table.",ko:"그녀는 모든 서류를 탁자에 늘어놓았다.",note:"배치"},{en:"Let me <em>lay out</em> the plan for you.",ko:"계획을 상세히 설명해줄게.",note:"설명"},{en:"We had to <em>lay out</em> a lot of money for repairs.",ko:"수리비로 돈을 많이 써야 했다.",note:"지출"},{en:"The garden was beautifully <em>laid out</em>.",ko:"정원이 아름답게 배치되어 있었다.",note:"정원"},{en:"One punch and he <em>laid him out</em>.",ko:"주먹 한 방에 그를 쓰러뜨렸다.",note:"격투"}],syn:[{s:"arrange",m:"배치하다"},{s:"explain",m:"설명하다"},{s:"spend",m:"지출하다"}],rel:["layout (n.) 배치·레이아웃","lay out a plan 계획을 설명하다"]},
{w:"lay into",pron:"/leɪ ˈɪntuː/",ko:"맹렬히 공격하다; 혹독하게 비난하다",base:"other",diff:2,nu:"물리적으로 맹렬히 공격하거나, 말로 혹독하게 비난하는 것.",uses:[{pat:"lay into + 사람",desc:"맹렬히 공격하다·혹독히 비난하다"}],ex:[{en:"She <em>laid into</em> him for being late.",ko:"그녀는 지각했다는 이유로 그를 혹독하게 비난했다.",note:"비난"},{en:"The critics <em>laid into</em> the film.",ko:"비평가들이 영화를 혹독하게 비판했다.",note:"비평"},{en:"He <em>laid into</em> the food after the long hike.",ko:"긴 하이킹 후 그는 음식을 게걸스럽게 먹었다.",note:"음식"},{en:"The manager <em>laid into</em> the team after the loss.",ko:"매니저가 패배 후 팀을 맹렬히 질책했다.",note:"스포츠"},{en:"Don't <em>lay into</em> him — he made an honest mistake.",ko:"그를 비난하지 마, 정직한 실수를 한 거야.",note:"조언"}],syn:[{s:"attack",m:"공격하다"},{s:"criticize harshly",m:"혹독히 비난하다"},{s:"berate",m:"꾸짖다"}],rel:["tear into 비난하다","go for 공격하다"]},
{w:"lay aside",pron:"/leɪ əˈsaɪd/",ko:"제쳐두다; 저축하다",base:"other",diff:2,nu:"잠시 제쳐두거나, 돈을 저축하거나, 차이점을 무시하고 나아가는 것.",uses:[{pat:"lay aside + 감정/차이",desc:"제쳐두다"},{pat:"lay aside + 돈",desc:"저축하다"}],ex:[{en:"Let's <em>lay aside</em> our differences.",ko:"차이점은 제쳐두자.",note:"화해"},{en:"She <em>lays aside</em> money each month.",ko:"그녀는 매달 돈을 저축한다.",note:"저축"},{en:"<em>Lay aside</em> your worries and enjoy the moment.",ko:"걱정은 제쳐두고 현재를 즐겨.",note:"조언"},{en:"He <em>laid aside</em> the book to answer the phone.",ko:"그는 전화를 받기 위해 책을 내려놓았다.",note:"행동"},{en:"The project was <em>laid aside</em> due to lack of funding.",ko:"자금 부족으로 프로젝트가 보류됐다.",note:"프로젝트"}],syn:[{s:"set aside",m:"제쳐두다"},{s:"put aside",m:"저축하다"},{s:"shelve",m:"보류하다"}],rel:["put aside 제쳐두다","set aside 따로 떼다"]},
{w:"bring on",pron:"/brɪŋ ɒn/",ko:"초래하다; 불러오다",base:"bring",diff:1,nu:"어떤 상황·증상을 일으키거나 더 심하게 만드는 것. 'bring it on!'은 도전을 받아들이겠다는 표현.",uses:[{pat:"bring on + 증상/상황",desc:"초래하다·유발하다"},{pat:"bring it on!",desc:"덤벼봐!"}],ex:[{en:"Stress can <em>bring on</em> migraines.",ko:"스트레스가 편두통을 유발할 수 있어.",note:"건강"},{en:"<em>Bring it on</em>! I'm ready for anything.",ko:"덤벼봐! 뭐든 준비돼있어.",note:"도전"},{en:"The cold weather <em>brought on</em> her arthritis.",ko:"추운 날씨가 그녀의 관절염을 악화시켰다.",note:"건강"},{en:"What <em>brought on</em> this sudden change?",ko:"이 갑작스러운 변화를 뭐가 초래했어?",note:"변화"},{en:"The news <em>brought on</em> a wave of anxiety.",ko:"그 소식이 불안의 파도를 몰고 왔다.",note:"감정"}],syn:[{s:"cause",m:"야기하다"},{s:"trigger",m:"촉발하다"},{s:"induce",m:"유발하다"}],rel:["bring about 초래하다","trigger 촉발하다"]},
{w:"bring off",pron:"/brɪŋ ɒf/",ko:"성공적으로 해내다",base:"bring",diff:2,nu:"어렵거나 까다로운 것을 성공적으로 이루어내는 것. 'pull off'와 비슷한 의미.",uses:[{pat:"bring off + 어려운 일",desc:"성공적으로 해내다"}],ex:[{en:"She managed to <em>bring off</em> the deal.",ko:"그녀는 거래를 성공적으로 성사시켰다.",note:"거래"},{en:"How did he <em>bring off</em> such a difficult stunt?",ko:"어떻게 그런 어려운 묘기를 해냈지?",note:"묘기"},{en:"The team <em>brought off</em> a remarkable victory.",ko:"팀이 놀라운 승리를 이끌어냈다.",note:"스포츠"},{en:"It was risky, but they <em>brought it off</em>.",ko:"위험했지만 그들은 해냈다.",note:"위험"},{en:"She <em>brought off</em> the performance flawlessly.",ko:"그녀는 공연을 완벽하게 해냈다.",note:"공연"}],syn:[{s:"pull off",m:"해내다"},{s:"carry off",m:"해내다"},{s:"achieve",m:"달성하다"}],rel:["pull off 해내다","carry off 해내다"]},
{w:"come into its own",pron:"/kʌm ˈɪntuː ɪts əʊn/",ko:"진가를 발휘하다",base:"come",diff:3,nu:"어떤 것이 드디어 자신의 강점이나 가치를 완전히 발휘하는 것.",uses:[{pat:"come into its own",desc:"진가를 발휘하다"}],ex:[{en:"This technology really <em>comes into its own</em> in winter.",ko:"이 기술은 겨울에 진가를 발휘한다.",note:"기술"},{en:"She <em>came into her own</em> as a manager.",ko:"그녀는 매니저로서 진가를 발휘했다.",note:"성장"},{en:"The product <em>comes into its own</em> for outdoor use.",ko:"그 제품은 야외에서 사용할 때 진가를 발휘한다.",note:"제품"},{en:"He finally <em>came into his own</em> at 40.",ko:"그는 40대에 마침내 진가를 발휘했다.",note:"늦은 개화"},{en:"Spring is when this garden <em>comes into its own</em>.",ko:"봄이 이 정원이 진가를 발휘하는 계절이다.",note:"계절"}],syn:[{s:"shine",m:"빛나다"},{s:"excel",m:"뛰어나다"},{s:"reach potential",m:"잠재력을 발휘하다"}],rel:["come of age 성숙하다","hit one's stride 본궤도에 오르다"]},
{w:"come at",pron:"/kʌm æt/",ko:"공격하다; 접근하다",base:"come",diff:2,nu:"누군가를 향해 공격적으로 접근하거나, 문제에 특정 방식으로 접근하는 것.",uses:[{pat:"come at + 사람",desc:"공격하다"},{pat:"come at + 문제",desc:"접근하다"}],ex:[{en:"The dog <em>came at</em> him with its teeth bared.",ko:"개가 이빨을 드러내며 그에게 달려들었다.",note:"공격"},{en:"How are you <em>coming at</em> this problem?",ko:"이 문제에 어떻게 접근하고 있어?",note:"접근"},{en:"Questions <em>came at</em> him from all directions.",ko:"사방에서 질문이 쏟아졌다.",note:"압박"},{en:"Let's <em>come at</em> it from a different angle.",ko:"다른 각도에서 접근해보자.",note:"관점"},{en:"She <em>came at</em> the challenge head-on.",ko:"그녀는 도전에 정면으로 맞섰다.",note:"자세"}],syn:[{s:"attack",m:"공격하다"},{s:"approach",m:"접근하다"},{s:"tackle",m:"다루다"}],rel:["go at 달려들다","approach 접근하다"]},
{w:"go about",pron:"/ɡəʊ əˈbaʊt/",ko:"돌아다니다; 일을 하다",base:"go",diff:1,nu:"여기저기 돌아다니거나, 일상적인 일을 하거나, 어떤 방식으로 접근하는 것.",uses:[{pat:"go about (돌아다니다)",desc:"돌아다니다"},{pat:"go about + 일",desc:"~을 해나가다"},{pat:"how to go about sth",desc:"~을 어떻게 처리할지"}],ex:[{en:"How do you <em>go about</em> learning a language?",ko:"언어를 어떻게 배워나가?",note:"방법"},{en:"She <em>goes about</em> her day without complaining.",ko:"그녀는 불평 없이 하루를 보낸다.",note:"일상"},{en:"I'm not sure how to <em>go about</em> this.",ko:"이걸 어떻게 처리해야 할지 모르겠어.",note:"방법"},{en:"He <em>goes about</em> town on his bicycle.",ko:"그는 자전거를 타고 동네를 돌아다닌다.",note:"이동"},{en:"Life went on and people <em>went about</em> their business.",ko:"생활은 계속됐고 사람들은 일상을 이어갔다.",note:"일상"}],syn:[{s:"go around",m:"돌아다니다"},{s:"proceed",m:"진행하다"},{s:"handle",m:"처리하다"}],rel:["go around 돌아다니다","get on with 계속하다"]},
{w:"go over to",pron:"/ɡəʊ ˈəʊvər tuː/",ko:"건너가다; 전환하다",base:"go",diff:2,nu:"물리적으로 건너가거나, 다른 진영·시스템·채널로 전환하는 것.",uses:[{pat:"go over to + 장소",desc:"건너가다"},{pat:"go over to + 진영/시스템",desc:"전환하다"}],ex:[{en:"She <em>went over to</em> the neighbour's house.",ko:"그녀는 이웃집으로 건너갔다.",note:"이동"},{en:"He <em>went over to</em> the opposition.",ko:"그는 반대편으로 넘어갔다.",note:"전향"},{en:"We're <em>going over to</em> a new system next month.",ko:"다음 달에 새 시스템으로 전환한다.",note:"전환"},{en:"<em>Go over to</em> channel 4 at 9.",ko:"9시에 채널 4로 전환해.",note:"방송"},{en:"Many users are <em>going over to</em> electric cars.",ko:"많은 사용자들이 전기차로 전환하고 있다.",note:"트렌드"}],syn:[{s:"switch to",m:"전환하다"},{s:"move to",m:"이동하다"},{s:"convert to",m:"변환하다"}],rel:["switch to 전환하다","go with 선택하다"]},
{w:"go short",pron:"/ɡəʊ ʃɔːrt/",ko:"부족하다; 없어서 못 하다",base:"go",diff:2,nu:"필요한 것이 부족해서 아쉬운 상황을 겪는 것.",uses:[{pat:"go short of sth",desc:"~이 부족하다"},{pat:"go short",desc:"부족하게 지내다"}],ex:[{en:"Nobody needs to <em>go short</em> in this house.",ko:"이 집에서는 아무도 부족하게 지낼 필요 없어.",note:"풍족함"},{en:"We had to <em>go short</em> on food during the trip.",ko:"여행 중에 음식이 부족했다.",note:"부족"},{en:"Children shouldn't <em>go short</em> of anything.",ko:"아이들은 아무것도 부족하지 않아야 한다.",note:"양육"},{en:"She always made sure her kids didn't <em>go short</em>.",ko:"그녀는 항상 아이들이 부족하지 않게 했다.",note:"부모"},{en:"We <em>went short</em> on sleep that week.",ko:"그 주에 수면이 부족했어.",note:"수면"}],syn:[{s:"be short of",m:"~이 부족하다"},{s:"lack",m:"부족하다"},{s:"run short",m:"부족해지다"}],rel:["run short of 부족해지다","fall short 미치지 못하다"]},
{w:"run down",pron:"/rʌn daʊn/",ko:"치다; 약해지다; 비난하다; 찾다",base:"run",diff:2,nu:"차가 사람을 치거나, 배터리가 방전되거나, 남을 깎아내리거나, 정보를 추적해 찾는 것.",uses:[{pat:"run down + 사람",desc:"차로 치다"},{pat:"run down (배터리)",desc:"방전되다"},{pat:"run sb down",desc:"깎아내리다"},{pat:"run down + 정보",desc:"추적해 찾다"}],ex:[{en:"The car nearly <em>ran him down</em>.",ko:"차가 그를 거의 칠 뻔했다.",note:"교통"},{en:"My battery is <em>running down</em>.",ko:"배터리가 방전되고 있어.",note:"기기"},{en:"Stop <em>running</em> her <em>down</em> — she's doing her best.",ko:"그녀를 깎아내리지 마, 최선을 다하고 있잖아.",note:"비난"},{en:"The police <em>ran down</em> the suspect.",ko:"경찰이 용의자를 추적해 잡았다.",note:"추적"},{en:"The factory is <em>running down</em> its operations.",ko:"공장이 운영을 축소하고 있다.",note:"축소"}],syn:[{s:"hit",m:"치다"},{s:"depreciate",m:"평가절하하다"},{s:"track down",m:"추적하다"}],rel:["run-down (adj.) 낡은·지친","rundown (n.) 개요"]},
{w:"run up against",pron:"/rʌn ʌp əˈɡenst/",ko:"~에 부딪히다; 어려움을 만나다",base:"run",diff:2,nu:"예상치 못한 어려움이나 장애물을 만나는 것.",uses:[{pat:"run up against + 어려움",desc:"~에 부딪히다"}],ex:[{en:"We <em>ran up against</em> a lot of bureaucracy.",ko:"많은 관료주의에 부딪혔다.",note:"행정"},{en:"She <em>ran up against</em> tough competition.",ko:"그녀는 치열한 경쟁에 부딪혔다.",note:"경쟁"},{en:"The project <em>ran up against</em> unexpected problems.",ko:"프로젝트가 예상치 못한 문제에 부딪혔다.",note:"프로젝트"},{en:"He <em>ran up against</em> his own limitations.",ko:"그는 자신의 한계에 부딪혔다.",note:"한계"},{en:"We may <em>run up against</em> legal issues.",ko:"법적 문제에 부딪힐 수도 있어.",note:"법률"}],syn:[{s:"encounter",m:"만나다"},{s:"face",m:"직면하다"},{s:"come up against",m:"~에 부딪히다"}],rel:["come up against 부딪히다","face obstacles 장애물에 직면하다"]},
{w:"knock off",pron:"/nɒk ɒf/",ko:"퇴근하다; 할인하다; 훔치다",base:"other",diff:1,nu:"일을 마치고 퇴근하거나, 가격을 깎거나, 물건을 훔치거나, 뚝딱 해치우는 것.",uses:[{pat:"knock off (퇴근)",desc:"일을 끝내다"},{pat:"knock off + 가격",desc:"할인하다"},{pat:"knock off + 물건",desc:"훔치다·뚝딱 해치우다"}],ex:[{en:"We usually <em>knock off</em> at 5.",ko:"우리는 보통 5시에 퇴근해.",note:"퇴근"},{en:"Can you <em>knock off</em> $10 from the price?",ko:"가격에서 10달러 깎아줄 수 있어?",note:"할인"},{en:"He <em>knocked off</em> the report in an hour.",ko:"그는 한 시간 만에 보고서를 뚝딱 해치웠다.",note:"빠른 작업"},{en:"<em>Knock it off</em>! I'm trying to sleep.",ko:"그만 해! 자려고 하는데.",note:"구어"},{en:"They were caught <em>knocking off</em> designer goods.",ko:"그들은 명품을 훔치다 잡혔다.",note:"도둑"}],syn:[{s:"finish work",m:"퇴근하다"},{s:"reduce",m:"할인하다"},{s:"steal",m:"훔치다"}],rel:["knock it off 그만해","knock-off (n.) 가짜·모조품"]},
{w:"knock over",pron:"/nɒk ˈəʊvər/",ko:"넘어뜨리다; 충격을 주다",base:"other",diff:1,nu:"물건이나 사람을 넘어뜨리거나, 충격적인 소식에 압도되는 것.",uses:[{pat:"knock over + 물건",desc:"넘어뜨리다"},{pat:"be knocked over",desc:"넘어지다·충격을 받다"}],ex:[{en:"I accidentally <em>knocked over</em> my coffee.",ko:"실수로 커피를 넘어뜨렸어.",note:"사고"},{en:"The wind <em>knocked over</em> the sign.",ko:"바람이 표지판을 넘어뜨렸다.",note:"날씨"},{en:"She was nearly <em>knocked over</em> by the crowd.",ko:"그녀는 군중에 거의 넘어질 뻔했다.",note:"군중"},{en:"The news <em>knocked me over</em>.",ko:"그 소식에 충격을 받았어.",note:"놀라움"},{en:"He <em>knocked over</em> the chess pieces in frustration.",ko:"그는 좌절감에 체스 말을 넘어뜨렸다.",note:"감정"}],syn:[{s:"tip over",m:"넘어뜨리다"},{s:"topple",m:"쓰러뜨리다"},{s:"overwhelm",m:"압도하다"}],rel:["knock down 쓰러뜨리다","knock out 기절시키다"]},
{w:"iron out",pron:"/ˈaɪərn aʊt/",ko:"해결하다; 다림질로 펴다",base:"other",diff:1,nu:"문제·의견 차이를 해결하거나, 옷의 주름을 다림질로 펴는 것.",uses:[{pat:"iron out + 문제",desc:"해결하다·해소하다"},{pat:"iron out + 주름",desc:"다림질로 펴다"}],ex:[{en:"We need to <em>iron out</em> the details.",ko:"세부 사항을 해결해야 해.",note:"협의"},{en:"They <em>ironed out</em> their differences.",ko:"그들은 의견 차이를 해소했다.",note:"화해"},{en:"Let me <em>iron out</em> these wrinkles.",ko:"이 주름들을 펴볼게.",note:"다림질"},{en:"There are still a few things to <em>iron out</em>.",ko:"아직 해결해야 할 게 몇 가지 있어.",note:"미완"},{en:"The new process has a few bugs to <em>iron out</em>.",ko:"새 프로세스에 아직 고쳐야 할 버그들이 있다.",note:"IT"}],syn:[{s:"resolve",m:"해결하다"},{s:"smooth out",m:"해소하다"},{s:"sort out",m:"정리하다"}],rel:["sort out 해결하다","smooth over 매끄럽게 하다"]},
{w:"smooth over",pron:"/smuːð ˈəʊvər/",ko:"무마하다; 매끄럽게 하다",base:"other",diff:2,nu:"갈등·불화·문제를 표면적으로 무마하거나 덮어두는 것.",uses:[{pat:"smooth over + 갈등",desc:"무마하다·덮어두다"}],ex:[{en:"She tried to <em>smooth over</em> the argument.",ko:"그녀는 논쟁을 무마하려 했다.",note:"갈등"},{en:"The manager <em>smoothed over</em> the tension.",ko:"매니저가 긴장감을 무마했다.",note:"직장"},{en:"You can't just <em>smooth over</em> serious problems.",ko:"심각한 문제들을 그냥 덮어둘 수는 없어.",note:"경고"},{en:"He <em>smoothed over</em> the awkwardness with a joke.",ko:"그는 농담으로 어색함을 무마했다.",note:"사교"},{en:"Diplomats worked to <em>smooth over</em> the dispute.",ko:"외교관들이 분쟁을 무마하기 위해 노력했다.",note:"외교"}],syn:[{s:"gloss over",m:"덮어두다"},{s:"paper over",m:"임시방편으로 덮다"},{s:"defuse",m:"완화하다"}],rel:["iron out 해결하다","gloss over 얼버무리다"]},
{w:"feel up to",pron:"/fiːl ʌp tuː/",ko:"~할 기분이다; ~할 여력이 있다",base:"other",diff:1,nu:"어떤 일을 할 기분이나 여력이 있는 것. 주로 부정문이나 의문문으로 쓰인다.",uses:[{pat:"feel up to + V-ing",desc:"~할 기분이다"},{pat:"not feel up to",desc:"~할 기분이 아니다"}],ex:[{en:"Do you <em>feel up to</em> going out tonight?",ko:"오늘 저녁 나갈 기분이야?",note:"제안"},{en:"I don't <em>feel up to</em> cooking today.",ko:"오늘은 요리할 기분이 아니야.",note:"피로"},{en:"She doesn't <em>feel up to</em> working after the illness.",ko:"그녀는 병 후에 일할 기력이 없어.",note:"건강"},{en:"<em>Feel up to</em> a challenge?",ko:"도전할 기분이야?",note:"도전"},{en:"Let me know when you <em>feel up to</em> it.",ko:"기분이 나아지면 알려줘.",note:"배려"}],syn:[{s:"be in the mood for",m:"~할 기분이다"},{s:"have energy for",m:"~할 기력이 있다"},{s:"be ready for",m:"~할 준비가 되다"}],rel:["be up for 하고 싶다","be in the mood 기분이다"]},
{w:"feel for",pron:"/fiːl fɔːr/",ko:"공감하다; 더듬어 찾다",base:"other",diff:1,nu:"누군가의 상황에 동정·공감하거나, 어둠 속에서 손으로 더듬어 찾는 것.",uses:[{pat:"feel for + 사람",desc:"~에게 공감하다·동정하다"},{pat:"feel for + 물건",desc:"더듬어 찾다"}],ex:[{en:"I really <em>feel for</em> her — it must be so hard.",ko:"그녀가 정말 안쓰러워, 정말 힘들겠다.",note:"공감"},{en:"She <em>felt for</em> her keys in her bag.",ko:"그녀는 가방에서 열쇠를 더듬어 찾았다.",note:"더듬기"},{en:"I <em>feel for</em> anyone going through that.",ko:"그걸 겪는 사람에게 공감해.",note:"공감"},{en:"He <em>felt for</em> the light switch in the dark.",ko:"그는 어둠 속에서 전등 스위치를 더듬었다.",note:"어둠"},{en:"We <em>feel for</em> the families affected.",ko:"영향 받은 가족들에게 공감한다.",note:"위로"}],syn:[{s:"sympathize with",m:"동정하다"},{s:"empathize",m:"공감하다"},{s:"grope for",m:"더듬어 찾다"}],rel:["feel sorry for 안쓰럽다","empathize 공감하다"]},
{w:"let on",pron:"/let ɒn/",ko:"내색하다; 속내를 드러내다",base:"let",diff:2,nu:"알고 있거나 느끼는 것을 의도적으로 또는 실수로 드러내는 것. 주로 부정문으로 쓰인다.",uses:[{pat:"let on (that)",desc:"내색하다·드러내다"},{pat:"don't let on",desc:"내색하지 마"}],ex:[{en:"Don't <em>let on</em> that you know.",ko:"알고 있다는 걸 내색하지 마.",note:"비밀"},{en:"She <em>let on</em> that she was upset.",ko:"그녀는 화가 났다는 것을 드러냈다.",note:"감정"},{en:"He never <em>let on</em> how much he was struggling.",ko:"그는 자신이 얼마나 힘든지 내색하지 않았다.",note:"은폐"},{en:"I didn't <em>let on</em> that I already knew.",ko:"이미 알고 있다는 것을 내색하지 않았다.",note:"전략"},{en:"Please don't <em>let on</em> — it's a surprise.",ko:"내색하지 마, 깜짝 파티야.",note:"비밀"}],syn:[{s:"reveal",m:"드러내다"},{s:"show",m:"내색하다"},{s:"give away",m:"누설하다"}],rel:["give away 드러내다","keep a secret 비밀을 지키다"]},
{w:"take to",pron:"/teɪk tuː/",ko:"좋아하게 되다; ~을 시작하다",base:"take",diff:2,nu:"처음에는 별로였다가 점점 좋아지거나, 새 습관·활동을 시작하는 것.",uses:[{pat:"take to + 사람",desc:"~를 마음에 들어하다"},{pat:"take to + 활동",desc:"~을 시작하다"},{pat:"take to + V-ing",desc:"~하기 시작하다"}],ex:[{en:"She really <em>took to</em> her new teacher.",ko:"그녀는 새 선생님을 정말 마음에 들어했다.",note:"관계"},{en:"He <em>took to</em> cycling as a way to relax.",ko:"그는 휴식 방법으로 자전거를 시작했다.",note:"취미"},{en:"The children <em>took to</em> her immediately.",ko:"아이들이 즉시 그녀를 좋아했다.",note:"인상"},{en:"She <em>took to</em> staying up late.",ko:"그녀는 늦게까지 자지 않는 습관이 생겼다.",note:"습관"},{en:"He <em>took to</em> the new job like a duck to water.",ko:"그는 새 직장에 마치 물 만난 물고기처럼 적응했다.",note:"적응"}],syn:[{s:"warm to",m:"마음에 들다"},{s:"start",m:"시작하다"},{s:"take up",m:"시작하다"}],rel:["take up 시작하다","warm to 마음에 들다"]},
{w:"take stock",pron:"/teɪk stɒk/",ko:"상황을 점검하다; 재고를 파악하다",base:"take",diff:2,nu:"현재 상황·진행 상황을 정확히 파악하거나 재평가하는 것.",uses:[{pat:"take stock of + 상황",desc:"~을 점검하다"}],ex:[{en:"It's time to <em>take stock</em> of where we are.",ko:"우리가 어디에 있는지 점검할 때야.",note:"점검"},{en:"After the crisis, she <em>took stock</em> of her life.",ko:"위기 후 그녀는 자신의 삶을 재평가했다.",note:"성찰"},{en:"Let's <em>take stock</em> before moving forward.",ko:"앞으로 나아가기 전에 상황을 파악하자.",note:"계획"},{en:"He <em>took stock</em> of his options.",ko:"그는 자신의 선택지를 파악했다.",note:"선택"},{en:"Year-end is a good time to <em>take stock</em>.",ko:"연말은 상황을 점검하기 좋은 시간이다.",note:"연말"}],syn:[{s:"assess",m:"평가하다"},{s:"review",m:"검토하다"},{s:"evaluate",m:"평가하다"}],rel:["take stock of 점검하다","reassess 재평가하다"]},
{w:"look to",pron:"/lʊk tuː/",ko:"~에 의지하다; 기대하다",base:"look",diff:2,nu:"도움·영감을 위해 누군가에게 의지하거나, 무언가를 기대하는 것.",uses:[{pat:"look to + 사람",desc:"~에게 의지하다"},{pat:"look to + 미래",desc:"기대하다"}],ex:[{en:"People <em>look to</em> leaders for guidance.",ko:"사람들은 지도자에게 지침을 기대한다.",note:"리더십"},{en:"We <em>look to</em> you for support.",ko:"우리는 당신의 지원을 기대한다.",note:"기대"},{en:"She <em>looked to</em> her mentor for advice.",ko:"그녀는 멘토에게 조언을 구했다.",note:"멘토"},{en:"Companies <em>look to</em> reduce costs.",ko:"회사들은 비용을 줄이려 한다.",note:"목표"},{en:"We're <em>looking to</em> the future with optimism.",ko:"우리는 낙관적으로 미래를 내다보고 있다.",note:"전망"}],syn:[{s:"rely on",m:"의지하다"},{s:"expect",m:"기대하다"},{s:"turn to",m:"~에 의지하다"}],rel:["turn to 의지하다","look up to 존경하다"]},
{w:"look past",pron:"/lʊk pɑːst/",ko:"~을 무시하다; 너머를 보다",base:"look",diff:2,nu:"결점·문제를 의도적으로 무시하거나 넘어서는 것.",uses:[{pat:"look past + 결점",desc:"~을 무시하다·넘어서다"}],ex:[{en:"Can you <em>look past</em> his faults?",ko:"그의 결점을 넘어설 수 있어?",note:"관계"},{en:"She <em>looked past</em> the superficial.",ko:"그녀는 표면적인 것을 넘어봤다.",note:"통찰"},{en:"Try to <em>look past</em> the obvious solution.",ko:"뻔한 해결책 너머를 봐.",note:"창의"},{en:"Employers should <em>look past</em> CVs.",ko:"고용주들은 이력서 너머를 봐야 한다.",note:"채용"},{en:"Love means <em>looking past</em> imperfections.",ko:"사랑은 불완전함을 넘어보는 것이다.",note:"사랑"}],syn:[{s:"overlook",m:"무시하다"},{s:"see beyond",m:"너머를 보다"},{s:"ignore",m:"무시하다"}],rel:["look beyond 너머를 보다","overlook 무시하다"]},
{w:"cut in",pron:"/kʌt ɪn/",ko:"끼어들다; 방해하다",base:"other",diff:1,nu:"대화에 끼어들거나, 차가 갑자기 끼어들거나, 댄스에 끼어드는 것.",uses:[{pat:"cut in (대화)",desc:"대화에 끼어들다"},{pat:"cut in (운전)",desc:"차가 갑자기 끼어들다"},{pat:"cut in on + 댄스",desc:"댄스에 끼어들다"}],ex:[{en:"Sorry to <em>cut in</em>, but I have something to add.",ko:"끼어들어서 미안한데, 덧붙일 말이 있어.",note:"대화"},{en:"The car <em>cut in</em> front of me suddenly.",ko:"차가 갑자기 내 앞으로 끼어들었다.",note:"운전"},{en:"He <em>cut in</em> on their dance.",ko:"그가 그들의 댄스에 끼어들었다.",note:"댄스"},{en:"Don't <em>cut in</em> when others are speaking.",ko:"다른 사람이 말할 때 끼어들지 마.",note:"예의"},{en:"The signal kept <em>cutting in</em> and out.",ko:"신호가 계속 끊겼다 연결됐다 했다.",note:"통신"}],syn:[{s:"interrupt",m:"방해하다"},{s:"butt in",m:"끼어들다"},{s:"interject",m:"불쑥 끼어들다"}],rel:["cut off 말을 자르다","butt in 끼어들다"]},
{w:"cut across",pron:"/kʌt əˈkrɒs/",ko:"가로질러 가다; 초월하다",base:"other",diff:2,nu:"지름길로 가로질러 가거나, 사회·정치적 경계를 초월하는 것.",uses:[{pat:"cut across + 장소",desc:"가로질러 가다"},{pat:"cut across + 경계",desc:"초월하다"}],ex:[{en:"Let's <em>cut across</em> the park.",ko:"공원을 가로질러 가자.",note:"지름길"},{en:"This issue <em>cuts across</em> party lines.",ko:"이 문제는 당파를 초월한다.",note:"정치"},{en:"The appeal <em>cuts across</em> all age groups.",ko:"그 매력은 모든 연령층을 아우른다.",note:"대중성"},{en:"We <em>cut across</em> the field to save time.",ko:"시간을 절약하기 위해 들판을 가로질렀다.",note:"지름길"},{en:"Poverty <em>cuts across</em> racial boundaries.",ko:"빈곤은 인종적 경계를 초월한다.",note:"사회"}],syn:[{s:"traverse",m:"가로지르다"},{s:"transcend",m:"초월하다"},{s:"cross",m:"건너다"}],rel:["cross over 건너다","transcend 초월하다"]},
{w:"pass up",pron:"/pɑːs ʌp/",ko:"~을 놓치다; 포기하다",base:"pass",diff:1,nu:"기회나 제안을 거절하거나 놓치는 것.",uses:[{pat:"pass up + 기회",desc:"기회를 놓치다·거절하다"}],ex:[{en:"Don't <em>pass up</em> this opportunity.",ko:"이 기회를 놓치지 마.",note:"기회"},{en:"She <em>passed up</em> a job offer in New York.",ko:"그녀는 뉴욕의 취업 제안을 거절했다.",note:"거절"},{en:"I can't <em>pass up</em> free food.",ko:"공짜 음식은 못 지나치지.",note:"유머"},{en:"He <em>passed up</em> the chance to study abroad.",ko:"그는 해외 유학 기회를 놓쳤다.",note:"후회"},{en:"Would you <em>pass up</em> a million dollars?",ko:"100만 달러를 거절하겠어?",note:"가정"}],syn:[{s:"miss",m:"놓치다"},{s:"decline",m:"거절하다"},{s:"forgo",m:"포기하다"}],rel:["turn down 거절하다","miss out on 놓치다"]},
{w:"pass through",pron:"/pɑːs θruː/",ko:"통과하다; 잠깐 들르다",base:"pass",diff:1,nu:"어떤 장소를 통과하거나, 여행 중에 잠깐 들르는 것.",uses:[{pat:"pass through + 장소",desc:"통과하다·잠깐 들르다"}],ex:[{en:"We're just <em>passing through</em> — not staying.",ko:"그냥 지나가는 중이야, 안 머물어.",note:"여행"},{en:"The road <em>passes through</em> a beautiful valley.",ko:"그 길은 아름다운 계곡을 통과한다.",note:"경로"},{en:"A feeling of peace <em>passed through</em> her.",ko:"평화로운 감정이 그녀를 통과했다.",note:"감정"},{en:"I <em>passed through</em> London on my way to Paris.",ko:"파리로 가는 길에 런던을 잠깐 들렀어.",note:"경유"},{en:"Light <em>passes through</em> glass.",ko:"빛이 유리를 통과한다.",note:"물리"}],syn:[{s:"travel through",m:"통과하다"},{s:"stop briefly",m:"잠깐 들르다"},{s:"transit",m:"경유하다"}],rel:["pass by 지나가다","stop over 잠깐 머물다"]},
{w:"burn up",pron:"/bɜːrn ʌp/",ko:"다 타버리다; 화나게 하다; 소모하다",base:"other",diff:2,nu:"완전히 타버리거나, 사람을 몹시 화나게 하거나, 에너지를 빠르게 소모하는 것.",uses:[{pat:"burn up (타다)",desc:"다 타버리다"},{pat:"burn sb up",desc:"몹시 화나게 하다"},{pat:"burn up + 에너지",desc:"에너지를 소모하다"}],ex:[{en:"The satellite <em>burned up</em> re-entering the atmosphere.",ko:"위성이 대기권에 재진입하면서 다 타버렸다.",note:"과학"},{en:"It really <em>burns me up</em> when people are rude.",ko:"사람들이 무례할 때 정말 화가 나.",note:"화남"},{en:"Exercise helps <em>burn up</em> calories.",ko:"운동이 칼로리를 소모하는 데 도움이 돼.",note:"건강"},{en:"The documents <em>burned up</em> in the fire.",ko:"서류들이 화재로 다 타버렸다.",note:"화재"},{en:"What really <em>burns me up</em> is the dishonesty.",ko:"정말 화나는 건 불정직함이야.",note:"감정"}],syn:[{s:"incinerate",m:"소각하다"},{s:"infuriate",m:"분노하게 하다"},{s:"consume",m:"소모하다"}],rel:["burn out 번아웃되다","burn down 불타다"]},
{w:"close down",pron:"/kləʊz daʊn/",ko:"폐업하다; 폐쇄하다",base:"other",diff:1,nu:"사업이나 시설이 영구적으로 문을 닫는 것.",uses:[{pat:"close down + 사업",desc:"폐업하다·폐쇄하다"}],ex:[{en:"The factory <em>closed down</em> last year.",ko:"공장이 작년에 폐쇄됐다.",note:"폐업"},{en:"The school was <em>closed down</em> due to lack of students.",ko:"학생 부족으로 학교가 폐쇄됐다.",note:"학교"},{en:"Many small shops <em>closed down</em> during the pandemic.",ko:"팬데믹 중에 많은 소규모 가게가 폐업했다.",note:"경제"},{en:"The company was <em>closed down</em> by the government.",ko:"회사가 정부에 의해 폐쇄됐다.",note:"규제"},{en:"The website was <em>closed down</em> for illegal content.",ko:"불법 콘텐츠로 웹사이트가 폐쇄됐다.",note:"인터넷"}],syn:[{s:"shut down",m:"폐쇄하다"},{s:"fold",m:"폐업하다"},{s:"cease operations",m:"운영을 중단하다"}],rel:["shut down 폐쇄하다","wind down 서서히 끝내다"]},
{w:"close in",pron:"/kləʊz ɪn/",ko:"가까워지다; 포위하다",base:"other",diff:2,nu:"어떤 것이 점점 가까워지거나, 여러 방향에서 포위하는 것.",uses:[{pat:"close in (on sb/sth)",desc:"가까워지다·포위하다"},{pat:"close in (날씨)",desc:"어두워지다"}],ex:[{en:"The police were <em>closing in</em> on the suspect.",ko:"경찰이 용의자를 포위하고 있었다.",note:"추격"},{en:"The walls seemed to be <em>closing in</em>.",ko:"벽이 좁아지는 것 같았다.",note:"압박감"},{en:"Winter is <em>closing in</em> fast.",ko:"겨울이 빠르게 다가오고 있다.",note:"계절"},{en:"The fog <em>closed in</em> around the ship.",ko:"안개가 배를 둘러쌌다.",note:"날씨"},{en:"His enemies were <em>closing in</em>.",ko:"그의 적들이 포위해오고 있었다.",note:"위험"}],syn:[{s:"surround",m:"포위하다"},{s:"approach",m:"가까워지다"},{s:"encircle",m:"둘러싸다"}],rel:["close down 폐쇄하다","close off 차단하다"]},
{w:"dwell on",pron:"/dwel ɒn/",ko:"~에 집착하다; 연연하다",base:"other",diff:2,nu:"부정적인 것에 오래 생각하거나 연연하는 것. 과거나 걱정에 지나치게 집중하는 것.",uses:[{pat:"dwell on + 과거/걱정",desc:"~에 연연하다"}],ex:[{en:"Don't <em>dwell on</em> your mistakes.",ko:"실수에 연연하지 마.",note:"조언"},{en:"She tends to <em>dwell on</em> the negative.",ko:"그녀는 부정적인 면에 집착하는 경향이 있다.",note:"성격"},{en:"There's no point <em>dwelling on</em> the past.",ko:"과거에 연연해봤자 소용없어.",note:"격언"},{en:"He <em>dwelt on</em> every detail of the argument.",ko:"그는 논쟁의 모든 세부 사항에 집착했다.",note:"반추"},{en:"Let's not <em>dwell on</em> what went wrong.",ko:"잘못된 것에 연연하지 말자.",note:"앞으로"}],syn:[{s:"obsess over",m:"집착하다"},{s:"linger on",m:"연연하다"},{s:"ruminate on",m:"반추하다"}],rel:["get over 극복하다","move on 앞으로 나아가다"]},
{w:"count down",pron:"/kaʊnt daʊn/",ko:"카운트다운하다; 기다리다",base:"other",diff:1,nu:"큰 행사·발사·새해 등을 앞두고 남은 시간을 거꾸로 세는 것.",uses:[{pat:"count down to + 행사",desc:"카운트다운하다"},{pat:"countdown (명사)",desc:"카운트다운"}],ex:[{en:"We're <em>counting down</em> to the holiday.",ko:"휴가까지 카운트다운 중이야.",note:"기대"},{en:"The rocket <em>counted down</em> to launch.",ko:"로켓 발사 카운트다운이 됐다.",note:"발사"},{en:"Everyone <em>counted down</em> to midnight.",ko:"모두가 자정까지 카운트다운을 했다.",note:"새해"},{en:"The <em>countdown</em> has begun.",ko:"카운트다운이 시작됐다.",note:"명사"},{en:"She's <em>counting down</em> the days until Friday.",ko:"그녀는 금요일까지 날짜를 세고 있어.",note:"기대"}],syn:[{s:"anticipate",m:"기대하다"},{s:"tick down",m:"줄어들다"}],rel:["countdown (n.) 카운트다운","count up 위로 세다"]}

{w:"hold off on",pron:"/həʊld ɒf ɒn/",ko:"~을 잠시 미루다",base:"hold",diff:1,nu:"결정이나 행동을 의도적으로 잠시 뒤로 미루는 것.",uses:[{pat:"hold off on + 결정/행동",desc:"~을 미루다"}],ex:[{en:"Let's <em>hold off on</em> making a decision.",ko:"결정을 잠시 미루자.",note:"보류"},{en:"I'll <em>hold off on</em> replying until I know more.",ko:"더 알 때까지 답장을 미룰게.",note:"대기"},{en:"She <em>held off on</em> buying the car.",ko:"그녀는 차 구매를 미뤘다.",note:"구매"},{en:"Can we <em>hold off on</em> this for now?",ko:"지금은 이걸 미룰 수 있을까요?",note:"요청"},{en:"<em>Hold off on</em> sending that email — I need to check it.",ko:"그 이메일 보내는 거 잠깐 미뤄, 확인해봐야 해.",note:"업무"}],syn:[{s:"postpone",m:"미루다"},{s:"delay",m:"지연하다"},{s:"defer",m:"연기하다"}],rel:["hold off 미루다","put off 연기하다"]},
{w:"go off with",pron:"/ɡəʊ ɒf wɪð/",ko:"~을 갖고 도망가다; ~와 눈이 맞다",base:"go",diff:2,nu:"물건을 갖고 달아나거나, 파트너를 두고 다른 사람과 떠나는 것.",uses:[{pat:"go off with + 물건",desc:"갖고 달아나다"},{pat:"go off with + 사람",desc:"~와 눈이 맞아 떠나다"}],ex:[{en:"He <em>went off with</em> my umbrella.",ko:"그가 내 우산을 갖고 가버렸어.",note:"물건"},{en:"She <em>went off with</em> her colleague.",ko:"그녀는 동료와 눈이 맞아 떠났다.",note:"불륜"},{en:"Someone <em>went off with</em> my bag.",ko:"누군가 내 가방을 갖고 가버렸어.",note:"도난"},{en:"The dog <em>went off with</em> one of my shoes.",ko:"개가 내 신발 한 짝을 물고 가버렸어.",note:"동물"},{en:"He <em>went off with</em> a younger woman.",ko:"그는 더 젊은 여성과 눈이 맞아 떠났다.",note:"관계"}],syn:[{s:"run off with",m:"갖고 달아나다"},{s:"elope with",m:"~와 도망치다"},{s:"abscond with",m:"갖고 도주하다"}],rel:["run away with 갖고 달아나다","take off 급히 떠나다"]},
{w:"come up against",pron:"/kʌm ʌp əˈɡenst/",ko:"~와 맞닥뜨리다; 직면하다",base:"come",diff:2,nu:"장애물·반대·어려움에 예상치 못하게 맞닥뜨리는 것.",uses:[{pat:"come up against + 장애물",desc:"~에 맞닥뜨리다"}],ex:[{en:"We <em>came up against</em> several obstacles.",ko:"우리는 몇 가지 장애물에 맞닥뜨렸다.",note:"어려움"},{en:"She <em>came up against</em> fierce competition.",ko:"그녀는 치열한 경쟁에 맞닥뜨렸다.",note:"경쟁"},{en:"They <em>came up against</em> strong opposition.",ko:"그들은 강한 반대에 직면했다.",note:"반대"},{en:"You'll <em>come up against</em> challenges — that's normal.",ko:"도전에 맞닥뜨릴 거야, 그건 정상이야.",note:"조언"},{en:"The team <em>came up against</em> the defending champions.",ko:"팀은 디펜딩 챔피언과 맞닥뜨렸다.",note:"스포츠"}],syn:[{s:"encounter",m:"맞닥뜨리다"},{s:"face",m:"직면하다"},{s:"run into",m:"부딪히다"}],rel:["face up to 직면하다","run into 부딪히다"]},
{w:"fall in line",pron:"/fɔːl ɪn laɪn/",ko:"따르다; 순응하다",base:"fall",diff:2,nu:"규칙·명령·기대에 순응하거나 맞추는 것.",uses:[{pat:"fall in line (with sth)",desc:"따르다·순응하다"}],ex:[{en:"Everyone is expected to <em>fall in line</em>.",ko:"모두가 따르도록 기대된다.",note:"규율"},{en:"He refused to <em>fall in line</em> with company policy.",ko:"그는 회사 정책에 따르기를 거부했다.",note:"반항"},{en:"New employees usually <em>fall in line</em> quickly.",ko:"신입 직원들은 보통 빨리 적응한다.",note:"적응"},{en:"She had no choice but to <em>fall in line</em>.",ko:"그녀는 따를 수밖에 없었다.",note:"어쩔 수 없음"},{en:"The troops were ordered to <em>fall in line</em>.",ko:"부대원들에게 대열에 서라는 명령이 내려졌다.",note:"군대"}],syn:[{s:"comply",m:"따르다"},{s:"conform",m:"순응하다"},{s:"toe the line",m:"규칙을 따르다"}],rel:["toe the line 규칙을 따르다","go along with 따르다"]},
{w:"fall off",pron:"/fɔːl ɒf/",ko:"떨어지다; 줄어들다",base:"fall",diff:1,nu:"물리적으로 떨어지거나, 수치·관심이 줄어드는 것.",uses:[{pat:"fall off (물리적)",desc:"떨어지다"},{pat:"fall off (수치)",desc:"줄어들다·감소하다"}],ex:[{en:"The button <em>fell off</em> my coat.",ko:"코트에서 단추가 떨어졌다.",note:"옷"},{en:"Sales have <em>fallen off</em> significantly.",ko:"매출이 상당히 줄었다.",note:"매출"},{en:"He <em>fell off</em> his bike.",ko:"그는 자전거에서 떨어졌다.",note:"사고"},{en:"Interest in the project has <em>fallen off</em>.",ko:"프로젝트에 대한 관심이 줄었다.",note:"관심"},{en:"Quality has <em>fallen off</em> lately.",ko:"최근 품질이 저하됐다.",note:"품질"}],syn:[{s:"drop off",m:"줄어들다"},{s:"decrease",m:"감소하다"},{s:"detach",m:"떨어지다"}],rel:["fall away 줄어들다","drop off 줄어들다"]},
{w:"run with",pron:"/rʌn wɪð/",ko:"~을 밀고 나가다; 활용하다",base:"run",diff:2,nu:"아이디어나 계획을 적극적으로 추진하거나, 특정 집단과 어울리는 것.",uses:[{pat:"run with + 아이디어",desc:"적극적으로 추진하다"},{pat:"run with + 무리",desc:"~와 어울리다"}],ex:[{en:"Let's <em>run with</em> this idea and see where it goes.",ko:"이 아이디어를 밀고 나가서 어떻게 되는지 보자.",note:"추진"},{en:"She <em>ran with</em> the opportunity.",ko:"그녀는 기회를 적극 활용했다.",note:"기회"},{en:"He used to <em>run with</em> a rough crowd.",ko:"그는 거친 무리와 어울리곤 했다.",note:"친구"},{en:"Take this concept and <em>run with</em> it.",ko:"이 개념을 가져다가 밀고 나가.",note:"격려"},{en:"The journalist <em>ran with</em> the story.",ko:"그 기자가 기사를 밀고 나갔다.",note:"언론"}],syn:[{s:"pursue",m:"추진하다"},{s:"develop",m:"발전시키다"},{s:"go with",m:"활용하다"}],rel:["go with 따르다","pursue an idea 아이디어를 추진하다"]},
{w:"run past",pron:"/rʌn pɑːst/",ko:"의견을 들어보다; 검토해달라 하다",base:"run",diff:2,nu:"결정을 내리기 전에 다른 사람의 의견이나 허락을 구하는 것.",uses:[{pat:"run sth past sb",desc:"~의 의견을 들어보다"}],ex:[{en:"Can I <em>run this past</em> you?",ko:"이것 좀 검토해줄 수 있어?",note:"검토"},{en:"Let me <em>run it past</em> my boss first.",ko:"먼저 상사에게 의견을 들어볼게.",note:"승인"},{en:"She <em>ran the idea past</em> the team.",ko:"그녀는 팀에 아이디어를 검토해달라고 했다.",note:"팀"},{en:"I want to <em>run this by</em> you before I send it.",ko:"보내기 전에 이걸 검토해줬으면 해.",note:"교정"},{en:"<em>Run it past</em> legal before signing.",ko:"서명하기 전에 법무팀에 검토를 부탁해.",note:"법률"}],syn:[{s:"check with",m:"확인하다"},{s:"consult",m:"상의하다"},{s:"get approval",m:"승인을 받다"}],rel:["run by 의견을 묻다","check with 확인하다"]},
{w:"take stock of",pron:"/teɪk stɒk əv/",ko:"평가하다; 상황을 파악하다",base:"take",diff:2,nu:"현재 상황이나 자신의 삶을 객관적으로 평가하고 점검하는 것.",uses:[{pat:"take stock of + 상황",desc:"상황을 평가하다"}],ex:[{en:"It's time to <em>take stock of</em> the situation.",ko:"상황을 평가할 때야.",note:"평가"},{en:"She <em>took stock of</em> her life at 40.",ko:"그녀는 40세에 자신의 삶을 돌아봤다.",note:"성찰"},{en:"Let's <em>take stock of</em> what we've achieved.",ko:"우리가 이룬 것을 평가해보자.",note:"점검"},{en:"He paused to <em>take stock of</em> his options.",ko:"그는 멈춰서 자신의 선택지를 평가했다.",note:"결정"},{en:"After the setback, they <em>took stock</em>.",ko:"차질이 생긴 후 그들은 상황을 재평가했다.",note:"재평가"}],syn:[{s:"assess",m:"평가하다"},{s:"evaluate",m:"평가하다"},{s:"review",m:"검토하다"}],rel:["take a step back 물러서서 보다","reassess 재평가하다"]},
{w:"get out of hand",pron:"/ɡet aʊt əv hænd/",ko:"통제 불능이 되다",base:"get",diff:1,nu:"상황이 너무 커지거나 심각해져서 통제하기 어렵게 되는 것.",uses:[{pat:"get out of hand",desc:"통제 불능이 되다"}],ex:[{en:"The party <em>got out of hand</em>.",ko:"파티가 통제 불능이 됐다.",note:"상황"},{en:"Don't let the situation <em>get out of hand</em>.",ko:"상황이 통제 불능이 되게 놔두지 마.",note:"경고"},{en:"Things are <em>getting out of hand</em>.",ko:"상황이 걷잡을 수 없게 되고 있어.",note:"악화"},{en:"The costs are <em>getting out of hand</em>.",ko:"비용이 걷잡을 수 없이 늘고 있어.",note:"재정"},{en:"The argument <em>got out of hand</em> quickly.",ko:"논쟁이 빠르게 걷잡을 수 없게 됐다.",note:"갈등"}],syn:[{s:"spiral out of control",m:"걷잡을 수 없어지다"},{s:"become unmanageable",m:"감당할 수 없어지다"},{s:"escalate",m:"악화되다"}],rel:["get out of control 통제를 벗어나다","spiral out of control 걷잡을 수 없어지다"]},
{w:"get the better of",pron:"/ɡet ðə ˈbetər əv/",ko:"이기다; 압도하다",base:"get",diff:2,nu:"상대방을 이기거나, 감정·유혹이 이성을 압도하는 것.",uses:[{pat:"get the better of + 사람",desc:"이기다·압도하다"},{pat:"get the better of + 감정",desc:"감정에 지다"}],ex:[{en:"Curiosity <em>got the better of</em> me.",ko:"호기심이 나를 이겼어.",note:"호기심"},{en:"Don't let fear <em>get the better of</em> you.",ko:"두려움이 너를 이기게 하지 마.",note:"두려움"},{en:"She <em>got the better of</em> her opponent.",ko:"그녀는 상대방을 이겼다.",note:"경쟁"},{en:"Jealousy <em>got the better of</em> him.",ko:"질투심이 그를 이겼다.",note:"감정"},{en:"His impatience <em>got the better of</em> him.",ko:"성급함이 그를 압도했다.",note:"성격"}],syn:[{s:"overcome",m:"극복하다"},{s:"defeat",m:"이기다"},{s:"overpower",m:"압도하다"}],rel:["overcome 극복하다","win over 이기다"]},
{w:"get on one's nerves",pron:"/ɡet ɒn wʌnz nɜːrvz/",ko:"신경을 건드리다; 짜증나게 하다",base:"get",diff:1,nu:"누군가의 행동이나 습관이 지속적으로 짜증을 유발하는 것.",uses:[{pat:"get on sb's nerves",desc:"~의 신경을 건드리다"}],ex:[{en:"His tapping <em>gets on my nerves</em>.",ko:"그의 두드리는 소리가 신경을 건드려.",note:"습관"},{en:"She really <em>gets on my nerves</em>.",ko:"그녀는 정말 나를 짜증나게 해.",note:"사람"},{en:"Stop it — you're <em>getting on my nerves</em>.",ko:"그만해, 신경 건드리잖아.",note:"경고"},{en:"Constant interruptions <em>get on everyone's nerves</em>.",ko:"끊임없는 방해가 모두의 신경을 건드린다.",note:"방해"},{en:"Traffic noise really <em>gets on my nerves</em>.",ko:"교통 소음이 정말 신경 쓰여.",note:"소음"}],syn:[{s:"irritate",m:"짜증나게 하다"},{s:"annoy",m:"귀찮게 하다"},{s:"grate on",m:"거슬리다"}],rel:["drive sb crazy 미칠 것 같게 하다","grate on 거슬리다"]},
{w:"make light of",pron:"/meɪk laɪt əv/",ko:"가볍게 여기다; 대수롭지 않게 보다",base:"make",diff:2,nu:"심각한 상황이나 문제를 실제보다 덜 중요하게 여기거나 농담으로 넘기는 것.",uses:[{pat:"make light of + 상황",desc:"가볍게 여기다"}],ex:[{en:"Don't <em>make light of</em> her concerns.",ko:"그녀의 걱정을 가볍게 여기지 마.",note:"배려"},{en:"He tends to <em>make light of</em> serious situations.",ko:"그는 심각한 상황을 대수롭지 않게 보는 경향이 있다.",note:"성격"},{en:"She <em>made light of</em> her injury to reassure everyone.",ko:"모두를 안심시키기 위해 부상을 가볍게 넘겼다.",note:"배려"},{en:"Don't <em>make light of</em> mental health issues.",ko:"정신 건강 문제를 가볍게 여기지 마.",note:"심각성"},{en:"He always <em>makes light of</em> his achievements.",ko:"그는 항상 자신의 성취를 겸손하게 말한다.",note:"겸손"}],syn:[{s:"trivialize",m:"사소하게 여기다"},{s:"brush off",m:"무시하다"},{s:"laugh off",m:"웃어넘기다"}],rel:["brush off 무시하다","laugh off 웃어넘기다"]},
{w:"make the most of",pron:"/meɪk ðə məʊst əv/",ko:"최대한 활용하다",base:"make",diff:1,nu:"주어진 상황·기회·시간을 최대한 활용하는 것.",uses:[{pat:"make the most of + 기회/상황",desc:"최대한 활용하다"}],ex:[{en:"<em>Make the most of</em> every opportunity.",ko:"모든 기회를 최대한 활용해.",note:"조언"},{en:"We need to <em>make the most of</em> the time we have.",ko:"우리에게 있는 시간을 최대한 활용해야 해.",note:"시간"},{en:"She <em>made the most of</em> her talent.",ko:"그녀는 자신의 재능을 최대한 살렸다.",note:"능력"},{en:"<em>Make the most of</em> your holiday.",ko:"휴가를 최대한 즐겨.",note:"휴가"},{en:"Despite the setback, they <em>made the most of</em> the situation.",ko:"차질에도 불구하고 그들은 상황을 최대한 활용했다.",note:"긍정"}],syn:[{s:"capitalize on",m:"최대한 활용하다"},{s:"maximize",m:"극대화하다"},{s:"take full advantage of",m:"충분히 활용하다"}],rel:["take advantage of 활용하다","seize the opportunity 기회를 잡다"]},
{w:"make up one's mind",pron:"/meɪk ʌp wʌnz maɪnd/",ko:"결심하다; 마음을 정하다",base:"make",diff:1,nu:"망설이다가 결국 결정을 내리는 것.",uses:[{pat:"make up one's mind",desc:"결심하다"},{pat:"make up one's mind to + V",desc:"~하기로 결심하다"}],ex:[{en:"I can't <em>make up my mind</em>.",ko:"결정을 못 하겠어.",note:"망설임"},{en:"She <em>made up her mind</em> to quit.",ko:"그녀는 그만두기로 결심했다.",note:"결심"},{en:"Have you <em>made up your mind</em> yet?",ko:"아직 결정 못 했어?",note:"질문"},{en:"Once he <em>makes up his mind</em>, there's no changing it.",ko:"그가 한번 결정하면 바꿀 수 없어.",note:"고집"},{en:"Take your time to <em>make up your mind</em>.",ko:"천천히 마음을 정해.",note:"여유"}],syn:[{s:"decide",m:"결정하다"},{s:"resolve",m:"결심하다"},{s:"commit",m:"확정하다"}],rel:["make a decision 결정하다","come to a decision 결정에 이르다"]},
{w:"break ranks",pron:"/breɪk ræŋks/",ko:"대열을 이탈하다; 이견을 제시하다",base:"break",diff:3,nu:"군사적으로 대열을 벗어나거나, 비유적으로 소속 집단의 공식 입장에 반하는 의견을 내는 것.",uses:[{pat:"break ranks (with sb)",desc:"이견을 제시하다·이탈하다"}],ex:[{en:"Several senators <em>broke ranks</em> with their party.",ko:"몇몇 상원의원들이 당의 입장과 다른 의견을 냈다.",note:"정치"},{en:"She <em>broke ranks</em> and criticized the management.",ko:"그녀는 이견을 내며 경영진을 비판했다.",note:"직장"},{en:"It takes courage to <em>break ranks</em>.",ko:"이견을 내는 데는 용기가 필요해.",note:"용기"},{en:"The general <em>broke ranks</em> to speak out.",ko:"그 장군은 대열을 이탈해 발언했다.",note:"군사"},{en:"Nobody dared <em>break ranks</em>.",ko:"아무도 감히 이견을 내지 못했다.",note:"복종"}],syn:[{s:"dissent",m:"이의를 제기하다"},{s:"defect",m:"탈퇴하다"},{s:"go against the grain",m:"흐름에 역행하다"}],rel:["toe the line 따르다","speak out 발언하다"]},
{w:"break cover",pron:"/breɪk ˈkʌvər/",ko:"은신처에서 나오다; 모습을 드러내다",base:"break",diff:3,nu:"숨어있다가 모습을 드러내거나, 비밀이나 신분을 공개하는 것.",uses:[{pat:"break cover",desc:"은신처에서 나오다·모습을 드러내다"}],ex:[{en:"The suspect finally <em>broke cover</em>.",ko:"용의자가 마침내 모습을 드러냈다.",note:"수사"},{en:"The rabbit <em>broke cover</em> and ran.",ko:"토끼가 은신처에서 뛰어나왔다.",note:"자연"},{en:"The spy was forced to <em>break cover</em>.",ko:"스파이는 어쩔 수 없이 신분을 드러냈다.",note:"스파이"},{en:"She <em>broke cover</em> to make a public statement.",ko:"그녀는 공개 성명을 내기 위해 모습을 드러냈다.",note:"공개"},{en:"The celebrity rarely <em>breaks cover</em>.",ko:"그 유명인은 거의 모습을 드러내지 않는다.",note:"은둔"}],syn:[{s:"emerge",m:"나타나다"},{s:"reveal oneself",m:"모습을 드러내다"},{s:"come out",m:"나오다"}],rel:["come out of hiding 은신에서 나오다","lay low 몸을 낮추다"]},
{w:"give it a shot",pron:"/ɡɪv ɪt ə ʃɒt/",ko:"한번 시도해보다",base:"give",diff:1,nu:"결과를 확신할 수 없지만 일단 한번 시도해보는 것.",uses:[{pat:"give it a shot",desc:"한번 시도해보다"}],ex:[{en:"Why not <em>give it a shot</em>?",ko:"한번 해보지 그래?",note:"격려"},{en:"I've never cooked Thai food, but I'll <em>give it a shot</em>.",ko:"태국 음식 요리해본 적 없지만 한번 해볼게.",note:"도전"},{en:"She decided to <em>give it a shot</em> despite the risk.",ko:"위험에도 불구하고 그녀는 한번 해보기로 했다.",note:"결심"},{en:"You'll never know if you don't <em>give it a shot</em>.",ko:"해보지 않으면 알 수 없잖아.",note:"조언"},{en:"Just <em>give it a shot</em> — worst case you fail.",ko:"그냥 해봐, 최악의 경우 실패하는 거잖아.",note:"도전"}],syn:[{s:"try",m:"시도하다"},{s:"have a go",m:"해보다"},{s:"attempt",m:"시도하다"}],rel:["give it a go 해보다","take a shot 시도하다"]},
{w:"give credit to",pron:"/ɡɪv ˈkredɪt tuː/",ko:"공을 인정하다; 인정해주다",base:"give",diff:1,nu:"누군가의 공헌이나 성취를 인정하고 칭찬하는 것.",uses:[{pat:"give credit to + 사람",desc:"공을 인정하다"},{pat:"give credit where it's due",desc:"마땅한 인정을 해주다"}],ex:[{en:"We should <em>give credit to</em> the whole team.",ko:"팀 전체의 공을 인정해야 해.",note:"팀워크"},{en:"<em>Give credit where credit is due</em>.",ko:"마땅한 인정을 해줘야 해.",note:"공정함"},{en:"She was quick to <em>give credit to</em> others.",ko:"그녀는 빠르게 다른 사람들의 공을 인정했다.",note:"겸손"},{en:"He never <em>gives credit to</em> his team.",ko:"그는 팀의 공을 절대 인정하지 않아.",note:"문제"},{en:"<em>Give</em> yourself some <em>credit</em> — you did great.",ko:"스스로 인정해줘, 정말 잘 했어.",note:"자기 인정"}],syn:[{s:"acknowledge",m:"인정하다"},{s:"recognize",m:"인정하다"},{s:"praise",m:"칭찬하다"}],rel:["take credit for 공을 가로채다","acknowledge 인정하다"]},
{w:"keep pace with",pron:"/kiːp peɪs wɪð/",ko:"~에 뒤지지 않다; 보조를 맞추다",base:"keep",diff:2,nu:"빠르게 변하는 것이나 다른 사람과 같은 속도를 유지하는 것.",uses:[{pat:"keep pace with + 변화/사람",desc:"~에 뒤지지 않다"}],ex:[{en:"It's hard to <em>keep pace with</em> technology.",ko:"기술의 변화 속도를 따라가기 어렵다.",note:"기술"},{en:"Wages haven't <em>kept pace with</em> inflation.",ko:"임금이 인플레이션을 따라가지 못했다.",note:"경제"},{en:"She struggled to <em>keep pace with</em> the rest of the class.",ko:"그녀는 반의 다른 학생들을 따라가기 힘들었다.",note:"학업"},{en:"Production needs to <em>keep pace with</em> demand.",ko:"생산이 수요를 따라가야 해.",note:"비즈니스"},{en:"He ran hard to <em>keep pace with</em> the leader.",ko:"그는 선두를 따라가기 위해 열심히 뛰었다.",note:"달리기"}],syn:[{s:"keep up with",m:"따라가다"},{s:"match",m:"맞추다"},{s:"stay abreast of",m:"뒤지지 않다"}],rel:["keep up with 따라가다","fall behind 뒤처지다"]},
{w:"keep an eye out for",pron:"/kiːp ən aɪ aʊt fɔːr/",ko:"~을 주의해서 찾아보다",base:"keep",diff:1,nu:"특정 것을 주의 깊게 찾거나 경계하는 것.",uses:[{pat:"keep an eye out for + 대상",desc:"~을 주의해서 보다"}],ex:[{en:"<em>Keep an eye out for</em> any suspicious activity.",ko:"의심스러운 활동을 주의해서 봐.",note:"경계"},{en:"I'll <em>keep an eye out for</em> a good deal.",ko:"좋은 거래를 찾아볼게.",note:"쇼핑"},{en:"<em>Keep an eye out for</em> the signal.",ko:"신호를 주의해서 봐.",note:"신호"},{en:"Can you <em>keep an eye out for</em> my package?",ko:"내 택배 좀 봐줄 수 있어?",note:"택배"},{en:"She always <em>keeps an eye out for</em> new talent.",ko:"그녀는 항상 새로운 인재를 주의해서 찾는다.",note:"채용"}],syn:[{s:"watch out for",m:"조심하다"},{s:"look out for",m:"살펴보다"},{s:"be alert to",m:"경계하다"}],rel:["keep an eye on 주시하다","look out for 살펴보다"]},
{w:"look sharp",pron:"/lʊk ʃɑːrp/",ko:"잘 차려입다; 서두르다",base:"look",diff:1,nu:"외모가 깔끔하고 세련되어 보이거나, 구어체로 서두르라는 뜻.",uses:[{pat:"look sharp (외모)",desc:"깔끔하게 보이다"},{pat:"look sharp! (명령)",desc:"서둘러!"}],ex:[{en:"You need to <em>look sharp</em> for the interview.",ko:"면접에서 깔끔하게 보여야 해.",note:"외모"},{en:"<em>Look sharp</em>! We're going to be late.",ko:"서둘러! 늦겠어.",note:"재촉"},{en:"He always <em>looks sharp</em> in a suit.",ko:"그는 양복을 입으면 항상 세련돼 보여.",note:"패션"},{en:"<em>Look sharp</em> and make a good impression.",ko:"잘 차려입고 좋은 인상을 남겨.",note:"조언"},{en:"Come on, <em>look sharp</em>!",ko:"어서, 빨리!",note:"재촉"}],syn:[{s:"look smart",m:"세련되어 보이다"},{s:"hurry up",m:"서두르다"},{s:"be well-dressed",m:"잘 차려입다"}],rel:["look neat 깔끔하게 보이다","dress to impress 인상적으로 차려입다"]},
{w:"look the other way",pron:"/lʊk ðə ˈʌðər weɪ/",ko:"모른 척하다; 눈을 감다",base:"look",diff:2,nu:"불법이나 잘못된 것을 알면서도 의도적으로 무시하는 것.",uses:[{pat:"look the other way",desc:"모른 척하다·눈을 감다"}],ex:[{en:"The guards <em>looked the other way</em>.",ko:"경비원들이 모른 척했다.",note:"방조"},{en:"Management often <em>looks the other way</em> on minor issues.",ko:"경영진은 종종 사소한 문제들을 모른 척한다.",note:"직장"},{en:"We can't afford to <em>look the other way</em>.",ko:"모른 척할 수 없는 상황이야.",note:"책임"},{en:"She <em>looked the other way</em> when he cheated.",ko:"그가 부정행위를 할 때 그녀는 모른 척했다.",note:"방관"},{en:"Society often <em>looks the other way</em> on corruption.",ko:"사회는 종종 부패에 눈을 감는다.",note:"사회"}],syn:[{s:"turn a blind eye",m:"모른 척하다"},{s:"ignore",m:"무시하다"},{s:"overlook",m:"간과하다"}],rel:["turn a blind eye 모른 척하다","sweep under the carpet 숨기다"]},
{w:"carry through",pron:"/ˈkæri θruː/",ko:"끝까지 해내다; 버티게 하다",base:"other",diff:2,nu:"어려움에도 불구하고 계획을 완수하거나, 힘든 상황에서 누군가를 버티게 해주는 것.",uses:[{pat:"carry through + 계획",desc:"끝까지 해내다"},{pat:"carry sb through",desc:"버티게 해주다"}],ex:[{en:"She <em>carried through</em> the plan despite obstacles.",ko:"그녀는 장애물에도 불구하고 계획을 끝까지 해냈다.",note:"완수"},{en:"His determination <em>carried him through</em>.",ko:"그의 결단력이 그를 버티게 해줬다.",note:"버팀"},{en:"Hope <em>carried</em> her <em>through</em> the darkest times.",ko:"희망이 가장 어두운 시간에 그녀를 버티게 해줬다.",note:"희망"},{en:"We must <em>carry through</em> on our promises.",ko:"약속을 끝까지 지켜야 해.",note:"약속"},{en:"The project was finally <em>carried through</em>.",ko:"프로젝트가 마침내 완수됐다.",note:"완성"}],syn:[{s:"complete",m:"완수하다"},{s:"follow through",m:"끝까지 하다"},{s:"sustain",m:"지속시키다"}],rel:["follow through 끝까지 하다","see through 끝까지 하다"]},

{w:"blow over",pron:"/bləʊ ˈəʊvər/",ko:"잠잠해지다; 지나가다",base:"other",diff:1,nu:"폭풍이 지나가거나, 논란·문제가 시간이 지나면서 잠잠해지는 것.",uses:[{pat:"blow over (폭풍)",desc:"지나가다"},{pat:"blow over (논란)",desc:"잠잠해지다"}],ex:[{en:"The storm will <em>blow over</em> by morning.",ko:"폭풍은 아침쯤 지나갈 거야.",note:"날씨"},{en:"The scandal will <em>blow over</em> eventually.",ko:"스캔들은 결국 잠잠해질 거야.",note:"논란"},{en:"Give it time — it'll <em>blow over</em>.",ko:"시간을 줘, 잠잠해질 거야.",note:"조언"},{en:"The controversy <em>blew over</em> quickly.",ko:"논란이 빠르게 잠잠해졌다.",note:"결과"},{en:"Don't worry — things like this always <em>blow over</em>.",ko:"걱정 마, 이런 것들은 항상 지나가.",note:"위로"}],syn:[{s:"pass",m:"지나가다"},{s:"subside",m:"가라앉다"},{s:"die down",m:"잦아들다"}],rel:["die down 잦아들다","pass over 지나가다"]},

{w:"pass over",pron:"/pɑːs ˈəʊvər/",ko:"무시하다; 건너뛰다; 진급에서 제외하다",base:"pass",diff:2,nu:"중요한 것을 무시하거나 건너뛰거나, 승진 대상에서 제외하는 것.",uses:[{pat:"pass over + 내용",desc:"건너뛰다·무시하다"},{pat:"pass sb over",desc:"진급에서 제외하다"}],ex:[{en:"She was <em>passed over</em> for promotion again.",ko:"그녀는 또 승진에서 제외됐다.",note:"직장"},{en:"Let's <em>pass over</em> the technical details.",ko:"기술적 세부 사항은 건너뜁시다.",note:"발표"},{en:"He <em>passed over</em> her concerns.",ko:"그는 그녀의 걱정을 무시했다.",note:"무시"},{en:"The storm <em>passed over</em> without damage.",ko:"폭풍이 피해 없이 지나갔다.",note:"날씨"},{en:"Why was he <em>passed over</em> for the role?",ko:"그는 왜 그 역할에서 제외됐어?",note:"선발"}],syn:[{s:"skip",m:"건너뛰다"},{s:"overlook",m:"무시하다"},{s:"bypass",m:"우회하다"}],rel:["pass by 지나가다","overlook 간과하다"]},
{w:"get a grip",pron:"/ɡet ə ɡrɪp/",ko:"정신 차리다; 자제하다",base:"get",diff:1,nu:"감정이나 상황을 통제하고 정신을 차리라는 표현.",uses:[{pat:"get a grip (on oneself)",desc:"정신 차리다"},{pat:"get a grip on + 상황",desc:"상황을 통제하다"}],ex:[{en:"<em>Get a grip</em>! It's not that bad.",ko:"정신 차려! 그렇게 나쁘지 않아.",note:"진정"},{en:"She needs to <em>get a grip</em> on her emotions.",ko:"그녀는 감정을 통제해야 해.",note:"감정"},{en:"<em>Get a grip</em> on yourself before the interview.",ko:"면접 전에 정신 차려.",note:"조언"},{en:"The company needs to <em>get a grip</em> on spending.",ko:"회사는 지출을 통제해야 해.",note:"재정"},{en:"I had to tell myself to <em>get a grip</em>.",ko:"스스로 정신 차리라고 해야 했어.",note:"자기 통제"}],syn:[{s:"calm down",m:"진정하다"},{s:"pull yourself together",m:"정신 차리다"},{s:"control oneself",m:"자제하다"}],rel:["pull yourself together 정신 차리다","calm down 진정하다"]},
{w:"get your act together",pron:"/ɡet jɔːr ækt təˈɡeðər/",ko:"정신 차리다; 제대로 하다",base:"get",diff:1,nu:"지금까지 엉망이었던 것을 바로잡고 제대로 행동하기 시작하는 것.",uses:[{pat:"get your act together",desc:"제대로 하다·정신 차리다"}],ex:[{en:"You need to <em>get your act together</em>.",ko:"제대로 좀 해야 해.",note:"경고"},{en:"He finally <em>got his act together</em> at 30.",ko:"그는 30살에 마침내 정신을 차렸다.",note:"성장"},{en:"<em>Get your act together</em> or you'll lose the job.",ko:"정신 차리지 않으면 직장 잃는다.",note:"경고"},{en:"The team needs to <em>get its act together</em>.",ko:"팀이 제대로 해야 해.",note:"팀"},{en:"She <em>got her act together</em> after the wake-up call.",ko:"경종이 울린 후 그녀는 정신을 차렸다.",note:"결심"}],syn:[{s:"pull yourself together",m:"정신 차리다"},{s:"sort yourself out",m:"정돈하다"},{s:"shape up",m:"제대로 하다"}],rel:["get a grip 정신 차리다","shape up 정신 차리다"]},
{w:"take it or leave it",pron:"/teɪk ɪt ɔːr liːv ɪt/",ko:"받아들이든지 말든지",base:"take",diff:1,nu:"협상 여지 없이 제시한 조건을 받아들이거나 거절하라는 최후통첩적 표현.",uses:[{pat:"take it or leave it",desc:"받아들이든지 말든지"}],ex:[{en:"That's my final offer — <em>take it or leave it</em>.",ko:"그게 내 최종 제안이야, 받아들이든지 말든지.",note:"협상"},{en:"He gave a <em>take it or leave it</em> attitude.",ko:"그는 받아들이든지 말든지 식의 태도를 보였다.",note:"태도"},{en:"\"Can I get a discount?\" \"<em>Take it or leave it</em>.\"",ko:"\"할인 안 되나요?\" \"받아들이든지 말든지요.\"",note:"쇼핑"},{en:"The contract was presented on a <em>take it or leave it</em> basis.",ko:"계약은 받아들이든지 말든지 조건으로 제시됐다.",note:"계약"},{en:"I know it's not ideal, but <em>take it or leave it</em>.",ko:"이상적이지 않다는 거 알지만 받아들이든지 말든지야.",note:"타협 없음"}],syn:[{s:"final offer",m:"최종 제안"},{s:"no negotiation",m:"협상 없음"},{s:"all or nothing",m:"전부 아니면 없음"}],rel:["like it or lump it 싫어도 어쩔 수 없다","make or break 결정적인"]},
{w:"take the plunge",pron:"/teɪk ðə plʌndʒ/",ko:"과감히 뛰어들다",base:"take",diff:2,nu:"오래 망설이다가 드디어 과감하게 결정적인 행동을 하는 것.",uses:[{pat:"take the plunge",desc:"과감히 결정하다·뛰어들다"}],ex:[{en:"She finally <em>took the plunge</em> and started her business.",ko:"그녀는 마침내 과감히 사업을 시작했다.",note:"창업"},{en:"After years of dating, they <em>took the plunge</em>.",ko:"수년간의 교제 끝에 그들은 과감히 결혼했다.",note:"결혼"},{en:"Are you going to <em>take the plunge</em>?",ko:"과감히 해볼 거야?",note:"결심"},{en:"He <em>took the plunge</em> and asked for a raise.",ko:"그는 과감히 급여 인상을 요청했다.",note:"직장"},{en:"Sometimes you just have to <em>take the plunge</em>.",ko:"때로는 그냥 과감히 뛰어들어야 해.",note:"조언"}],syn:[{s:"go for it",m:"도전하다"},{s:"dive in",m:"뛰어들다"},{s:"commit",m:"결정하다"}],rel:["go for it 도전하다","jump in 뛰어들다"]},
{w:"stand one's ground",pron:"/stænd wʌnz ɡraʊnd/",ko:"자신의 입장을 고수하다",base:"stand",diff:2,nu:"압박이나 반대에도 굴복하지 않고 자신의 위치나 의견을 지키는 것.",uses:[{pat:"stand one's ground",desc:"자신의 입장을 지키다"}],ex:[{en:"She <em>stood her ground</em> despite the criticism.",ko:"그녀는 비판에도 불구하고 자신의 입장을 지켰다.",note:"고집"},{en:"He <em>stood his ground</em> and refused to back down.",ko:"그는 입장을 고수하며 물러서기를 거부했다.",note:"저항"},{en:"You need to <em>stand your ground</em> in negotiations.",ko:"협상에서 자신의 입장을 지켜야 해.",note:"협상"},{en:"The lawyer <em>stood her ground</em> in court.",ko:"변호사는 법정에서 자신의 입장을 지켰다.",note:"법정"},{en:"Don't let them bully you — <em>stand your ground</em>.",ko:"그들이 괴롭히게 놔두지 마, 자신의 입장을 지켜.",note:"격려"}],syn:[{s:"hold your ground",m:"입장을 지키다"},{s:"refuse to yield",m:"굴복하지 않다"},{s:"maintain your position",m:"위치를 지키다"}],rel:["hold your ground 입장을 지키다","back down 물러서다"]},
{w:"put one's foot in it",pron:"/pʊt wʌnz fʊt ɪn ɪt/",ko:"실언하다; 실수하다",base:"put",diff:2,nu:"의도치 않게 누군가를 당황시키거나 화나게 만드는 말이나 행동을 하는 것.",uses:[{pat:"put one's foot in it",desc:"실언하다·실수하다"}],ex:[{en:"I really <em>put my foot in it</em> by mentioning her ex.",ko:"그녀의 전 남자친구를 언급해서 완전히 실언했어.",note:"실언"},{en:"He <em>put his foot in it</em> at the dinner party.",ko:"그는 저녁 파티에서 실언했다.",note:"파티"},{en:"I've <em>put my foot in it</em> again — sorry.",ko:"또 실언했어, 미안해.",note:"사과"},{en:"She <em>put her foot in it</em> by asking when the baby was due.",ko:"그녀는 출산 예정일을 물어보다가 실언했다.",note:"실수"},{en:"I always seem to <em>put my foot in it</em>.",ko:"나는 항상 실언을 하는 것 같아.",note:"성격"}],syn:[{s:"blunder",m:"실수하다"},{s:"speak out of turn",m:"부적절하게 말하다"},{s:"say the wrong thing",m:"잘못 말하다"}],rel:["put your foot down 단호히 말하다","slip up 실수하다"]},
{w:"put one's foot down",pron:"/pʊt wʌnz fʊt daʊn/",ko:"단호히 말하다; 속도를 높이다",base:"put",diff:1,nu:"더 이상 용납하지 않겠다고 단호하게 말하거나, 차의 액셀을 밟아 속도를 높이는 것.",uses:[{pat:"put one's foot down (단호)",desc:"단호히 말하다"},{pat:"put one's foot down (속도)",desc:"속도를 높이다"}],ex:[{en:"She finally <em>put her foot down</em> and said no.",ko:"그녀는 마침내 단호히 거절했다.",note:"단호함"},{en:"You need to <em>put your foot down</em> with him.",ko:"그에게 단호하게 말해야 해.",note:"조언"},{en:"He <em>put his foot down</em> and the car accelerated.",ko:"그는 액셀을 밟아 차가 가속됐다.",note:"운전"},{en:"Parents sometimes need to <em>put their foot down</em>.",ko:"부모들은 때로 단호하게 말해야 할 때가 있다.",note:"육아"},{en:"I'll <em>put my foot down</em> if they try that again.",ko:"그들이 다시 시도하면 단호히 말하겠어.",note:"경고"}],syn:[{s:"put one's foot down",m:"단호히 말하다"},{s:"be firm",m:"단호하다"},{s:"accelerate",m:"가속하다"}],rel:["put one's foot in it 실언하다","stand firm 단호히 서다"]},
{w:"make a point of",pron:"/meɪk ə pɔɪnt əv/",ko:"~을 특히 신경 쓰다; 반드시 하다",base:"make",diff:2,nu:"무언가를 특별히 의도적으로 하거나 신경 쓰는 것.",uses:[{pat:"make a point of + V-ing",desc:"반드시 ~하다"}],ex:[{en:"She <em>makes a point of</em> arriving early.",ko:"그녀는 항상 일찍 도착하도록 신경 쓴다.",note:"습관"},{en:"I <em>make a point of</em> reading every day.",ko:"나는 매일 독서하는 것을 특히 신경 쓴다.",note:"습관"},{en:"He <em>made a point of</em> thanking everyone.",ko:"그는 모두에게 감사 인사를 전하는 것을 신경 썼다.",note:"배려"},{en:"<em>Make a point of</em> checking your work before submitting.",ko:"제출 전에 반드시 작업을 확인해.",note:"조언"},{en:"She always <em>makes a point of</em> being polite.",ko:"그녀는 항상 예의 바르게 행동하도록 신경 쓴다.",note:"성격"}],syn:[{s:"make sure to",m:"반드시 하다"},{s:"deliberately",m:"의도적으로"},{s:"take care to",m:"~하도록 신경 쓰다"}],rel:["make it a rule to 규칙적으로 하다","be sure to 반드시 하다"]},
{w:"make believe",pron:"/meɪk bɪˈliːv/",ko:"~인 척하다; 가상의",base:"make",diff:1,nu:"실제가 아닌 것을 상상하거나 ~인 척하는 것. 특히 어린이의 역할놀이.",uses:[{pat:"make believe + that",desc:"~인 척하다"},{pat:"make-believe (명사/형용사)",desc:"가상의"}],ex:[{en:"Children love to <em>make believe</em> they're superheroes.",ko:"아이들은 슈퍼히어로인 척하는 걸 좋아해.",note:"놀이"},{en:"It's not a <em>make-believe</em> world — this is real.",ko:"가상의 세계가 아니야, 이건 현실이야.",note:"현실"},{en:"Stop <em>making believe</em> everything is fine.",ko:"모든 것이 괜찮은 척 그만해.",note:"현실 부정"},{en:"She <em>made believe</em> she didn't see him.",ko:"그녀는 그를 보지 못한 척했다.",note:"무시"},{en:"It's just a <em>make-believe</em> story.",ko:"그냥 가상의 이야기야.",note:"허구"}],syn:[{s:"pretend",m:"~인 척하다"},{s:"fantasize",m:"공상하다"},{s:"play-act",m:"역할놀이 하다"}],rel:["pretend 척하다","let's pretend ~인 척 해보자"]},
{w:"go bust",pron:"/ɡəʊ bʌst/",ko:"파산하다",base:"go",diff:2,nu:"사업이 파산하거나 재정적으로 망하는 것.",uses:[{pat:"go bust",desc:"파산하다"}],ex:[{en:"The company <em>went bust</em> during the recession.",ko:"회사가 경기 침체 중에 파산했다.",note:"파산"},{en:"Several banks <em>went bust</em> in the crisis.",ko:"위기 중에 몇몇 은행이 파산했다.",note:"금융"},{en:"I don't want to <em>go bust</em> — we need to cut costs.",ko:"파산하고 싶지 않아, 비용을 줄여야 해.",note:"경고"},{en:"The startup <em>went bust</em> after just six months.",ko:"그 스타트업은 6개월 만에 파산했다.",note:"창업"},{en:"Many retailers <em>went bust</em> last year.",ko:"작년에 많은 소매업체가 파산했다.",note:"유통"}],syn:[{s:"go bankrupt",m:"파산하다"},{s:"go under",m:"파산하다"},{s:"collapse",m:"붕괴하다"}],rel:["go under 파산하다","go belly up 파산하다"]},
{w:"go nowhere",pron:"/ɡəʊ ˈnəʊweər/",ko:"진전이 없다; 아무 성과 없다",base:"go",diff:1,nu:"노력이나 협상이 아무런 결과나 진전을 이루지 못하는 것.",uses:[{pat:"go nowhere",desc:"진전이 없다"},{pat:"going nowhere fast",desc:"아무 성과도 없다"}],ex:[{en:"These negotiations are <em>going nowhere</em>.",ko:"이 협상은 진전이 없어.",note:"협상"},{en:"This conversation is <em>going nowhere</em>.",ko:"이 대화는 아무 성과가 없어.",note:"대화"},{en:"We're <em>going nowhere fast</em> with this approach.",ko:"이 방식으로는 아무 성과도 없어.",note:"방법"},{en:"The project was <em>going nowhere</em> until she took charge.",ko:"그녀가 책임을 맡기 전까지 프로젝트는 진전이 없었다.",note:"리더십"},{en:"His career was <em>going nowhere</em>.",ko:"그의 커리어는 아무 진전이 없었다.",note:"커리어"}],syn:[{s:"stagnate",m:"침체하다"},{s:"make no progress",m:"진전이 없다"},{s:"be stuck",m:"막히다"}],rel:["get nowhere 아무 성과가 없다","spinning wheels 헛돌고 있다"]},
{w:"give the go-ahead",pron:"/ɡɪv ðə ɡəʊ əˈhed/",ko:"진행 허가를 내리다",base:"give",diff:2,nu:"계획이나 프로젝트를 공식적으로 진행하도록 허가하는 것.",uses:[{pat:"give the go-ahead",desc:"진행을 허가하다"}],ex:[{en:"The boss <em>gave the go-ahead</em> for the project.",ko:"상사가 프로젝트 진행을 허가했다.",note:"승인"},{en:"We're still waiting for the <em>go-ahead</em>.",ko:"우리는 아직 허가를 기다리고 있어.",note:"대기"},{en:"Once we get the <em>go-ahead</em>, we can start.",ko:"허가가 나면 시작할 수 있어.",note:"준비"},{en:"She was <em>given the go-ahead</em> to proceed.",ko:"그녀는 진행 허가를 받았다.",note:"공식"},{en:"The government <em>gave the go-ahead</em> for construction.",ko:"정부가 공사 진행을 허가했다.",note:"정책"}],syn:[{s:"authorize",m:"허가하다"},{s:"approve",m:"승인하다"},{s:"green-light",m:"허가하다"}],rel:["go ahead 진행하다","get the green light 허가받다"]},

const PS=8;
let saved=new Set(JSON.parse(localStorage.getItem('pv_saved')||'[]'));
let curBase='';
let pool=[...PV];
let filt=[...pool];
let pg=0;

function save(){localStorage.setItem('pv_saved',JSON.stringify([...saved]));document.getElementById('sc0').textContent=saved.size;}

function diffStar(d){
  const cls=['','d1','d2','d3'];
  const f=d||1;
  let s='<span class="ds">';
  for(let i=1;i<=3;i++) s+='<span class="'+(i<=f?cls[f]:'')+'">'+( i<=f?'★':'☆')+'</span>';
  return s+'</span>';
}

// base filter buttons 생성
(function(){
  const all=[...new Set(PV.map(p=>p.base))];
  // 각 base 개수 세기
  const cnt={};
  PV.forEach(p=>{cnt[p.base]=(cnt[p.base]||0)+1;});
  // other 제외하고 개수 내림차순 정렬, other는 맨 끝
  const bases=all.filter(b=>b!=='other').sort((a,b)=>cnt[b]-cnt[a]);
  if(all.includes('other')) bases.push('other');
  const bf=document.getElementById('bf');
  bases.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='bf-btn';
    btn.textContent=b==='other'?'📦 기타':b;
    btn.onclick=()=>setBase(b);
    bf.appendChild(btn);
  });
})();

function setBase(b){
  curBase=b;
  document.querySelectorAll('.bf-btn').forEach((btn,i)=>{
    const label=btn.textContent;
    btn.classList.toggle('on', b==='' ? i===0 : label===b);
  });
  applyFilter();
}

function applyFilter(){
  let base=curBase?PV.filter(w=>w.base===curBase):[...PV];
  const q=document.getElementById('srch').value.toLowerCase().trim();
  filt=q?base.filter(w=>w.w.toLowerCase().includes(q)||w.ko.includes(q)):base;
  pg=0;rdr();
}

function onSrch(){applyFilter();}
function doShuffle(){shuf(filt);pg=0;rdr();}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}}
function nxt(){if((pg+1)*PS<filt.length){pg++;rdr();window.scrollTo(0,0);}}
function prv(){if(pg>0){pg--;rdr();window.scrollTo(0,0);}}

function spk(e,w){
  e.stopPropagation();
  const u=new SpeechSynthesisUtterance(w);
  u.lang='en-US';u.rate=0.9;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
function tgSv(e,w){
  e.stopPropagation();
  saved.has(w)?saved.delete(w):saved.add(w);
  save();rdr();
}

function tog(id){
  document.getElementById(id).classList.toggle('ex');
}

function rdr(){
  const total=filt.length;
  const start=pg*PS, end=Math.min(start+PS,total);
  const slice=filt.slice(start,end);
  document.getElementById('plbl').textContent=total+'개';
  document.getElementById('pnd').textContent=(pg+1)+'/'+ Math.ceil(total/PS)||1;
  document.getElementById('pbtn').disabled=pg===0;
  document.getElementById('nbtn').disabled=end>=total;

  document.getElementById('wl').innerHTML=slice.map((w,i)=>{
    const sv=saved.has(w.w);
    const usesHtml=w.uses.map(u=>`<div class="use-row"><span class="use-pat">${u.pat}</span><span class="use-desc">${u.desc}</span></div>`).join('');
    const exHtml=w.ex.map(e=>`<div class="exb">${e.en}<div class="exko">${e.ko}</div><div class="exnote">${e.note||''}</div></div>`).join('');
    const synHtml=`<div class="sg">${w.syn.map(s=>`<div class="sr"><span class="sc">${s.s}</span><span class="sm">${s.m}</span></div>`).join('')}</div>`;
    const relHtml=`<div class="rc">${w.rel.map(r=>`<span class="rch">${r}</span>`).join('')}</div>`;
    return `<div class="wc" id="c${i}">
  <div class="ch" onclick="tog('c${i}')">
    <div class="wi">
      <div class="wtop">
        <span class="wen">${w.w}</span>
        <span class="wbase">${w.base}</span>
        ${diffStar(w.diff)}
      </div>
      <div class="wpron">${w.pron}</div>
      <div class="wko">${w.ko}</div>
    </div>
    <div class="ca">
      <button class="sbtn" onclick="spk(event,'${w.w}')">🔊</button>
      <button class="vbtn${sv?' sv':''}" onclick="tgSv(event,'${w.w}')">${sv?'⭐':'☆'}</button>
      <span class="ei">▼</span>
    </div>
  </div>
  <div class="cd">
    <div class="nu-box"><strong>뉘앙스</strong>${w.nu}</div>
    <div class="uses-box"><div class="uses-title">쓰임새 패턴</div>${usesHtml}</div>
    <div class="ex-section"><div class="ex-title">예문 (${w.ex.length}개)</div>${exHtml}</div>
    <div class="syn-box"><div class="uses-title">유의어</div>${synHtml}</div>
    <div class="uses-title" style="margin-top:10px">관련 표현</div>${relHtml}
  </div>
</div>`;
  }).join('');
}

function sw(tab){
  ['vocab','saved','quiz'].forEach((t,i)=>{
    document.getElementById('pnl-'+t).classList.toggle('on',t===tab);
    document.querySelectorAll('.tb')[i].classList.toggle('on',t===tab);
  });
  if(tab==='saved')rdrSaved();
  if(tab==='quiz')rdrQuiz();
}

function clrAll(){
  if(!saved.size)return;
  saved.clear();save();rdrSaved();rdr();
}

function rdrSaved(){
  const svl=document.getElementById('svl');
  const words=PV.filter(w=>saved.has(w.w));
  if(!words.length){svl.innerHTML='<div class="se"><div class="ic">⭐</div><p>저장된 단어가 없습니다.</p></div>';return;}
  svl.innerHTML=words.map((w,i)=>{
    const usesHtml=w.uses.map(u=>`<div class="use-row"><span class="use-pat">${u.pat}</span><span class="use-desc">${u.desc}</span></div>`).join('');
    const exHtml=w.ex.map(e=>`<div class="exb">${e.en}<div class="exko">${e.ko}</div><div class="exnote">${e.note||''}</div></div>`).join('');
    return `<div class="wc" id="s${i}">
  <div class="ch" onclick="tog('s${i}')">
    <div class="wi">
      <div class="wtop"><span class="wen">${w.w}</span><span class="wbase">${w.base}</span>${diffStar(w.diff)}</div>
      <div class="wpron">${w.pron}</div>
      <div class="wko">${w.ko}</div>
    </div>
    <div class="ca">
      <button class="sbtn" onclick="spk(event,'${w.w}')">🔊</button>
      <button class="vbtn sv" onclick="tgSv(event,'${w.w}')">⭐</button>
      <span class="ei">▼</span>
    </div>
  </div>
  <div class="cd">
    <div class="nu-box"><strong>뉘앙스</strong>${w.nu}</div>
    <div class="uses-box"><div class="uses-title">쓰임새 패턴</div>${usesHtml}</div>
    <div class="ex-section"><div class="ex-title">예문</div>${exHtml}</div>
  </div>
</div>`;
  }).join('');
}

// ── Quiz ──
let qPool=[],qIdx=0,qScore=0,qAns=false,qWrong=[];
function rdrQuiz(){
  const qc=document.getElementById('qc');
  const shuffled=PV.slice().sort(()=>Math.random()-.5).slice(0,10);
  qPool=shuffled;
  if(qPool.length<4){qc.innerHTML='<div class="se"><div class="ic">📚</div><p>단어가 부족합니다.</p></div>';return;}
  qIdx=0;qScore=0;qWrong=[];showQ();
}
function showQ(){
  const qc=document.getElementById('qc');
  if(qIdx>=qPool.length){
    // 결과 화면
    const wrongHtml=qWrong.length===0?'<p style="color:var(--ac4);font-size:13px;margin-top:12px">🎉 모두 정답!</p>':`
      <div style="margin-top:16px;text-align:left">
        <p style="font-size:11px;color:var(--mu);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">틀린 문제 (${qWrong.length}개)</p>
        ${qWrong.map(w=>`<div style="background:var(--sf2);border:1px solid rgba(240,127,160,.25);border-radius:10px;padding:10px 12px;margin-bottom:6px">
          <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--tx)">${w.w}</div>
          <div style="font-size:11px;color:var(--ac3);margin-top:2px">내 답: ${w.mine}</div>
          <div style="font-size:11px;color:var(--ac4);margin-top:1px">정답: ${w.ko}</div>
        </div>`).join('')}
      </div>`;
    qc.innerHTML=`<div class="qres">
      <div style="font-size:13px;color:var(--mu);margin-bottom:8px">최종 점수</div>
      <div class="qsc">${qScore}<span style="font-size:22px;color:var(--mu)">/${qPool.length}</span></div>
      <div style="margin-top:10px;font-size:13px;color:var(--mu)">${qScore>=qPool.length*.8?'🎉 훌륭해요!':qScore>=qPool.length*.5?'👍 잘 했어요!':'📚 더 연습해요!'}</div>
      ${wrongHtml}
      <button class="btn a" style="margin-top:16px" onclick="rdrQuiz()">다시 풀기</button>
    </div>`;
    return;
  }
  const w=qPool[qIdx];
  const wrong=PV.filter(x=>x.w!==w.w).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[...wrong,w].sort(()=>Math.random()-.5);
  const prog=(qIdx/qPool.length*100).toFixed(0);
  // 정답 인덱스를 PV 배열 인덱스로 저장 (따옴표 이슈 방지)
  const ansIdx=PV.findIndex(x=>x.w===w.w);
  qc.innerHTML=`<div class="pb"><div class="pf" style="width:${prog}%"></div></div>
<div class="qsetup"><p style="font-size:10px;color:var(--mu);margin-bottom:4px">${qIdx+1} / ${qPool.length}</p>
<div class="qcard"><div class="qw">${w.w}</div><div class="qsub">${w.pron}</div></div>
<div class="qopts">${opts.map((o,i)=>{const oIdx=PV.findIndex(x=>x.w===o.w);return `<button class="qob" onclick="ansQ(${oIdx},${ansIdx},this)">${o.ko}</button>`;}).join('')}</div></div>`;
}
function ansQ(selIdx,ansIdx,el){
  if(qAns)return;qAns=true;
  const correct=selIdx===ansIdx;
  const ansWord=PV[ansIdx];
  document.querySelectorAll('.qob').forEach(b=>{
    b.disabled=true;
    if(b.textContent===ansWord.ko) b.classList.add('ok');
  });
  el.classList.add(correct?'ok':'no');
  if(correct){
    qScore++;
    setTimeout(()=>{qIdx++;qAns=false;showQ();},900);
  } else {
    qWrong.push({w:ansWord.w,ko:ansWord.ko,mine:el.textContent});
    setTimeout(()=>{qIdx++;qAns=false;showQ();},3000);
  }
}
